# GCP (Google Cloud Platform) Infrastructure as Code Security Rules
# Detects security misconfigurations in GCP Terraform and YAML templates
# Version: 1.0.0

# ======================== Cloud Storage (GCS) ========================

- id: gcp-storage-public-bucket
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_storage_bucket[^}]*acl\s*=\s*"publicRead"''- regex: '(?i)google_storage_bucket[^}]*acl\s*=\s*"public-read"''- regex: '(?i)google_storage_bucket_object[^}]*acl\s*=\s*"publicRead"''severity: critical
  description: "GCS bucket with public ACL - sensitive data may be exposed to the internet"
  remediation: "Remove public ACLs and use IAM policies for access control"
  cwe: "CWE-732"
  owasp: "A01:2021"

- id: gcp-storage-uniform-bucket-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_storage_bucket[^}]*uniform_bucket_level_access\s*=\s*false''severity: high
  description: "GCS bucket does not have uniform bucket-level access enabled"
  remediation: "Set uniform_bucket_level_access = true to enforce IAM-only access"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-storage-public-access-prevention
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)public_access_prevention\s*=\s*"inherited"|public_access_prevention\s*=\s*"unspecified"''severity: critical
  description: "GCS bucket does not enforce public access prevention"
  remediation: "Set public_access_prevention = 'enforced' to prevent public access"
  cwe: "CWE-732"
  owasp: "A01:2021"

- id: gcp-storage-no-versioning
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_storage_bucket[^}]*versioning\s*=\s*false''- regex: '(?i)google_storage_bucket[^}]*versioning\s*\{[^}]*enabled\s*=\s*false''severity: medium
  description: "GCS bucket does not have versioning enabled - data loss risk"
  remediation: "Enable versioning to protect against accidental deletions"
  cwe: "CWE-400"
  owasp: "A04:2021"

- id: gcp-storage-no-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_storage_bucket[^}]*encryption\s*\{[^}]*default_kms_key_name\s*=\s*""''- regex: '(?i)google_storage_bucket[^}]*encryption\s*=\s*\{\s*\}''severity: high
  description: "GCS bucket does not use customer-managed encryption keys"
  remediation: "Configure default_kms_key_name with a Cloud KMS key"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: gcp-storage-lifecycle-no-delete
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_storage_bucket[^}]*lifecycle_rule[^}]*action[^}]*type\s*=\s*"Delete"''severity: low
  description: "GCS bucket has lifecycle rule that may delete data"
  remediation: "Review lifecycle rules and set age/num_newer_versions appropriately"
  cwe: "N/A"
  owasp: "N/A"

# ======================== Cloud SQL ========================

- id: gcp-sql-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_sql_database_instance[^}]*ip_configuration[^}]*ipv4_enabled\s*=\s*true''- regex: '(?i)google_sql_database_instance[^}]*public_ip_address\s*=\s*true''- regex: '(?i)google_sql_database_instance[^}]*database_flags[^}]*name\s*=\s*"enable_public_ip"''severity: critical
  description: "Cloud SQL instance has public IP enabled - database exposed to internet"
  remediation: "Disable public IP and use Cloud SQL Proxy or private IP with VPC"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-sql-no-ssl
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_sql_database_instance[^}]*ssl_mode\s*=\s*"ALLOW_UNENCRYPTED"|ssl_mode\s*=\s*"DISABLED"''- regex: '(?i)google_sql_database_instance[^}]*require_ssl\s*=\s*false''severity: critical
  description: "Cloud SQL instance does not require SSL/TLS connections"
  remediation: "Set require_ssl = true and configure SSL certificates"
  cwe: "CWE-295"
  owasp: "A02:2021"

- id: gcp-sql-weak-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_sql_database_instance[^}]*database_version\s*=\s*"MYSQL_5\.|database_version\s*=\s*"POSTGRES_9\."''severity: high
  description: "Cloud SQL using outdated database version with weak encryption"
  remediation: "Upgrade to latest supported database version with stronger encryption"
  cwe: "CWE-327"
  owasp: "A02:2021"

- id: gcp-sql-no-backup
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_sql_database_instance[^}]*backup_configuration[^}]*enabled\s*=\s*false''- regex: '(?i)google_sql_database_instance[^}]*backup_configuration\s*=\s*\{\s*\}''severity: high
  description: "Cloud SQL instance does not have automated backups enabled"
  remediation: "Enable backup_configuration with retention days"
  cwe: "CWE-778"
  owasp: "A09:2021"

- id: gcp-sql-root-password
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_sql_user[^}]*password\s*=\s*"[^"]{0,15}"''severity: critical
  description: "Cloud SQL root/user password is too short or weak"
  remediation: "Use a strong password with at least 16 characters"
  cwe: "CWE-259"
  owasp: "A02:2021"

# ======================== IAM ========================

- id: gcp-iam-wildcard-principal
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_iam_policy[^}]*binding[^}]*members\s*=\s*\[\s*"allUsers"''- regex: '(?i)google_iam_policy[^}]*binding[^}]*members\s*=\s*\[\s*"allAuthenticatedUsers"''- regex: '(?i)member\s*=\s*"allUsers"''- regex: '(?i)member\s*=\s*"allAuthenticatedUsers"''severity: critical
  description: "IAM policy grants access to allUsers or allAuthenticatedUsers"
  remediation: "Replace wildcard principals with specific service accounts or users"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-iam-wildcard-action
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_iam_policy[^}]*role\s*=\s*"roles/owner"''- regex: '(?i)google_iam_policy[^}]*role\s*=\s*"roles/editor"''- regex: '(?i)role\s*=\s*"roles/\*"''- regex: '(?i)role\s*=\s*"roles/viewer"[^}]*actions\s*=\s*"\*"''severity: high
  description: "IAM policy grants overly broad roles or wildcard actions"
  remediation: "Use least-privilege roles with specific permissions"
  cwe: "CWE-250"
  owasp: "A01:2021"

- id: gcp-service-account-key
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_service_account_key[^}]*key_algorithm\s*=\s*"KEY_ALG_RSA_2048"''- regex: '(?i)google_service_account_key[^}]*private_key_type\s*=\s*"TYPE_GOOGLE_CREDENTIALS_FILE"''severity: high
  description: "Service account user-managed key found - rotation required"
  remediation: "Use service account impersonation instead of long-lived keys"
  cwe: "CWE-798"
  owasp: "A02:2021"

- id: gcp-service-account-key-expired
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_service_account_key[^}]*valid_after_time\s*=\s*"[0-9]{4}-[0-9]{2}-[0-9]{2}"''- regex: '(?i)google_service_account_key[^}]*valid_before_time\s*=\s*"202[0-9]"''severity: high
  description: "Service account key has expired or will expire soon"
  remediation: "Delete expired keys and rotate keys before expiration"
  cwe: "CWE-798"
  owasp: "A02:2021"

- id: gcp-service-account-default
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)service_account\s*=\s*"default"''- regex: '(?i)service_account\s*=\s*"[0-9]+-compute@developer\.gserviceaccount\.com"''severity: high
  description: "Using default service account instead of dedicated service account"
  remediation: "Create and use a dedicated service account with minimal permissions"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== BigQuery ========================

- id: gcp-bigquery-public-dataset
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_bigquery_dataset[^}]*access\s*=\s*\[.*"specialGroup":\s*"allUsers"''- regex: '(?i)google_bigquery_dataset[^}]*access\s*=\s*\[.*"specialGroup":\s*"allAuthenticatedUsers"''- regex: '(?i)google_bigquery_dataset[^}]*access\s*\[.*role\s*=\s*"OWNER"[^}]*userByEmail''severity: critical
  description: "BigQuery dataset is publicly accessible"
  remediation: "Remove public access and use authorized views or service accounts"
  cwe: "CWE-732"
  owasp: "A01:2021"

- id: gcp-bigquery-no-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_bigquery_table[^}]*encryption_configuration\s*=\s*\{\s*\}''- regex: '(?i)google_bigquery_table[^}]*kms_key_name\s*=\s*""''severity: high
  description: "BigQuery table does not use customer-managed encryption keys"
  remediation: "Configure encryption_configuration with a Cloud KMS key"
  cwe: "CWE-311"
  owasp: "A02:2021"

# ======================== Pub/Sub ========================

- id: gcp-pubsub-public-topic
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_pubsub_topic[^}]*labels\s*=\s*\{[^}]*public\s*=\s*"true"''- regex: '(?i)google_pubsub_subscription[^}]*ack_deadline_seconds\s*=\s*600''severity: high
  description: "Pub/Sub topic may be exposed publicly"
  remediation: "Review IAM policies on topics and restrict access"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-pubsub-no-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_pubsub_topic[^}]*message_encryption\s*=\s*"NONE"''severity: high
  description: "Pub/Sub topic does not use encryption at rest"
  remediation: "Enable customer-managed encryption using Cloud KMS"
  cwe: "CWE-311"
  owasp: "A02:2021"

# ======================== GKE (Kubernetes Engine) ========================

- id: gcp-gke-private-cluster-disabled
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_container_cluster[^}]*private_cluster_config\s*=\s*\{\s*enable_private_nodes\s*=\s*false''- regex: '(?i)google_container_cluster[^}]*private_cluster_config\s*=\s*\{\s*\}''- regex: '(?i)google_container_cluster[^}]*private_cluster\s*=\s*false''severity: critical
  description: "GKE cluster has private cluster disabled - nodes exposed to public internet"
  remediation: "Enable private_cluster_config with enable_private_nodes = true"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-gke-master-authorized-networks
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_container_cluster[^}]*master_authorized_networks_config[^}]*cidr_blocks[^}]*cidr_block\s*=\s*"0\.0\.0\.0/0"''- regex: '(?i)google_container_cluster[^}]*master_authorized_networks_config\s*=\s*\{\s*\}''severity: critical
  description: "GKE cluster allows master access from 0.0.0.0/0"
  remediation: "Configure specific CIDR blocks for authorized master access"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-gke-no-network-policy
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_container_cluster[^}]*network_policy\s*=\s*false''- regex: '(?i)google_container_cluster[^}]*network_policy_config\s*=\s*\{\s*disabled\s*=\s*true''severity: high
  description: "GKE cluster does not have network policy enabled"
  remediation: "Enable network_policy and install Calico for pod communication control"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-gke-legacy-authorization
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_container_cluster[^}]*enable_legacy_abac\s*=\s*true''severity: critical
  description: "GKE cluster has legacy ABAC enabled - insecure authorization mode"
  remediation: "Disable enable_legacy_abac and use RBAC instead"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-gke-no-stackdriver
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_container_cluster[^}]*logging_service\s*=\s*"none"''- regex: '(?i)google_container_cluster[^}]*monitoring_service\s*=\s*"none"''severity: medium
  description: "GKE cluster does not have logging and monitoring enabled"
  remediation: "Enable Cloud Logging and Cloud Monitoring"
  cwe: "CWE-778"
  owasp: "A09:2021"

- id: gcp-gke-default-service-account
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_container_node_pool[^}]*service_account\s*=\s*"default"''- regex: '(?i)google_container_node_pool[^}]*service_account\s*=\s*"[0-9]+-compute@developer\.gserviceaccount\.com"''severity: high
  description: "GKE nodes use default service account with excessive permissions"
  remediation: "Create and use a dedicated service account with minimal permissions"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== Cloud Functions ========================

- id: gcp-function-allow-unauthenticated
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_cloudfunctions_function[^}]*invoker\s*=\s*"allUsers"''- regex: '(?i)google_cloudfunctions2_function[^}]*build_config[^}]*service_account\s*=\s*"default"''severity: critical
  description: "Cloud Function allows unauthenticated invocation"
  remediation: "Remove allUsers invoker and use IAM for authentication"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-function-no-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_cloudfunctions_function[^}]*environment_variables\s*\{[^}]*ENCRYPTED\s*=\s*"false"''severity: medium
  description: "Cloud Function may store sensitive data without encryption"
  remediation: "Use Cloud KMS for sensitive environment variables"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: gcp-function-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_cloudfunctions_function[^}]*https_trigger_url\s*=\s*"https://[a-z0-9-]*\.cloudfunctions\.net"''severity: critical
  description: "Cloud Function is publicly accessible"
  remediation: "Restrict access with IAM or use VPC connector"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== App Engine ========================

- id: gcp-appengine-debug-mode
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_app_engine_standard_app_version[^}]*runtime\s*=\s*"python38"[^}]*debug\s*=\s*true''- regex: '(?i)google_app_engine_flexible_app_version[^}]*debug\s*=\s*true''severity: critical
  description: "App Engine application has debug mode enabled in production"
  remediation: "Disable debug mode in production environments"
  cwe: "CWE-11"
  owasp: "A04:2021"

- id: gcp-appengine-insecure-ssl
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_app_engine_application[^}]*ssl_support\s*=\s*"SSL_SUPPORT_DISABLED"''- regex: '(?i)google_app_engine_application[^}]*automatic_ssl_provisioning\s*=\s*false''severity: high
  description: "App Engine application does not have SSL enabled"
  remediation: "Enable SSL/TLS with automatic certificate provisioning"
  cwe: "CWE-295"
  owasp: "A02:2021"

- id: gcp-appengine-weak-runtime
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_app_engine_flexible_app_version[^}]*runtime\s*=\s*"python27"|runtime\s*=\s*"python3\.[0-6]"''- regex: '(?i)google_app_engine_flexible_app_version[^}]*runtime\s*=\s*"nodejs10"''severity: high
  description: "App Engine uses deprecated/end-of-life runtime"
  remediation: "Upgrade to current supported runtime versions"
  cwe: "CWE-1104"
  owasp: "A06:2021"

# ======================== VPC Firewall ========================

- id: gcp-firewall-allow-all-ingress
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_compute_firewall[^}]*direction\s*=\s*"INGRESS"[^}]*source_ranges\s*=\s*\[\s*"0\.0\.0\.0/0"\s*\]''- regex: '(?i)google_compute_firewall[^}]*source_ranges\s*=\s*\[\s*"0\.0\.0\.0/0"\s*\]''- regex: '(?i)google_compute_firewall[^}]*allow\s*\{[^}]*ports\s*=\s*\[\s*"all"\s*\]''severity: critical
  description: "VPC firewall rule allows all ingress traffic from internet"
  remediation: "Restrict source_ranges to specific IP ranges and limit ports"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-firewall-no-logging
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_compute_firewall[^}]*log_config\s*=\s*\{\s*\}''- regex: '(?i)google_compute_firewall[^}]*log_config[^}]*enable_logging\s*=\s*false''severity: medium
  description: "VPC firewall rule does not have logging enabled"
  remediation: "Enable log_config with enable_logging = true"
  cwe: "CWE-778"
  owasp: "A09:2021"

# ======================== Cloud CDN ========================

- id: gcp-cdn-disabled-backend-bucket
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_compute_backend_bucket[^}]*enable_cdn\s*=\s*false''- regex: '(?i)google_compute_backend_bucket[^}]*cdn_policy\s*=\s*\{\s*\}|enable_cloud_cdn\s*=\s*false''severity: high
  description: "Cloud CDN is disabled for backend bucket - content not cached"
  remediation: "Enable enable_cdn = true for better performance and security"
  cwe: "N/A"
  owasp: "A04:2021"

- id: gcp-cdn-no-signed-url
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_compute_backend_bucket[^}]*cdn_policy[^}]*signed_url_cache_max_age\s*=\s*"0s"''severity: medium
  description: "Cloud CDN does not use signed URLs for private content"
  remediation: "Configure signed_url_cache_max_age for private content"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== Load Balancer ========================

- id: gcp-lb-no-ssl-policy
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_compute_ssl_policy[^}]*tls_min_version\s*=\s*"TLS_1_0"''- regex: '(?i)google_compute_target_https_proxy[^}]*ssl_policy\s*=\s*""''- regex: '(?i)google_compute_global_forwarding_rule[^}]*port_range\s*=\s*"80"''severity: high
  description: "Load balancer has weak or no SSL policy configured"
  remediation: "Create SSL policy with TLS 1.2 minimum and modern cipher suites"
  cwe: "CWE-295"
  owasp: "A02:2021"

- id: gcp-lb-no-health-check
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_compute_backend_service[^}]*health_checks\s*=\s*""''- regex: '(?i)google_compute_backend_service[^}]*health_check\s*=\s*\{\s*\}''severity: medium
  description: "Load balancer backend service has no health check configured"
  remediation: "Configure health_check with appropriate check interval and timeout"
  cwe: "N/A"
  owasp: "N/A"

# ======================== Cloud Run ========================

- id: gcp-cloudrun-allow-unauthenticated
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_cloud_run_service_iam_member[^}]*member\s*=\s*"allUsers"''- regex: '(?i)google_cloud_run_service[^}]*allow_unauthenticated\s*=\s*true''severity: critical
  description: "Cloud Run service allows unauthenticated access"
  remediation: "Remove allUsers member and use IAM for authentication"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-cloudrun-no-vpc-connector
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_cloud_run_service[^}]*vpc_connector\s*=\s*""''- regex: '(?i)google_cloud_run_service[^}]*egress_settings\s*=\s*"ALL_TRAFFIC"''severity: high
  description: "Cloud Run service does not use VPC connector - traffic exits to public internet"
  remediation: "Configure vpc_connector for private traffic routing"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== Composer (Airflow) ========================

- id: gcp-composer-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_composer_environment[^}]*config[^}]*web_server_network_ip\s*=\s*"[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+"''severity: critical
  description: "Composer/Airflow web server has public IP assigned"
  remediation: "Use private IP and configure Identity-Aware Proxy for access"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-composer-no-private-workers
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_composer_environment[^}]*config[^}]*use_private_environment\s*=\s*false''severity: high
  description: "Composer does not use private environment - workers exposed to public internet"
  remediation: "Enable use_private_environment = true"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gcp-composer-no-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_composer_environment[^}]*config[^}]*encryption_config\s*=\s*\{\s*\}''severity: medium
  description: "Composer environment does not use customer-managed encryption keys"
  remediation: "Configure encryption_config with a Cloud KMS key"
  cwe: "CWE-311"
  owasp: "A02:2021"

# ======================== VPC ========================

- id: gcp-vpc-flow-logs-disabled
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_compute_network[^}]*auto_create_subnetworks\s*=\s*true''- regex: '(?i)google_compute_subnetwork[^}]*log_config\s*=\s*\{\s*\}|enable_flow_logs\s*=\s*false''severity: medium
  description: "VPC flow logs are disabled - network traffic not monitored"
  remediation: "Enable flow logs on subnetworks for network monitoring"
  cwe: "CWE-778"
  owasp: "A09:2021"

- id: gcp-vpc-dns-peering
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_dns_peering_zone[^}]*target_network\s*=\s*""''severity: low
  description: "DNS peering zone may allow cross-project DNS queries"
  remediation: "Review DNS peering configuration and limit to authorized networks"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== Cloud DNS ========================

- id: gcp-dns-dsec-not-enabled
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_dns_managed_zone[^}]*dnssec_config\s*=\s*\{\s*\}''- regex: '(?i)google_dns_managed_zone[^}]*dnssec_config[^}]*state\s*=\s*"off"''severity: high
  description: "Cloud DNS does not have DNSSEC enabled"
  remediation: "Enable DNSSEC with state = 'on'"
  cwe: "CWE-311"
  owasp: "A02:2021"

# ======================== Cloud KMS ========================

- id: gcp-kms-no-key-protection
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_kms_key_ring[^}]*location\s*=\s*"us"''- regex: '(?i)google_kms_crypto_key[^}]*rotation_period\s*=\s*""''severity: high
  description: "Cloud KMS key ring in default location or key has no rotation"
  remediation: "Use regional key rings and set rotation_period (e.g., 7776000s = 90 days)"
  cwe: "CWE-327"
  owasp: "A02:2021"

- id: gcp-kms-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)google_kms_key_ring_iam_policy[^}]*members\s*=\s*\[\s*"allUsers"''- regex: '(?i)google_kms_crypto_key_iam_binding[^}]*role\s*=\s*"roles/cloudkms\.cryptoKeyEncrypter"[^}]*members\s*=\s*"allUsers"''severity: critical
  description: "Cloud KMS key is publicly accessible - encryption compromised"
  remediation: "Restrict IAM policy to specific service accounts and users"
  cwe: "CWE-284"
  owasp: "A01:2021"

