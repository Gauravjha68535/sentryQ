- id: crystal-system-cmd
  languages: [crystal]
  patterns:
    - regex: '(?i)\bsystem\s*\('
  severity: critical
  description: "OS command execution"
  remediation: "Use Process.run with array of arguments"
  cwe: "CWE-78"
  owasp: "A03:2021"
  confidence: 0.8

- id: crystal-backticks
  languages: [crystal]
  patterns:
    - regex: '(?i)`[^`]*#\{[^}]+}[^`]*`'
  severity: critical
  description: "OS command execution via backticks"
  remediation: "Use Process.run"
  cwe: "CWE-78"
  owasp: "A03:2021"
  confidence: 0.8

- id: crystal-sql-concat
  languages: [crystal]
  patterns:
    - regex: '(?i)db\.query\s*\(.*#\{'
  severity: critical
  description: "SQL injection via interpolation"
  remediation: "Use generic DB bound arguments ?"
  cwe: "CWE-89"
  owasp: "A03:2021"
  confidence: 0.8

- id: crystal-sql-exec-concat
