  owasp: "A06:2021"

- id: bash-function-local-var
  languages: [bash]
  patterns:
    - regex: 'function\.s+\.w+\.s*{\.s*[^}]*\.$[a-zA-Z_][a-zA-Z0-9_]*'
  severity: medium
  description: "Function using global variables (side effects)"
  remediation: "Use local variables with local keyword"
