  owasp: "A03:2021"

- id: bash-function-local-keyword
  languages: [bash]
  patterns:
    - regex: 'local\.s+\.w+='
  severity: low
  description: "local variable in function (good)"
  remediation: "Good practice"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-function-redefine
  languages: [bash]
  patterns:
    - regex: 'function\.s+\.w+\.s*{\.s*[^}]*}\.s*function\.s+\.1'
  severity: low
