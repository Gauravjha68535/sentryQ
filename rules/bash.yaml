- id: bash-eval-usage
  languages: [bash]
  patterns:
    - regex: '\.beval\.s+'
  severity: high
  description: "Use of eval can execute arbitrary code"
  remediation: "Avoid eval. Use arrays and proper quoting for dynamic commands"
  cwe: "CWE-94"
  owasp: "A03:2021"

- id: bash-unquoted-variable
  languages: [bash]
  patterns:
    - regex: '\.$\.{?[A-Za-z_][A-Za-z0-9_]*\.}?(?:[^\.''])'
  severity: medium
  description: "Unquoted variable expansion may cause word splitting and globbing"
  remediation: "Always quote variable expansions: \"$variable\" instead of $variable"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: bash-backtick-command
  languages: [bash]
  patterns:
    - regex: '`[^`]+`'
  severity: low
  description: "Backtick command substitution is harder to read and nest"
  remediation: "Use $(command) syntax instead of backticks for command substitution"
  cwe: "N/A"
  owasp: "N/A"

# ======================== Hardcoded Secrets ========================
- id: bash-hardcoded-password
  languages: [bash]
  patterns:
    - regex: '(?i)(PASSWORD|PASSWD|DB_PASS|MYSQL_PASSWORD)\.s*=\.s*[''\.][^''\.]{8,}[''\.]'
  severity: high
  description: "Hardcoded password in shell script"
  remediation: "Use environment variables, .env files with restricted permissions, or a secrets manager"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: bash-hardcoded-api-key
  languages: [bash]
  patterns:
    - regex: '(?i)(API_KEY|SECRET_KEY|ACCESS_TOKEN)\.s*=\.s*[''\.][a-zA-Z0-9]{16,}[''\.]'
  severity: high
  description: "Hardcoded API key or token in shell script"
  remediation: "Pass secrets via environment variables or secrets manager"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: bash-aws-credentials
  languages: [bash]
  patterns:
    - regex: 'AKIA[0-9A-Z]{16}|(?i)AWS_SECRET_ACCESS_KEY\.s*=\.s*[''\.][^''\.]+[''\.]'
  severity: critical
  description: "AWS credentials detected in shell script"
  remediation: "Use IAM roles, AWS CLI profiles, or environment variables"
  cwe: "CWE-798"
  owasp: "A07:2021"

# ======================== Insecure File Operations ========================
- id: bash-world-writable-chmod
  languages: [bash]
  patterns:
    - regex: 'chmod\.s+(777|666|o\.+w)'
  severity: high
  description: "Setting world-writable permissions is a security risk"
  remediation: "Use restrictive permissions: chmod 750 for dirs, chmod 640 for files"
  cwe: "CWE-732"
  owasp: "A01:2021"

- id: bash-insecure-temp-file
  languages: [bash]
  patterns:
    - regex: '(?i)/tmp/[a-zA-Z0-9_]+'
  severity: medium
  description: "Predictable temp file name — vulnerable to symlink attacks"
  remediation: "Use mktemp for secure temp file creation: tmpfile=$(mktemp)"
  cwe: "CWE-377"
  owasp: "N/A"

# ======================== Insecure Network ========================
- id: bash-curl-insecure
  languages: [bash]
  patterns:
    - regex: 'curl\.s+.*(-k|--insecure)'
  severity: high
  description: "curl with --insecure flag disables SSL certificate verification"
  remediation: "Remove -k/--insecure flag. Fix certificate issues instead"
  cwe: "CWE-295"
  owasp: "A07:2021"

- id: bash-wget-no-check
  languages: [bash]
  patterns:
    - regex: 'wget\.s+.*--no-check-certificate'
  severity: high
  description: "wget with --no-check-certificate disables SSL verification"
  remediation: "Remove --no-check-certificate. Install proper CA certificates"
  cwe: "CWE-295"
  owasp: "A07:2021"

- id: bash-pipe-to-shell
  languages: [bash]
  patterns:
    - regex: 'curl\.s+.*\.|\.s*(bash|sh|zsh)|wget\.s+.*-O\.s*-\.s*\.|\.s*(bash|sh)'
  severity: critical
  description: "Piping remote content directly to shell is extremely dangerous"
  remediation: "Download script first, inspect it, then execute: curl -o script.sh URL && bash script.sh"
  cwe: "CWE-94"
  owasp: "A08:2021"

# ======================== SQL via CLI ========================
- id: bash-sql-injection-cli
  languages: [bash]
  patterns:
    - regex: '(?i)(mysql|psql|sqlite3)\.s+.*-e\.s+[''\.].*\.$'
  severity: critical
  description: "SQL injection via variable interpolation in CLI database commands"
  remediation: "Use parameterized queries or properly escape variables"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ======================== Privilege Escalation ========================
- id: bash-suid-binary
  languages: [bash]
  patterns:
    - regex: 'chmod\.s+[u+]?s\.s|chmod\.s+4[0-7]{3}\.s'
  severity: high
  description: "Setting SUID bit can lead to privilege escalation"
  remediation: "Avoid SUID. Use capabilities or sudoers for specific permissions"
  cwe: "CWE-250"
  owasp: "A01:2021"

- id: bash-variable-in-command
  languages: [bash]
  patterns:
    - regex: '\$\{?\w+\}?\s*[|;&]'
  severity: high
  description: "Variable in command chain — injection if user-controlled"
  remediation: "Quote variables: \"$var\". Validate all user input"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: bash-unquoted-variable-in-test
  languages: [bash]
  patterns:
    - regex: '(?i)if\s+\[\s+\$\w+\s+'
  severity: medium
  description: "Unquoted variable in test — word splitting and globbing"
  remediation: "Always quote: if [ \"$var\" = ... ]"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: bash-curl-output-exec
  languages: [bash]
  patterns:
    - regex: 'curl.*\|\s*(bash|sh|sudo)'
  severity: critical
  description: "Piping curl to shell — remote code execution"
  remediation: "Download first, verify checksum, then execute"
  cwe: "CWE-829"
  owasp: "A08:2021"

- id: bash-wget-exec
  languages: [bash]
  patterns:
    - regex: 'wget.*-O\s*-\s*\|\s*(bash|sh)'
  severity: critical
  description: "Piping wget to shell — remote code execution"
  remediation: "Download first, inspect, verify integrity, then execute"
  cwe: "CWE-829"
  owasp: "A08:2021"

- id: bash-mysql-password-cli
  languages: [bash]
  patterns:
    - regex: 'mysql\s+.*-p\S+'
  severity: high
  description: "MySQL password in command line — visible in process list"
  remediation: "Use mysql_config_editor or .my.cnf for credentials"
  cwe: "CWE-214"
  owasp: "A07:2021"

- id: bash-source-untrusted
  languages: [bash]
  patterns:
    - regex: '(?i)(source|\.)\s+\$'
  severity: high
  description: "Sourcing file from variable — code injection risk"
  remediation: "Validate file path before sourcing"
  cwe: "CWE-94"
  owasp: "A03:2021"

