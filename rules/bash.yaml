  description: "Exit code checking (good)"
  remediation: "Always check exit codes"
  cwe: "CWE-754"
  owasp: "A06:2021"

- id: bash-exit-code-ignored
  languages: [bash]
  patterns:
    - regex: 'command\.s+[^;]+;\.s*'
