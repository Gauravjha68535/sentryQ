  cwe: "CWE-754"
  owasp: "A06:2021"

- id: bash-exit-code-exit-0
  languages: [bash]
  patterns:
    - regex: 'exit\.s+0'
  severity: low
  description: "exit 0 (success)"
  remediation: "Good for normal completion"
  cwe: "CWE-754"
  owasp: "A06:2021"

- id: bash-exit-code-exit-1
  languages: [bash]
  patterns:
    - regex: 'exit\.s+1'
  severity: low
  description: "exit 1 (general error)"
  remediation: "Use specific codes for different errors"
  cwe: "CWE-754"
  owasp: "A06:2021"

- id: bash-exit-code-custom
  languages: [bash]
  patterns:
    - regex: 'exit\.s+[2-9][0-9]*'
  severity: low
  description: "exit with custom code (good)"
