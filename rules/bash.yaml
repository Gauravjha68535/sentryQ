  cwe: "CWE-754"
  owasp: "A06:2021"

# ======================== SECURE DEFAULT OPTIONS (176-185) ========================

- id: bash-secure-shebang
  languages: [bash]
  patterns:
    - regex: '^#!/bin/bash|^#!/bin/sh'
  severity: low
  description: "Shebang line (good)"
  remediation: "Use #!/bin/bash for bash features, #!/bin/sh for POSIX"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-secure-shebang-env
  languages: [bash]
  patterns:
    - regex: '^#!/usr/bin/env bash|^#!/usr/bin/env sh'
  severity: low
  description: "env shebang (more portable)"
  remediation: "Good for portability"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-secure-options-header
  languages: [bash]
  patterns:
    - regex: '^#!/bin/bash\.s*\.n(set\.s+-[euo]+\.s*pipefail|set\.s+-euo)'
  severity: low
  description: "Script with secure options (good)"
  remediation: "Best practice"
  cwe: "CWE-754"
  owasp: "A06:2021"

- id: bash-secure-execution-bit
  languages: [bash]
  patterns:
    - regex: '-rwxr-xr-x'
  severity: low
  description: "Script with execute permission (good)"
  remediation: "Set execute permission: chmod +x script.sh"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-secure-world-writable
  languages: [bash]
  patterns:
    - regex: '-rw-rw-rw-|-rwxrwxrwx'
  severity: high
  description: "World-writable script (security risk)"
  remediation: "chmod 755 script.sh or 750"
  cwe: "CWE-732"
  owasp: "A05:2021"

- id: bash-secure-group-writable
  languages: [bash]
  patterns:
    - regex: '-rw-rw-r--|-rwxrwxr-x'
  severity: medium
  description: "Group-writable script (ensure trusted group)"
  remediation: "chmod 755 or 750"
  cwe: "CWE-732"
  owasp: "A05:2021"

- id: bash-secure-suid
  languages: [bash]
  patterns:
    - regex: '-rwsr-xr-x|-rwsr-sr-x'
  severity: critical
  description: "SUID on shell script (ignored, but dangerous)"
  remediation: "Remove SUID bit from scripts"
  cwe: "CWE-250"
  owasp: "A01:2021"

- id: bash-secure-sgid
  languages: [bash]
  patterns:
    - regex: '-rwxr-sr-x'
  severity: high
  description: "SGID on shell script (ignored, but dangerous)"
  remediation: "Remove SGID bit from scripts"
  cwe: "CWE-250"
  owasp: "A01:2021"

- id: bash-secure-sticky-bit
  languages: [bash]
  patterns:
    - regex: '-rwxr-xr-t'
  severity: low
  description: "Sticky bit on script (unusual)"
  remediation: "Remove sticky bit if not needed"
  cwe: "CWE-732"
  owasp: "A05:2021"

- id: bash-secure-owner-root
  languages: [bash]
  patterns:
    - regex: 'root\.s+root'
  severity: medium
  description: "Script owned by root (ensure permissions are tight)"
  remediation: "chmod 750 for root-owned scripts"
  cwe: "CWE-732"
  owasp: "A05:2021"

# ======================== LOOP SAFETY (186-200) ========================

- id: bash-loop-infinite
  languages: [bash]
  patterns:
    - regex: 'while\.s+true|while\.s*:\.s*;|for\.s*\.(\.s*;\.s*;\.s*\.)'
  severity: medium
  description: "Infinite loop (may hang)"
  remediation: "Add exit conditions or timeouts"
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: bash-loop-while-read
  languages: [bash]
  patterns:
    - regex: 'while\.s+read\.s+-r\.s+line'
  severity: low
  description: "while read loop (good)"
  remediation: "Good for processing files"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-for-file
  languages: [bash]
  patterns:
    - regex: 'for\.s+file\.s+in\.s+\.*'
  severity: medium
  description: "for file in * (may include unexpected files)"
  remediation: "Check if file is regular: [ -f \"$file\" ]"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: bash-loop-for-array
  languages: [bash]
  patterns:
    - regex: 'for\.s+item\.s+in\.s+\.$\.{[^}]+\.[@\.]\.}'
  severity: low
  description: "for loop over array (good)"
  remediation: "Good practice"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-for-command
  languages: [bash]
  patterns:
    - regex: 'for\.s+item\.s+in\.s+\.$\.([^)]+\.)'
  severity: high
  description: "for loop over command output (word splitting risk)"
  remediation: "Use while read loop for command output"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: bash-loop-break
  languages: [bash]
  patterns:
    - regex: 'break\.s+[0-9]+'
  severity: low
  description: "break with level (good)"
  remediation: "Good for nested loops"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-continue
  languages: [bash]
  patterns:
    - regex: 'continue\.s+[0-9]+'
  severity: low
  description: "continue with level (good)"
  remediation: "Good for nested loops"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-select
  languages: [bash]
  patterns:
    - regex: 'select\.s+\.w+\.s+in'
  severity: medium
  description: "select menu (interactive)"
  remediation: "Avoid in non-interactive scripts"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-until
  languages: [bash]
  patterns:
    - regex: 'until\.s+'
  severity: low
  description: "until loop (opposite of while)"
  remediation: "Use when condition should become true"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-arithmetic
  languages: [bash]
  patterns:
    - regex: 'for\.s+\.(\.s*\.(\.s*[a-zA-Z_]+=0))'
  severity: low
  description: "C-style for loop"
  remediation: "Good for arithmetic loops"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-command-sub
  languages: [bash]
  patterns:
    - regex: 'for\.s+\.w+\.s+in\.s+\.$\.(find)'
  severity: high
  description: "for loop over find output (pathname expansion risk)"
  remediation: "Use find -print0 | while IFS= read -r -d ''"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: bash-loop-find-while
  languages: [bash]
  patterns:
    - regex: 'find.*-print0\.s*\.|\.s*while\.s+IFS= read\.s+-r\.s+-d'
  severity: low
  description: "find with while read (good for filenames with spaces)"
  remediation: "Best practice"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-while-ifs
  languages: [bash]
  patterns:
    - regex: 'while\.s+IFS= read\.s+-r'
  severity: low
  description: "while read with IFS= (preserves whitespace) - good"
  remediation: "Good practice"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-while-redirect
  languages: [bash]
  patterns:
    - regex: 'while.*?do.*?done\.s*<'
  severity: low
  description: "while loop with input redirection (good)"
  remediation: "Good for file processing"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: bash-loop-while-pipe
  languages: [bash]
  patterns:
    - regex: 'while.*?do.*?done\.s*\.|'
  severity: medium
  description: "while loop in pipeline (subshell, variable scope issues)"
  remediation: "Use process substitution: while ... done < <(command)"
  cwe: "CWE-20"
  owasp: "A03:2021"



