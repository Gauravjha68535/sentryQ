# SentryQL example rules — semantic queries that go beyond simple regex.
# These rules use the sentryql: field which the pattern engine executes
# after regex scanning. Each query finds call sites that match a pattern
# within a source file.

- id: sentryql-ssrf-requests-get
  languages: [python]
  patterns:
    - regex: 'requests\.(get|post|put|delete|head|request)\s*\('
  sentryql: |
    FIND requests.get OR requests.post OR requests.put OR requests.delete
    WHERE input IS NOT LITERAL
  severity: high
  description: Possible SSRF — requests call with non-literal URL argument
  remediation: Validate the URL against an allowlist before making outbound HTTP requests
  cwe: CWE-918
  owasp: A10:2021
  confidence: 0.7
  negative_patterns:
    - regex: '(?i)(allowlist|whitelist|validate_url|is_safe_url|urlparse|urljoin)\s*\('
    - regex: "requests\\.get\\(\\s*['\"]https?://"

- id: sentryql-sqli-format-python
  languages: [python]
  patterns:
    - regex: '(?i)(execute|executemany|raw|extra\(where)\s*\(.*(%|format\(|f\")'
  sentryql: |
    FIND execute OR executemany OR raw
    WHERE CONTAINS % OR CONTAINS .format(
  severity: critical
  description: SQL injection via Python string formatting in database call
  remediation: Use parameterized queries — cursor.execute(sql, (param,)) instead of string formatting
  cwe: CWE-89
  owasp: A03:2021
  confidence: 0.9
  negative_patterns:
    - regex: '(?i)(execute|executemany)\s*\(\s*["\x27][^"\x27]*["\x27]\s*,\s*[\(\[]'
    - regex: '(?i)(prepare|prepareStatement)\s*\('

- id: sentryql-xss-innerhtml-js
  languages: [javascript, typescript]
  patterns:
    - regex: '\.innerHTML\s*='
    - regex: '\.outerHTML\s*='
  sentryql: |
    FIND .innerHTML OR .outerHTML
    WHERE CONTAINS request OR CONTAINS param OR CONTAINS query OR CONTAINS body
  severity: high
  description: Potential XSS — innerHTML assignment with user-controlled data
  remediation: Use textContent instead of innerHTML, or sanitize with DOMPurify before assignment
  cwe: CWE-79
  owasp: A03:2021
  confidence: 0.8
  negative_patterns:
    - regex: '(?i)(DOMPurify\.sanitize|sanitize\(|escapeHtml\(|encode\()'
    - regex: 'innerHTML\s*=\s*["`\x27][^`\x27"]*["`\x27]'

- id: sentryql-eval-user-input
  languages: [javascript, typescript, python]
  patterns:
    - regex: '\beval\s*\('
  sentryql: |
    FIND eval
    WHERE input IS NOT LITERAL
  severity: critical
  description: Code injection — eval() called with potentially user-controlled input
  remediation: Never use eval() with user input. Use JSON.parse() for JSON, or structured alternatives
  cwe: CWE-94
  owasp: A03:2021
  confidence: 0.85
  negative_patterns:
    - regex: "eval\\(\\s*['\"]"

- id: sentryql-path-traversal-open
  languages: [python]
  patterns:
    - regex: '\bopen\s*\(.*\b(request|args|form|params|data|input|user)\b'
  sentryql: |
    FIND open
    WHERE CONTAINS request OR CONTAINS args OR CONTAINS form
  severity: high
  description: Path traversal — file open with user-controlled path
  remediation: Validate and sanitize the path using os.path.realpath() and restrict to an allowed base directory
  cwe: CWE-22
  owasp: A01:2021
  confidence: 0.75
  negative_patterns:
    - regex: '(?i)(realpath|abspath|basename|safe_join|os\.path\.join\(base)'
    - regex: '(?i)(\.startswith\(|in ALLOWED_|whitelist)'

- id: sentryql-hardcoded-token-go
  languages: [go]
  patterns:
    - regex: '(?i)(token|secret|password|apikey|api_key|passwd)\s*:?=\s*"[A-Za-z0-9+/]{16,}"'
  sentryql: |
    FIND := OR =
    WHERE IDENTIFIER MATCHES (token|secret|password|apikey) AND VALUE IS LITERAL STRING
  severity: high
  description: Hardcoded credential detected in Go source
  remediation: Load secrets from environment variables using os.Getenv() or a secrets manager
  cwe: CWE-798
  owasp: A07:2021
  confidence: 0.8
  negative_patterns:
    - regex: '(?i)os\.Getenv\('
    - regex: '(?i)(test|mock|example|sample|placeholder|dummy)'
    - regex: '(?i)(YOUR_|REPLACE_|TODO|FIXME|<[A-Z_]+>)'

- id: sentryql-deserialization-pickle
  languages: [python]
  patterns:
    - regex: '\bpickle\.(loads|load)\s*\('
    - regex: '\byaml\.load\s*\([^,)]+\)'
  sentryql: |
    FIND pickle.loads OR pickle.load OR yaml.load
    WHERE input IS NOT LITERAL
  severity: critical
  description: Insecure deserialization — pickle.loads/yaml.load with untrusted input can execute arbitrary code
  remediation: Use pickle only with data from trusted sources. For YAML, use yaml.safe_load() instead of yaml.load()
  cwe: CWE-502
  owasp: A08:2021
  confidence: 0.9
  negative_patterns:
    - regex: 'yaml\.safe_load\s*\('
    - regex: '(?i)(Loader\s*=\s*yaml\.SafeLoader|Loader\s*=\s*yaml\.CSafeLoader)'

- id: sentryql-cmd-injection-subprocess
  languages: [python]
  patterns:
    - regex: '\bsubprocess\.(run|call|Popen|check_output|check_call)\s*\(.*shell\s*=\s*True'
  sentryql: |
    FIND subprocess.run OR subprocess.call OR subprocess.Popen OR subprocess.check_output
    WHERE CONTAINS shell=True AND CONTAINS (request OR args OR form OR input OR user)
  severity: critical
  description: Command injection — subprocess with shell=True and user-controlled input
  remediation: Use shell=False and pass arguments as a list. Validate all user input before passing to subprocesses
  cwe: CWE-78
  owasp: A03:2021
  confidence: 0.9
  negative_patterns:
    - regex: '(?i)(shlex\.quote\(|shlex\.split\(|shell=False)'
