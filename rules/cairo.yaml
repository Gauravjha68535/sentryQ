- id: cairo-hint-injection
  languages: [cairo]
  patterns:
    - regex: '(?i)%\{.*?%\}'
  severity: high
  description: "Hint injection"
  remediation: "Hints can write to arbitrary memory locations"
  cwe: "CWE-94"
  owasp: "A03:2021"
  confidence: 0.8

- id: cairo-assert-eq
  languages: [cairo]
  patterns:
    - regex: '(?i)assert\s+\w+\s*=\s*'
  severity: medium
  description: "Constrained assert"
  remediation: "Review constraint logic carefully"
  cwe: "CWE-617"
  owasp: "A06:2021"
  confidence: 0.8

- id: cairo-alloc-locals
  languages: [cairo]
  patterns:
    - regex: '(?i)alloc_locals'
  severity: low
  description: "Local allocation"
  remediation: "Ensure proper revoked reference handling"
  cwe: "CWE-119"
  owasp: "A06:2021"
  confidence: 0.8

- id: cairo-call-contract
  languages: [cairo]
  patterns:
    - regex: '(?i)call_contract'
  severity: medium
  description: "External contract call"
  remediation: "Verify external target and handle state changes safely"
  cwe: "CWE-242"
  owasp: "A06:2021"
  confidence: 0.8

- id: cairo-missing-range-check
  languages: [cairo]
  patterns:
    - regex: '(?i)func\s+\w+\s*\{[\s\S]*?\}\s*\([\s\S]*?\)'
  severity: high
  description: "Missing range check on arithmetic/felt"
  remediation: "Use assert_nn or assert_le for bounds checking"
  cwe: "CWE-190"
  owasp: "A06:2021"
  confidence: 0.8
- id: cairo-implicit-gas-bypass
  languages: [cairo]
  patterns:
    - regex: '(?i)func\s+\w+\s*\{[\s\S]*?\}\s*\([\s\S]*?\)'
  severity: medium
  description: "Recursive or looping function missing gas checks (Cairo 1.0)"
  remediation: "Check array bounds or withdraw gas"
  cwe: "CWE-400"
  owasp: "A05:2021"
  confidence: 0.8
- id: cairo-arbitrary-state-change
  languages: [cairo]
  patterns:
    - regex: '(?i)storage_write\s*\([\s\S]*?\)'
  severity: critical
  description: "Storage written without access control"
  remediation: "Assert caller_address before storage_write"
  cwe: "CWE-284"
  owasp: "A01:2021"
  confidence: 0.8

- id: cairo-reentrancy-guard
  languages: [cairo]
  patterns:
    - regex: '(?i)func\s+\w+\s*\([^)]*\)[^)]*emit\s+event'
  severity: high
  description: "Missing reentrancy guard"
  remediation: "Use @external decorator with reentrancy guard"
  cwe: "CWE-362"
  owasp: "A01:2021"
  confidence: 0.8

- id: cairo-oracle-manipulation
  languages: [cairo]
  patterns:
    - regex: '(?i)call_contract.*oracle'
  severity: critical
  description: "Oracle call without staleness check"
  remediation: "Add oracle staleness/timeout validation"
  cwe: "CWE-754"
  owasp: "A04:2021"
  confidence: 0.8

- id: cairo-front-running
  languages: [cairo]
  patterns:
    - regex: '(?i)func\s+\w+\s*\([^)]*\)[^)]*'
  severity: medium
  description: "Missing transaction ordering protection"
  remediation: "Implement commit-reveal or nonce-based ordering"
  cwe: "CWE-362"
  owasp: "A04:2021"
  confidence: 0.8

- id: cairo-untrusted-library
  languages: [cairo]
  patterns:
    - regex: '(?i)@storage_var.*uint256.*address'
  severity: medium
  description: "Storage variable with address type"
  remediation: "Validate addresses before storage operations"
  cwe: "CWE-20"
  owasp: "A03:2021"
  confidence: 0.8

- id: cairo-unchecked-return
  languages: [cairo]
  patterns:
    - regex: '(?i)call_contract.*\\\\'
  severity: high
  description: "Unchecked return value from external call"
  remediation: "Check return values from external calls"
  cwe: "CWE-252"
  owasp: "A06:2021"
  confidence: 0.8

- id: cairo-auth-bypass
  languages: [cairo]
  patterns:
    - regex: '(?i)@external.*'
  severity: high
  description: "External function missing authorization"
  remediation: "Add access control checks"
  cwe: "CWE-862"
  owasp: "A01:2021"
  confidence: 0.8

- id: cairo-curve-bypass
  languages: [cairo]
  patterns:
    - regex: '(?i)ec_mul|ec_add'
  severity: medium
  description: "Elliptic curve operation without validation"
  remediation: "Validate curve points"
  cwe: "CWE-20"
  owasp: "A03:2021"
  confidence: 0.8

- id: cairo-math-overflow
  languages: [cairo]
  patterns:
    - regex: '(?i)\+\s*\+|-\s*-|\*\s*\*'
  severity: high
  description: "Arithmetic without overflow check"
  remediation: "Use checked arithmetic"
  cwe: "CWE-190"
  owasp: "A06:2021"
  confidence: 0.8

- id: cairo-randomness
  languages: [cairo]
  patterns:
    - regex: '(?i)block\.timestamp.*%.*seed'
  severity: medium
  description: "Block timestamp for randomness"
  remediation: "Use Chainlink VRF"
  cwe: "CWE-338"
  owasp: "A02:2021"
  confidence: 0.8

- id: cairo-loop-gas
  languages: [cairo]
  patterns:
    - regex: '(?i)loop\s*\{.*'
  severity: medium
  description: "Loop without gas checking"
  remediation: "Add gas checks in loops"
  cwe: "CWE-400"
  owasp: "A05:2021"
  confidence: 0.8

- id: cairo-eth-transfer
  languages: [cairo]
  patterns:
    - regex: '(?i)send\.emit\s*\(.*'
  severity: high
  description: "Ether send without caller check"
  remediation: "Verify caller before sending"
  cwe: "CWE-284"
  owasp: "A01:2021"
  confidence: 0.8
