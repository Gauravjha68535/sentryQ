- id: docker-run-as-root
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)^FROM\.s+[^:]+$|^USER\.s+root
  severity: high
  description: "Container running as root user"
  remediation: "Add USER instruction with non-root user: USER appuser"

# Hardcoded Secrets in Dockerfile

- id: docker-hardcoded-secret
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)ENV\.s+(PASSWORD|SECRET|API_KEY|TOKEN)\.s*=
  severity: critical
  description: "Hardcoded secrets in Dockerfile ENV instruction"
  remediation: "Use Docker secrets or pass secrets at runtime via environment variables"

# ADD Instead of COPY

- id: docker-add-instead-of-copy
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)^ADD\.s+https?://
  severity: medium
  description: "Using ADD instead of COPY for remote URLs"
  remediation: "Use COPY for local files and curl/wget for remote files"

# Latest Tag

- id: docker-latest-tag
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)^FROM\.s+[^:]+:latest|^FROM\.s+[^:]+$
  severity: medium
  description: "Using :latest tag or no tag for base image"
  remediation: "Pin base image to specific version: FROM node:18.17.0-alpine"

# Privileged Container

- id: docker-privileged
  languages: [yaml]
  patterns:
    - regex: |-
        (?i)privileged:\.s*true
  severity: critical
  description: "Container running in privileged mode"
  remediation: "Remove privileged: true and use specific capabilities instead"

# Capabilities Added

- id: docker-cap-add
  languages: [yaml]
  patterns:
    - regex: |-
        (?i)cap_add:\.s*\.[?\.s*(ALL|SYS_ADMIN|NET_ADMIN)
  severity: high
  description: "Dangerous Linux capabilities added to container"
  remediation: "Remove unnecessary capabilities. Use minimal required set"

# Host Network

- id: docker-host-network
  languages: [yaml]
  patterns:
    - regex: |-
        (?i)network_mode:\.s*host
  severity: high
  description: "Container using host network namespace"
  remediation: "Use bridge network with explicit port mappings"

# Host PID

- id: docker-host-pid
  languages: [yaml]
  patterns:
    - regex: |-
        (?i)pid:\.s*host
  severity: high
  description: "Container sharing host PID namespace"
  remediation: "Remove pid: host unless absolutely necessary"

# Writable Root Filesystem

- id: docker-writable-root
  languages: [yaml]
  patterns:
    - regex: |-
        (?i)read_only:\.s*false|(?!read_only)security_opt
  severity: medium
  description: "Container root filesystem is writable"
  remediation: "Set read_only: true and use volumes for writable paths"

# No Security Options

- id: docker-no-security-opt
  languages: [yaml]
  patterns:
    - regex: |-
        (?i)security_opt:\.s*\.[?\.s*apparmor=unconfined|seccomp=unconfined
  severity: high
  description: "Container security profiles disabled"
  remediation: "Use default or custom AppArmor/Seccomp profiles"

# Exposed Sensitive Ports

- id: docker-exposed-ports
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)EXPOSE\.s+(22|23|3389|5900)
  severity: medium
  description: "Sensitive ports exposed in Dockerfile"
  remediation: "Remove EXPOSE for sensitive services. Use internal networking"

# Curl/Wget in Production

- id: docker-curl-wget
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)RUN.*\.b(curl|wget)\.b.*\.|
  severity: medium
  description: "Downloading and executing remote scripts in Dockerfile"
  remediation: "Download files, verify checksums, then execute separately"

# Apt/Yum Without Cleanup

- id: docker-package-manager-cleanup
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)RUN.*\.b(apt-get|yum|apk)\.s+(install|add)\.b(?!.*&&.*rm.*-rf.*var.*cache)
  severity: low
  description: "Package manager cache not cleaned after installation"
  remediation: "Add && rm -rf /var/cache/apt/* or use --no-cache with apk"

# Multiple CMD/ENTRYPOINT

- id: docker-multiple-cmd
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)^(CMD|ENTRYPOINT).+^(CMD|ENTRYPOINT)
  severity: low
  description: "Multiple CMD or ENTRYPOINT instructions (only last one takes effect)"
  remediation: "Use only one CMD or ENTRYPOINT instruction"

# Health Check Missing

- id: docker-healthcheck-missing
  languages: [dockerfile]
  patterns:
    - regex: |-
        (?i)^FROM.*^(?!.*HEALTHCHECK)
  severity: low
  description: "No HEALTHCHECK instruction defined"
  remediation: "Add HEALTHCHECK instruction for container health monitoring"

