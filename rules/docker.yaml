- id: docker-user-missing
  languages: [dockerfile]
  patterns:
    - regex: |-
        ^(?i)FROM.*(?!USER)
  severity: high
  description: "Dockerfile missing USER instruction (runs as root)"
  remediation: "Add USER instruction with non-root user before CMD/ENTRYPOINT"
  cwe: "CWE-250"
  owasp: "A01:2021"

- id: docker-user-root
  languages: [dockerfile]
  patterns:
    - regex: |-
        ^USER\s+root|^USER\s+0
  severity: high
  description: "Container explicitly runs as root user"
  remediation: "Create and use non-root user: RUN useradd -m appuser && USER appuser"
  cwe: "CWE-250"
  owasp: "A01:2021"

- id: docker-user-numeric
  languages: [dockerfile]
  patterns:
    - regex: |-
        ^USER\s+\d+
  severity: low
