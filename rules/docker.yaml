  remediation: "Good practice, ensure UID exists in container"
  cwe: "CWE-250"
  owasp: "A01:2021"

- id: docker-user-non-existent
  languages: [dockerfile]
  patterns:
    - regex: |-
        ^USER\s+\w+(?!.*useradd).*?^(?!.*RUN.*useradd)
  severity: high
  description: "USER specified but user may not exist"
  remediation: "Create user before switching: RUN useradd -m appuser && USER appuser"
  cwe: "CWE-250"
  owasp: "A01:2021"

