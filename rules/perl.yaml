- id: perl-storable-thaw
  languages: [perl]
  patterns:
    - regex: '(?i)(thaw|retrieve|fd_retrieve)\s*\(''severity: critical
  description: "Storable deserialization — code execution risk"
  remediation: "Use JSON or YAML for untrusted data"
  cwe: "CWE-502"
  owasp: "A08:2021"

