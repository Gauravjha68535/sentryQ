- id: perl-hardcoded-password
  languages: [perl]
  patterns:
    - regex: '(?i)(password|passwd|pwd)\\s*=\\s*['''\"][^''\"]{8,}[''\"]'
  severity: high
  description: "Hardcoded password detected in Perl source code"
  remediation: "Use environment variables ($ENV{PASSWORD}) or a configuration manager"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: perl-hardcoded-api-key
  languages: [perl]
  patterns:
    - regex: '(?i)(api[_-]?key|apikey)\\s*=\\s*['''\"][a-zA-Z0-9]{16,}[''\"]'
  severity: high
  description: "Hardcoded API key detected in Perl source code"
  remediation: "Store API keys in environment variables or encrypted config"
  cwe: "CWE-798"
  owasp: "A07:2021"

# ======================== SQL Injection ========================
- id: perl-sql-injection
  languages: [perl]
  patterns:
    - regex: '(?i)(do|execute|prepare)\\s*\\(\\s*['''\"].*\\$'
  severity: critical
  description: "SQL injection via variable interpolation in Perl DBI"
  remediation: "Use DBI placeholders: $dbh->prepare('SELECT * FROM users WHERE id = ?'); $sth->execute($id)"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: perl-sql-injection-concat
  languages: [perl]
  patterns:
    - regex: '(?i)(do|execute)\\s*\\(\\s*['''\"].*\\s*\\.\\s*\\$'
  severity: critical
  description: "SQL injection via string concatenation in DBI query"
  remediation: "Use parameterized queries with ? placeholders in DBI"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ======================== Command Injection ========================
- id: perl-command-injection-system
  languages: [perl]
  patterns:
    - regex: '(?i)system\\s*\\(\\s*['''\"].*\\$|system\\s*\\(\\s*\\$'
  severity: critical
  description: "Command injection via system() with variable input"
  remediation: "Use list form of system: system('cmd', @args) or IPC::Run for safe execution"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: perl-command-injection-backtick
  languages: [perl]
  patterns:
    - regex: '`.*\\$.*`|qx/.*\\$/''severity: critical
  description: "Command injection via backticks or qx// with variable interpolation"
  remediation: "Avoid backticks with user input. Use IPC::Run or open3 with argument lists"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: perl-command-injection-open
  languages: [perl]
  patterns:
    - regex: 'open\\s*\\(\\s*\\w+\\s*,\\s*['''\"]\\|.*\\$|open\\s*\\(\\s*\\w+\\s*,\\s*[''\"].*\\$.*\\|'
  severity: critical
  description: "Command injection via two-argument open with pipe"
  remediation: "Use three-argument open: open(my $fh, '-|', 'cmd', @args)"
  cwe: "CWE-78"
  owasp: "A03:2021"

# ======================== Code Injection ========================
- id: perl-dangerous-eval
  languages: [perl]
  patterns:
    - regex: '\\beval\\s*[{(\"].*\\$''severity: high
  description: "eval with variable input allows arbitrary code execution"
  remediation: "Avoid eval with user input. Use Safe module or specific parsers"
  cwe: "CWE-94"
  owasp: "A03:2021"

# ======================== File Inclusion ========================
- id: perl-file-inclusion
  languages: [perl]
  patterns:
    - regex: '(?i)(require|do)\\s+\\$''severity: high
  description: "Dynamic file inclusion via variable-controlled require/do"
  remediation: "Use allowlist of permitted modules. Never load files based on user input"
  cwe: "CWE-98"
  owasp: "A01:2021"

# ======================== Path Traversal ========================
- id: perl-path-traversal
  languages: [perl]
  patterns:
    - regex: 'open\\s*\\(\\s*\\w+\\s*,\\s*['''\"]?\\s*\\$'
  severity: high
  description: "File open with user-controlled path — potential path traversal"
  remediation: "Validate file paths. Use File::Spec->canonpath and check against base directory"
  cwe: "CWE-22"
  owasp: "A01:2021"

# ======================== XSS ========================
- id: perl-xss-cgi
  languages: [perl]
  patterns:
    - regex: 'print\\s+.*\\$query->param|print\\s+.*param\\s*\\(''severity: high
  description: "XSS via direct output of CGI parameter"
  remediation: "Use HTML::Entities::encode_entities() to escape user input before output"
  cwe: "CWE-79"
  owasp: "A03:2021"

# ======================== Unsafe Deserialization ========================
- id: perl-insecure-storable
  languages: [perl]
  patterns:
    - regex: 'Storable::thaw|Storable::retrieve\\s*\\(\\s*\\$''severity: high
  description: "Storable deserialization of untrusted data can execute code"
  remediation: "Use JSON or YAML for untrusted data. Never deserialize untrusted Storable data"
  cwe: "CWE-502"
  owasp: "A08:2021"

# ======================== LDAP Injection ========================
- id: perl-ldap-injection
  languages: [perl]
  patterns:
    - regex: 'Net::LDAP.*search\\s*\\(.*filter.*\\$''severity: critical
  description: "LDAP injection via user input in search filter"
  remediation: "Use Net::LDAP::Filter for safe filter construction"
  cwe: "CWE-90"
  owasp: "A03:2021"

# ======================== Weak Cryptography ========================
- id: perl-weak-crypto-md5
  languages: [perl]
  patterns:
    - regex: '(?i)(Digest::MD5|Digest::SHA1|md5_hex)''severity: medium
  description: "Use of weak cryptographic hash (MD5/SHA1)"
  remediation: "Use Digest::SHA256 or Crypt::Argon2 for password hashing"
  cwe: "CWE-327"
  owasp: "A02:2021"

# ======================== Insecure Random ========================
- id: perl-insecure-random
  languages: [perl]
  patterns:
    - regex: '\\brand\\s*\\(|int\\s*\\(\\s*rand''severity: medium
  description: "Perl rand() is not cryptographically secure"
  remediation: "Use Crypt::Random or Math::Random::Secure for security-sensitive random"
  cwe: "CWE-330"
  owasp: "A02:2021"

# ======================== ReDoS ========================
- id: perl-redos
  languages: [perl]
  patterns:
    - regex: '=~\\s*/.*\\(\\?.*\\+.*\\+|=~\\s*/.*\\{\\d+,\\}.*\\{\\d+,\\}''severity: medium
  description: "Regular expression vulnerable to ReDoS attacks"
  remediation: "Avoid nested quantifiers. Use re2 engine for untrusted patterns"
  cwe: "CWE-1333"
  owasp: "N/A"

# ======================== Open Redirect ========================
- id: perl-open-redirect
  languages: [perl]
  patterns:
    - regex: '(?i)redirect\\s*\\(\\s*\\$|print\\s+.*Location:.*\\$''severity: high
  description: "Open redirect via user-controlled URL"
  remediation: "Validate redirect URLs against allowlist"
  cwe: "CWE-601"
  owasp: "A01:2021"

# ======================== Format String ========================
- id: perl-format-string
  languages: [perl]
  patterns:
    - regex: 'sprintf\\s*\\(\\s*\\$''severity: medium
  description: "Format string vulnerability via user-controlled format"
  remediation: "Never use user input as format string: use sprintf('%s', $input)"
  cwe: "CWE-134"
  owasp: "A03:2021"

# ======================== Taint Mode ========================
- id: perl-open-pipe
  languages: [perl]
  patterns:
    - regex: 'open\s*\(\s*\w+\s*,\s*"\s*\|''severity: critical
  description: "Perl open with pipe — command injection"
  remediation: "Use list form of open or IPC::Run for safe command execution"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: perl-backtick-variable
  languages: [perl]
  patterns:
    - regex: '`[^`]*\$''severity: high
  description: "Backtick with variable — command injection"
  remediation: "Use IPC::Open3 or capture() from IPC::System::Simple"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: perl-dbi-prepare-var
  languages: [perl]
  patterns:
    - regex: '(?i)\$\w+->do\s*\(\s*".*\$''severity: critical
  description: "DBI do() with variable interpolation — SQL injection"
  remediation: "Use placeholders: $dbh->do('INSERT ... WHERE id=?', undef, $id)"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: perl-cgi-param
  languages: [perl]
  patterns:
    - regex: '(?i)\$\w+->param\s*\(''severity: low
  description: "CGI param access — validate input"
  remediation: "Always validate and sanitize CGI parameters"
  cwe: "CWE-20"
