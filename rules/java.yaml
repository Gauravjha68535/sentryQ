  remediation: "Disable JavaScript if not needed; annotate JS interfaces with @JavascriptInterface"

- id: java-android-exported-component
  languages: [java]
  patterns:
    - regex: 'android:exported\s*=\s*[''\\\"]true[''\\\"]'
  severity: medium
  description: "Android component exported without permission protection"
  remediation: "Set exported=false or add custom permission requirements"

- id: java-android-insecure-storage
  languages: [java]
  patterns:
    - regex: 'MODE_WORLD_READABLE|MODE_WORLD_WRITEABLE|getExternalStorageDirectory'
  severity: high
  description: "Insecure file storage using world-readable/writeable or external storage"
  remediation: "Use MODE_PRIVATE and internal storage. Use Scoped Storage on Android 10+"

- id: java-android-debug-logging
  languages: [java]
  patterns:
    - regex: 'Log\.(d|v|i)\s*\([^\)]*(password|token|secret|key|credential)'
