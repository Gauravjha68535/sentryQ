- id: java-hardcoded-password
  languages: [java]
  patterns:
    - regex: '(?i)(password|passwd|pwd)\s*=\s*[''\\"][^''\\"]{8,}[''\\"]'
  severity: high
  description: "Hardcoded password detected in Java source code"
  remediation: "Use environment variables or Java system properties. Consider using a secrets manager"

- id: java-hardcoded-api-key
  languages: [java]
  patterns:
    - regex: '(?i)(api[_-]?key|apikey)\s*=\s*[''\\"][a-zA-Z0-9]{16,}[''\\"]'
  severity: high
  description: "Hardcoded API key detected in Java source code"
  remediation: "Store API keys in environment variables or use AWS Secrets Manager/HashiCorp Vault"

- id: java-hardcoded-aws-credentials
  languages: [java]
  patterns:
    - regex: 'AKIA[0-9A-Z]{16}'
  severity: critical
  description: "AWS Access Key ID detected in Java source code"
  remediation: "Remove AWS credentials from code. Use IAM roles or AWS Secrets Manager"

- id: java-hardcoded-jdbc
  languages: [java]
  patterns:
    - regex: '(?i)jdbc:[^''\\\"]*password=[^''\\\"]+'
  severity: high
  description: "Database credentials in JDBC connection string"
  remediation: "Use environment variables or JNDI for database credentials. Never hardcode passwords"

# ======================== SQL Injection ========================
- id: java-sql-injection
  languages: [java]
  patterns:
    - regex: '(?i)(executeQuery|executeUpdate|execute)\s*\(\s*.*\+.*\)'
  severity: critical
  description: "Potential SQL injection via string concatenation"
  remediation: "Use PreparedStatement with parameterized queries. Never concatenate user input into SQL"

- id: java-sql-injection-statement
  languages: [java]
  patterns:
    - regex: '(?i)createStatement\s*\(\s*\).*execute.*(\\".*\+|String\.format)'
  severity: critical
  description: "SQL injection via Statement instead of PreparedStatement"
  remediation: "Replace Statement with PreparedStatement and use parameterized queries"

- id: java-hibernate-hql-injection
  languages: [java]
  patterns:
    - regex: '(?i)createQuery\s*\(\s*\\".*\+.*\)|createSQLQuery\s*\(\s*\\".*\+.*\)'
  severity: critical
  description: "HQL/SQL injection via string concatenation in Hibernate query"
  remediation: "Use named parameters: createQuery('FROM User WHERE name = :name').setParameter('name', input)"

# ======================== Command Injection ========================
- id: java-command-injection
  languages: [java]
  patterns:
    - regex: '(?i)(Runtime\.getRuntime|ProcessBuilder)\s*.*\(\s*.*\+.*\)'
  severity: critical
  description: "Potential command injection via Runtime.exec or ProcessBuilder"
  remediation: "Avoid executing shell commands. If necessary, validate and sanitize all inputs"

# ======================== Deserialization ========================
- id: java-insecure-deserialization
  languages: [java]
  patterns:
    - regex: '(?i)(ObjectInputStream|readObject|XMLDecoder)'
  severity: high
  description: "Java deserialization detected which can lead to remote code execution"
  remediation: "Avoid deserializing untrusted data. Use JSON or other safe serialization formats"

- id: java-unsafe-xmldecoder
  languages: [java]
  patterns:
    - regex: 'XMLDecoder\s*\(\s*new\s+BufferedInputStream'
  severity: critical
  description: "XMLDecoder can execute arbitrary code during deserialization"
  remediation: "Never use XMLDecoder on untrusted input. Use JAXB or Jackson instead"

# ======================== Cryptography ========================
- id: java-weak-crypto-md5
  languages: [java]
  patterns:
    - regex: '(?i)(MessageDigest\.getInstance\s*\(\s*[''\\"](?:MD5|SHA-1)[''\\"])'
  severity: medium
  description: "Use of weak cryptographic hash function (MD5/SHA1)"
  remediation: "Use SHA-256 or SHA-512. For passwords, use bcrypt, scrypt, or Argon2"

- id: java-weak-cipher-ecb
  languages: [java]
  patterns:
    - regex: '(?i)Cipher\.getInstance\s*\(\s*[''\\"](?:AES/ECB|DES|DESede|RC4)[''\\"]'
  severity: high
  description: "Use of weak cipher mode (ECB) or deprecated algorithm (DES/RC4)"
  remediation: "Use AES/GCM/NoPadding or AES/CBC/PKCS5Padding with random IV"

- id: java-hardcoded-crypto-key
  languages: [java]
  patterns:
    - regex: 'new\s+SecretKeySpec\s*\(\s*[''\\\"].*[''\\\"]'
  severity: critical
  description: "Hardcoded encryption key in SecretKeySpec"
  remediation: "Generate keys using KeyGenerator and store in KeyStore"

- id: java-insecure-random
  languages: [java]
  patterns:
    - regex: 'new\s+Random\s*\(\)|java\.util\.Random'
  severity: medium
  description: "Using insecure Random for security-sensitive operations"
  remediation: "Use java.security.SecureRandom for security-critical random numbers"

# ======================== XXE ========================
- id: java-xxe-vulnerability
  languages: [java]
  patterns:
    - regex: '(?i)(DocumentBuilderFactory|XMLInputFactory|SAXParserFactory|TransformerFactory)'
  severity: high
  description: "XML parser instantiation without disabling external entities (XXE risk)"
  remediation: "Disable external entities: factory.setFeature('http://xml.org/sax/features/external-general-entities', false)"

# ======================== Path Traversal ========================
- id: java-path-traversal
  languages: [java]
  patterns:
    - regex: '(?i)(FileInputStream|FileOutputStream|new File)\s*\(\s*.*\+.*\)'
  severity: high
  description: "Potential path traversal vulnerability"
  remediation: "Validate and sanitize file paths. Use allowlists for permitted directories"

# ======================== SSRF ========================
- id: java-ssrf
  languages: [java]
  patterns:
    - regex: '(?i)new\s+URL\s*\(\s*.*request\.getParameter|HttpURLConnection.*request\.getParameter'
  severity: high
  description: "Server-Side Request Forgery via user-controlled URL"
  remediation: "Validate URLs against allowlists. Block private/internal IP ranges"

# ======================== Spring Framework ========================
- id: java-spring-sql-injection
  languages: [java]
  patterns:
    - regex: '(?i)JdbcTemplate\s*\.\s*(query|update|execute)\s*\(\s*\\".*\+'
  severity: critical
  description: "SQL injection in Spring JdbcTemplate via string concatenation"
  remediation: "Use parameterized queries with ? placeholders in JdbcTemplate"

- id: java-spring-open-redirect
  languages: [java]
  patterns:
    - regex: '(?i)redirect:\s*\\"\s*\+\s*request\.getParameter|sendRedirect\s*\(\s*request\.getParameter'
  severity: high
  description: "Open redirect via user-controlled redirect URL"
  remediation: "Validate redirect URLs against allowlist. Never redirect to user-controlled URL"

- id: java-spring-csrf-disabled
  languages: [java]
  patterns:
    - regex: '(?i)csrf\s*\(\s*\)\s*\.\s*disable|@CrossOrigin.*allowCredentials.*true'
  severity: high
  description: "CSRF protection disabled in Spring Security"
  remediation: "Enable CSRF protection for state-changing operations"

- id: java-spring-actuator-exposed
  languages: [java]
  patterns:
    - regex: 'management\.endpoints\.web\.exposure\.include\s*=\s*\*'
  severity: high
  description: "Spring Boot Actuator endpoints exposed to all"
  remediation: "Restrict actuator endpoints to specific paths behind authentication"

# ======================== LDAP Injection ========================
- id: java-ldap-injection
  languages: [java]
  patterns:
    - regex: '(?i)DirContext.*search\s*\(.*\+.*request|NamingEnumeration.*search.*String\.format'
  severity: critical
  description: "LDAP injection via string concatenation in search filter"
  remediation: "Use parameterized LDAP queries with proper escaping"

# ======================== XSS ========================
- id: java-xss-response
  languages: [java]
  patterns:
    - regex: '(?i)response\.getWriter\s*\(\s*\)\s*\.\s*(print|write)\s*\(\s*request\.getParameter'
  severity: high
  description: "XSS via direct output of user input in HTTP response"
  remediation: "Escape HTML output using OWASP ESAPI or Apache Commons Text"

- id: java-jsp-scriptlet
  languages: [java]
  patterns:
    - regex: '<%=.*request\.getParameter'
  severity: high
  description: "XSS via unescaped JSP expression with user input"
  remediation: "Use JSTL <c:out> or ${fn:escapeXml()} for output encoding"

# ======================== Logging Injection ========================
- id: java-log-injection
  languages: [java]
  patterns:
    - regex: '(?i)(log|logger)\.(info|debug|warn|error)\s*\(\s*.*request\.getParameter'
  severity: medium
  description: "Log injection via unsanitized user input in log statements"
  remediation: "Sanitize user input before logging. Remove newlines and control characters"

# ======================== Android Specific (Java) ========================
- id: java-android-insecure-webview
  languages: [java]
  patterns:
    - regex: 'setJavaScriptEnabled\s*\(\s*true|addJavascriptInterface'
  severity: high
