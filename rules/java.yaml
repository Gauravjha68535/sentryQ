# ===== Additional Vulnerability Categories =====

# Cache Poisoning
- id: java-cache-poisoning-headers
  languages: [java]
  patterns:
    - regex: 'request\.getHeader\s*\(\s*(?i)["''](x-forwarded-host|x-forwarded-scheme|x-original-url|x-rewrite-url)["'']'
  severity: medium
  description: "Cache poisoning via unkeyed HTTP header"
  remediation: "Validate forwarded headers; set correct Vary headers"
  cwe: "CWE-444"
  owasp: "A05:2021"

# DoS
- id: java-regex-dos
  languages: [java]
  patterns:
    - regex: 'Pattern\.compile\s*\(\s*".*\(\.\*\).*(\+|\*|\{.*\}).*\)\s*"'
  severity: medium
  description: "ReDoS via catastrophic backtracking in regex"
  remediation: "Avoid nested quantifiers in regex patterns"
  cwe: "CWE-1333"
  owasp: "A06:2021"

# Open Redirect
- id: java-open-redirect-sendredirect
  languages: [java]
  patterns:
    - regex: 'response\.sendRedirect\s*\(\s*request\.getParameter\s*\('
  severity: high
  description: "Open redirect via user-controlled parameter"
  remediation: "Validate redirect URLs against domain whitelist"
  cwe: "CWE-601"
  owasp: "A01:2021"

# CORS
- id: java-cors-wildcard
  languages: [java]
  patterns:
    - regex: 'setHeader\s*\(\s*["'']Access-Control-Allow-Origin["'']\s*,\s*["'']\*["'']\s*\)'
  severity: high
  description: "CORS wildcard allows any origin"
  remediation: "Explicitly list allowed origins"
  cwe: "CWE-942"
  owasp: "A05:2021"

- id: java-cors-reflected
  languages: [java]
  patterns:
    - regex: 'setHeader\s*\(\s*["'']Access-Control-Allow-Origin["'']\s*,\s*request\.getHeader\s*\(\s*["'']Origin["'']\s*\)\s*\)'
  severity: critical
  description: "CORS origin reflected without validation"
  remediation: "Validate Origin against whitelist before reflecting"
  cwe: "CWE-942"
  owasp: "A05:2021"

# File Upload
- id: java-file-upload-no-validation
  languages: [java]
  patterns:
    - regex: 'MultipartFile\.transferTo\s*\(\s*new\s*File\s*\('
  severity: high
  description: "File upload without extension/content validation"
  remediation: "Validate file extension and MIME type"
  cwe: "CWE-434"
  owasp: "A04:2021"

# Format String
- id: java-format-string-dup1
  languages: [java]
  patterns:
    - regex: 'String\.format\s*\(\s*request\.getParameter\s*\('
  severity: high
  description: "Format string injection with user input"
  remediation: "Sanitize user input before using in format strings"
  cwe: "CWE-134"
  owasp: "A03:2021"

# Business Logic
- id: java-race-condition
  languages: [java]
  patterns:
    - regex: 'if\s*\(!.*\.exists\(\)\)\s*\{[^}]*.*\.createNewFile\(\)'
  severity: medium
  description: "TOCTOU race condition in file creation"
  remediation: "Use atomic file constraints or locking"
  cwe: "CWE-367"
  owasp: "A04:2021"

- id: java-mass-assignment
  languages: [java]
  patterns:
    - regex: '@ModelAttribute\s+[A-Za-z0-9_]+\s+[A-Za-z0-9_]+'
  severity: medium
  description: "Potential mass assignment in Spring MVC without validation"
  remediation: "Use DTOs tailored to the specific request; avoid binding domain objects directly"
  cwe: "CWE-915"
  owasp: "A08:2021"

