- id: julia-eval
  languages: [julia]
  patterns:
    - regex: '(?i)\beval\s*\('
  severity: critical
  description: "Dynamic code execution"
  remediation: "Avoid eval with user input"
  cwe: "CWE-94"
  owasp: "A03:2021"
  confidence: 0.8

- id: julia-run-cmd
  languages: [julia]
  patterns:
