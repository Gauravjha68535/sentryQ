- id: dart-hardcoded-password
  languages: [dart]
  patterns:
    - regex: '(?i)(password|passwd|pwd)\s*=\s*[''\\"][^''\\"]{8,}[''\\"]'
  severity: high
  description: "Hardcoded password detected in Dart/Flutter source code"
  remediation: "Use flutter_dotenv or --dart-define for environment variables"

- id: dart-hardcoded-api-key
  languages: [dart]
  patterns:
    - regex: '(?i)(api[_-]?key|apikey|secret|token)\s*=\s*[''\\"][a-zA-Z0-9]{16,}[''\\"]'
  severity: high
  description: "Hardcoded API key or secret detected"
  remediation: "Store keys using flutter_secure_storage or pass via --dart-define at build time"

- id: dart-hardcoded-firebase
  languages: [dart]
  patterns:
    - regex: '(?i)(apiKey|messagingSenderId|appId|measurementId)\s*:\s*[''\\"][a-zA-Z0-9:_-]{20,}[''\\"]'
  severity: medium
  description: "Firebase configuration values detected in source code"
  remediation: "Use firebase_options.dart generated by FlutterFire CLI and restrict API keys in Google Cloud Console"

# ======================== Insecure HTTP ========================
- id: dart-insecure-http
  languages: [dart]
  patterns:
    - regex: 'http://[^''\\\"\s]+'
  severity: medium
  description: "Insecure HTTP URL detected (should use HTTPS)"
  remediation: "Use HTTPS for all network requests to protect data in transit"

- id: dart-ssl-bypass
  languages: [dart]
  patterns:
    - regex: 'badCertificateCallback\s*.*=>\s*true|HttpOverrides'
  severity: critical
  description: "SSL certificate validation bypassed"
  remediation: "Never bypass SSL in production. Use proper certificate pinning"

# ======================== Insecure Storage ========================
- id: dart-insecure-shared-prefs
  languages: [dart]
  patterns:
    - regex: 'SharedPreferences.*set(String|Int|Bool)\s*\([^)]*(?i)(password|token|secret|key)'
  severity: high
  description: "Sensitive data stored in SharedPreferences (unencrypted)"
  remediation: "Use flutter_secure_storage for sensitive values instead of SharedPreferences"

# ======================== WebView ========================
- id: dart-insecure-webview
  languages: [dart]
  patterns:
    - regex: 'WebView\s*\([^)]*javascriptMode\s*:\s*JavascriptMode\.unrestricted'
  severity: high
  description: "WebView with unrestricted JavaScript execution"
  remediation: "Only enable JavaScript if absolutely necessary and validate loaded URLs"

- id: dart-webview-javascript-channel
  languages: [dart]
  patterns:
    - regex: 'JavascriptChannel\s*\('
  severity: medium
  description: "JavaScript bridge enabled in Flutter WebView"
  remediation: "Validate all messages received through JavascriptChannel"

# ======================== Cryptography ========================
- id: dart-insecure-random
  languages: [dart]
  patterns:
    - regex: 'Random\(\)'
  severity: medium
  description: "Standard Random() used for potential security context"
  remediation: "Use Random.secure() for cryptographically strong random numbers"

- id: dart-weak-crypto
  languages: [dart]
  patterns:
    - regex: '(?i)(md5|sha1)\s*\.'
  severity: medium
  description: "Use of weak hash function (MD5 or SHA1)"
  remediation: "Use SHA-256 or SHA-512. For passwords use bcrypt or argon2"

# ======================== Navigation & Deep Links ========================
- id: dart-open-redirect
  languages: [dart]
  patterns:
    - regex: 'launch\s*\(\s*[^)]*uri|openUrl\s*\(\s*[^)]*userInput'
  severity: high
  description: "Potential open redirect via user-controlled URL"
  remediation: "Validate URLs against an allowlist before opening"

# ======================== SQL Injection ========================
- id: dart-sql-injection
  languages: [dart]
  patterns:
    - regex: 'rawQuery\s*\(\s*[''\\"].*\$|rawQuery\s*\(\s*[''\\"].*\+'
  severity: critical
  description: "SQL injection via string interpolation in sqflite rawQuery"
  remediation: "Use parameterized queries: rawQuery('SELECT * FROM users WHERE id = ?', [userId])"

# ======================== Debug / Logging ========================
- id: dart-debug-print-sensitive
  languages: [dart]
  patterns:
    - regex: '(print|debugPrint|log)\s*\([^)]*(?i)(password|token|secret|key|credential)'
  severity: medium
  description: "Sensitive data in print/log statements"
  remediation: "Remove sensitive data from logs in production builds"

- id: dart-kReleaseMode-check
  languages: [dart]
  patterns:
    - regex: 'assert\s*\(.*[''\\"].*password|assert\s*\(.*[''\\"].*token'
  severity: low
  description: "Sensitive data in assert statements (only runs in debug mode)"
  remediation: "Never include real credentials even in assertions"

# ======================== DEEP DETECTION RULES ========================
- id: dart-webview-js
  languages: [dart]
  patterns:
    - regex: 'javascriptMode:\s*JavascriptMode\.unrestricted'
  severity: high
  description: "WebView with unrestricted JavaScript — XSS risk"
  remediation: "Only enable JS when necessary. Sanitize all loaded content"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: dart-shared-prefs-sensitive
  languages: [dart]
  patterns:
    - regex: '(?i)SharedPreferences.*(password|token|secret|key|api_key)'
  severity: high
  description: "Sensitive data in SharedPreferences — stored in plain text"
  remediation: "Use flutter_secure_storage for sensitive data"
  cwe: "CWE-312"
  owasp: "A02:2021"

- id: dart-http-no-ssl
  languages: [dart]
  patterns:
    - regex: 'http\.get\s*\(\s*Uri\.parse\s*\(\s*[''\\\"]http:'
  severity: high
  description: "HTTP request without TLS"
  remediation: "Use HTTPS for all network requests"
  cwe: "CWE-319"
  owasp: "A02:2021"

- id: dart-process-run
  languages: [dart]
  patterns:
    - regex: 'Process\.run\s*\('
  severity: high
  description: "Process execution — avoid user input in command args"
  remediation: "Validate all arguments. Never pass user input to Process.run"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: dart-sql-interpolation
  languages: [dart]
  patterns:
    - regex: '(?i)(rawQuery|rawInsert|rawUpdate|rawDelete|execute)\s*\(\s*[''\\"].*\$'
  severity: critical
  description: "SQL query with string interpolation"
  remediation: "Use parameterized queries with ? placeholders"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: dart-certificate-bypass
  languages: [dart]
  patterns:
    - regex: '(?i)badCertificateCallback.*true'
  severity: critical
  description: "TLS certificate validation bypassed"
  remediation: "Implement proper certificate pinning"
  cwe: "CWE-295"
  owasp: "A07:2021"

