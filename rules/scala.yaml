- id: scala-hardcoded-password
  languages: [scala]
  patterns:
    - regex: '(?i)(password|passwd|pwd)\\s*=\\s*"[^"]{8,}"''severity: high
  description: "Hardcoded password detected in Scala source code"
  remediation: "Use environment variables or Typesafe Config for secrets"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: scala-hardcoded-api-key
  languages: [scala]
  patterns:
    - regex: '(?i)(api[_-]?key|apikey|secret)\\s*=\\s*"[a-zA-Z0-9]{16,}"''severity: high
  description: "Hardcoded API key or secret detected"
  remediation: "Store keys in environment variables or use a vault service"
  cwe: "CWE-798"
  owasp: "A07:2021"

# ======================== SQL Injection ========================
- id: scala-sql-injection-concat
  languages: [scala]
  patterns:
    - regex: '(?i)(execute|query)\\s*\\(\\s*s?".*\\$|sql".*\\$\\{''severity: critical
  description: "SQL injection via string interpolation"
  remediation: "Use Slick or Doobie parameterized queries. Never interpolate user input into SQL"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: scala-sql-injection-anorm
  languages: [scala]
  patterns:
    - regex: 'SQL\\s*\\(\\s*s?".*\\$''severity: critical
  description: "SQL injection in Anorm query with string interpolation"
  remediation: "Use SQL(\"SELECT * FROM users WHERE id = {id}\").on('id -> userId)"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ======================== Command Injection ========================
- id: scala-command-injection
  languages: [scala]
  patterns:
    - regex: '(Process|Runtime\\.getRuntime).*\\+.*|sys\\.process.*\\+|".*"\\s*\\.!''severity: critical
  description: "Command injection via Process or sys.process"
  remediation: "Use ProcessBuilder with argument list. Never concatenate user input"
  cwe: "CWE-78"
  owasp: "A03:2021"

# ======================== XSS (Play Framework) ========================
- id: scala-play-xss
  languages: [scala]
  patterns:
    - regex: '(?i)Html\\s*\\(|@Html\\s*\\(.*request''severity: high
  description: "Play Framework Html() bypasses auto-escaping — XSS risk"
  remediation: "Avoid Html() with user input. Use Twirl templates for auto-escaping"
  cwe: "CWE-79"
  owasp: "A03:2021"

# ======================== CSRF ========================
- id: scala-play-csrf-disabled
  languages: [scala]
  patterns:
    - regex: '(?i)play\\.filters\\.csrf\\..*disabled|csrf\\.bypass''severity: high
  description: "CSRF protection disabled in Play Framework"
  remediation: "Enable CSRF protection: play.filters.csrf.header.name and use @helper.CSRF"
  cwe: "CWE-352"
  owasp: "A01:2021"

# ======================== Deserialization ========================
- id: scala-insecure-deserialization
  languages: [scala]
  patterns:
    - regex: '(?i)ObjectInputStream|JavaSerialization|readObject\\s*\\(''severity: critical
  description: "Insecure Java deserialization in Scala code"
  remediation: "Use JSON (circe, play-json) or Protocol Buffers. Never deserialize untrusted data"
  cwe: "CWE-502"
  owasp: "A08:2021"

# ======================== Path Traversal ========================
- id: scala-path-traversal
  languages: [scala]
  patterns:
    - regex: '(?i)(Source\\.fromFile|new File)\\s*\\(.*request|Paths\\.get\\s*\\(.*param''severity: high
  description: "Path traversal via user-controlled file path"
  remediation: "Validate paths against base directory. Use Path.normalize() and startsWith()"
  cwe: "CWE-22"
  owasp: "A01:2021"

# ======================== Weak Cryptography ========================
- id: scala-weak-crypto
  languages: [scala]
  patterns:
    - regex: '(?i)(MessageDigest\\.getInstance\\s*\\(\\s*"MD5"|MessageDigest\\.getInstance\\s*\\(\\s*"SHA-1")''severity: medium
  description: "Use of weak hash function (MD5/SHA-1)"
  remediation: "Use SHA-256 or bcrypt/scrypt for password hashing"
  cwe: "CWE-327"
  owasp: "A02:2021"

# ======================== Open Redirect ========================
- id: scala-open-redirect
  languages: [scala]
  patterns:
    - regex: 'Redirect\\s*\\(\\s*request\\.getQueryString|Redirect\\s*\\(\\s*params''severity: high
  description: "Open redirect via user-controlled URL"
  remediation: "Validate redirect URLs against an allowlist"
  cwe: "CWE-601"
  owasp: "A01:2021"

# ======================== SSRF ========================
- id: scala-ssrf
  languages: [scala]
  patterns:
    - regex: '(?i)(ws\\.url|Http\\(|sttp\\.client)\\s*\\(.*request|new URL\\s*\\(.*param''severity: high
  description: "SSRF via user-controlled URL"
  remediation: "Validate URLs against allowlist. Block private IP ranges"
  cwe: "CWE-918"
  owasp: "A10:2021"

# ======================== XXE ========================
- id: scala-xxe
  languages: [scala]
  patterns:
    - regex: '(?i)XML\\.load|SAXParserFactory|DocumentBuilderFactory''severity: high
  description: "XML parsing may be vulnerable to XXE attacks"
  remediation: "Disable external entities: factory.setFeature(XMLConstants.FEATURE_SECURE_PROCESSING, true)"
  cwe: "CWE-611"
  owasp: "A05:2021"

# ======================== Log Forging ========================
- id: scala-log-forging
  languages: [scala]
  patterns:
    - regex: '(?i)logger\\.(info|warn|error|debug)\\s*\\(.*request\\.getQueryString''severity: medium
  description: "Log forging via unsanitized user input in log messages"
  remediation: "Sanitize log input: remove newlines and control characters"
  cwe: "CWE-117"
  owasp: "A09:2021"

# ======================== SSTI ========================
- id: scala-ssti
  languages: [scala]
  patterns:
    - regex: '(?i)Twirl\\.compile|views\\.html.*\\+.*request''severity: high
  description: "Server-side template injection in Play/Twirl"
  remediation: "Never concatenate user input into template content"
  cwe: "CWE-1336"
  owasp: "A03:2021"

