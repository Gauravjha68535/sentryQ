  severity: critical
  description: "Entity resolver without auth - can load any referenced entity"
  remediation: "Add authorization to __resolveReference. Validate user has access to entity."
  cwe: "CWE-862"
  owasp: "A01:2021"

- id: gql-fed-context-forwarding
  languages: [javascript, typescript]
  patterns:
    - regex: 'buildGateway.*'
