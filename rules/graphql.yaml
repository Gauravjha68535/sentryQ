  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-biz-operation-name-missing
  languages: [graphql]
  patterns:
    - regex: '^\{'
  severity: low
  description: "Anonymous query without operation name - harder to monitor/log"
  remediation: "Require operation names for all queries. Reject anonymous operations."
  cwe: "CWE-778"
  owasp: "A05:2021"

- id: gql-biz-fragment-name-collision
