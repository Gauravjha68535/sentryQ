# ============================================================================
# GRAPHQL SECURITY RULES - COMPREHENSIVE EDITION
# ============================================================================

# ======================== INJECTION ATTACKS (1-15) ========================

- id: gql-injection-query-concat
  languages: [graphql, javascript, typescript, python, ruby, java, go]
  patterns:
    - regex: '(?i)(query|mutation|subscription)\s*[''\\"]\s*\+|gql\s*`[^`]*\$\{.*(req|params|body|input)|graphql\s*\(\s*[''\\"].*\+\s*(req|params)'
  severity: critical
  description: "GraphQL query constructed via string concatenation with user input - allows attackers to modify query structure"
  remediation: "Use GraphQL variables exclusively: query($id: ID!) { user(id: $id) }. Never concatenate user input into query strings."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: gql-injection-template-literal
  languages: [javascript, typescript]
  patterns:
    - regex: 'gql\s*`[^`]*\$\{[^}]*\}'
  severity: high
  description: "GraphQL query uses template literal with dynamic values - enables query structure manipulation"
  remediation: "Replace template interpolation with GraphQL variables. Example: gql`query($id:ID!){user(id:$id)}`"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: gql-injection-field-name
  languages: [graphql, javascript, typescript, python]
  patterns:
    - regex: 'field(?:Name)?\s*[:=]\s*(?:req|params|body|input)'
  severity: high
  description: "Dynamic field names from user input - allows attackers to query unauthorized fields"
  remediation: "Validate field names against an allowlist. Never use user input directly as field names."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: gql-injection-directive-name
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: '@\$\{[^}]*\}|@\\"\s*\+\s*(?:req|params)'
  severity: high
  description: "Dynamic directive names from user input - can bypass authorization directives"
  remediation: "Use static directive names only. Validate any dynamic directive usage against allowlist."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: gql-injection-typename
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: '__typename.*\$\{|__typename.*\+.*(?:req|params)'
  severity: medium
  description: "Dynamic __typename usage with user input - can expose internal type information"
  remediation: "Avoid using __typename with user input. Use fragments with static type conditions."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-injection-argument-name
  languages: [graphql, javascript, typescript, python]
  patterns:
    - regex: 'args\[.*(?:req|params|body|input)\]|arguments\[.*user'
  severity: high
  description: "Dynamic argument names from user input - allows attackers to manipulate query logic"
  remediation: "Use fixed argument names. Validate any dynamic argument names against an allowlist."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: gql-injection-raw-sql
  languages: [javascript, typescript, python, ruby, java]
  patterns:
    - regex: 'db\.(?:query|execute|raw)\s*\(\s*[''\\"].*\$\{.*args|db\.(?:query|execute).*\+\s*args\.'
  severity: critical
  description: "SQL injection via GraphQL args passed directly to database queries"
  remediation: "Use ORM/ODM with parameterized queries. Never interpolate args into SQL strings."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: gql-injection-nosql
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'db\.(?:find|insert|update|aggregate)\s*\(\s*\{[^}]*args\.[^}]*\}'
  severity: high
  description: "NoSQL injection via GraphQL args passed to MongoDB queries"
  remediation: "Validate and sanitize args before using in NoSQL queries. Use schema validation."
  cwe: "CWE-943"
  owasp: "A03:2021"

- id: gql-injection-rest-call
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'axios\.(?:get|post|put|delete)\s*\(\s*[''\\"].*\$\{.*args|fetch\(\s*[''\\"].*\+\s*args'
  severity: high
  description: "REST API URL injection via GraphQL args - SSRF vulnerability"
  remediation: "Validate URLs against allowlist. Use environment variables for API endpoints."
  cwe: "CWE-918"
  owasp: "A10:2021"

- id: gql-injection-redis
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'redis\.(?:get|set|hset|hget)\s*\(\s*[''\\"].*\$\{.*args|redis\.call.*\+\s*args'
  severity: high
  description: "Redis command injection via GraphQL args - can manipulate cache data"
  remediation: "Use parameterized Redis commands. Validate cache keys against patterns."
  cwe: "CWE-77"
  owasp: "A03:2021"

- id: gql-injection-elasticsearch
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'elastic\.(?:search|index|update)\s*\(\s*\{[^}]*args\.[^}]*\}'
  severity: high
  description: "Elasticsearch query injection via GraphQL args"
  remediation: "Use Elasticsearch query builders with strict schema validation."
  cwe: "CWE-943"
  owasp: "A03:2021"

- id: gql-injection-ldap
  languages: [javascript, typescript, python, java]
  patterns:
    - regex: 'ldap\.(?:search|bind)\s*\(\s*[''\\"].*\$\{.*args|ldap\.search.*\+\s*args'
  severity: critical
  description: "LDAP injection via GraphQL args - can bypass authentication"
  remediation: "Use LDAP escaping libraries. Never interpolate user input into LDAP filters."
  cwe: "CWE-90"
  owasp: "A03:2021"

- id: gql-injection-command
  languages: [javascript, typescript, python, ruby]
  patterns:
    - regex: 'exec(?:Sync)?\s*\(\s*[''\\"].*\$\{.*args|spawn\s*\(\s*[''\\"].*\+\s*args'
  severity: critical
  description: "Command injection via GraphQL args - RCE vulnerability"
  remediation: "Avoid shell commands entirely. Use safe APIs for system operations."
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: gql-injection-xpath
  languages: [javascript, typescript, python, java]
  patterns:
    - regex: 'xpath\.(?:query|evaluate)\s*\(\s*[''\\"].*\$\{.*args|xpath.*\+\s*args'
  severity: high
  description: "XPath injection via GraphQL args - can access unauthorized XML data"
  remediation: "Use parameterized XPath queries. Validate and escape user input."
  cwe: "CWE-643"
  owasp: "A03:2021"

- id: gql-injection-graphql-variables
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'variables:\s*\{[^}]*req\.|variables:\s*\{[^}]*params\.'
  severity: medium
  description: "GraphQL variables populated directly from request data without validation"
  remediation: "Validate and sanitize all variable inputs against the schema before processing."
  cwe: "CWE-20"
  owasp: "A03:2021"


# ======================== DOS & PERFORMANCE (16-35) ========================

- id: gql-dos-deep-nesting
  languages: [graphql]
  patterns:
    - regex: '\{\s*\w+\s*\{\s*\w+\s*\{\s*\w+\s*\{\s*\w+\s*\{\s*\w+'
  severity: critical
  description: "Extremely deep nested query - can cause stack overflow and CPU exhaustion"
  remediation: "Implement depth limiting (max depth 5-7). Use graphql-depth-limit middleware."
  cwe: "CWE-400"
  owasp: "A04:2023"

- id: gql-dos-circular-fragments
  languages: [graphql]
  patterns:
    - regex: '\.\.\.\w+.*\{\s*\.\.\.\w+.*\{\s*\.\.\.\w+'
  severity: high
  description: "Circular fragment references can cause infinite query expansion and memory exhaustion"
  remediation: "Implement fragment cycle detection in validation layer. Limit fragment recursion depth."
  cwe: "CWE-835"
  owasp: "A04:2023"

- id: gql-dos-array-batching
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: '\[.*\].*\[.*\].*\[.*\].*\[.*\]|\w+\(\s*\[.*,\s*.*,\s*.*,\s*.*,\s*.*\]'
  severity: high
  description: "Array-based query batching with many elements - resource exhaustion DoS"
  remediation: "Limit array sizes (max 10-20 elements). Implement pagination instead of large arrays."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-aliases-overload
  languages: [graphql]
  patterns:
    - regex: '\w+\s*:\s*\w+.*\w+\s*:\s*\w+.*\w+\s*:\s*\w+.*\w+\s*:\s*\w+.*\w+\s*:\s*\w+'
  severity: medium
  description: "Excessive field aliases (5+) - can cause response explosion and CPU overload"
  remediation: "Limit aliases per query (max 10). Implement cost analysis based on alias count."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-directive-spam
  languages: [graphql]
  patterns:
    - regex: '@\w+.*@\w+.*@\w+.*@\w+.*@\w+.*@\w+'
  severity: medium
  description: "Excessive directive usage (6+) - can cause directive execution overhead"
  remediation: "Limit directives per field and per query. Implement directive cost analysis."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-fragment-spread
  languages: [graphql]
  patterns:
    - regex: '\.\.\.\w+.*\.\.\.\w+.*\.\.\.\w+.*\.\.\.\w+.*\.\.\.\w+'
  severity: high
  description: "Excessive fragment spreading (5+) - can cause query explosion and memory issues"
  remediation: "Limit fragment spreads. Implement maximum query size limits."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-field-duplication
  languages: [graphql]
  patterns:
    - regex: '\w+\s*\{\s*\w+\s*\w+\s*\w+\s*\w+\s*\w+\s*\w+'
  severity: low
  description: "Multiple fields without spacing - potential query parser DoS"
  remediation: "Implement query size limits. Use query cost analysis."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-mutation-batching
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'mutation.*\{.*\{.*\}.*\{.*\}.*\{.*\}.*\{.*\}|batch.*mutation'
  severity: high
  description: "Multiple mutations in single request - can cause state-changing DoS"
  remediation: "Limit mutations per request. Implement rate limiting per mutation type."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-subscription-events
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'subscription.*\{.*\{.*\}.*\{.*\}.*\{.*\}|asyncIterator.*multiple'
  severity: high
  description: "Subscriptions with multiple event streams - event loop starvation"
  remediation: "Limit concurrent subscriptions per client. Implement event throttling."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-introspection-abuse
  languages: [graphql]
  patterns:
    - regex: '__schema\s*\{\s*__.*__.*__.*__.*__|__type\s*\(.*\).*\{.*__'
  severity: medium
  description: "Introspection queries requesting excessive metadata - information disclosure + DoS"
  remediation: "Disable introspection in production. Rate limit introspection queries."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-dos-cost-analysis-missing
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'ApolloServer\s*\(\s*\{[^}]*'
  severity: high
  description: "GraphQL server without query cost analysis - vulnerable to expensive query DoS"
  remediation: "Implement graphql-query-complexity with field costs. Set maximum cost limit."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-depth-limit-missing
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'ApolloServer\s*\(\s*\{[^}]*'
  severity: high
  description: "No query depth limiting - attackers can send deeply nested queries"
  remediation: "Implement graphql-depth-limit with max depth of 5-7 levels."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-pagination-unlimited
  languages: [graphql]
  patterns:
    - regex: 'first:\s*\d{4,}|last:\s*\d{4,}|limit:\s*\d{4,}|take:\s*\d{4,}'
  severity: high
  description: "Pagination with very large limits (1000+) - can cause database overload"
  remediation: "Set maximum page size (e.g., max 100). Implement cursor-based pagination."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-recursive-fragments
  languages: [graphql]
  patterns:
    - regex: 'fragment\s+\w+\s+on\s+\w+\s*\{[^}]*\.\.\..*'
  severity: critical
  description: "Self-recursive fragment - infinite loop and stack overflow"
  remediation: "Implement fragment cycle detection. Reject queries with recursive fragments."
  cwe: "CWE-835"
  owasp: "A04:2023"

- id: gql-dos-query-size
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'query\s*\{.{1000,}|mutation\s*\{.{1000,}'
  severity: medium
  description: "Extremely large query (5000+ chars) - parser and memory DoS"
  remediation: "Implement maximum query length limits (e.g., 2000 chars)."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-token-count
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: '\w+.{1000,}|\s+.{1000,}'
  severity: medium
  description: "Query with excessive tokens - parsing and validation DoS"
  remediation: "Limit total tokens per query. Implement query cost analysis."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-http-batching
  languages: [javascript, typescript]
  patterns:
    - regex: 'allowBatchedHttpRequests\s*:\s*true.*'
  severity: high
  description: "HTTP batching enabled without batch size limits - amplification DoS"
  remediation: "Set maxBatchSize (e.g., 5-10). Implement per-batch rate limiting."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-persisted-queries-bypass
  languages: [javascript, typescript]
  patterns:
    - regex: 'persistedQueries\s*:\s*false'
  severity: medium
  description: "Persisted queries disabled - clients can send arbitrary expensive queries"
  remediation: "Enable automatic persisted queries (APQ) and use operation allowlist."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-subscription-connections
  languages: [javascript, typescript]
  patterns:
    - regex: 'subscriptions\s*:\s*\{[^}]*'
  severity: high
  description: "No limit on subscription connections - WebSocket connection exhaustion"
  remediation: "Set maxConnections per client (e.g., 5). Implement connection rate limiting."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-dos-resolver-timeout
  languages: [javascript, typescript]
  patterns:
    - regex: 'resolver.*\{[^}]*'
  severity: medium
  description: "Resolvers without timeouts - can hang indefinitely on slow operations"
  remediation: "Implement resolver timeouts (e.g., 5-10 seconds). Use Promise.race with timeout."
  cwe: "CWE-770"
  owasp: "A04:2023"


# ======================== AUTHORIZATION & ACCESS CONTROL (36-60) ========================

- id: gql-auth-missing-mutation
  languages: [graphql]
  patterns:
    - regex: 'type\s+Mutation\s*\{[^}]*'
  severity: critical
  description: "Mutations defined without any authorization directives - unauthenticated state changes"
  remediation: "Apply @auth or @hasRole directives to ALL mutations. Implement resolver-level auth checks."
  cwe: "CWE-862"
  owasp: "A01:2021"

- id: gql-auth-missing-query-sensitive
  languages: [graphql]
  patterns:
    - regex: '(?:email|password|token|secret|credit|ssn|private)\s*:\s*\w+'
  severity: high
  description: "Sensitive fields exposed without authorization - data leakage"
  remediation: "Add field-level authorization directives. Implement data filtering in resolvers."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-auth-role-escalation
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'role:\s*[''\\"]admin[''\\"]|roles.*includes.*[''\\"]admin[''\\"]'
  severity: critical
  description: "Role assignment based on user input - privilege escalation vulnerability"
  remediation: "Never accept roles from client. Set roles server-side based on authentication."
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: gql-auth-field-skipping
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'if\s*\(\s*!user\s*\)\s*\{\s*return\s+null|if.*!token.*return.*null'
  severity: high
  description: "Auth returns null instead of throwing - allows partial data access"
  remediation: "Throw authentication errors (AuthenticationError). Never return partial data."
  cwe: "CWE-306"
  owasp: "A01:2021"

- id: gql-auth-context-injection
  languages: [javascript, typescript]
  patterns:
    - regex: 'context:\s*\{[^}]*req\.[^}]*\}|context:\s*\(\s*req\s*\)'
  severity: medium
  description: "Context populated directly from request without validation"
  remediation: "Validate and sanitize all request data before adding to context."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-auth-jwt-none-algorithm
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'algorithms?:\s*\[?[''\\"]none[''\\"]|verify.*\{\s*algorithm.*none'
  severity: critical
  description: "JWT validation accepting 'none' algorithm - authentication bypass"
  remediation: "Always specify allowed algorithms (HS256, RS256). Never allow 'none'."
  cwe: "CWE-327"
  owasp: "A02:2021"

- id: gql-auth-jwt-weak-secret
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'secret:\s*[''\\"]\w{1,15}[''\\"]|jwt\.sign.*[''\\"]\w{1,15}[''\\"]'
  severity: high
  description: "Weak JWT secret (<16 chars) - token forgery vulnerability"
  remediation: "Use strong secrets (min 32 chars). Store secrets in environment variables."
  cwe: "CWE-326"
  owasp: "A02:2021"

- id: gql-auth-jwt-no-expiry
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'jwt\.sign\([^,]+,\s*[^,]+,\s*'
  severity: high
  description: "JWT created without expiration - tokens valid indefinitely"
  remediation: "Always set expiresIn (e.g., '15m' for access tokens, '7d' for refresh tokens)."
  cwe: "CWE-613"
  owasp: "A07:2021"

- id: gql-auth-bypass-null-token
  languages: [javascript, typescript]
  patterns:
    - regex: 'if\s*\(\s*!token\s*\)\s*\{\s*return\s*\{\s*\}\s*\}|if.*!token.*next'
  severity: critical
  description: "Auth middleware proceeds with null token - authentication bypass"
  remediation: "Reject requests with missing/invalid tokens. Don't proceed without auth."
  cwe: "CWE-306"
  owasp: "A01:2021"

- id: gql-auth-unauthorized-field-suggestions
  languages: [javascript, typescript]
  patterns:
    - regex: 'hideSuggestions:\s*false|hideSchemaDetailsFromClientErrors:\s*false'
  severity: medium
  description: "Field suggestions enabled - helps attackers enumerate schema"
  remediation: "Set hideSuggestions: true in production. Disable schema leak in errors."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-auth-data-loader-cache-leak
  languages: [javascript, typescript]
  patterns:
    - regex: 'new\s+DataLoader\([^,]+,\s*\{\s*cache:\s*true'
  severity: high
  description: "DataLoader cache enabled across requests - user data leakage"
  remediation: "Create new DataLoader per request. Disable caching for user-specific data."
  cwe: "CWE-524"
  owasp: "A05:2021"

- id: gql-auth-field-filtering-missing
  languages: [javascript, typescript]
  patterns:
    - regex: 'resolve\s*:\s*async.*return.*db.*find|resolve.*return.*data'
  severity: medium
  description: "Resolver returns all data without field-level filtering"
  remediation: "Filter fields based on user permissions. Use projection in database queries."
  cwe: "CWE-862"
  owasp: "A01:2021"

- id: gql-auth-query-complexity-bypass
  languages: [javascript, typescript]
  patterns:
    - regex: 'cost.*analysis.*'
  severity: medium
  description: "Query cost analysis without authentication context"
  remediation: "Implement authenticated cost analysis - higher costs for unauthenticated users."
  cwe: "CWE-862"
  owasp: "A01:2021"

- id: gql-auth-rate-limit-bypass
  languages: [javascript, typescript]
  patterns:
    - regex: 'rateLimit.*'
  severity: medium
  description: "Rate limiting without user context - can be bypassed via IP rotation"
  remediation: "Rate limit based on user ID when authenticated, fallback to IP."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-auth-operation-name-bypass
  languages: [javascript, typescript]
  patterns:
    - regex: 'validationRules.*'
  severity: low
  description: "Operation name not validated - can hide malicious queries"
  remediation: "Validate operation names against allowlist. Log unknown operation names."
  cwe: "CWE-20"
  owasp: "A03:2021"


# ======================== INFORMATION DISCLOSURE (61-75) ========================

- id: gql-info-introspection-enabled
  languages: [graphql, javascript, typescript, python]
  patterns:
    - regex: '__schema|__type|introspection:\s*true'
  severity: high
  description: "Introspection enabled in production - full schema exposure to attackers"
  remediation: "Set introspection: false in production. Use conditional introspection based on NODE_ENV."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-info-stacktrace-exposed
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'debug:\s*true|stacktrace:\s*true|includeStacktraceInErrorResponses:\s*true'
  severity: high
  description: "Stack traces exposed in error messages - internal code leakage"
  remediation: "Set debug: false. Mask error details in production. Log errors internally only."
  cwe: "CWE-209"
  owasp: "A05:2021"

- id: gql-info-internal-error-messages
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'formatError.*message.*error|error.*internal.*message'
  severity: medium
  description: "Internal error messages exposed to clients - system information leak"
  remediation: "Use generic error messages. Map internal errors to client-safe errors."
  cwe: "CWE-209"
  owasp: "A05:2021"

- id: gql-info-verbose-graphql-errors
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'formatError.*extensions|error.*extensions.*exception'
  severity: high
  description: "Verbose GraphQL errors with extensions - exposes internal details"
  remediation: "Strip extensions in production. Use custom error formatter to hide details."
  cwe: "CWE-209"
  owasp: "A05:2021"

- id: gql-info-debug-headers
  languages: [javascript, typescript]
  patterns:
    - regex: 'req\.headers\[''x-debug''\]|req\.headers\[''debug''\]|X-Debug-Token'
  severity: medium
  description: "Debug headers enabled - can expose sensitive debugging information"
  remediation: "Disable debug headers in production. Use authenticated debug modes only."
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: gql-info-query-logging
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'console\.log.*query|logger\.info.*query|console\.log.*gql'
  severity: medium
  description: "Full queries logged - may contain PII or tokens in variables"
  remediation: "Redact sensitive data from logs. Log only operation names and metadata."
  cwe: "CWE-532"
  owasp: "A05:2021"

- id: gql-info-variable-logging
  languages: [javascript, typescript, python]
  patterns:
    - regex: 'console\.log.*variables|logger\.info.*variables'
  severity: high
  description: "GraphQL variables logged - passwords, tokens exposed in logs"
  remediation: "Never log variables. Mask sensitive fields before logging."
  cwe: "CWE-532"
  owasp: "A05:2021"

- id: gql-info-schema-descriptions
  languages: [graphql]
  patterns:
    - regex: '\\"\\"\\".*(password|secret|key|internal).*\\"\\"\\"|\\".*(password|secret).*\\"'
  severity: high
  description: "Sensitive information in schema descriptions - exposed via introspection"
