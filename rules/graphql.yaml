  severity: medium
  description: "String field without length limits - DoS via large strings"
  remediation: "Add @length or @maxLength directives. Limit string sizes (e.g., 255 chars)."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-input-regex-validation-missing
  languages: [graphql]
  patterns:
    - regex: '(?:code|token|key|reference|handle):\s*String'
  severity: medium
  description: "Code/token field without format validation"
  remediation: "Use @pattern directive with strict regex validation. Never accept arbitrary formats."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-input-array-size-missing
  languages: [graphql]
  patterns:
    - regex: '\[.*\]\s*\w+\s*\([^)]*\]'
  severity: high
  description: "Array input without size limits - resource exhaustion"
  remediation: "Add @size or @maxItems directive. Limit array sizes (e.g., max 100 items)."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-input-nested-deep
  languages: [graphql]
  patterns:
    - regex: 'input\s+\w+\s*\{[^}]*\w+\s*:\s*\w+\s*\{[^}]*\w+\s*:\s*\w+\s*\{'
  severity: medium
  description: "Deeply nested input types - recursive parsing DoS"
  remediation: "Limit input nesting depth. Flatten complex input structures."
  cwe: "CWE-400"
  owasp: "A04:2023"

- id: gql-input-self-referential
  languages: [graphql]
  patterns:
