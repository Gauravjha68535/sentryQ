  owasp: "A04:2023"

- id: gql-biz-orderby-injection
  languages: [graphql]
  patterns:
    - regex: 'orderBy:\s*\w+|sort:\s*\w+|order:\s*\w+'
  severity: medium
  description: "Order by field from user input - may reveal indexing strategy"
  remediation: "Validate orderBy fields against allowlist. Use enum for sort options."
  cwe: "CWE-20"
  owasp: "A03:2021"

