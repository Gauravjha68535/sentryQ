- id: gql-fed-link-version
  languages: [graphql]
  patterns:
    - regex: '@link\(url:.*federation.*version=[''\\"]1\.|@link.*url.*v1\.0'
  severity: medium
  description: "Federation v1 spec - missing v2 security improvements"
  remediation: "Upgrade to Federation v2 with @link directive and better composition."
  cwe: "CWE-1104"
