  severity: high
  description: "Batch mixing queries and mutations - CSRF/state change risks"
  remediation: "Don't allow mixing query and mutation in same batch. Separate batches by type."
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: gql-biz-pagination-cursor-injection
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'cursor:\s*\$\w+|after:\s*\$\w+|before:\s*\$\w+'
  severity: high
