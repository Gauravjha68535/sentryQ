  severity: high
  description: "Self-referential input type - infinite recursion risk"
  remediation: "Avoid self-referential inputs. Use separate input types for nested data."
  cwe: "CWE-835"
  owasp: "A04:2023"

- id: gql-input-union-injection
  languages: [graphql]
  patterns:
    - regex: 'input.*union|union.*input|__typename.*input'
  severity: medium
  description: "Union in input position - GraphQL spec violation, may cause parsing issues"
  remediation: "Unions cannot be used as inputs. Use interfaces or separate input types."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-input-interface
  languages: [graphql]
  patterns:
    - regex: 'input.*implements|implements.*input'
  severity: medium
  description: "Interface implementation on input type - not supported"
  remediation: "Input types cannot implement interfaces. Use composition instead."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-input-default-sql
  languages: [graphql]
  patterns:
    - regex: 'default:\s*[''\\"].*(?:SELECT|INSERT|UPDATE|DELETE|DROP|UNION).*[''\\"]'
  severity: critical
  description: "SQL injection payload in default value - potential backdoor"
  remediation: "Never use SQL as default values. Remove suspicious defaults."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: gql-input-default-command
  languages: [graphql]
  patterns:
    - regex: 'default:\s*[''\\"].*(?:exec|system|eval|require|process).*[''\\"]'
  severity: critical
  description: "Command injection payload in default value - RCE risk"
  remediation: "Remove all command-like strings from default values."
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: gql-input-default-html
  languages: [graphql]
  patterns:
    - regex: 'default:\s*[''\\\"].*<script>.*[''\\\"]'
  severity: high
  description: "XSS payload in default value - reflected XSS risk"
  remediation: "Remove HTML/script tags from default values. Escape all defaults."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: gql-input-required-field-after-optional
  languages: [graphql]
  patterns:
    - regex: '\w+!.*\s+\w+:\s*\w+'
  severity: low
  description: "Required field after optional - API design flaw, client confusion"
  remediation: "Place required fields before optional ones in input definitions."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-input-mutually-exclusive
  languages: [graphql]
  patterns:
    - regex: 'input\s+\w+\s*\{[^}]*(?:\w+\s*:\s*\w+.*\w+\s*:\s*\w+){3,}'
  severity: medium
  description: "Input with many fields but no validation - ambiguous API"
  remediation: "Use OneOf directive for mutually exclusive fields. Add input validation rules."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-input-sensitive-in-enum
  languages: [graphql]
  patterns:
    - regex: 'enum\s+\w+\s*\{[^}]*(?:ADMIN|ROOT|SUPER|OWNER|INTERNAL|PRIVATE)'
  severity: high
  description: "Sensitive role/enum values exposed - privilege escalation"
  remediation: "Remove sensitive enum values. Map internal roles to client-safe enums."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-input-empty-enum
  languages: [graphql]
  patterns:
    - regex: 'enum\s+\w+\s*\{\s*\}'
  severity: low
  description: "Empty enum definition - schema parsing error risk"
  remediation: "Remove empty enums or add valid values."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-input-duplicate-values
  languages: [graphql]
  patterns:
    - regex: 'enum\s+\w+\s*\{[^}]*(\w+)[^}]*.*[^}]*.*'
  severity: low
  description: "Duplicate enum values - client confusion"
  remediation: "Remove duplicate enum values. Keep enum unique."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-input-deprecated-values
  languages: [graphql]
  patterns:
    - regex: '@deprecated.*reason:\s*[''\\\"]([^''\\\"]*)[''\\\"]'
  severity: low
  description: "Deprecated enum values - may still be used by clients"
  remediation: "Plan removal of deprecated values. Monitor usage before removal."
  cwe: "CWE-1104"
  owasp: "A05:2021"

  # ======================== BUSINESS LOGIC (46-65) ========================

- id: gql-biz-rate-limit-auth-bypass
