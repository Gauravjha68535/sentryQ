  remediation: "Cache identical query results. Rate limit repeated queries."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-biz-field-suggestions-enumeration
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'didYouMean|suggestions.*field|field.*suggestions'
  severity: high
  description: "Field suggestions in errors - helps attackers discover fields"
  remediation: "Disable field suggestions in production. Return generic errors."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-biz-type-suggestions
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'didYouMeanType|type.*suggestions|suggestedType'
  severity: high
  description: "Type suggestions in errors - reveals schema structure"
  remediation: "Disable type suggestions. Return generic type errors."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-biz-argument-suggestions
  languages: [graphql, javascript, typescript]
  patterns:
    - regex: 'didYouMeanArgument|argument.*suggestions|suggestedArg'
  severity: high
  description: "Argument suggestions - reveals available arguments"
  remediation: "Disable argument suggestions. Use generic error messages."
  cwe: "CWE-200"
  owasp: "A01:2021"

- id: gql-biz-error-detail-timing
  languages: [javascript, typescript]
  patterns:
    - regex: 'error.*timing|performance.*error|execution.*time'
  severity: medium
  description: "Error messages reveal timing information - timing attacks possible"
  remediation: "Ensure consistent error response times. Remove timing from errors."
  cwe: "CWE-208"
  owasp: "A02:2021"

- id: gql-biz-error-auth-detail
  languages: [javascript, typescript]
  patterns:
    - regex: 'invalid\s+(?:password|token|credential)|user\s+not\s+found|account.*locked'
  severity: high
  description: "Specific auth errors - user enumeration"
  remediation: "Use generic messages: 'Invalid credentials'. Same message for all auth failures."
  cwe: "CWE-204"
  owasp: "A01:2021"

- id: gql-biz-error-resource-existence
  languages: [javascript, typescript]
  patterns:
    - regex: '(?:not\s+found|does\s+not\s+exist|no\s+such)'
  severity: medium
  description: "Error messages reveal resource existence - enumeration"
  remediation: "Return 404 with same message for both missing and unauthorized resources."
  cwe: "CWE-204"
  owasp: "A01:2021"

- id: gql-biz-batch-operation-limit
  languages: [javascript, typescript]
  patterns:
    - regex: 'batch.*'
  severity: high
  description: "Batch requests without operation limits - amplification attack"
  remediation: "Limit operations per batch (e.g., 5). Apply rate limits to each operation."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-biz-batch-mix-types
  languages: [javascript, typescript]
  patterns:
