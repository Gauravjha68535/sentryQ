  owasp: "A01:2021"

- id: gql-fed-subgraph-timeout
  languages: [javascript, typescript]
  patterns:
    - regex: 'RemoteGraphQLDataSource.*'
  severity: high
  description: "Subgraph requests without timeout - cascading failures"
  remediation: "Set timeouts for all subgraph requests (e.g., 5 seconds)."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-fed-subgraph-retry
  languages: [javascript, typescript]
  patterns:
    - regex: 'RemoteGraphQLDataSource.*'
  severity: medium
  description: "No retry logic for subgraph failures - availability issues"
  remediation: "Implement retry with exponential backoff for transient failures."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-fed-subgraph-circuit-breaker
  languages: [javascript, typescript]
  patterns:
    - regex: 'gateway.*'
  severity: high
  description: "No circuit breaker for failing subgraphs - service degradation"
  remediation: "Implement circuit breakers for subgraph health checks."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-fed-supergraph-sdl-leak
  languages: [javascript, typescript]
  patterns:
    - regex: 'gateway.*loadSupergraphSdl.*console|gateway.*supergraphSdl.*log'
  severity: high
  description: "Supergraph SDL logged - full schema exposure"
  remediation: "Never log supergraph schema. Use monitoring without schema details."
  cwe: "CWE-200"
  owasp: "A05:2021"

  # ======================== PERSISTED OPERATIONS (106-115) ========================

- id: gql-persisted-store-injection
  languages: [javascript, typescript]
  patterns:
    - regex: 'store\s*\[\s*[''\\"]\s*\+\s*input|store\.get\s*\(\s*[''\\"]\s*\+'
  severity: critical
  description: "Persisted operation store key from user input - cache poisoning"
  remediation: "Use static operation IDs. Never construct cache keys from input."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-persisted-id-collision
  languages: [javascript, typescript]
  patterns:
    - regex: 'hash.*(?:md5|sha1).*query|createHash.*update.*query.*digest'
  severity: high
  description: "Weak hash for operation IDs - collision attacks"
  remediation: "Use SHA-256 or better for operation hashing. Add salt to hashes."
  cwe: "CWE-328"
  owasp: "A02:2021"

- id: gql-persisted-allowlist-bypass
  languages: [javascript, typescript]
  patterns:
    - regex: 'if.*operationName.*(?:!|not).*allowlist|operationName.*'
  severity: high
  description: "Operation name not checked against allowlist - arbitrary operations"
  remediation: "Always validate operationName against allowlist before execution."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-persisted-allowlist-cache
  languages: [javascript, typescript]
  patterns:
    - regex: 'allowlist.*'
  severity: medium
  description: "Allowlist not cached - performance overhead"
  remediation: "Cache allowlist in memory. Use Redis for distributed allowlist."
  cwe: "CWE-400"
  owasp: "A04:2023"

- id: gql-persisted-operation-rotate
  languages: [javascript, typescript]
  patterns:
    - regex: 'persistedQueries.*'
  severity: low
  description: "No rotation of persisted operation IDs - stale operations"
  remediation: "Implement TTL and rotation for persisted operations. Version operations."
  cwe: "CWE-613"
  owasp: "A07:2021"

- id: gql-persisted-registration-auth
  languages: [javascript, typescript]
  patterns:
    - regex: 'registerOperation.*'
  severity: critical
  description: "Operation registration without auth - anyone can register"
  remediation: "Authenticate and authorize operation registration endpoints."
  cwe: "CWE-306"
  owasp: "A01:2021"

- id: gql-persisted-size-limit
  languages: [javascript, typescript]
  patterns:
    - regex: 'registerOperation.*query'
  severity: medium
  description: "No size limit on registered operations - storage exhaustion"
  remediation: "Limit query size for registration (e.g., 10KB). Reject large queries."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-persisted-count-limit
  languages: [javascript, typescript]
  patterns:
    - regex: 'persistedQueries.*'
  severity: medium
  description: "No limit on persisted operations per client - storage DoS"
  remediation: "Limit persisted operations per client (e.g., 100 operations)."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-persisted-validation-skip
  languages: [javascript, typescript]
  patterns:
    - regex: 'persisted.*'
  severity: high
  description: "Persisted operations not validated - malicious operations persisted"
  remediation: "Validate all operations during registration, not just execution."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-persisted-duplicate-detection
  languages: [javascript, typescript]
  patterns:
    - regex: 'registerOperation.*'
  severity: low
  description: "No duplicate detection - same operation stored multiple times"
  remediation: "Check for existing operations. Reuse IDs for identical queries."
  cwe: "CWE-770"
  owasp: "A04:2023"

  # ======================== MONITORING & AUDIT (116-125) ========================

- id: gql-audit-sensitive-operations
