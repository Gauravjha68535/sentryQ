  description: "Queries requesting many fields - over-fetching"
  remediation: "Implement field usage analytics. Educate clients on minimal fields."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-perf-slow-resolvers
  languages: [javascript, typescript]
  patterns:
    - regex: 'setTimeout|sleep|delay.*resolve'
  severity: high
  description: "Resolvers with artificial delays - performance issues"
  remediation: "Remove artificial delays. Optimize slow operations."
  cwe: "CWE-400"
  owasp: "A04:2023"

- id: gql-perf-cacheable-queries
  languages: [graphql]
  patterns:
    - regex: 'query.*\{.*\}'
  severity: low
  description: "Cacheable queries without cache directives"
  remediation: "Add @cacheControl directives to cacheable queries and fields."
  cwe: "CWE-524"
  owasp: "A05:2021"

- id: gql-perf-persisted-operations-missing
  languages: [javascript, typescript]
  patterns:
    - regex: 'ApolloServer.*'
  severity: medium
  description: "Persisted queries not used - larger payloads, slower"
  remediation: "Enable persisted queries to reduce request size and parsing time."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-perf-response-compression
  languages: [javascript, typescript]
  patterns:
    - regex: 'app\.use\(.*'
  severity: low
  description: "Response compression not enabled - bandwidth waste"
  remediation: "Enable gzip/brotli compression for GraphQL responses."
  cwe: "CWE-770"
  owasp: "A04:2023"

  # ======================== SECURITY HEADERS (136-145) ========================

- id: gql-headers-csp-missing
  languages: [javascript, typescript]
  patterns:
    - regex: 'Content-Security-Policy|helmet\.contentSecurityPolicy'
  severity: high
  description: "CSP header missing - XSS and data injection risks"
  remediation: "Implement CSP with strict directives: default-src 'none'; script-src 'self'"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: gql-headers-csp-unsafe
  languages: [javascript, typescript]
  patterns:
    - regex: 'script-src.*''unsafe-inline''|script-src.*''unsafe-eval'
  severity: high
  description: "CSP allows unsafe-inline or unsafe-eval - XSS mitigation bypass"
  remediation: "Remove unsafe-inline/unsafe-eval. Use nonces or hashes for scripts."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: gql-headers-csp-wildcard
  languages: [javascript, typescript]
  patterns:
    - regex: 'default-src\s+\*|script-src\s+\*|connect-src\s+\*'
  severity: high
  description: "CSP with wildcards - ineffective against many attacks"
  remediation: "Restrict all directives to specific domains. Avoid wildcards."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: gql-headers-xfo-missing
  languages: [javascript, typescript]
  patterns:
    - regex: 'X-Frame-Options|helmet\.frameguard'
  severity: medium
  description: "X-Frame-Options missing - clickjacking risk"
  remediation: "Set X-Frame-Options: DENY or SAMEORIGIN."
  cwe: "CWE-1021"
  owasp: "A01:2021"

- id: gql-headers-xcto-missing
  languages: [javascript, typescript]
  patterns:
    - regex: 'X-Content-Type-Options|helmet\.noSniff'
  severity: low
  description: "X-Content-Type-Options missing - MIME sniffing risk"
  remediation: "Set X-Content-Type-Options: nosniff."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: gql-headers-xss-protection
  languages: [javascript, typescript]
  patterns:
    - regex: 'X-XSS-Protection|helmet\.xssFilter'
  severity: low
  description: "X-XSS-Protection header missing - older browsers vulnerable"
  remediation: "Set X-XSS-Protection: 1; mode=block (deprecated but helpful for legacy)."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: gql-headers-referrer-policy
  languages: [javascript, typescript]
  patterns:
    - regex: 'Referrer-Policy|helmet\.referrerPolicy'
  severity: low
  description: "Referrer-Policy missing - URL leakage"
  remediation: "Set Referrer-Policy: strict-origin-when-cross-origin."
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: gql-headers-permissions-policy
  languages: [javascript, typescript]
  patterns:
    - regex: 'Permissions-Policy|Feature-Policy|helmet\.permissionsPolicy'
  severity: low
  description: "Permissions-Policy missing - browser features exposed"
  remediation: "Disable unnecessary features: geolocation=(), camera=(), microphone=()"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: gql-headers-cors-expose
  languages: [javascript, typescript]
  patterns:
    - regex: 'Access-Control-Expose-Headers:\s*\*'
  severity: high
  description: "CORS exposes all headers - information leak"
  remediation: "Only expose necessary headers. Never use * with credentials."
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: gql-headers-hsts-missing
  languages: [javascript, typescript]
  patterns:
    - regex: 'Strict-Transport-Security|helmet\.hsts'
  severity: high
  description: "HSTS header missing - SSL stripping attacks"
  remediation: "Enable HSTS with max-age=31536000; includeSubDomains; preload"
  cwe: "CWE-319"
  owasp: "A02:2021"

