  remediation: "Validate cursor format and ownership. Use encrypted/signed cursors."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: gql-biz-pagination-offset-large
  languages: [graphql]
  patterns:
    - regex: 'offset:\s*[1-9]\d{5,}|skip:\s*[1-9]\d{5,}'
