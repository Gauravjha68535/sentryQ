  # ======================== PERFORMANCE OPTIMIZATION (126-135) ========================

- id: gql-perf-n-plus-one
  languages: [javascript, typescript]
  patterns:
    - regex: 'resolve.*\{[^}]*await.*(?:find|get|fetch).*\}\s*await.*(?:find|get|fetch)'
  severity: high
  description: "N+1 query pattern - multiple database calls"
  remediation: "Use DataLoader for batching. Implement query optimization."
  cwe: "CWE-400"
  owasp: "A04:2023"

- id: gql-perf-unbatched-resolvers
  languages: [javascript, typescript]
  patterns:
    - regex: 'resolve.*'
  severity: medium
  description: "Resolvers without DataLoader - inefficient queries"
  remediation: "Implement DataLoader for all database access patterns."
  cwe: "CWE-400"
  owasp: "A04:2023"

- id: gql-perf-unindexed-fields
  languages: [graphql]
  patterns:
    - regex: 'filter.*\w+|where.*\w+|search.*\w+'
  severity: medium
  description: "Filter fields that may lack database indexes"
  remediation: "Ensure all filterable fields have appropriate database indexes."
  cwe: "CWE-400"
  owasp: "A04:2023"

- id: gql-perf-large-response
  languages: [graphql]
  patterns:
    - regex: '\{[^\}]{1000,}'
  severity: low
  description: "Potential large response size - bandwidth issues"
  remediation: "Implement pagination for list fields. Limit response size."
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: gql-perf-serial-resolvers
  languages: [javascript, typescript]
  patterns:
    - regex: 'await.*;.*await.*;.*await|Promise\.all.*\[.*await'
  severity: medium
  description: "Serial resolver execution - slow response times"
  remediation: "Use Promise.all for independent resolvers. Parallelize when possible."
  cwe: "CWE-400"
  owasp: "A04:2023"

- id: gql-perf-unnecessary-fields
  languages: [graphql]
  patterns:
    - regex: '\{\s*\w+\s+\w+\s+\w+\s+\w+\s+\w+\s+\w+\s+\w+\s+\w+'
