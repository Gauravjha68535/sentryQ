- id: kotlin-hardcoded-password
  languages: [kotlin]
  patterns:
    - regex: '(?i)(password|passwd|pwd)\.s*=\.s*[''\.][^''\.]{8,}[''\.]'
  severity: high
  description: "Hardcoded password detected in Kotlin source code"
  remediation: "Use environment variables or Android Keystore for sensitive credentials"

- id: kotlin-hardcoded-api-key
  languages: [kotlin]
  patterns:
    - regex: '(?i)(api[_-]?key|apikey)\.s*=\.s*[''\.][a-zA-Z0-9]{16,}[''\.]'
  severity: high
  description: "Hardcoded API key detected in Kotlin source code"
  remediation: "Store API keys in encrypted SharedPreferences or use a secrets manager"

# SQL Injection
- id: kotlin-sql-injection
  languages: [kotlin]
  patterns:
    - regex: '(?i)(execSQL|rawQuery)\.s*\.(\.s*[''\.].*\.+.*[''\.])'
  severity: critical
  description: "Potential SQL injection via string concatenation"
  remediation: "Use parameterized queries with ? placeholders in SQLite"

# Command Injection
- id: kotlin-command-injection
  languages: [kotlin]
  patterns:
    - regex: 'Runtime\..getRuntime\.(\.)\..exec\.s*\.(\.s*[''\.].*\.+.*[''\.])'
  severity: critical
  description: "Potential command injection via Runtime.exec"
  remediation: "Avoid executing shell commands. If necessary, validate all inputs"

# Insecure WebView
- id: kotlin-insecure-webview
  languages: [kotlin]
  patterns:
    - regex: 'webView\..settings\..javaScriptEnabled\.s*=\.s*true|addJavascriptInterface'
  severity: high
  description: "JavaScript enabled in WebView without proper security controls"
  remediation: "Disable JavaScript if not needed, or implement a secure JsInterface"

# Weak Cryptography
- id: kotlin-weak-crypto-md5
  languages: [kotlin]
  patterns:
    - regex: '(?i)(MessageDigest\..getInstance\.s*\.(\.s*[''\.]MD5[''\.])|(Cipher\..getInstance\.s*\.(\.s*[''\.]DES[''\.])))'
  severity: medium
  description: "Use of weak cryptographic hash function (MD5) or cipher (DES)"
  remediation: "Use SHA-256 or SHA-512. For passwords, use bcrypt or Argon2"

# Insecure File Access
- id: kotlin-insecure-file-access
  languages: [kotlin]
  patterns:
    - regex: 'File\.s*\.(\.s*Environment\..getExternalStorageDirectory|Context\..MODE_WORLD_READABLE|Context\..MODE_WORLD_WRITEABLE)'
  severity: high
  description: "Accessing external storage or using world-readable/writable files"
  remediation: "Use scoped storage (Android 10+) and internal storage with MODE_PRIVATE"

# Debug Logging
- id: kotlin-debug-logging
  languages: [kotlin]
  patterns:
    - regex: 'Log\..(d|v|i)\.s*\.([^\.)]*(password|token|secret|key))'
  severity: medium
  description: "Sensitive data logged in debug statements"
  remediation: "Remove or obfuscate sensitive data in log statements for production"

# Insecure SharedPreferences
- id: kotlin-insecure-sharedprefs
  languages: [kotlin]
  patterns:
    - regex: 'getSharedPreferences\.s*\.([^\.)]+,\.s*Context\..MODE_WORLD)'
  severity: high
  description: "SharedPreferences with world-readable/writable mode"
  remediation: "Use Context.MODE_PRIVATE for SharedPreferences"

# Hardcoded Encryption Key
- id: kotlin-hardcoded-encryption-key
  languages: [kotlin]
  patterns:
    - regex: '(?i)(key|secret|iv)\.s*=\.s*[''\.][a-zA-Z0-9+/=]{16,}[''\.]'
  severity: medium
  description: "Hardcoded encryption key or IV detected"
  remediation: "Use Android Keystore for key generation and storage"

# Insecure Random
- id: kotlin-insecure-random
  languages: [kotlin]
  patterns:
    - regex: 'Random\.(\.)|java\..util\..Random'
  severity: medium
  description: "Using insecure random number generator for security operations"
  remediation: "Use SecureRandom for security-sensitive random number generation"

# Exported Components
- id: kotlin-exported-component
  languages: [kotlin]
  patterns:
    - regex: '(?i)android:exported\.s*=\.s*[''\.]true[''\.]'
  severity: medium
  description: "Android component exported without permission protection"
  remediation: "Set exported=false or add permission requirements for exported components"

# Pending Intent Mutability
- id: kotlin-pending-intent-mutable
  languages: [kotlin]
  patterns:
    - regex: 'PendingIntent\..(getActivity|getService|getBroadcast)\.s*\.([^\.)]+,\.s*PendingIntent\..FLAG_MUTABLE)'
  severity: high
  description: "Mutable PendingIntent can be exploited by other apps"
  remediation: "Use FLAG_IMMUTABLE unless mutability is specifically required"

# SSL Pinning Missing
- id: kotlin-ssl-pinning-missing
  languages: [kotlin]
  patterns:
    - regex: '(?i)HostnameVerifier|X509TrustManager|checkServerTrusted.*return'
  severity: high
  description: "Custom SSL/TLS validation that may bypass certificate checks"
  remediation: "Use default SSL validation or implement proper certificate pinning"

# Deep Link Validation
- id: kotlin-deep-link-validation
  languages: [kotlin]
  patterns:
    - regex: '(?i)Intent\..ACTION_VIEW|data\..scheme\.s*=='
  severity: medium
  description: "Deep link handling without proper validation"
  remediation: "Validate deep link URLs and use app links with verification"

# WebView File Access
- id: kotlin-webview-file-access
  languages: [kotlin]
  patterns:
    - regex: 'webView\..settings\..allowFileAccess\.s*=\.s*true|allowUniversalAccessFromFileURLs\.s*=\.s*true'
  severity: high
  description: "WebView allows file access which can lead to data theft"
  remediation: "Disable file access in WebView unless absolutely necessary"

# Insecure Broadcast Receiver
- id: kotlin-insecure-broadcast
  languages: [kotlin]
  patterns:
    - regex: 'registerReceiver\.s*\.([^\.)]+,\.s*null\.s*\.)'
  severity: medium
  description: "BroadcastReceiver registered without permission protection"
  remediation: "Specify permission parameter when registering BroadcastReceiver"

# Tapjacking Vulnerability
- id: kotlin-tapjacking
  languages: [kotlin]
  patterns:
    - regex: '(?i)FLAG_SECURE\.s*not\.s*set|setFlags\.s*\.([^\.)]*LayoutParams)'
  severity: low
  description: "Activity may be vulnerable to tapjacking attacks"
  remediation: "Set FLAG_SECURE in sensitive activities to prevent screen recording"

# Implicit Intent
- id: kotlin-implicit-intent
  languages: [kotlin]
  patterns:
    - regex: 'startActivity\.s*\.(\.s*Intent\.s*\.([^\.)]*ACTION))'
  severity: medium
  description: "Implicit intent may be intercepted by malicious apps"
  remediation: "Use explicit intents or verify package name before startActivity"

# Clipboard Data
- id: kotlin-clipboard-sensitive
  languages: [kotlin]
  patterns:
    - regex: '(?i)ClipboardManager.*putPrimaryClip.*password|ClipboardManager.*putPrimaryClip.*token'
  severity: medium
  description: "Sensitive data copied to clipboard"
  remediation: "Avoid copying sensitive data to clipboard or clear clipboard after use"
