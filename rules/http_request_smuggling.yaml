# SentryQ HTTP Request Smuggling Security Rules
# Covers: CL.TE, TE.CL, header obfuscation, CRLF injection, and proxy misconfigurations

- id: smuggling-cl-te-conflict
  patterns:
    - regex: '(?i)Transfer-Encoding\s*:\s*chunked[^\n]*\nContent-Length\s*:|Content-Length\s*:[^\n]*\nTransfer-Encoding\s*:\s*chunked'
  severity: critical
  description: "Both Content-Length and Transfer-Encoding: chunked headers present in a single HTTP message. This CL.TE or TE.CL ambiguity is the root cause of HTTP request smuggling; frontend and backend servers may disagree on where one request ends and the next begins."
  remediation: "Configure all HTTP servers and proxies to reject requests containing both Content-Length and Transfer-Encoding headers. For Nginx: set proxy_http_version 1.1 and ensure upstream servers are consistent. For HAProxy: add 'option http-server-close'. Prefer HTTP/2 end-to-end to eliminate HTTP/1.1 smuggling."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.85

- id: smuggling-te-cl-headers
  patterns:
    - regex: '(?i)Transfer-Encoding\s*:\s*chunked.*Transfer-Encoding\s*:\s*identity'
  severity: critical
  description: "Duplicate Transfer-Encoding headers with conflicting directives (chunked and identity) detected. Duplicate TE headers exploit differences in header parsing between proxy and origin server, enabling TE.TE smuggling attacks."
  remediation: "Reject any request containing duplicate Transfer-Encoding headers. Normalize incoming headers at the edge proxy before forwarding. Use HTTP/2 between proxy and origin to eliminate HTTP/1.1 framing ambiguities."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.9

- id: smuggling-proxy-strip-te
  patterns:
    - regex: '(?i)proxy_set_header\s+Transfer-Encoding\s+""'
  severity: high
  description: "Nginx proxy_set_header directive strips the Transfer-Encoding header before forwarding. When the frontend strips TE but forwards the body as-is, the backend may interpret it using Content-Length, creating a TE.CL desync condition."
  remediation: "Instead of stripping Transfer-Encoding, configure the proxy to normalize the connection to HTTP/2 or to re-frame chunked bodies as a fixed-length stream. Audit upstream server configurations to ensure consistent header interpretation."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.8

- id: smuggling-nginx-ignore-invalid-headers
  patterns:
    - regex: '(?i)ignore_invalid_headers\s+off'
  severity: medium
  description: "Nginx ignore_invalid_headers set to off, allowing non-standard header names to be forwarded. Attackers can inject headers with embedded spaces or special characters (e.g., 'Transfer-Encoding\\x0b: chunked') that Nginx forwards but backend servers may interpret differently, enabling smuggling."
  remediation: "Leave ignore_invalid_headers at its default (on) or explicitly set it to on. Reject requests with header names containing characters outside the RFC 7230 token character set at the proxy layer."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.75

- id: smuggling-haproxy-server-close
  patterns:
    - regex: '(?i)option\s+http-server-close'
  severity: medium
  description: "HAProxy http-server-close mode closes the server-side connection after each response but keeps the client connection alive. Without careful header normalization this mode can interact with upstream HTTP/1.0 servers in ways that enable request smuggling."
  remediation: "Combine 'option http-server-close' with 'option forwardfor' and explicit Transfer-Encoding normalization. Upgrade backend connections to HTTP/1.1 with keepalive or prefer HTTP/2 for backend communication. Validate that all backends handle chunked encoding consistently."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.55

- id: smuggling-chunked-obfuscation
  patterns:
    - regex: '(?i)Transfer-Encoding\s*:\s*(?:xchunked|x-gzip,\s*chunked|chunked,\s*identity|chunked\s+chunked)'
  severity: critical
  description: "Obfuscated or non-standard Transfer-Encoding directive detected. Variants like 'xchunked', 'chunked, identity', or 'x-gzip, chunked' exploit inconsistent TE header parsing; some proxies accept them as chunked while others reject or ignore them, creating request smuggling desync conditions."
  remediation: "Reject any Transfer-Encoding value other than 'chunked' or 'identity' at the edge. Normalize TE headers before forwarding. Implement a strict HTTP parser that follows RFC 7230 transfer-coding precedence rules."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.9

- id: smuggling-header-injection-crlf
  patterns:
    - regex: '(?i)(?:header|addHeader|setHeader)\s*\([^)]*(?:\\r\\n|\\n%0d|%0a%0d)'
  severity: critical
  description: "HTTP header set or added with CRLF sequences embedded in the value. CR/LF characters in header values allow injecting additional HTTP headers or terminating the current request prematurely, enabling HTTP response splitting and request smuggling."
  remediation: "Validate and reject any header value containing \\r (CR, 0x0D) or \\n (LF, 0x0A) characters before setting the header. Use a safe HTTP framework that encodes or rejects CRLF in header values by default."
  cwe: "CWE-113"
  owasp: "A03:2021"
  confidence: 0.85

- id: smuggling-request-line-injection
  patterns:
    - regex: '(?i)(?:GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS)\s+[^\s][^\n]*\r\n'
  severity: medium
  description: "HTTP request line followed immediately by a CRLF in source code or test fixture. Hardcoded request lines with embedded CRLF can be used to craft smuggled requests in integration tests, custom HTTP clients, or proxy configuration files."
  remediation: "Construct HTTP request lines programmatically using an HTTP library that handles line termination correctly. Never embed raw CRLF sequences in request strings. Validate that custom HTTP clients follow RFC 7230 strict parsing rules."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.6

- id: smuggling-flask-gunicorn-proxy
  languages: [python]
  patterns:
    - regex: '(?i)forwarded_allow_ips'
  severity: low
  description: "Gunicorn forwarded_allow_ips configuration detected. Incorrect trust of X-Forwarded-For and X-Forwarded-Proto headers from untrusted proxies can allow IP spoofing. When combined with HTTP/1.1 keep-alive proxy chains, this can contribute to request smuggling exploitation."
  remediation: "Set forwarded_allow_ips to only the IP addresses of trusted reverse proxies. Use Gunicorn's --forwarded-allow-ips flag or the gunicorn.conf.py setting. Prefer using ProxyFix middleware with a strictly set x_for count."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.45

- id: smuggling-nodejs-http-pipeline
  languages: [javascript]
  patterns:
    - regex: '(?i)http\.createServer.*socket\.allowHalfOpen'
  severity: medium
  description: "Node.js HTTP server created with socket.allowHalfOpen enabled. Half-open TCP connections in combination with HTTP pipelining can create desync conditions where the server reads a subsequent pipelined request as data belonging to a prior request body."
  remediation: "Set allowHalfOpen to false (the default) on HTTP server sockets. Disable HTTP pipelining on untrusted connection paths. Use HTTP/2 which multiplexes requests on a single connection without the pipelining ambiguities of HTTP/1.1."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.6

- id: smuggling-apache-keep-alive-timeout
  patterns:
    - regex: '(?i)KeepAliveTimeout\s+[6-9][0-9]|KeepAliveTimeout\s+[1-9][0-9]{2,}'
  severity: medium
  description: "Apache KeepAliveTimeout set to a high value (60+ seconds). Long-lived keep-alive connections increase the window for request smuggling exploits and resource exhaustion attacks."
  remediation: "Set KeepAliveTimeout to 5–15 seconds for public-facing servers. Combine with a short RequestReadTimeout to bound how long the server waits for complete request headers and bodies. Disable KeepAlive entirely on internal-only endpoints if connection overhead is not a concern."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.55

- id: smuggling-content-length-negative
  patterns:
    - regex: '(?i)Content-Length\s*:\s*-[1-9]'
  severity: critical
  description: "HTTP Content-Length header set to a negative value. Negative Content-Length values are not permitted by RFC 7230. Some servers accept them, leading to undefined parsing behavior that can be exploited to desync request boundaries."
  remediation: "Reject any request with a non-positive Content-Length at the edge. Configure the HTTP parser to strictly enforce RFC 7230 field value grammar for Content-Length."
  cwe: "CWE-444"
  owasp: "A05:2021"
  confidence: 0.9
