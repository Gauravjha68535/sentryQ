- id: groovy-hardcoded-password
  languages: [groovy]
  patterns:
    - regex: '(?i)(password|passwd|pwd|secret)\\s*=\\s*['''"][^''"]{8,}[''"]'
  severity: high
  description: "Hardcoded password detected in Groovy source code"
  remediation: "Use credentials binding or environment variables"
  cwe: "CWE-798"
  owasp: "A07:2021"

# ======================== Code Injection ========================
- id: groovy-code-injection-evaluate
  languages: [groovy]
  patterns:
    - regex: 'Eval\\.me\\s*\\(|GroovyShell\\s*\\(\\s*\\)\\.evaluate|new GroovyShell\\s*\\(\\s*\\)''severity: critical
  description: "Groovy code injection via GroovyShell.evaluate()"
  remediation: "Never evaluate untrusted Groovy code. Use CompilerConfiguration with SecureASTCustomizer"
  cwe: "CWE-94"
  owasp: "A03:2021"

- id: groovy-code-injection-gstring
  languages: [groovy]
  patterns:
    - regex: '"\\$\\{.*\\}".*execute|"\\$\\{.*\\}"\\.execute''severity: critical
  description: "Command execution via GString interpolation"
  remediation: "Never execute interpolated strings. Use ProcessBuilder with argument list"
  cwe: "CWE-78"
  owasp: "A03:2021"

# ======================== Jenkins Pipeline Security ========================
- id: groovy-jenkins-credentials-plaintext
  languages: [groovy]
  patterns:
    - regex: '(?i)(password|token|secret)\\s*:\\s*['''"][^''"]{8,}[''"]'
  severity: critical
  description: "Plaintext credentials in Jenkins pipeline"
  remediation: "Use credentials() binding or Jenkins Credentials Manager"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: groovy-jenkins-script-approval
  languages: [groovy]
  patterns:
    - regex: '@Grab|@GrabResolver|import groovy\\.lang\\.GroovyShell''severity: high
  description: "Dynamic code loading in Jenkins pipeline may bypass script approval"
  remediation: "Use approved Jenkins plugins. Avoid @Grab and dynamic loading"
  cwe: "CWE-94"
  owasp: "A06:2021"

- id: groovy-jenkins-shared-library-unsafe
  languages: [groovy]
  patterns:
    - regex: 'library\\s*\\(\\s*['''"].*@\\$\\{|checkout\\s*\\(.*url:.*\\$'
  severity: high
  description: "Shared library loaded from user-controlled source"
  remediation: "Pin shared libraries to specific versions from trusted sources"
  cwe: "CWE-829"
  owasp: "A08:2021"

# ======================== SQL Injection ========================
- id: groovy-sql-injection
  languages: [groovy]
  patterns:
    - regex: '(?i)sql\\.execute\\s*\\(\\s*".*\\$|Sql\\.newInstance.*execute.*\\$''severity: critical
  description: "SQL injection via GString interpolation in Groovy SQL"
  remediation: "Use parameterized queries: sql.execute('SELECT * FROM users WHERE id = ?', [userId])"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ======================== Command Injection ========================
- id: groovy-command-injection
  languages: [groovy]
  patterns:
    - regex: '\\.execute\\s*\\(\\s*\\)|\\[.*\\]\\.execute\\(\\)''severity: critical
  description: "Command execution via Groovy's String.execute() or List.execute()"
  remediation: "Use ProcessBuilder with argument list. Validate and sanitize input"
  cwe: "CWE-78"
  owasp: "A03:2021"

# ======================== Deserialization ========================
- id: groovy-insecure-deserialization
  languages: [groovy]
  patterns:
    - regex: 'ObjectInputStream|readObject\\s*\\(''severity: critical
  description: "Insecure Java deserialization in Groovy code"
  remediation: "Use JSON (JsonSlurper) instead. Never deserialize untrusted Java objects"
  cwe: "CWE-502"
  owasp: "A08:2021"

# ======================== Path Traversal ========================
- id: groovy-path-traversal
  languages: [groovy]
  patterns:
    - regex: 'new File\\s*\\(.*params|new File\\s*\\(.*request''severity: high
  description: "Path traversal via user-controlled file path"
  remediation: "Validate paths. Use canonical path and check against base directory"
  cwe: "CWE-22"
  owasp: "A01:2021"

# ======================== XSS ========================
- id: groovy-xss-grails
  languages: [groovy]
  patterns:
    - regex: '(?i)\\$\\{raw\\(|encodeAs.*None|<%=.*params\\.''severity: high
  description: "XSS via unescaped output in Grails GSP"
  remediation: "Use ${fieldValue()} or encodeAsHTML() for output encoding"
  cwe: "CWE-79"
  owasp: "A03:2021"

# ======================== XXE ========================
- id: groovy-xxe
  languages: [groovy]
  patterns:
    - regex: 'new XmlSlurper\\s*\\(\\s*\\)|new XmlParser\\s*\\(\\s*\\)''severity: high
  description: "XML parsing may be vulnerable to XXE"
  remediation: "Disable external entities in XmlSlurper/XmlParser"
  cwe: "CWE-611"
  owasp: "A05:2021"

