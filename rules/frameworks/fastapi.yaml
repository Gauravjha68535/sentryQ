# -
# FASTAPI SECURITY RULES — Comprehensive Security Rules
# -
# Security rules for detecting FastAPI/Python vulnerabilities across multiple categories
# -

# -
- id: fastapi-hardcoded-secret-key
  languages: [python]
  patterns:
    - regex: '(?i)SECRET_KEY\s*=\s*[''\\\"][^''\\\"]{8,}[''\\\"]'
  severity: critical
  description: "Hardcoded secret key detected in FastAPI application"
  remediation: "Use environment variables via os.getenv('SECRET_KEY') or a secrets manager"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-debug-mode-enabled
  languages: [python]
  patterns:
    - regex: 'debug\s*=\s*True'
  severity: high
  description: "Debug mode enabled in FastAPI production"
  remediation: "Set debug=False in production and use environment variable DEBUG=False"
  cwe: "CWE-489"
  owasp: "A05:2021"

- id: fastapi-cors-allow-all
  languages: [python]
  patterns:
    - regex: 'allow_origins\s*=\s*\[\s*[''\\\"]\*[''\\\"]\s*\]'
  severity: high
  description: "CORS configured to allow all origins"
  remediation: "Restrict CORS to specific domains using allow_origins=[\"https://example.com\"]"
  cwe: "CWE-942"
  owasp: "A05:2021"

- id: fastapi-sql-injection-raw-query
  languages: [python]
  patterns:
    - regex: 'execute\s*\(\s*[''\\"]\s*(SELECT|INSERT|UPDATE|DELETE).*\{.*\}.*[''\\"]'
  severity: critical
  description: "Potential SQL injection with raw query using string formatting"
  remediation: "Use parameterized queries with SQLAlchemy or ORM"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: fastapi-no-https-redirect
  languages: [python]
  patterns:
    - regex: 'redirect_slashes\s*=\s*True.*?'
  severity: medium
  description: "Missing HTTPS redirect configuration"
  remediation: "Use middleware like HTTPSRedirectMiddleware or configure reverse proxy for HTTPS"
  cwe: "CWE-319"
  owasp: "A02:2021"

- id: fastapi-jwt-hardcoded-secret
  languages: [python]
  patterns:
    - regex: 'JWT_SECRET_KEY\s*=\s*[''\\"][^''\\"]{8,}[''\\"]|jwt.encode\(.*,.*[''\\"][^''\\"]{8,}[''\\"]'
  severity: critical
  description: "Hardcoded JWT secret key in FastAPI"
  remediation: "Use environment variables for JWT secrets and rotate regularly"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-jwt-no-expiration
  languages: [python]
  patterns:
    - regex: 'jwt.encode\(.*?.*?\)'
  severity: high
  description: "JWT token created without expiration time"
  remediation: "Add expiration claim: 'exp': datetime.utcnow() + timedelta(minutes=30)"
  cwe: "CWE-613"
  owasp: "A01:2021"

- id: fastapi-pickle-deserialization
  languages: [python]
  patterns:
    - regex: 'pickle\.loads|pickle\.load'
  severity: critical
  description: "Pickle deserialization detected - can lead to RCE"
  remediation: "Use JSON or other safe serialization formats instead of pickle"
  cwe: "CWE-502"
  owasp: "A08:2021"

- id: fastapi-yaml-deserialization
  languages: [python]
  patterns:
    - regex: 'yaml\.load\(.*?.*?\)'
  severity: critical
  description: "Unsafe YAML deserialization detected"
  remediation: "Use yaml.safe_load() instead of yaml.load()"
  cwe: "CWE-502"
  owasp: "A08:2021"

- id: fastapi-eval-exec-usage
  languages: [python]
  patterns:
    - regex: 'eval\(|exec\('
  severity: critical
  description: "Use of eval() or exec() detected - can lead to RCE"
  remediation: "Avoid using eval/exec with user input; use safer alternatives"
  cwe: "CWE-95"
  owasp: "A03:2021"

- id: fastapi-command-injection
  languages: [python]
  patterns:
    - regex: 'os\.system\(|subprocess\.call\(|subprocess\.Popen\(|os\.popen\('
  severity: critical
  description: "Command execution with potential user input"
  remediation: "Validate and sanitize all inputs, use subprocess.run with shell=False"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: fastapi-path-traversal
  languages: [python]
  patterns:
    - regex: 'open\(.*\+.*[''\\"]\.\.\\/|send_file\(.*\+.*[''\\"]\.\.\\/'
  severity: high
  description: "Potential path traversal vulnerability"
  remediation: "Validate file paths and use os.path.basename to sanitize inputs"
  cwe: "CWE-22"
  owasp: "A01:2021"

- id: fastapi-missing-rate-limiting
  languages: [python]
  patterns:
    - regex: '@app\.(get|post|put|delete|patch).*?'
  severity: medium
  description: "No rate limiting detected on endpoint"
  remediation: "Implement rate limiting using slowapi or fastapi-limiter"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: fastapi-password-plaintext-storage
  languages: [python]
  patterns:
    - regex: 'password\s*=\s*[''\\"][^''\\"]+[''\\"]|user\.password\s*=\s*[''\\"][^''\\"]+[''\\"]'
  severity: critical
  description: "Password stored in plaintext"
  remediation: "Use passlib or bcrypt to hash passwords before storage"
  cwe: "CWE-256"
  owasp: "A02:2021"

- id: fastapi-missing-password-hashing
  languages: [python]
  patterns:
    - regex: 'password\s*=\s*request\.(body|json|form).*?'
  severity: critical
  description: "Password being processed without hashing"
  remediation: "Always hash passwords using bcrypt, argon2, or passlib"
  cwe: "CWE-256"
  owasp: "A02:2021"

- id: fastapi-sqlalchemy-raw-sql
  languages: [python]
  patterns:
    - regex: 'session\.execute\(.*[''\\"]SELECT.*\{.*\}.*[''\\"]|text\(.*\+.*\).*'
  severity: high
  description: "Raw SQL execution with string concatenation"
  remediation: "Use SQLAlchemy ORM or parameterized queries with :param"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: fastapi-missing-auth-decorator
  languages: [python]
  patterns:
    - regex: '@app\.(get|post|put|delete|patch).*?.*'
  severity: high
  description: "Endpoint missing authentication dependency"
  remediation: "Add authentication dependency: Depends(get_current_user)"
  cwe: "CWE-306"
  owasp: "A01:2021"

- id: fastapi-wide-scope-permissions
  languages: [python]
  patterns:
    - regex: 'scopes\s*=\s*\[\s*[''\\"]\*[''\\"]\s*\]|permissions\s*=\s*\[\s*[''\\"]admin[''\\"]\s*\]'
  severity: high
  description: "Overly permissive authorization scopes"
  remediation: "Implement least privilege principle with specific scopes"
  cwe: "CWE-732"
  owasp: "A01:2021"

- id: fastapi-ssrf-vulnerability
  languages: [python]
  patterns:
    - regex: 'requests\.(get|post|put|delete|request)\(.*url\s*=\s*.*request\.(query|body|json).*'
  severity: high
  description: "Server-side request forgery (SSRF) possible"
  remediation: "Validate and whitelist URLs, block internal IP ranges"
  cwe: "CWE-918"
  owasp: "A10:2021"

- id: fastapi-openapi-exposed
  languages: [python]
  patterns:
    - regex: 'openapi_url\s*=\s*[''\\"]\\/openapi.json[''\\"]|docs_url\s*=\s*[''\\"]\\/docs[''\\"]'
  severity: low
  description: "OpenAPI docs exposed in production"
  remediation: "Disable docs in production: docs_url=None, redoc_url=None"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: fastapi-file-upload-no-validation
  languages: [python]
  patterns:
    - regex: 'UploadFile\(.*?.*?\).*?save\(|file\.filename'
  severity: high
  description: "File upload without validation"
  remediation: "Validate file size, type, and scan for malware"
  cwe: "CWE-434"
  owasp: "A04:2021"

- id: fastapi-missing-content-type
  languages: [python]
  patterns:
    - regex: 'return\s+FileResponse\(.*?.*?\)'
  severity: low
  description: "FileResponse without media_type specified"
  remediation: "Set proper media_type based on file content"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: fastapi-session-fixation
  languages: [python]
  patterns:
    - regex: 'session\s*=\s*request\.cookies\.get\(.*?\)'
  severity: medium
  description: "Potential session fixation vulnerability"
  remediation: "Regenerate session IDs after login"
  cwe: "CWE-384"
  owasp: "A01:2021"

- id: fastapi-database-credentials-hardcoded
  languages: [python]
  patterns:
    - regex: 'postgresql://[a-zA-Z0-9_]+:[^@]+@|mysql://[a-zA-Z0-9_]+:[^@]+@|mongodb://[a-zA-Z0-9_]+:[^@]+@'
  severity: critical
  description: "Database credentials hardcoded in connection string"
  remediation: "Use environment variables for database URLs"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-redis-credentials-hardcoded
  languages: [python]
  patterns:
    - regex: 'redis://:[^@]+@|REDIS_PASSWORD\s*=\s*[''\\"][^''\\"]+[''\\"]'
  severity: high
  description: "Redis credentials hardcoded"
  remediation: "Use environment variables for Redis configuration"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-aws-credentials-hardcoded
  languages: [python]
  patterns:
    - regex: 'AWS_ACCESS_KEY_ID\s*=\s*[''\\"][AKIA][0-9A-Z]{16}[''\\"]|AWS_SECRET_ACCESS_KEY\s*=\s*[''\\"][a-zA-Z0-9/+=]{40}[''\\"]'
  severity: critical
  description: "AWS credentials hardcoded in FastAPI"
  remediation: "Use IAM roles or environment variables for AWS credentials"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-api-key-hardcoded
  languages: [python]
  patterns:
    - regex: 'API_KEY\s*=\s*[''\\"][a-zA-Z0-9]{16,}[''\\"]|X-API-Key[''\\"]:\s*[''\\"][a-zA-Z0-9]{16,}[''\\"]'
  severity: high
  description: "API key hardcoded in source"
  remediation: "Use environment variables or a secrets manager"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-oauth-client-secret-hardcoded
  languages: [python]
  patterns:
    - regex: 'CLIENT_SECRET\s*=\s*[''\\"][a-zA-Z0-9_-]{16,}[''\\"]|OAUTH_CLIENT_SECRET\s*=\s*[''\\"][a-zA-Z0-9_-]+[''\\"]'
  severity: critical
  description: "OAuth client secret hardcoded"
  remediation: "Store OAuth secrets in environment variables"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-smtp-password-hardcoded
  languages: [python]
  patterns:
    - regex: 'SMTP_PASSWORD\s*=\s*[''\\"][^''\\"]+[''\\"]|mail_password\s*=\s*[''\\"][^''\\"]+[''\\"]'
  severity: high
  description: "SMTP password hardcoded"
  remediation: "Use environment variables for email configuration"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-stripe-key-hardcoded
  languages: [python]
  patterns:
    - regex: 'sk_live_|pk_live_|STRIPE_(LIVE|TEST)_(SECRET|PUBLISHABLE)_KEY\s*=\s*[''\\"][^''\\"]+[''\\"]'
  severity: critical
  description: "Stripe API key hardcoded"
  remediation: "Use environment variables for payment gateway keys"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-no-ssl-context
  languages: [python]
  patterns:
    - regex: 'uvicorn\.run\(.*?.*?\)'
  severity: medium
  description: "Running without SSL configuration"
  remediation: "Configure SSL with ssl_keyfile and ssl_certfile parameters"
  cwe: "CWE-319"
  owasp: "A02:2021"

- id: fastapi-csrf-protection-missing
  languages: [python]
  patterns:
    - regex: '@app\.post\(.*?.*?\)'
  severity: medium
  description: "POST endpoint missing CSRF protection"
  remediation: "Implement CSRF tokens for state-changing operations"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: fastapi-xss-vulnerability
  languages: [python]
  patterns:
    - regex: 'return\s+HTMLResponse\(.*request\.(query|body|json).*|jinja2\.Template\(.*request.*\)'
  severity: high
  description: "Potential XSS vulnerability in template rendering"
  remediation: "Use Jinja2 autoescaping or escape user input"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: fastapi-missing-security-headers
  languages: [python]
  patterns:
    - regex: '@app\.(get|post|put|delete|patch).*?'
  severity: low
  description: "Security headers middleware not detected"
  remediation: "Add security headers middleware for HSTS, CSP, X-Frame-Options"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: fastapi-cors-credentials-allow-all
  languages: [python]
  patterns:
    - regex: 'allow_credentials\s*=\s*True.*?allow_origins\s*=\s*\[\s*[''\\\"]\*[''\\\"]\s*\]'
  severity: high
  description: "CORS allows credentials from all origins"
  remediation: "Specify exact origins when allow_credentials=True"
  cwe: "CWE-942"
  owasp: "A05:2021"

- id: fastapi-graphql-introspection-enabled
  languages: [python]
  patterns:
    - regex: 'GraphQL\(.*?.*?\)|strawberry\.GraphQL\(.*?.*?\)'
  severity: medium
  description: "GraphQL introspection enabled in production"
  remediation: "Disable introspection in production with introspection=False"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: fastapi-websocket-no-auth
  languages: [python]
  patterns:
    - regex: '@app\.websocket\(.*?.*?\)'
  severity: high
  description: "WebSocket endpoint without authentication"
  remediation: "Add authentication to WebSocket connections"
  cwe: "CWE-306"
  owasp: "A01:2021"

- id: fastapi-missing-input-validation
  languages: [python]
  patterns:
    - regex: 'request\.(query|body|json|form).*?'
  severity: medium
  description: "Request data accessed without validation"
  remediation: "Use Pydantic models for request validation"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: fastapi-exception-leaking-info
  languages: [python]
  patterns:
    - regex: 'return\s+.*?str\(e\)|traceback\.format_exc\(\)'
  severity: medium
  description: "Exception details exposed to client"
  remediation: "Log errors server-side, return generic error messages"
  cwe: "CWE-209"
  owasp: "A05:2021"

- id: fastapi-sqlalchemy-connection-leak
  languages: [python]
  patterns:
    - regex: 'engine\.connect\(.*?.*?\)'
  severity: medium
  description: "Database connection not properly managed"
  remediation: "Use context managers: with engine.connect() as conn:"
  cwe: "CWE-404"
  owasp: "A06:2021"

- id: fastapi-uploaded-file-no-size-limit
  languages: [python]
  patterns:
    - regex: 'UploadFile\(.*?.*?\)'
  severity: high
  description: "File upload without size limit"
  remediation: "Set maximum file size limit"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: fastapi-uploaded-file-name-validation
  languages: [python]
  patterns:
    - regex: 'file\.filename.*?'
  severity: high
  description: "File name used without sanitization"
  remediation: "Use secure_filename() from werkzeug to sanitize filenames"
  cwe: "CWE-22"
  owasp: "A01:2021"

- id: fastapi-no-session-timeout
  languages: [python]
  patterns:
    - regex: 'session\.'
  severity: medium
  description: "Session missing timeout configuration"
  remediation: "Configure session expiration and max age"
  cwe: "CWE-613"
  owasp: "A01:2021"

- id: fastapi-missing-pagination
  languages: [python]
  patterns:
    - regex: 'return\s+query\.all\(\)|return\s+list\(query\)'
  severity: low
  description: "Database query without pagination"
  remediation: "Implement pagination using limit() and offset()"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: fastapi-admin-panel-no-auth
  languages: [python]
  patterns:
    - regex: '@app\.(get|post).*[''\\"]\\/admin.*?(?:Depends\(.*auth.*\))'
  severity: critical
  description: "Admin endpoint without authentication"
  remediation: "Add authentication and authorization to admin routes"
  cwe: "CWE-306"
  owasp: "A01:2021"

- id: fastapi-cache-control-missing
  languages: [python]
  patterns:
    - regex: 'return\s+.*?Response\(.*?'
  severity: low
  description: "Response missing cache control headers"
  remediation: "Add Cache-Control headers for sensitive data"
  cwe: "CWE-524"
  owasp: "A05:2021"

- id: fastapi-environment-credentials-in-code
  languages: [python]
  patterns:
    - regex: 'os\.environ\.get\([''\\"](?:SECRET|KEY|PASS|TOKEN|AUTH)[''\\"]\)|os\.getenv\([''\\"](?:SECRET|KEY|PASS|TOKEN|AUTH)[''\\"]\)'
  severity: low
  description: "Non-sensitive environment variable usage"
  remediation: "Use consistent environment variable naming"
  cwe: "CWE-200"
  owasp: "N/A"

- id: fastapi-pydantic-secret-field-plaintext
  languages: [python]
  patterns:
    - regex: 'class\s+\w+\s*\(BaseModel\):.*?\w+\s*:\s*str'
  severity: medium
  description: "Sensitive field without SecretStr type"
  remediation: "Use SecretStr from pydantic for sensitive data"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: fastapi-dependency-injection-order
  languages: [python]
  patterns:
    - regex: 'Depends\(.*auth.*\),.*Depends\(.*db.*\)|Depends\(.*db.*\),.*Depends\(.*auth.*\)'
  severity: low
  description: "Auth dependency should run before DB dependency"
  remediation: "Place authentication dependencies before database dependencies"
  cwe: "CWE-285"
  owasp: "A01:2021"

- id: fastapi-insecure-cookie-config
  languages: [python]
  patterns:
    - regex: 'set_cookie\(.*?.*?\)'
  severity: high
  description: "Insecure cookie configuration"
  remediation: "Set httponly=True, secure=True, samesite='lax' for cookies"
  cwe: "CWE-614"
  owasp: "A05:2021"

- id: fastapi-response-injection
  languages: [python]
  patterns:
    - regex: 'Response\(content=.*request.*,.*headers=.*request.*\)'
  severity: high
  description: "User input used in response headers/content"
  remediation: "Validate and sanitize user input before including in responses"
  cwe: "CWE-644"
  owasp: "A03:2021"

- id: fastapi-missing-content-security-policy
  languages: [python]
  patterns:
    - regex: 'Middleware\(.*?.*?\)'
  severity: low
  description: "Content Security Policy (CSP) header missing"
  remediation: "Add CSP middleware with appropriate policy"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: fastapi-redirect-open-redirect
  languages: [python]
  patterns:
    - regex: 'RedirectResponse\(.*request\.(query|body|json).*next.*\)|redirect\(.*request.*url.*\)'
  severity: high
  description: "Open redirect vulnerability"
  remediation: "Validate redirect URLs against allowlist"
  cwe: "CWE-601"
  owasp: "A01:2021"

- id: fastapi-jwt-algorithm-none
  languages: [python]
  patterns:
    - regex: 'jwt\.(encode|decode)\(.*algorithm=[''\\"]None[''\\"]'
  severity: critical
  description: "JWT with algorithm 'none' - can be forged"
  remediation: "Always specify a strong algorithm like 'HS256' or 'RS256'"
  cwe: "CWE-347"
  owasp: "A02:2021"

- id: fastapi-tls-version-old
  languages: [python]
  patterns:
    - regex: 'SSLContext\(.*PROTOCOL_(SSLv2|SSLv3|TLSv1)'
  severity: high
  description: "Outdated TLS/SSL protocol version"
  remediation: "Use PROTOCOL_TLS_SERVER or PROTOCOL_TLS_CLIENT with minimum TLSv1.2"
  cwe: "CWE-326"
  owasp: "A02:2021"

- id: fastapi-bcrypt-rounds-low
  languages: [python]
  patterns:
    - regex: 'bcrypt\.gensalt\(rounds=[0-9]|rounds=[0-9]\).*bcrypt'
  severity: medium
  description: "Low bcrypt work factor (rounds < 12)"
  remediation: "Use at least 12 rounds for bcrypt hashing"
  cwe: "CWE-916"
  owasp: "A02:2021"

- id: fastapi-celery-broker-plaintext
  languages: [python]
  patterns:
    - regex: 'broker_url\s*=\s*[''\\"]redis://[^@]+:|broker_url\s*=\s*[''\\"]amqp://[^@]+:'
  severity: high
  description: "Celery broker URL with plaintext credentials"
  remediation: "Use environment variables for broker credentials"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: fastapi-alembic-version-leak
  languages: [python]
  patterns:
    - regex: 'alembic_version|alembic_version_table'
  severity: low
  description: "Database schema version exposed"
  remediation: "Restrict access to alembic_version table"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: fastapi-missing-database-encryption
  languages: [python]
  patterns:
    - regex: 'sqlalchemy\.create_engine\(.*?.*?\)'
  severity: medium
  description: "Database connection without encryption"
  remediation: "Enable SSL/TLS for database connections"
  cwe: "CWE-319"
  owasp: "A02:2021"

- id: fastapi-oauth-state-missing
  languages: [python]
  patterns:
    - regex: 'authlib\.integrations\.starlette_client.*authorize_redirect\(.*?.*?\)'
  severity: medium
  description: "OAuth state parameter missing (CSRF risk)"
  remediation: "Always include and validate state parameter in OAuth flow"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: fastapi-graphql-query-depth
  languages: [python]
  patterns:
    - regex: 'strawberry\.GraphQL\(.*?.*?\)|graphene\.Schema\(.*?.*?\)'
  severity: low
  description: "GraphQL without query depth limiting"
  remediation: "Set max query depth to prevent DoS attacks"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: fastapi-graphql-query-complexity
  languages: [python]
  patterns:
    - regex: 'strawberry\.GraphQL\(.*?.*?\)|graphene\.Schema\(.*?.*?\)'
  severity: low
  description: "GraphQL without query complexity limiting"
  remediation: "Implement query complexity analysis to prevent DoS"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: fastapi-missing-request-id
  languages: [python]
  patterns:
    - regex: '@app\.middleware\(.*?.*?\)'
  severity: low
  description: "No request ID middleware for tracing"
  remediation: "Add request ID middleware for request tracking"
  cwe: "CWE-532"
  owasp: "N/A"

- id: fastapi-sensitive-data-in-logs
  languages: [python]
  patterns:
    - regex: 'logging\.(info|debug|warning)\(.*(password|token|secret|key|credit|ssn).*'
  severity: high
