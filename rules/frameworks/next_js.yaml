# ============================================================================
# NEXT.JS SECURITY RULES - COMPREHENSIVE
# ============================================================================
# 150 Rules for detecting Next.js-specific security vulnerabilities
# Categories: SSR, API Routes, Authentication, Environment, 
#             Server Components, Middleware, API Security, XSS, CSRF
# ============================================================================

# --- Server-Side Rendering Security (1-20) ---
- id: nextjs-ssr-user-input
  languages: [javascript, typescript]
  patterns:
    - regex: 'getServerSideProps.*req\.query|getServerSideProps.*req\.query\.'
  severity: high
  description: "User input from getServerSideProps query without validation"
  remediation: "Validate and sanitize all query parameters before use"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-params-injection
  languages: [javascript, typescript]
  patterns:
    - regex: 'getServerSideProps.*context\.params|context\.params\.'
  severity: high
  description: "Route params in getServerSideProps without validation"
  remediation: "Validate route parameters before database queries"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-redirect-user
  languages: [javascript, typescript]
  patterns:
    - regex: 'redirect:\s*\{\s*destination:\s*.*req\.query|redirect:.*query\.'
  severity: high
  description: "Open redirect via getServerSideProps redirect with user input"
  remediation: "Validate redirect URLs against allowlist"
  cwe: "CWE-601"
  owasp: "A01:2021"

- id: nextjs-ssr-props-injection
  languages: [javascript, typescript]
  patterns:
    - regex: 'return\s*\{\s*props:\s*\{.*req\.query'
  severity: medium
  description: "Passing user input to props without sanitization"
  remediation: "Sanitize data before passing to props"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: nextjs-ssr-server-side-injection
  languages: [javascript, typescript]
  patterns:
    - regex: 'getServerSideProps.*query\[.*\]|query\[.*\]'
  severity: high
  description: "Direct query parameter access in SSR"
  remediation: "Validate and sanitize query parameters"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-get-static-props
  languages: [javascript, typescript]
  patterns:
    - regex: 'getStaticProps.*context\.params|getStaticPaths'
  severity: medium
  description: "getStaticProps/Paths with dynamic params"
  remediation: "Validate paths in getStaticPaths"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-fallback-true
  languages: [javascript, typescript]
  patterns:
    - regex: 'fallback:\s*true'
  severity: medium
  description: "SSG fallback enabled may expose incomplete pages"
  remediation: "Use fallback: 'blocking' for better security"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: nextjs-ssr-get-initial-props
  languages: [javascript, typescript]
  patterns:
    - regex: 'getInitialProps.*ctx\.req|getInitialProps.*ctx\.query'
  severity: medium
  description: "getInitialProps with request data"
  remediation: "Validate all context data"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-server-component-env
  languages: [javascript, typescript]
  patterns:
    - regex: 'export\s+async\s+function\s+generateMetadata|generateStaticParams'
  severity: low
  description: "Server component with metadata generation"
  remediation: "Validate metadata inputs"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-server-action
  languages: [javascript, typescript]
  patterns:
    - regex: "'use server'|'use client'"
  severity: low
  description: "Server/Client component directive"
  remediation: "Ensure proper separation of concerns"
  cwe: "CWE-693"
  owasp: "A05:2021"

- id: nextjs-ssr-action-mutation
  languages: [javascript, typescript]
  patterns:
    - regex: "'use server'.*mutation|server action"
  severity: medium
  description: "Server action with potential mutation"
  remediation: "Validate server action inputs"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-form-action
  languages: [javascript, typescript]
  patterns:
    - regex: 'action=\\"[^\\"]*\\"|action=\{[^}]*\}'
  severity: medium
  description: "Form action handler"
  remediation: "Validate form action handlers"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-server-component-fetch
  languages: [javascript, typescript]
  patterns:
    - regex: 'async.*function.*fetch\(|fetch\(.*process\.env'
  severity: medium
  description: "Server component with fetch"
  remediation: "Validate fetch URLs"
  cwe: "CWE-918"
  owasp: "A10:2021"

- id: nextjs-ssr-dynamic-import
  languages: [javascript, typescript]
  patterns:
    - regex: 'import\s*\(.*process\.env|dynamic\s*\(\s*import'
  severity: medium
  description: "Dynamic import with environment variables"
  remediation: "Validate dynamic imports"
  cwe: "CWE-94"
  owasp: "A03:2021"

- id: nextjs-ssr-image-optimization
  languages: [javascript, typescript]
  patterns:
    - regex: '<Image\s+src=|<Image\s+src='
  severity: low
  description: "Next.js Image component"
  remediation: "Validate image sources"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-image-external
  languages: [javascript, typescript]
  patterns:
    - regex: '<Image.*domains=|images:\s*\{\s*domains:'
  severity: low
  description: "External image domains configured"
  remediation: "Restrict allowed image domains"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: nextjs-ssr-redirect-external
  languages: [javascript, typescript]
  patterns:
    - regex: 'redirect\s*\(\s*[''\\\"]http'
  severity: medium
  description: "External redirect in Next.js"
  remediation: "Validate redirect URLs"
  cwe: "CWE-601"
  owasp: "A01:2021"

- id: nextjs-ssr-rewrite-external
  languages: [javascript, typescript]
  patterns:
    - regex: 'rewrites.*destination.*http|rewrites:.*http'
  severity: medium
  description: "External rewrite configured"
  remediation: "Validate rewrite destinations"
  cwe: "CWE-601"
  owasp: "A01:2021"

- id: nextjs-ssr-middleware-redirect
  languages: [javascript, typescript]
  patterns:
    - regex: 'middleware.*Next\.redirect|Next\.redirect\('
  severity: medium
  description: "Middleware redirect"
  remediation: "Validate redirect URLs in middleware"
  cwe: "CWE-601"
  owasp: "A01:2021"

- id: nextjs-ssr-middleware-rewrite
  languages: [javascript, typescript]
