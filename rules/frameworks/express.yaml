# Express Security Rules
- id: express-missing-helmet
  name: "Express: Missing Helmet HTTP Headers"
  description: "Helmet helps secure Express apps by setting various HTTP headers. Not using it leaves the app vulnerable to XSS and clickjacking."
  severity: "medium"
  patterns:
    - regex: 'app\\.use\\(''cwe: "CWE-693"
  owasp: "A05:2021-Security Misconfiguration"

- id: express-no-rate-limiting
  name: "Express: Missing Rate Limiting"
  description: "Lack of rate limiting exposes the API to brute force and DoS attacks."
  severity: "high"
  patterns:
    - regex: 'app\\.post\\(''cwe: "CWE-799"
  owasp: "A04:2021-Insecure Design"

- id: express-unsafe-regex
  name: "Express: Unsafe Regular Expression (ReDoS)"
  description: "Using user input directly in RegExp can lead to Regular Expression Denial of Service."
  severity: "high"
  patterns:
    - regex: 'new\\s*RegExp\\s*\\(.*req\\..*\\)''cwe: "CWE-1333"
  owasp: "A04:2021-Insecure Design"

