  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-query-builder-where-raw
  languages: [php]
  patterns:
    - regex: '(?i)->whereRaw\\s*\\(\\s*\".*\\$\\{''severity: critical
  description: "SQL injection via whereRaw with interpolation"
  remediation: "Use where() with parameterized bindings"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-query-builder-order-by-raw
  languages: [php]
  patterns:
    - regex: '(?i)->orderByRaw\\s*\\(\\s*\\$\\w+''severity: high
  description: "SQL injection via orderByRaw with user input"
  remediation: "Validate order by columns against whitelist"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-query-builder-group-by-raw
  languages: [php]
  patterns:
    - regex: '(?i)->groupByRaw\\s*\\(\\s*\\$\\w+''severity: high
