    - regex: '(?i)->havingRaw\\s*\\(\\s*\".*\\$\\{''severity: critical
  description: "SQL injection via havingRaw with interpolation"
  remediation: "Use having() with parameterized bindings"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-query-builder-join-raw
  languages: [php]
  patterns:
    - regex: '(?i)->join\\s*\\(\\s*DB::raw''severity: critical
  description: "SQL injection via join with DB::raw"
  remediation: "Use parameterized joins"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-eloquent-where-column
  languages: [php]
  patterns:
    - regex: '(?i)->whereColumn\\s*\\(\\s*\\$\\w+''severity: high
  description: "SQL injection via whereColumn with variable"
  remediation: "Validate column names"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-eloquent-pluck-raw
  languages: [php]
  patterns:
    - regex: '(?i)->pluck\\s*\\(\\s*DB::raw''severity: critical
  description: "SQL injection via pluck with DB::raw"
  remediation: "Use pluck with column name string"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-eloquent-increment-decrement
  languages: [php]
  patterns:
