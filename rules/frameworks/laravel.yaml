# --- SQL Injection (1-15) ---
- id: laravel-db-raw-query-interpolation
  languages: [php]
  patterns:
    - regex: '(?i)DB::raw\\s*\\(\\s*\".*\\$\\{''severity: critical
  description: "SQL injection via DB::raw with string interpolation"
  remediation: "Use parameterized queries: DB::select('SELECT * WHERE id = ?', [$id])"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-db-select-interpolation
  languages: [php]
  patterns:
    - regex: '(?i)DB::select\\s*\\(\\s*\".*\\.\\$''severity: critical
  description: "SQL injection via DB::select with concatenation"
  remediation: "Use parameterized queries with bindings"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-db-table-dynamic
