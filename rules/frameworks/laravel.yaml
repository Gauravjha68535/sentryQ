  owasp: "A03:2021"

- id: laravel-model-new-query
  languages: [php]
  patterns:
    - regex: '(?i)->newQuery\\(\\)->whereRaw''severity: critical
  description: "SQL injection via newQuery with whereRaw"
  remediation: "Use parameterized queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-db-statement-prepare
  languages: [php]
  patterns:
    - regex: '(?i)DB::connection.*prepare\\s*\\(\\s*\".*\\$\\{''severity: critical
  description: "SQL injection via prepared statement with interpolation"
  remediation: "Use parameter binding"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-db-transaction-raw
  languages: [php]
  patterns:
    - regex: '(?i)DB::transaction\\s*\\(.*DB::raw''severity: critical
  description: "SQL injection in transaction with DB::raw"
  remediation: "Use parameterized queries in transactions"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: laravel-eloquent-scope-raw
