# Laravel Security Rules
- id: laravel-mass-assignment
  name: "Laravel: Mass Assignment"
  description: "Using Model::create() or fill() with an unprotected $guarded or $fillable property allows attackers to overwrite unexpected database columns."
  severity: "high"
  patterns:
    - regex: '::create\\s*\\([^{]*request\\(''cwe: "CWE-915"
  owasp: "A08:2021-Software and Data Integrity Failures"

- id: laravel-blade-xss
  name: "Laravel: Blade Unescaped Output (XSS)"
  description: "Using {!! !!} in Blade templates outputs raw HTML, making the application vulnerable to XSS if the data is user-controlled."
  severity: "high"
  patterns:
    - regex: '\\{!!.*!!\\}''cwe: "CWE-79"
  owasp: "A03:2021-Injection"

- id: laravel-env-exposure
  name: "Laravel: Unsafe env() usage"
  description: "Using env() outside of config files can lead to null values in production if config is cached."
  severity: "medium"
  patterns:
    - regex: 'env\\s*\\(''cwe: "CWE-488"
  owasp: "A05:2021-Security Misconfiguration"

