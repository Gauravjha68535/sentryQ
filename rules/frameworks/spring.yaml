# ============================================================================
# SPRING FRAMEWORK SECURITY RULES - COMPREHENSIVE
# ============================================================================
# 150+ Security Rules for Spring/Spring Boot Applications
# Format: Valid YAML List for Security Scanners
# ============================================================================

# --- Authentication & Authorization (1-20) ---
- id: spring-auth-no-security-config
  languages: [java]
  patterns:
    - regex: '(?i)@SpringBootApplication'
  severity: high
  description: "Spring Boot application without security configuration"
  remediation: "Add @EnableWebSecurity and configure SecurityFilterChain"
  cwe: "CWE-306"
  owasp: "A01:2021"

- id: spring-auth-permit-all-endpoints
  languages: [java]
  patterns:
    - regex: '(?i)\.permitAll\(\)\.anyRequest'
  severity: critical
  description: "All endpoints permitted without authentication"
  remediation: "Restrict permitAll to specific endpoints like /login, /register"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: spring-auth-web-ignored
  languages: [java]
  patterns:
    - regex: '(?i)\.web\.ignoring\(\)\.antMatchers'
  severity: high
  description: "Security ignored for URL patterns"
  remediation: "Use httpSecurity instead of web.ignoring for security"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: spring-auth-no-password-encoder
  languages: [java]
  patterns:
    - regex: '(?i)PasswordEncoder\s*\{\s*\}|NoOpPasswordEncoder'
  severity: critical
  description: "NoOpPasswordEncoder stores passwords in plain text"
  remediation: "Use BCryptPasswordEncoder or Argon2PasswordEncoder"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: spring-auth-basic-auth-enabled
  languages: [java]
  patterns:
    - regex: '(?i)httpBasic\(\)\.and\(\)'
  severity: medium
  description: "HTTP Basic Authentication enabled"
  remediation: "Use token-based auth for APIs, Basic only for internal services"
  cwe: "CWE-523"
  owasp: "A01:2021"

- id: spring-auth-remember-me-enabled
  languages: [java]
  patterns:
    - regex: '(?i)\.rememberMe\(\)\.key\s*\('
  severity: medium
  description: "Remember-me with hardcoded key"
  remediation: "Generate secure random key for remember-me"
  cwe: "CWE-330"
  owasp: "A02:2021"

- id: spring-auth-session-fixation
  languages: [java]
  patterns:
    - regex: '(?i)\.sessionManagement\(\)\.sessionFixation\(\)\.none'
  severity: high
  description: "Session fixation protection disabled"
  remediation: "Enable session fixation protection: migrateSession or newSession"
  cwe: "CWE-384"
  owasp: "A01:2021"

- id: spring-auth-concurrent-sessions
  languages: [java]
  patterns:
    - regex: '(?i)\.maximumSessions\s*\(\s*-1\s*\)'
  severity: medium
  description: "Unlimited concurrent sessions allowed"
  remediation: "Set reasonable maximum sessions limit"
  cwe: "CWE-613"
  owasp: "A01:2021"

- id: spring-auth-anonymous-enabled
  languages: [java]
  patterns:
    - regex: '(?i)\.anonymous\(\)\.disable\s*\(\s*\)\s*\\\\'
  severity: low
  description: "Anonymous authentication disabled"
  remediation: "Review if anonymous access is needed"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: spring-auth-logout-url-default
  languages: [java]
  patterns:
    - regex: '(?i)\.logout\(\)'
  severity: low
  description: "Default logout URL (/logout) used"
  remediation: "Consider customizing logout URL"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: spring-auth-csrf-disabled
  languages: [java]
  patterns:
    - regex: '(?i)\.csrf\(\)\.disable\(\)'
  severity: critical
  description: "CSRF protection completely disabled"
  remediation: "Enable CSRF for state-changing operations"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: spring-auth-csrf-ignore-ant-matchers
  languages: [java]
  patterns:
    - regex: '(?i)\.csrf\(\)\.ignoringAntMatchers'
  severity: high
  description: "CSRF ignored for specific URL patterns"
  remediation: "Review if CSRF should be ignored for these endpoints"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: spring-auth-csrf-cookie-http-only-false
  languages: [java]
  patterns:
    - regex: '(?i)\.csrfTokenRepository\(\).*httpOnly\s*\(\s*false\s*\)'
  severity: high
  description: "CSRF cookie not HttpOnly"
  remediation: "Set CSRF cookie as HttpOnly"
  cwe: "CWE-614"
  owasp: "A01:2021"

- id: spring-auth-oauth2-client-secret-plaintext
  languages: [java]
  patterns:
    - regex: '(?i)client-secret:\s*[a-zA-Z0-9]{8,}'
  severity: high
  description: "OAuth2 client secret in plaintext configuration"
  remediation: "Use environment variables or vault for client secrets"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: spring-auth-jwt-secret-short
  languages: [java]
  patterns:
    - regex: '(?i)jwt\.secret\s*=\s*[\\\"''][a-zA-Z0-9]{8,20}[\\\"'']'
  severity: high
  description: "JWT secret key too short"
  remediation: "Use minimum 256-bit (32 character) secret for JWT"
  cwe: "CWE-330"
  owasp: "A02:2021"

- id: spring-auth-jwt-no-expiration
  languages: [java]
  patterns:
    - regex: '(?i)JwtBuilder.*\.setExpiration\s*\(\s*null\s*\)'
  severity: high
  description: "JWT token without expiration"
  remediation: "Set reasonable expiration time for JWT tokens"
  cwe: "CWE-613"
  owasp: "A01:2021"

- id: spring-auth-jwt-algorithm-none
  languages: [java]
  patterns:
    - regex: '(?i)\.signWith\s*\(\s*SignatureAlgorithm\.NONE'
  severity: critical
  description: "JWT signed with NONE algorithm"
  remediation: "Use HS256, RS256, or ES256 for JWT signing"
  cwe: "CWE-327"
  owasp: "A02:2021"

- id: spring-auth-method-security-disabled
  languages: [java]
  patterns:
    - regex: '(?i)@EnableMethodSecurity\s*\(\s*securedEnabled\s*=\s*false'
  severity: medium
  description: "Method security disabled"
  remediation: "Enable method security for fine-grained access control"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: spring-auth-preauthorize-spel-injection
  languages: [java]
  patterns:
    - regex: '(?i)@PreAuthorize\s*\(\s*\\\".*#\{.*\}'
  severity: high
  description: "SpEL injection in @PreAuthorize"
  remediation: "Avoid user input in SpEL expressions"
  cwe: "CWE-917"
  owasp: "A03:2021"

- id: spring-auth-roles-hardcoded
  languages: [java]
  patterns:
    - regex: '(?i)@PreAuthorize\s*\(\s*\\\"hasRole\s*\(\s*[''\\\"]ADMIN[''\\\"]'
  severity: low
  description: "Hardcoded role in authorization"
  remediation: "Externalize roles to configuration"
  cwe: "CWE-284"
  owasp: "A01:2021"

# --- SQL Injection (21-40) ---
- id: spring-sql-jdbc-concatenation
  languages: [java]
  patterns:
    - regex: '(?i)JdbcTemplate.*execute\s*\(\s*\\\".*\+.*\+'
  severity: critical
  description: "SQL injection via string concatenation in JdbcTemplate"
  remediation: "Use parameterized queries with ? placeholders"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-named-parameter-jdbc
  languages: [java]
  patterns:
    - regex: '(?i)NamedParameterJdbcTemplate.*\\\".*:\w+.*\\\".*\+.*\+'
  severity: critical
  description: "SQL injection in NamedParameterJdbcTemplate"
  remediation: "Use MapSqlParameterSource for parameters"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-hibernate-create-native-query
  languages: [java]
  patterns:
    - regex: '(?i)createNativeQuery\s*\(\s*\\\".*\+.*\+'
  severity: critical
  description: "SQL injection in Hibernate native query"
  remediation: "Use parameterized native queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-hibernate-hql-concatenation
  languages: [java]
  patterns:
    - regex: '(?i)createQuery\s*\(\s*\\\"FROM.*WHERE.*\+.*\+'
  severity: critical
  description: "HQL injection via string concatenation"
  remediation: "Use HQL with named parameters"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-string-builder-sql
  languages: [java]
  patterns:
    - regex: '(?i)StringBuilder.*append\s*\(.*SELECT|StringBuilder.*append\s*\(.*INSERT'
  severity: critical
  description: "SQL built with StringBuilder"
  remediation: "Use parameterized queries instead"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-string-format-sql
  languages: [java]
  patterns:
    - regex: '(?i)String\.format\s*\(\s*\\\".*SELECT.*%s'
  severity: critical
  description: "SQL built with String.format"
  remediation: "Use parameterized queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-concat-function
  languages: [java]
  patterns:
    - regex: '(?i)CONCAT\s*\(.*\$\{|CONCAT\s*\(.*\+'
  severity: critical
  description: "SQL CONCAT with user input"
  remediation: "Use parameterized queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-order-by-injection
  languages: [java]
  patterns:
    - regex: '(?i)ORDER\s+BY\s+\$\{|ORDER\s+BY\s+\+'
  severity: high
  description: "ORDER BY clause with user input"
  remediation: "Whitelist allowed sort columns"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-limit-injection
  languages: [java]
  patterns:
    - regex: '(?i)LIMIT\s+\$\{|LIMIT\s+\+'
  severity: high
  description: "LIMIT clause with user input"
  remediation: "Validate and cast to integer"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-group-by-injection
  languages: [java]
  patterns:
    - regex: '(?i)GROUP\s+BY\s+\$\{|GROUP\s+BY\s+\+'
  severity: high
  description: "GROUP BY clause with user input"
  remediation: "Whitelist allowed group columns"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-into-outfile
  languages: [java]
  patterns:
    - regex: '(?i)INTO\s+OUTFILE|INTO\s+DUMPFILE'
  severity: critical
  description: "SQL INTO OUTFILE can write files"
  remediation: "Disable FILE privilege for database user"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-union-based
  languages: [java]
  patterns:
    - regex: '(?i)UNION\s+SELECT.*\$\{'
  severity: critical
  description: "UNION-based SQL injection"
  remediation: "Use parameterized queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-error-based
  languages: [java]
  patterns:
    - regex: '(?i)EXTRACTVALUE\s*\(|UPDATEXML\s*\('
  severity: critical
  description: "Error-based SQL injection functions"
  remediation: "Use parameterized queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-time-based
  languages: [java]
  patterns:
    - regex: '(?i)SLEEP\s*\(|BENCHMARK\s*\(|WAITFOR\s+DELAY'
  severity: critical
  description: "Time-based SQL injection functions"
  remediation: "Use parameterized queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-stored-procedure
  languages: [java]
  patterns:
    - regex: '(?i)\{\s*CALL\s+.*\$\{'
  severity: high
  description: "Stored procedure with user input"
  remediation: "Validate stored procedure parameters"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-batch-update
  languages: [java]
  patterns:
    - regex: '(?i)batchUpdate\s*\(\s*\\\".*\+.*\+'
  severity: critical
  description: "SQL injection in batch update"
  remediation: "Use parameterized batch operations"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-dynamic-table-name
  languages: [java]
  patterns:
    - regex: '(?i)FROM\s+\$\{|FROM\s+\+.*table'
  severity: critical
  description: "Dynamic table name from user input"
  remediation: "Whitelist allowed table names"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-like-injection
  languages: [java]
  patterns:
    - regex: '(?i)LIKE\s+\\\"%\\\".*\+.*\+'
  severity: high
  description: "LIKE clause with user input"
  remediation: "Escape special characters in LIKE queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-in-clause-injection
  languages: [java]
  patterns:
    - regex: '(?i)IN\s*\(\s*\$\{|IN\s*\(\s*\+'
  severity: high
  description: "IN clause with user input"
  remediation: "Validate and sanitize IN clause values"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: spring-sql-comment-injection
  languages: [java]
  patterns:
    - regex: '(?i)--\s*$|/\*.*\*/.*\$'
  severity: high
  description: "SQL comment in query with user input"
  remediation: "Remove comments from user input"
  cwe: "CWE-89"
  owasp: "A03:2021"

# --- XSS (41-60) ---
- id: spring-xss-response-body
  languages: [java]
  patterns:
    - regex: '(?i)@ResponseBody.*String.*request\.getParameter'
  severity: high
  description: "XSS via @ResponseBody with user input"
  remediation: "Encode output or use @ResponseBody with proper content type"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-response-entity
  languages: [java]
  patterns:
    - regex: '(?i)ResponseEntity\.ok\s*\(\s*request\.getParameter'
  severity: high
  description: "XSS via ResponseEntity with user input"
  remediation: "Encode output before returning in ResponseEntity"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-model-and-view
  languages: [java]
  patterns:
    - regex: '(?i)new\s+ModelAndView\s*\(\s*\\\".*\\\".*request\.getParameter'
  severity: high
  description: "XSS via ModelAndView with user input"
  remediation: "Encode model attributes or use view technology auto-escaping"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-model-add-attribute
  languages: [java]
  patterns:
    - regex: '(?i)model\.addAttribute\s*\(\s*request\.getParameter'
  severity: high
  description: "XSS via model.addAttribute with user input"
  remediation: "Encode data before adding to model"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-print-writer
  languages: [java]
  patterns:
    - regex: '(?i)response\.getWriter\s*\(\s*\)\.print\s*\(\s*request'
  severity: high
  description: "XSS via PrintWriter with user input"
  remediation: "Encode output before writing to response"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-output-stream
  languages: [java]
  patterns:
    - regex: '(?i)response\.getOutputStream\s*\(\s*\)\.write\s*\(\s*request'
  severity: high
  description: "XSS via OutputStream with user input"
  remediation: "Encode output before writing to response"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-jsp-expression
  languages: [java, jsp]
  patterns:
    - regex: '(?i)<%=.*request\.getParameter|%\{.*param\.'
  severity: high
  description: "XSS via JSP expression with user input"
  remediation: "Use JSTL <c:out> or EL with escaping"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-thymeleaf-unescaped
  languages: [java, html]
  patterns:
    - regex: '(?i)th:utext\s*=|th:utext\s*\('
  severity: high
  description: "XSS via Thymeleaf unescaped text (th:utext)"
  remediation: "Use th:text instead of th:utext for user input"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-freemarker-raw
  languages: [java, ftl]
  patterns:
    - regex: '(?i)\$\{.*\?html|\$\{.*\?xml'
  severity: high
  description: "XSS via FreeMarker without escaping"
  remediation: "Use ?html or ?xml built-in for escaping"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-velocity-unescaped
  languages: [java, vm]
  patterns:
    - regex: '(?i)\$[^{]|\$!\{'
  severity: high
  description: "XSS via Velocity without escaping"
  remediation: "Use Velocity escape tools"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-redirect-url
  languages: [java]
  patterns:
    - regex: '(?i)redirect:\s*\+.*request\.getParameter'
  severity: high
  description: "XSS via redirect URL with user input"
  remediation: "Validate and encode redirect URLs"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-forward-url
  languages: [java]
  patterns:
    - regex: '(?i)forward:\s*\+.*request\.getParameter'
  severity: high
  description: "XSS via forward URL with user input"
  remediation: "Validate forward URLs against whitelist"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-json-content-type
  languages: [java]
  patterns:
    - regex: '(?i)produces\s*=\s*\\\"application/json\\\".*request\.getParameter'
  severity: medium
  description: "JSON response with user input"
  remediation: "Validate and sanitize JSON output"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-html-content-type
  languages: [java]
  patterns:
    - regex: '(?i)produces\s*=\s*\\\"text/html\\\".*request\.getParameter'
  severity: high
  description: "HTML response with user input"
  remediation: "Encode all user input in HTML responses"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-javascript-content-type
  languages: [java]
  patterns:
    - regex: '(?i)produces\s*=\s*\\\"application/javascript\\\".*request'
  severity: high
  description: "JavaScript response with user input"
  remediation: "Avoid returning user input in JavaScript"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-xml-content-type
  languages: [java]
  patterns:
    - regex: '(?i)produces\s*=\s*\\\"application/xml\\\".*request'
  severity: high
  description: "XML response with user input"
  remediation: "Encode XML special characters"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-svg-content-type
  languages: [java]
  patterns:
    - regex: '(?i)produces\s*=\s*\\\"image/svg\+xml\\\".*request'
  severity: high
  description: "SVG response with user input"
  remediation: "Sanitize SVG content"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-pdf-content-type
  languages: [java]
  patterns:
    - regex: '(?i)produces\s*=\s*\\\"application/pdf\\\".*request'
  severity: medium
  description: "PDF generation with user input"
  remediation: "Validate PDF content"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-csv-content-type
  languages: [java]
  patterns:
    - regex: '(?i)produces\s*=\s*\\\"text/csv\\\".*request'
  severity: medium
  description: "CSV export with user input"
  remediation: "Escape CSV special characters"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: spring-xss-reflected-parameter
  languages: [java]
  patterns:
    - regex: '(?i)@RequestParam.*@ResponseBody|@RequestParam.*ResponseEntity'
  severity: high
  description: "Reflected XSS via RequestParam to Response"
  remediation: "Encode all reflected parameters"
  cwe: "CWE-79"
  owasp: "A03:2021"

# --- CSRF (61-75) ---
- id: spring-csrf-get-state-changing
  languages: [java]
  patterns:
    - regex: '(?i)@GetMapping.*@PostMapping|@GetMapping.*delete|@GetMapping.*update'
  severity: high
  description: "State-changing operation on GET request"
  remediation: "Use POST/PUT/DELETE for state-changing operations"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: spring-csrf-cookie-secure-false
  languages: [java]
  patterns:
    - regex: '(?i)\.secure\s*\(\s*false\s*\)'
  severity: high
  description: "CSRF cookie not marked as secure"
  remediation: "Set CSRF cookie as secure"
  cwe: "CWE-614"
  owasp: "A01:2021"

- id: spring-csrf-cookie-same-site-none
  languages: [java]
  patterns:
    - regex: '(?i)\.sameSite\s*\(\s*SameSitePolicy\.NONE'
  severity: medium
  description: "CSRF cookie with SameSite=None"
  remediation: "Use SameSite=Lax or Strict"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: spring-csrf-header-name-default
  languages: [java]
  patterns:
    - regex: '(?i)\.csrfTokenRepository\s*\(\).*headerName\s*\(\s*\\\"X-CSRF-TOKEN'
  severity: low
  description: "Default CSRF header name used"
  remediation: "Consider customizing CSRF header name"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: spring-csrf-parameter-name-default
  languages: [java]
  patterns:
    - regex: '(?i)\.csrfTokenRepository\s*\(\).*parameterName\s*\(\s*\\\"_csrf'
  severity: low
  description: "Default CSRF parameter name used"
  remediation: "Consider customizing CSRF parameter name"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: spring-csrf-session-repository
  languages: [java]
  patterns:
    - regex: '(?i)HttpSessionCsrfTokenRepository'
  severity: low
  description: "Session-based CSRF token repository"
  remediation: "Consider cookie-based token repository for stateless APIs"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: spring-csrf-cookie-http-only-false
  languages: [java]
  patterns:
    - regex: '(?i)CookieCsrfTokenRepository.*httpOnly\s*\(\s*false'
  severity: high
  description: "CSRF cookie not HttpOnly"
  remediation: "Set CSRF cookie as HttpOnly"
  cwe: "CWE-614"
  owasp: "A01:2021"

- id: spring-csrf-cookie-path-root
  languages: [java]
  patterns:
    - regex: '(?i)\.cookiePath\s*\(\s*\\\"/\\\"\s*\)'
  severity: low
  description: "CSRF cookie path set to root"
  remediation: "Consider restricting cookie path"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: spring-csrf-cookie-domain
  languages: [java]
