# -
# SVELTE SECURITY RULES — Comprehensive 150+ Rules
# -
# Security rules for detecting Svelte/SvelteKit vulnerabilities across multiple categories
# -

# -
- id: svelte-hardcoded-password
  languages: [javascript, typescript]
  patterns:
    - regex: '(?i)(password|passwd|pwd)\s*[=:]\s*[''\\"''][^''\\"]{8,}[''\\"]'
  severity: high
  description: "Hardcoded password detected in Svelte source code"
  remediation: "Use environment variables via process.env.PASSWORD or a secrets manager like HashiCorp Vault"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: svelte-hardcoded-api-key
  languages: [javascript, typescript]
  patterns:
    - regex: '(?i)(api[_-]?key|apikey)\s*[=:]\s*[''\\"''][a-zA-Z0-9]{16,}[''\\"]'
  severity: high
  description: "Hardcoded API key detected in Svelte source code"
  remediation: "Store API keys in environment variables or use a secure vault service"
  cwe: "CWE-798"
  owasp: "A07:2021"

