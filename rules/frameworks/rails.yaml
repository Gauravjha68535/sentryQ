# Rails Security Rules
- id: rails-raw-sql
  name: "Rails: Raw SQL Injection"
  description: "Using raw SQL strings with user input in where() or execute() leads to SQL Injection."
  severity: "high"
  patterns:
    - regex: 'where\s*\(\\\".*?#[{].*?}.*?\\\"\)'
  cwe: "CWE-89"
  owasp: "A03:2021-Injection"

- id: rails-html-safe
  name: "Rails: Unsafe html_safe usage (XSS)"
  description: "Calling html_safe on user-controlled data bypasses XSS protection."
  severity: "high"
  patterns:
    - regex: 'params\[.*?\]\.html_safe'
  cwe: "CWE-79"
  owasp: "A03:2021-Injection"

- id: rails-mass-assignment
  name: "Rails: Mass Assignment bypassing Strong Parameters"
  description: "Bypassing strong parameters by directly passing params to update or create can allow mass assignment."
  severity: "medium"
  patterns:
    - regex: '\.update\(params\[.*?\]\)'
  cwe: "CWE-915"
  owasp: "A08:2021-Software and Data Integrity Failures"

