# Flask Security Rules
- id: flask-debug-true
  name: "Flask: app.run(debug=True) in production"
  description: "Running Flask with debug=True enables the interactive debugger, allowing remote code execution if the PIN is brute-forced."
  severity: "critical"
  patterns:
    - regex: 'run\([^)]*debug\s*=\s*True'
  cwe: "CWE-489"
  owasp: "A05:2021-Security Misconfiguration"

- id: flask-ssti-jinja2
  name: "Flask: Server-Side Template Injection (SSTI)"
  description: "Rendering templates from a string instead of a file can allow attackers to execute arbitrary code via Jinja2 SSTI."
  severity: "high"
  patterns:
    - regex: 'render_template_string\s*\('
  cwe: "CWE-1336"
  owasp: "A03:2021-Injection"

- id: flask-unsafe-send-file
  name: "Flask: Unsafe send_file"
  description: "Using send_file() with user-controlled input can lead to Path Traversal vulnerabilities."
  severity: "medium"
  patterns:
    - regex: 'send_file\s*\([^)]*request\.'
  cwe: "CWE-22"
  owasp: "A01:2021-Broken Access Control"

