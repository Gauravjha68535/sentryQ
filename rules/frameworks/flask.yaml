# --- SQL Injection (1-15) ---
- id: flask-sqlalchemy-filter-interpolation
  languages: [python]
  patterns:
    - regex: '(?i)\.filter\s*\(.*f[''\\\"].*\{.*\}'
  severity: critical
  description: "SQL injection via SQLAlchemy filter with f-string"
  remediation: "Use parameterized queries: Model.query.filter_by(id=user_id)"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: flask-sqlalchemy-filter-string-format
