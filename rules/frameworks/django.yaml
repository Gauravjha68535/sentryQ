# --- DJANGO ORM (1-20) ---
- id: django-orm-filter-injection
  languages: [python]
  patterns:
    - regex: '(?i)\\.filter\\s*\\(\\s*\\*\\*request\\.''severity: critical
  description: "Django ORM filter with request data - potential injection"
  remediation: "Validate and sanitize filter parameters"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: django-orm-exclude-injection
