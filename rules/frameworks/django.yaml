# Django Security Rules
- id: django-csrf-exempt
  name: "Django: @csrf_exempt used"
  description: "Disabling CSRF protection on a view can allow attackers to perform Cross-Site Request Forgery attacks."
  severity: "high"
  patterns:
    - regex: '@csrf_exempt''cwe: "CWE-352"
  owasp: "A01:2021-Broken Access Control"

- id: django-debug-true
  name: "Django: DEBUG = True in production"
  description: "Running Django with DEBUG=True can leak sensitive internal configuration and source code to attackers."
  severity: "critical"
  patterns:
    - regex: 'DEBUG\\s*=\\s*True''cwe: "CWE-489"
  owasp: "A05:2021-Security Misconfiguration"

- id: django-raw-sql
  name: "Django: Raw SQL Query Execution"
  description: "Using raw() or execute() opens the application to SQL injection if user input is not properly parameterized."
  severity: "high"
  patterns:
    - regex: '\\.(raw|execute)\\s*\\(.*%''cwe: "CWE-89"
  owasp: "A03:2021-Injection"

- id: django-unsafe-template-render
  name: "Django: Unsafe Template Rendering"
  description: "Rendering templates from raw strings with user input can lead to Server-Side Template Injection (SSTI)."
  severity: "high"
  patterns:
    - regex: 'render_template_string\\s*\\(''cwe: "CWE-1336"
  owasp: "A03:2021-Injection"
