# --- Angular XSS Vulnerabilities (1-25) ---
- id: angular-inner-html
  languages: [typescript, typescript]
  patterns:
    - regex: '\\[innerHTML\\]\\s*=''severity: high
  description: "innerHTML binding - XSS risk"
  remediation: "Sanitize HTML content before binding"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: angular-inner-html-dynamic
  languages: [typescript, typescript]
  patterns:
    - regex: '\\[innerHTML\\]\\s*=\\s*\\[''severity: high
  description: "Dynamic innerHTML binding"
  remediation: "Sanitize dynamic content"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: angular-inner-html-property
  languages: [typescript, typescript]
  patterns:
    - regex: '\\[innerHTML\\]\\s*=\\s*\\[\\w+''severity: high
  description: "innerHTML with property"
  remediation: "Sanitize property"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: angular-inner-html-method
