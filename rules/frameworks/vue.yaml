# ============================================================================
# VUE.JS SECURITY RULES - COMPREHENSIVE
# ============================================================================
# 150 Rules for detecting Vue.js-specific security vulnerabilities
# Categories: XSS, Component Security, Directive Security, Routing,
#             State Management, API Security, Authentication, Configuration
# ============================================================================

# --- XSS Vulnerabilities (1-25) ---
- id: vue-v-html-directive
  languages: [vue, javascript]
  patterns:
    - regex: 'v-html\s*='
  severity: high
  description: "v-html directive bypasses Vue's XSS protection"
  remediation: "Avoid v-html with user input. Use text interpolation or sanitize with DOMPurify"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: vue-v-html-user-input
  languages: [vue, javascript]
  patterns:
    - regex: 'v-html\s*=\s*[''\.]?\.$\.{'
  severity: critical
  description: "v-html with template literal containing user input"
  remediation: "Never use v-html with user-controlled data"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: vue-v-html-data-property
  languages: [vue, javascript]
  patterns:
    - regex: 'v-html\s*=\s*[''\.]?\w+\..html'
  severity: high
  description: "v-html bound to data property"
  remediation: "Sanitize HTML content before binding"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: vue-v-html-props
  languages: [vue, javascript]
  patterns:
    - regex: 'v-html\s*=\s*[''\.]?props\..'
  severity: high
  description: "v-html bound to props"
  remediation: "Sanitize props before rendering as HTML"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: vue-v-html-computed
