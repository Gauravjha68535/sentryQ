# ============================================================================
# REACT SECURITY RULES - COMPREHENSIVE EDITION (300+ RULES)
# ============================================================================

# ======================== DANGEROUSLYSETINNERHTML (1-25) ========================

- id: react-dangerously-set-inner-html
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'dangerouslySetInnerHTML\\s*='
  severity: critical
  description: "dangerouslySetInnerHTML bypasses React's XSS protection"
  remediation: "Avoid using dangerouslySetInnerHTML. Sanitize content with DOMPurify if absolutely necessary"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-user-input
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'dangerouslySetInnerHTML\\s*=\\s*\\{\\{\\s*__html\\s*:\\s*(?:props|state|userInput|query|params)\\.'
  severity: critical
  description: "dangerouslySetInnerHTML with user-controlled props - XSS vulnerability"
  remediation: "Never use dangerouslySetInnerHTML with user input. Sanitize with DOMPurify first"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-fetch
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'dangerouslySetInnerHTML\\s*=\\s*\\{\\{\\s*__html\\s*:\\s*(?:response\\.data|res\\.data|result\\.html)'
  severity: critical
  description: "dangerouslySetInnerHTML with fetch response data - XSS if API compromised"
  remediation: "Sanitize all API responses before using dangerouslySetInnerHTML"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-sanitized
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'dangerouslySetInnerHTML\\s*=\\s*\\{\\{\\s*__html\\s*:\\s*DOMPurify\\.sanitize'
  severity: info
  description: "dangerouslySetInnerHTML with DOMPurify - ensure sanitization is secure"
  remediation: "Continue using DOMPurify with secure configuration"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-sanitized-config
  languages: [javascript, typescript]
  patterns:
    - regex: 'DOMPurify\\.sanitize\\s*\\([^)]*,\\s*\\{[^}]*ALLOWED_TAGS'
  severity: low
  description: "DOMPurify with custom configuration - ensure safe tags allowed"
  remediation: "Review ALLOWED_TAGS to prevent XSS vectors"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-xss-payload
  languages: [javascript, typescript]
  patterns:
    - regex: '<img\\s+src=x\\s+onerror|javascript:|onload\\s*=|onerror\\s*='
  severity: critical
  description: "Potential XSS payload in dangerouslySetInnerHTML"
  remediation: "Sanitize HTML to remove event handlers and javascript: URLs"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-svg
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: '<svg.*dangerouslySetInnerHTML.*</svg>'
  severity: critical
  description: "SVG with dangerouslySetInnerHTML - XSS via SVG script tags"
  remediation: "Sanitize SVG content, remove script tags and event handlers"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-iframe
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: '<iframe.*dangerouslySetInnerHTML.*</iframe>'
  severity: critical
  description: "Iframe with dangerouslySetInnerHTML - XSS and clickjacking risk"
  remediation: "Avoid iframe with innerHTML, use src attribute with allowlist"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-mathml
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: '<math.*dangerouslySetInnerHTML.*</math>'
  severity: critical
  description: "MathML with dangerouslySetInnerHTML - XSS via MathML vectors"
  remediation: "Sanitize MathML content or avoid MathML"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-component
  languages: [javascript, typescript]
  patterns:
    - regex: 'component.*dangerouslySetInnerHTML'
  severity: high
  description: "Component receiving dangerouslySetInnerHTML prop - verify usage"
  remediation: "Document that component uses dangerouslySetInnerHTML"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-third-party
  languages: [javascript, typescript]
  patterns:
    - regex: 'import.*(quill|ckeditor|tinymce|froala).*dangerouslySetInnerHTML'
  severity: high
  description: "Rich text editor using dangerouslySetInnerHTML - XSS risk"
  remediation: "Configure editor to sanitize output, use text-only mode"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-markdown
  languages: [javascript, typescript]
  patterns:
    - regex: 'react-markdown|markdown-to-jsx.*dangerouslySetInnerHTML'
  severity: high
  description: "Markdown renderer using dangerouslySetInnerHTML - XSS risk"
  remediation: "Configure markdown renderer to disallow HTML"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-base64
  languages: [javascript, typescript]
  patterns:
    - regex: 'atob\\s*\\(.*\\).*dangerouslySetInnerHTML|btoa.*dangerouslySetInnerHTML'
  severity: high
  description: "Base64 encoded content in dangerouslySetInnerHTML - obfuscated XSS"
  remediation: "Decode and sanitize Base64 content before use"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-url
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'fetch\\s*\\([^)]*\\)\\s*\\.then\\s*\\([^)]*\\)\\s*.*dangerouslySetInnerHTML'
  severity: critical
  description: "Fetching URL and using response in dangerouslySetInnerHTML - XSS"
  remediation: "Sanitize all fetched HTML content"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-localstorage
  languages: [javascript, typescript]
  patterns:
    - regex: 'localStorage\\.getItem.*dangerouslySetInnerHTML'
  severity: critical
  description: "Using localStorage data in dangerouslySetInnerHTML - XSS if storage poisoned"
  remediation: "Sanitize all data from storage before use"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-sessionstorage
  languages: [javascript, typescript]
  patterns:
    - regex: 'sessionStorage\\.getItem.*dangerouslySetInnerHTML'
  severity: critical
  description: "Using sessionStorage data in dangerouslySetInnerHTML - XSS risk"
  remediation: "Sanitize all data from storage before use"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-indexeddb
  languages: [javascript, typescript]
  patterns:
    - regex: 'indexedDB.*result.*dangerouslySetInnerHTML'
  severity: critical
  description: "Using IndexedDB data in dangerouslySetInnerHTML - XSS risk"
  remediation: "Sanitize all data from database before use"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-context
  languages: [javascript, typescript]
  patterns:
    - regex: 'useContext.*dangerouslySetInnerHTML'
  severity: high
  description: "Context data used in dangerouslySetInnerHTML - XSS risk"
  remediation: "Sanitize context data before rendering"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-redux
  languages: [javascript, typescript]
  patterns:
    - regex: 'useSelector.*dangerouslySetInnerHTML'
  severity: high
  description: "Redux store data used in dangerouslySetInnerHTML - XSS risk"
  remediation: "Sanitize Redux state before rendering"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-route-param
  languages: [javascript, typescript]
  patterns:
    - regex: 'useParams.*dangerouslySetInnerHTML|useSearchParams.*dangerouslySetInnerHTML'
  severity: critical
  description: "URL parameters used in dangerouslySetInnerHTML - reflected XSS"
  remediation: "Never use URL params directly in dangerouslySetInnerHTML"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-query-string
  languages: [javascript, typescript]
  patterns:
    - regex: 'window\\.location\\.search.*dangerouslySetInnerHTML|window\\.location\\.hash.*dangerouslySetInnerHTML'
  severity: critical
  description: "Query string/hash used in dangerouslySetInnerHTML - reflected XSS"
  remediation: "Never use location data directly in dangerouslySetInnerHTML"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-document-referrer
  languages: [javascript, typescript]
  patterns:
    - regex: 'document\\.referrer.*dangerouslySetInnerHTML'
  severity: high
  description: "Document referrer used in dangerouslySetInnerHTML - XSS risk"
  remediation: "Sanitize referrer before use"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-cookie
  languages: [javascript, typescript]
  patterns:
    - regex: 'document\\.cookie.*dangerouslySetInnerHTML'
  severity: critical
  description: "Cookie data used in dangerouslySetInnerHTML - XSS risk"
  remediation: "Never use cookie data directly in dangerouslySetInnerHTML"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-dangerously-set-inner-html-multiple
  languages: [javascript, typescript, jsx, tsx]
