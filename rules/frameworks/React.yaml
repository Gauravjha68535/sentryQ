# ======================== USEEFFECT DATA LEAKS (51-75) ========================

- id: react-useeffect-fetch-sensitive
  languages: [javascript, typescript]
  patterns:
    - regex: 'useEffect\\s*\\(\\s*\\(\\)\\s*=>\\s*\\{[^}]*fetch\\s*\\([^)]*\\).*\\}[^,]*\\]'
  severity: medium
  description: "Fetch in useEffect without cleanup - may cause memory leaks"
  remediation: "Add AbortController to cancel fetch on unmount"
  cwe: "CWE-401"
  owasp: "A05:2021"

- id: react-useeffect-subscription
  languages: [javascript, typescript]
  patterns:
    - regex: 'useEffect\\s*\\(\\s*\\(\\)\\s*=>\\s*\\{[^}]*(?:addEventListener|subscribe|on)",\\s*\\[\\s*\\]\\s*\\)'
  severity: high
  description: "useEffect with subscription and empty deps - no cleanup"
  remediation: "Return cleanup function to unsubscribe"
  cwe: "CWE-401"
  owasp: "A05:2021"

- id: react-useeffect-interval
  languages: [javascript, typescript]
  patterns:
    - regex: 'useEffect\\s*\\(\\s*\\(\\)\\s*=>\\s*\\{[^}]*setInterval(?!.*clearInterval)[^}]*\\}[^)]*\\)'
  severity: high
  description: "setInterval in useEffect without cleanup - memory leak"
  remediation: "Return cleanup function with clearInterval"
  cwe: "CWE-401"
  owasp: "A05:2021"

- id: react-useeffect-timeout
  languages: [javascript, typescript]
  patterns:
    - regex: 'useEffect\\s*\\(\\s*\\(\\)\\s*=>\\s*\\{[^}]*setTimeout(?!.*clearTimeout)[^}]*\\}[^)]*\\)'
  severity: medium
  description: "setTimeout in useEffect without cleanup"
  remediation: "Return cleanup function with clearTimeout"
  cwe: "CWE-401"
  owasp: "A05:2021"

- id: react-useeffect-websocket
  languages: [javascript, typescript]
  patterns:
    - regex: 'useEffect\\s*\\(\\s*\\(\\)\\s*=>\\s*\\{[^}]*new\\s+WebSocket[^}]*(?!close)[^}]*\\}[^)]*\\)'
  severity: high
  description: "WebSocket in useEffect without closing - connection leak"
  remediation: "Return cleanup function to close WebSocket"
  cwe: "CWE-401"
  owasp: "A05:2021"

- id: react-useeffect-observer
  languages: [javascript, typescript]
  patterns:
    - regex: 'useEffect\\s*\\(\\s*\\(\\)\\s*=>\\s*\\{[^}]*(?:MutationObserver|ResizeObserver|IntersectionObserver)[^}]*(?!disconnect)[^}]*\\}[^)]*\\)'
  severity: high
  description: "Observer in useEffect without disconnect - memory leak"
  remediation: "Return cleanup function to disconnect observer"
  cwe: "CWE-401"
  owasp: "A05:2021"

- id: react-useeffect-sensitive-data
  languages: [javascript, typescript]
  patterns:
    - regex: 'useEffect\\s*\\(\\s*\\(\\)\\s*=>\\s*\\{[^}]*(?:password|token|key|secret|credit)\\s*=[^}]*\\}'
  severity: critical
  description: "Sensitive data accessed in useEffect - may be exposed"
