  cwe: "CWE-79"
  owasp: "A03:2021"

# ======================== INSECURE HREF (26-50) ========================

- id: react-href-javascript-protocol
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'href\\s*=\\s*\\{\\s*[''"]javascript:'
  severity: critical
  description: "Hardcoded javascript: protocol in href - XSS vulnerability"
  remediation: "Never use javascript: URLs. Use event handlers for actions"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-href-javascript-protocol-variable
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'href\\s*=\\s*\\{\\s*.*\\s*\\+\\s*[''"]javascript:|href\\s*=\\s*\\{\\s*[''"]javascript:.*\\+'
  severity: critical
  description: "Dynamic javascript: protocol via concatenation - XSS"
  remediation: "Validate URL scheme, never allow javascript: protocol"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-href-user-input
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'href\\s*=\\s*\\{\\s*(?:props|state|userInput|query|params)\\.'
  severity: high
  description: "User input in href - open redirect and XSS risks"
  remediation: "Validate URL against allowlist, encode user input"
  cwe: "CWE-601"
  owasp: "A01:2021"

- id: react-href-data-protocol
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'href\\s*=\\s*\\{\\s*[''"]data:'
  severity: critical
  description: "data: protocol in href - XSS via data URIs"
  remediation: "Block data: URLs or sanitize content"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-href-blob-protocol
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'href\\s*=\\s*\\{\\s*[''"]blob:'
  severity: medium
  description: "blob: protocol in href - may lead to XSS"
  remediation: "Validate blob content, ensure same-origin"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: react-href-http-without-https
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'href\\s*=\\s*\\{\\s*[''"]http://[^''"]*[''"]'
  severity: high
  description: "HTTP URL in href - insecure connection"
  remediation: "Use HTTPS URLs for all external links"
  cwe: "CWE-319"
  owasp: "A02:2021"

- id: react-href-protocol-relative
  languages: [javascript, typescript, jsx, tsx]
  patterns:
    - regex: 'href\\s*=\\s*\\{\\s*[''"]//[^''"]*[''"]'
  severity: low
  description: "Protocol-relative URL - inherits page protocol"
  remediation: "Specify HTTPS explicitly for external links"
  cwe: "CWE-319"
  owasp: "A02:2021"

- id: react-href-open-redirect
  languages: [javascript, typescript, jsx, tsx]
