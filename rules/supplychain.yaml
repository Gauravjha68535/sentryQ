- id: supplychain-npm-internal-public
  languages:
  - javascript
  - typescript
  patterns:
  - regex: (?i)"name":\s*"(@private|@internal|@company|@corp|@enterprise)
  - regex: (?i)npm\s+install\s+@[a-zA-Z0-9]+-[a-zA-Z0-9]+\s+--save
  severity: critical
  description: Potential dependency confusion - internal package name may be hijacked from public registry
  remediation: 'Configure .npmrc with registry scoping: @company:registry=https://npm.pkg.github.com/ or use npm login with
    proper registry authentication'
  cwe: CWE-427
  owasp: A06:2021
  confidence: 0.75
- id: supplychain-unverified-npm-source
  languages:
  - javascript
  - typescript
  patterns:
  - regex: (?i)npm\s+install\s+.*--registry\s+https?://
  - regex: (?i)"registry"\s*:\s*"http://
  - regex: (?i)\.npmrc.*registry\s*=\s*http://
  severity: high
  description: Unverified or insecure npm registry source detected
  remediation: Use official npm registry (https://registry.npmjs.org/) or verified private registries with HTTPS
  cwe: CWE-295
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-unverified-pip-source
  languages:
  - python
  patterns:
  - regex: (?i)--index-url\s+https?://
  - regex: (?i)--extra-index-url\s+https?://
  - regex: (?i)pip\.conf.*index-url\s*=\s*http://
  severity: high
  description: Unverified or custom Python package index detected
  remediation: Use official PyPI (https://pypi.org/simple/) or trusted private indexes with HTTPS
  cwe: CWE-295
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-unverified-source-generic
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  - java
  - go
  - csharp
  - dotnet
  patterns:
  - regex: (?i)(npm|pip|gem|composer|gradle|maven|nuget|go)\s+install\s+.*--from\s+http://
  - regex: (?i)source\s+["']http://
  - regex: (?i)url\s*=\s*["']http://[a-zA-Z0-9.-]+/[a-zA-Z0-9./-]+["']
  severity: high
  description: Package installation from unverified HTTP source - vulnerable to man-in-the-middle attacks
  remediation: Always use HTTPS for package sources to prevent tampering during download
  cwe: CWE-295
  owasp: A06:2021
  confidence: 0.7
- id: supplychain-insecure-install-npm
  languages:
  - javascript
  - typescript
  patterns:
  - regex: (?i)npm\s+install\s+.*--allow-root
  - regex: (?i)npm\s+install\s+.*--unsafe-perm
  - regex: (?i)npm\s+install\s+-g\s+.*--ignore-scripts
  - regex: (?i)npm\s+i\s+-[gl]\s+.*http://
  severity: high
  description: Insecure npm installation flags may allow privilege escalation or execute malicious scripts
  remediation: Avoid --allow-root, --unsafe-perm in production; use --ignore-scripts only after code review
  cwe: CWE-94
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-insecure-install-pip
  languages:
  - python
  patterns:
  - regex: (?i)pip\s+install\s+.*--trusted-host
  - regex: (?i)pip\s+install\s+.*--index-url\s+http://
  - regex: (?i)pip\s+install\s+--user\s+.*--ignore-installed
  - regex: (?i)pip\s+install\s+git\+http://
  severity: high
  description: Insecure pip installation allowing untrusted hosts or executing arbitrary code
  remediation: Use --trusted-host only for known internal repositories; prefer HTTPS everywhere
  cwe: CWE-94
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-insecure-install-script
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  patterns:
  - regex: (?i)(curl|wget).*\|sh\b
  - regex: (?i)bash\s+[-c]\s*["'].*(pip|npm|gem|composer)\s+install
  - regex: (?i)sh\s+-c\s*["'].*(pip|npm|gem|composer)\s+install
  - regex: \|\s*(sh|bash|shred)
  severity: critical
  description: Pipe installation directly to shell - extremely dangerous, allows code injection
  remediation: Never pipe curl/wget output directly to shell; download first, verify, then execute
  cwe: CWE-94
  owasp: A06:2021
  confidence: 0.7
- id: supplychain-hardcoded-url
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  - java
  - go
  - csharp
  - dotnet
  patterns:
  - regex: (?i)(https?|git)\+?(http|git|ssh)://[a-zA-Z0-9._/~-]+@[a-zA-Z0-9.-]+:[0-9]+/[a-zA-Z0-9._/-]+
  - regex: (?i)url\s*=\s*["']https?://[a-zA-Z0-9.-]+/[a-zA-Z0-9._/-]+\.(tar\.gz|zip|gem|npm|tgz|whl|jar)["']
  - regex: (?i)(npm|pip|gem|composer)\s+(install|add)\s+(git\+)?https?://github\.com/[a-zA-Z0-9-]+/[a-zA-Z0-9._-]+
  severity: medium
  description: Hardcoded package URL detected - may contain credentials or point to unverified source
  remediation: Use package manager lockfiles; if URL contains credentials, use environment variables instead
  cwe: CWE-798
  owasp: A02:2021
  confidence: 0.65
- id: supplychain-credentials-in-url
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  - java
  - go
  - csharp
  - dotnet
  patterns:
  - regex: (?i)(http|git|ssh)://[a-zA-Z0-9]+:[a-zA-Z0-9]+@[a-zA-Z0-9.-]+
  - regex: (?i)(git|https?)://[^@]+@[^/]+
  - regex: (?i)(username|password|token|api[_-]?key)\s*[:=]\s*["'][^"']+["'].*\.(json|yaml|yml|txt)
  severity: critical
  description: Credentials hardcoded in package URL - can be exposed in version control and logs
  remediation: Never embed credentials in URLs; use environment variables, secrets managers, or token-based auth
  cwe: CWE-798
  owasp: A02:2021
  confidence: 0.75
- id: supplychain-missing-integrity-npm
  languages:
  - javascript
  - typescript
  patterns:
  - regex: (?i)"integrity"\s*:\s*null
  - regex: (?i)package\.json.*\n[^}]*"integrity"\s*:\s*["']?
  - regex: (?i)\.npmrc.*(package-lock\s*=\s*false|audit\s*=\s*false)
  severity: high
  description: Missing package integrity verification - vulnerable to supply chain attacks
  remediation: Ensure package-lock.json is present and integrity hashes are verified; never disable audit
  cwe: CWE-494
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-missing-integrity-pip
  languages:
  - python
  patterns:
  - regex: (?i)pip\s+install\s+.*--no-deps
  - regex: (?i)pip\s+install\s+.*--no-verify
  - regex: (?i)Pipfile.*verify_ssl\s*=\s*false
  severity: high
  description: Disabling dependency verification in pip - vulnerable to malicious package injection
  remediation: Always verify package integrity; use pip's hash checking with hashin or pip-compile
  cwe: CWE-494
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-git-protocol
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  - java
  - go
  patterns:
  - regex: (?i)git://[a-zA-Z0-9.-]+/[a-zA-Z0-9._/-]+
  - regex: (?i)(npm|pip|gem|go)\s+install\s+git://
  - regex: (?i)git\s+clone\s+git://
  severity: high
  description: Using git:// protocol which is unencrypted - vulnerable to MITM attacks
  remediation: 'Replace git:// with https:// or use SSH keys with git@github.com: format'
  cwe: CWE-295
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-npmrc-insecure
  languages:
  - javascript
  - typescript
  patterns:
  - regex: (?i)\.npmrc.*registry\s*=\s*http://
  - regex: (?i)\.npmrc.*_auth\s*=
  - regex: (?i)\.npmrc.*(strict-ssl|verify-ssl)\s*=\s*false
  - regex: (?i)\.npmrc.*always-auth\s*=\s*true
  severity: high
  description: Insecure .npmrc configuration detected
  remediation: Use HTTPS registry, enable strict-ssl, store tokens in .npmrc using npm login or npm token
  cwe: CWE-295
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-pip-conf-insecure
  languages:
  - python
  patterns:
  - regex: (?i)pip\.conf.*index-url\s*=\s*http://
  - regex: (?i)pip\.conf.*trusted-host\s*=
  - regex: (?i)requirements\.txt.*--index-url\s+http://
  - regex: (?i)setup\.py.*install_requires.*url\s*=\s*http://
  severity: high
  description: Insecure pip configuration detected
  remediation: Use pip.conf with HTTPS index-url, never use --trusted-host for public repos
  cwe: CWE-295
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-gemfile-insecure
  languages:
  - ruby
  patterns:
  - regex: (?i)Gemfile.*source\s+["']http://
  - regex: (?i)\.gemrc.*(verify_ssl|ssl_verification)\s*:\s*false
  - regex: (?i)Bundler\.configure.*ssl_verify_mode\s*=\s*OpenSSL::SSL::VERIFY_NONE
  severity: high
  description: Insecure Ruby Gemfile or .gemrc configuration
  remediation: Use HTTPS sources in Gemfile, never disable SSL verification
  cwe: CWE-295
  owasp: A06:2021
  confidence: 0.7
- id: supplychain-composer-insecure
  languages:
  - php
  patterns:
  - regex: (?i)composer\.json.*"repositories".*http://
  - regex: (?i)composer\.json.*"secure-http"\s*:\s*false
  - regex: (?i)composer\.json.*"allow-plugins".*:\s*true
  severity: high
  description: Insecure Composer configuration in PHP
  remediation: Use HTTPS for all Composer repositories, set secure-http to true, audit plugins
  cwe: CWE-295
  owasp: A06:2021
  confidence: 0.65
- id: supplychain-cicd-unsafe-install
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  - yaml
  - json
  patterns:
  - regex: (?i)(github_actions|gitlab_ci|jenkins|circleci|azure_pipelines|bitbucket).*(npm|pip|gem|composer)\s+install\s+-g\s+
  - regex: (?i)(npm|pip)\s+install\s+.*--skip-if-installed
  - regex: (?i)RUN\s+pip\s+install\s+--no-verify
  - regex: (?i)RUN\s+npm\s+install\s+.*--global
  severity: medium
  description: CI/CD pipeline using potentially unsafe package installation
  remediation: Use specific versions in CI, avoid global installs, use caching with integrity verification
  cwe: CWE-94
  owasp: A06:2021
  confidence: 0.6
- id: supplychain-cicd-cache-poisoning
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - yaml
  patterns:
  - regex: '(?i)(cache|npm| pip | bundler).*restore_cache.*keys:'
  - regex: (?i)cache:\s*\n\s*.*paths:.*node_modules
  - regex: (?i)cache_directories:\s*\n\s*.*vendor/bundle
  severity: medium
  description: CI/CD cache may be poisoned with malicious packages
  remediation: Use content-addressable cache keys based on lockfile hashes, not just dependency names
  cwe: CWE-494
  owasp: A06:2021
  confidence: 0.55
- id: supplychain-cicd-secret-exposure
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  - yaml
  - json
  patterns:
  - regex: (?i)(NPM_TOKEN|PYPI_TOKEN|RUBYGEMS_TOKEN|COMPOSER_AUTH).*["'][^"']+["']
  - regex: (?i)env:\s*\n\s*.*(API_TOKEN|PASSWORD|SECRET).*:\s*["'][^"']+["']
  - regex: (?i)(npm|pip)\s+publish.*--password
  severity: critical
  description: CI/CD pipeline exposes package manager credentials
  remediation: Use secret management (GitHub Secrets, HashiCorp Vault) instead of environment variables in code
  cwe: CWE-798
  owasp: A02:2021
  confidence: 0.75
- id: supplychain-unmaintained-package
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  patterns:
  - regex: (?i)"(left-pad|event-stream|coinbase|crypto-js)"[^a-zA-Z]
  - regex: (?i)(request|node-uuid|rimraf|mkdirp)\s*:\s*"[^"]*"
  - regex: (?i)(bluebird|when|q|promise)\s*:\s*"[^"]*0\.[0-4]\.
  severity: medium
  description: Dependency on potentially unmaintained or abandoned package
  remediation: Check package last update date, number of maintainers, and consider migrating to actively maintained alternatives
  cwe: CWE-1104
  owasp: A06:2021
  confidence: 0.6
- id: supplychain-private-pkg-hijack
  languages:
  - javascript
  - typescript
  - python
  - ruby
  - php
  - csharp
  - dotnet
  patterns:
  - regex: (?i)npm\s+(publish|unpublish)\s+.*--public
  - regex: (?i)NuGet\.org.*(key|apikey)\s*=
  - regex: (?i)(private|npmjs\.com|nuget\.org)\s+publish\s+.*[0-9a-zA-Z]{8}
  severity: critical
  description: Potential private package name hijacking - publishing internal packages to public registries
  remediation: Use scoped packages (@company/pkg), private registries, or NuGet internal feeds
  cwe: CWE-427
  owasp: A06:2021
  confidence: 0.8
- id: supplychain-curl-pipe-bash
  languages:
  - bash
  - dockerfile
  patterns:
  - regex: (?i)(?:curl|wget)\s+(?:-[a-zA-Z]*\s+)*https?://[^\s|;]+\s*\|\s*(?:sudo\s+)?(?:bash|sh|python3?|perl|ruby)\b
  severity: critical
  description: Script downloaded and executed via curl|bash. Compromising the remote URL at build/deploy time injects malicious
    code into the CI/CD pipeline or production environment with no integrity check.
  remediation: Download the file, verify SHA256 hash against a known-good value, then execute. Pin to a specific version and
    checksum. Use package managers with lockfiles instead.
  cwe: CWE-494
  owasp: A08:2021
  confidence: 0.97
- id: supplychain-download-no-checksum
  languages:
  - bash
  - dockerfile
  patterns:
  - regex: (?i)(?:curl|wget)\s+(?:-[a-zA-Z]*O?\s+)*https?://[^\s]+
  negative_patterns:
  - regex: (?i)sha256sum|sha512sum|md5sum|gpg.*verify|cosign.*verify
  - regex: (?i)checksum|hash|verify|integrity
  severity: high
  description: Binary or script downloaded without checksum verification — supply chain compromise is undetectable.
  remediation: 'Always verify downloaded artifacts: sha256sum binary.tar.gz | grep -q ''expected_hash'' || exit 1. Use package
    managers that verify signatures by default.'
  cwe: CWE-494
  owasp: A08:2021
  confidence: 0.9
- id: supplychain-pip-no-index-pinning
  languages:
  - bash
  - dockerfile
  patterns:
  - regex: (?i)\bpip\s+install\s+[\w][\w\-\.]+
  negative_patterns:
  - regex: (?i)==[0-9]
  - regex: (?i)\\-r\\s
  - regex: (?i)--no-index
  - regex: (?i)--hash=
  - regex: (?i)--require-hashes
  severity: medium
  description: pip install without version pinning or hash verification — silent dependency upgrades can introduce malicious
    versions.
  remediation: Pin exact versions (pip install requests==2.31.0) and use hash verification (--require-hashes in requirements.txt).
    Use pip-audit to scan for known vulnerabilities.
  cwe: CWE-829
  owasp: A08:2021
  confidence: 0.85
- id: supplychain-npm-install-script-external-fetch
  languages:
  - javascript
  - typescript
  patterns:
  - regex: (?i)(?:postinstall|preinstall|install)\s*[\":]\s*[^,\\n]*(?:curl|wget|fetch|http\.)
  severity: critical
  description: npm lifecycle script (postinstall/preinstall) downloads content from external URL during package installation.
    The exact attack vector used in several high-profile supply chain attacks — code runs silently during npm install.
  remediation: Avoid postinstall scripts that fetch external content. Use --ignore-scripts flag when possible. Audit dependencies
    with npm audit and Snyk.
  cwe: CWE-494
  owasp: A08:2021
  confidence: 0.95
- id: supplychain-setup-py-exec-on-install
  languages:
  - python
  patterns:
  - regex: (?i)(?:setup\.py|setup\s*\([^)]*cmdclass)\b[^\\n]*(?:exec|eval|subprocess|os\.system)
  - regex: (?i)class\s+\w+\s*\(\s*(?:install|build_ext|develop)\s*\)\s*:[^}]*(?:exec|eval|subprocess|os\.system)
  severity: high
  description: Python package setup.py executes code during install (via exec/eval/subprocess in install hooks). Classic supply
    chain attack vector — malicious code runs during pip install on the victim's machine.
  remediation: Migrate to pyproject.toml (PEP 517/518) which has no arbitrary code execution during install. Audit any package
    using setup.py with install hooks.
  cwe: CWE-494
  owasp: A08:2021
  confidence: 0.93
