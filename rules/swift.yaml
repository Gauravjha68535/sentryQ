  languages: [swift]
  patterns:
    - regex: 'Realm\\.s*\\.\\.s*\\.''severity: medium
  description: "Realm database without encryption"
  remediation: "Use Realm encryption: Realm.Configuration(encryptionKey: key)"
  cwe: "CWE-311"
  owasp: "A02:2021"

