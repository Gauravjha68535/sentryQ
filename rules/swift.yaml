  languages: [swift]
  patterns:
    - regex: '(?i)allowsArbitraryLoads\\.s*:\\.s*true''severity: critical
  description: "ATS disabled — allows insecure HTTP connections"
  remediation: "Enable ATS. Only add exceptions for specific domains"
  cwe: "CWE-295"
  owasp: "A07:2021"

- id: swift-print-sensitive
  languages: [swift]
  patterns:
    - regex: '(?i)print\\.s*\\.\\.s*.*(?:password|token|secret|apiKey|credential)''severity: high
  description: "Sensitive data in print() — visible in device logs"
  remediation: "Remove sensitive data from print statements"
  cwe: "CWE-532"
  owasp: "A09:2021"

