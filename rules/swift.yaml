- id: swift-hardcoded-password
  languages: [swift]
  patterns:
    - regex: '(?i)(password|passwd|pwd)\\.s*=\\.s*['''\\.][^''\\.]{8,}[''\\.]'
  severity: high
  description: "Hardcoded password detected in Swift source code"
  remediation: "Use Keychain or environment variables for sensitive credentials"

- id: swift-hardcoded-api-key
  languages: [swift]
  patterns:
    - regex: '(?i)(api[_-]?key|apikey)\\.s*=\\.s*['''\\.][a-zA-Z0-9]{16,}[''\\.]'
  severity: high
  description: "Hardcoded API key detected in Swift source code"
  remediation: "Store API keys in Keychain or use a secure configuration system"

# Insecure NSUserDefaults
- id: swift-insecure-userdefaults
  languages: [swift]
  patterns:
    - regex: 'UserDefaults\\..standard\\..set\\.s*\\.(.*password|UserDefaults\\..standard\\..set\\.s*\\.(.*token|UserDefaults\\..standard\\..set\\.s*\\.(.*secret''severity: high
  description: "Sensitive data stored in UserDefaults (not secure)"
  remediation: "Use Keychain for storing passwords and sensitive credentials"

# Weak Cryptography
- id: swift-weak-crypto-md5
  languages: [swift]
  patterns:
    - regex: '(?i)(CC_MD5|CommonCrypto.*MD5|Insecure.MD5)''severity: medium
  description: "Use of weak cryptographic hash function (MD5)"
  remediation: "Use CryptoKit's SHA256 or SHA512 for hashing"

# Insecure HTTP
- id: swift-insecure-http
  languages: [swift]
  patterns:
    - regex: 'http://[^'''\\.\\.s]+'
  severity: low
  description: "Insecure HTTP URL detected (should use HTTPS)"
  remediation: "Use HTTPS for all network requests to ensure encryption in transit"

# ATS Disabled
- id: swift-ats-disabled
  languages: [swift]
  patterns:
    - regex: '(?i)NSAllowsArbitraryLoads\\.s*=\\.s*true''severity: high
  description: "App Transport Security disabled - allows insecure HTTP connections"
  remediation: "Enable ATS or specify allowed domains explicitly in Info.plist"

# Code Injection
- id: swift-code-injection
  languages: [swift]
  patterns:
    - regex: 'NSPredicate\\.s*\\.(format:\\.s*['''\\.].*%@.*[''\\.]'
  severity: medium
  description: "Potential code injection via NSPredicate format string"
  remediation: "Use parameterized NSPredicate with %K for key names and %? for values"

# Jailbreak Detection Bypass
- id: swift-jailbreak-check-missing
  languages: [swift]
  patterns:
    - regex: '(?i)(canOpenURL|fileExistsAtPath).*jailbreak''severity: low
  description: "Jailbreak detection logic detected - ensure it's properly implemented"
  remediation: "Implement comprehensive jailbreak detection using multiple checks"

# Hardcoded Bundle Identifier
- id: swift-hardcoded-bundle-id
  languages: [swift]
  patterns:
    - regex: 'Bundle\\..main\\..bundleIdentifier\\.s*==\\.s*['''\\.][^''\\.]+[''\\.]'
  severity: low
  description: "Hardcoded bundle identifier comparison"
  remediation: "Use configuration files or environment variables for environment-specific values"

# Insecure Keychain Usage
- id: swift-insecure-keychain
  languages: [swift]
  patterns:
    - regex: '(?i)kSecAttrAccessible\\.s*=\\.s*kSecAttrAccessibleAlways''severity: medium
  description: "Keychain item accessible even when device is locked"
  remediation: "Use kSecAttrAccessibleWhenUnlocked or kSecAttrAccessibleWhenPasscodeSetThisDeviceOnly"

# Biometric Authentication Bypass
- id: swift-biometric-bypass
  languages: [swift]
  patterns:
    - regex: '(?i)LAContext\\..evaluatePolicy.*fallbackString\\.s*=\\.s*['''\\.]skip[''\\.]'
  severity: high
  description: "Biometric authentication can be bypassed with skip option"
  remediation: "Remove skip/fallback options from biometric authentication"

# SQL Injection (CoreData/SQLite)
- id: swift-sql-injection
  languages: [swift]
  patterns:
    - regex: '(?i)(NSFetchRequest|executeQuery)\\.s*\\.([^\\.)]*\\.+[^\\.)]+''severity: critical
  description: "Potential SQL injection via string concatenation"
  remediation: "Use parameterized queries with ? placeholders"

# Command Injection
- id: swift-command-injection
  languages: [swift]
  patterns:
    - regex: '(?i)(Process|NSTask)\\.s*\\.([^\\.)]*\\.+[^\\.)]+''severity: critical
  description: "Potential command injection via Process with string concatenation"
  remediation: "Pass command arguments as separate parameters, not concatenated strings"

# Insecure WebView
- id: swift-insecure-webview
  languages: [swift]
  patterns:
    - regex: '(?i)allowsBackForwardNavigationGestures\\.s*=\\.s*true|javaScriptEnabled\\.s*=\\.s*true''severity: medium
  description: "WebView configured with potentially insecure settings"
  remediation: "Disable JavaScript if not needed, implement proper WKScriptMessageHandler"

# Hardcoded Encryption Key
- id: swift-hardcoded-encryption-key
  languages: [swift]
  patterns:
    - regex: '(?i)(key|iv|secret)\\.s*=\\.s*['''\\.][a-zA-Z0-9+/=]{16,}[''\\.]'
  severity: critical
  description: "Hardcoded encryption key or IV detected"
  remediation: "Generate keys dynamically or store in Keychain/Secure Enclave"

# Debug Logging
- id: swift-debug-logging
  languages: [swift]
  patterns:
    - regex: '(?i)print\\.s*\\.([^\\.)]*password|print\\.s*\\.([^\\.)]*token|print\\.s*\\.([^\\.)]*secret''severity: medium
  description: "Sensitive data logged via print() statements"
  remediation: "Remove or obfuscate sensitive data in log statements for production"

# Unsafe Deserialization
- id: swift-unsafe-codable
  languages: [swift]
  patterns:
    - regex: '(?i)try\\.s*JSONDecoder\\.(\\.)\\..decode\\.s*\\.([^\\.)]*from:\\.s*Data\\.(\\.s*contentsOf''severity: medium
  description: "Deserializing from untrusted external data source"
  remediation: "Validate and sanitize external data before decoding"

# Certificate Pinning Missing
- id: swift-cert-pinning-missing
  languages: [swift]
  patterns:
    - regex: '(?i)URLSessionDelegate|didReceive\\.s*challenge.*completionHandler\\.s*\\.(\\..useCredential''severity: medium
  description: "SSL certificate validation may be bypassed"
  remediation: "Implement proper certificate pinning for sensitive connections"

# TouchID/FaceID Fallback
- id: swift-biometric-fallback-weak
  languages: [swift]
  patterns:
    - regex: '(?i)localizedFallback\\.s*=\\.s*['''\\.]Use Password[''\\.]'
  severity: low
  description: "Biometric authentication has weak password fallback"
  remediation: "Use strong passcode fallback or require biometric for sensitive operations"
