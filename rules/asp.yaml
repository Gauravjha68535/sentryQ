- id: aspnet-xxe-xml-reader
  languages: [csharp, aspnet]
  patterns:
    - regex: 'XmlReaderSettings\\..DtdProcessing\\.s=\\.sDtdProcessing\\..Parse''severity: high
  description: "XML parsing may be vulnerable to XXE attacks"
  remediation: "Set DtdProcessing = Prohibit"
  cwe: "CWE-611"
  owasp: "A05:2021"

