  description: "SQL injection via string concatenation in ADO.NET"
  remediation: "Use SqlParameter with parameterized queries"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: aspnet-sql-injection-interpolation
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)(SqlCommand|ExecuteReader)\\.s*\\.(\\.s*\\.$\\.''severity: critical
  description: "SQL injection via C# string interpolation in SQL command"
  remediation: "Never use string interpolation for SQL"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: aspnet-ef-raw-sql
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)(FromSqlRaw|ExecuteSqlRaw)\\.s*\\.(\\.s*\\.$\\.|FromSqlRaw\\.s*\\.([^)]*\\.+''severity: critical
  description: "Entity Framework raw SQL with user input"
  remediation: "Use FromSqlInterpolated or parameterized FromSqlRaw"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: aspnet-xss-html-raw
