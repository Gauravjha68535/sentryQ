  cwe: "CWE-79"
  owasp: "A03:2021"

- id: aspnet-xss-response-write
  languages: [csharp, aspnet]
  patterns:
    - regex: 'Response\\..Write\\.s*\\.(\\.s*Request\\.[''severity: high
  description: "XSS via direct output of request parameters"
  remediation: "Use HttpUtility.HtmlEncode on user input"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: aspnet-csrf-disabled
