- id: asp-sql-injection-execute
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)(conn\\..execute|rs\\..open)\\.s*\\.([^\\.)]*\\.&[^\\.)]+\\.)''severity: critical
  description: "Potential SQL injection via string concatenation in ASP"
  remediation: "Use parameterized queries: cmd.Parameters.Append cmd.CreateParameter(...)"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: asp-command-injection-exec
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)exec\\.s*\\.([^\\.)]*\\.&[^\\.)]+\\.)''severity: critical
  description: "Potential command injection via Exec() with user input"
  remediation: "Avoid Exec(). Validate and whitelist allowed commands"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: asp-xss-response-write
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Response\\..Write\\.s*\\.([^\\.)]*Request\\..''severity: high
  description: "Direct output of user input via Response.Write may cause XSS"
  remediation: "Use Server.HTMLEncode() on user input before Response.Write"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: asp-path-traversal-server-mappath
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Server\\..MapPath\\.s*\\.([^\\.)]*Request\\..''severity: high
  description: "Potential path traversal via Server.MapPath with user input"
  remediation: "Validate file paths against allowlist. Use fixed base directories"
  cwe: "CWE-22"
  owasp: "A01:2021"

- id: asp-hardcoded-password
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)(password|passwd)\\.s*=\\.s*['''\\.][^''\\.]{8,}[''\\.]'
  severity: high
  description: "Hardcoded password detected in ASP source code"
  remediation: "Store credentials in encrypted config files or use Windows Authentication"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: asp-weak-session-timeout
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Session\\..Timeout\\.s*=\\.s*\\.d{4,}''severity: medium
  description: "Excessively long session timeout increases session hijacking risk"
  remediation: "Set Session.Timeout to 20 minutes or less for sensitive applications"
  cwe: "CWE-613"
  owasp: "A01:2021"

- id: asp-insecure-cookie-httponly
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Response\\..Cookies\\.([^\\.)]+\\.)\\.s*=\\.s*[^;]''severity: medium
  description: "Cookie set without HttpOnly flag is vulnerable to XSS theft"
  remediation: "Always set HttpOnly and Secure flags: Response.Cookies(...).HttpOnly = True"
  cwe: "CWE-614"
  owasp: "A01:2021"

- id: asp-unsafe-deserialization
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)LoadFromStream|ExecuteGlobal''severity: high
  description: "Use of ExecuteGlobal or unsafe deserialization can execute arbitrary code"
  remediation: "Avoid ExecuteGlobal. Validate and parse input safely"
  cwe: "CWE-502"
  owasp: "A08:2021"

- id: asp-debug-enabled
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)@\\.sENABLED\\.s=\\.s*['''\\.]?debug[''\\.]?'
  severity: low
  description: "Debug mode enabled in ASP page may leak sensitive information"
  remediation: "Disable debug mode in production: @ENABLED = False"
  cwe: "CWE-209"
  owasp: "A05:2021"

- id: asp-error-disclosure
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Response\\..Write\\.s*\\.([^\\.)]*Err\\..''severity: medium
  description: "Output of error details may leak sensitive information"
  remediation: "Log errors server-side. Show generic error messages to users"
  cwe: "CWE-209"
  owasp: "A05:2021"

- id: asp-request-querystring
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Request\\..(QueryString|Form|Cookies|ServerVariables)\\.s*\\.(''severity: medium
  description: "Direct request data access — ensure sanitization"
  remediation: "Validate and encode all user input from Request object"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: asp-response-write-request
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Response\\..Write\\.s*.*Request\\..''severity: high
  description: "Response.Write with request data — reflected XSS"
  remediation: "Use Server.HTMLEncode() before writing user input"
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: asp-ldap-server
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)(LDAP|IPWorksASP\\..LDAP|Server\\..CreateObject.*LDAP)''severity: high
  description: "LDAP operations in ASP — injection risk"
  remediation: "Sanitize all LDAP query parameters"
  cwe: "CWE-90"
  owasp: "A03:2021"

- id: asp-server-createobject
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Server\\..CreateObject\\.s*\\.(''severity: medium
  description: "Server.CreateObject — ensure object type is safe"
  remediation: "Restrict allowed COM objects. Validate object names"
  cwe: "CWE-94"
  owasp: "A03:2021"

- id: asp-execute
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)(Server\\..Execute|Server\\..Transfer|Execute)\\.s*\\.(''severity: high
  description: "Server.Execute/Transfer — file inclusion risk"
  remediation: "Use allowlist for executed files. Never use user input"
  cwe: "CWE-98"
  owasp: "A03:2021"

- id: asp-int32-parse-request
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Int32\\..Parse\\.s*\\.(\\.s*Request\\..''severity: medium
  description: "Parsing request data as integer — input validation"
  remediation: "Use Int32.TryParse() and validate range"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: asp-adodb-stream-type
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)Adodb\\..Stream.*\\..Type\\.s*=\\.s*1''severity: medium
  description: "Adodb.Stream binary type usage may allow file upload vulnerabilities"
  remediation: "Validate file extensions and MIME types strictly"
  cwe: "CWE-434"
  owasp: "A01:2021"

- id: asp-fso-delete
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)FileSystemObject\\..DeleteFile|\\..DeleteFolder''severity: high
  description: "FileSystemObject Delete operations detected"
  remediation: "Ensure path is hardcoded or strictly validated. Never use user input"
  cwe: "CWE-73"
  owasp: "A01:2021"

- id: asp-fso-copy
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)FileSystemObject\\..CopyFile|\\..CopyFolder''severity: high
  description: "FileSystemObject Copy operations detected"
  remediation: "Validate source and destination paths strictly"
  cwe: "CWE-73"
  owasp: "A01:2021"

- id: asp-include-virtual
  languages: [asp, vbscript]
  patterns:
    - regex: '(?i)<!--\\.s*#include\\.s+virtual=\\.\"[^\\.\"]*\\.\"''severity: medium
  description: "Virtual Include detected — ensure path is not user controlled"
  remediation: "Use fixed paths for includes. Do not construct include paths dynamically"
  cwe: "CWE-98"
  owasp: "A03:2021"

# --- ASP.NET (C#) - CORE VULNERABILITIES (21-40) ---

- id: aspnet-sql-injection-string-concat
  languages: [csharp, aspnet]
  patterns:
