  owasp: "A01:2021"

- id: aspnet-command-injection
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)Process\\..Start\\.s*\\.(\\.s*[^)]*\\.+|ProcessStartInfo.Arguments.\\.+''severity: critical
  description: "Command injection via Process.Start with concatenated user input"
  remediation: "Validate and sanitize inputs. Use argument arrays"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: aspnet-path-traversal
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)(File\\..Read|File\\..Open|StreamReader).*Request\\.[''severity: high
  description: "Path traversal via user-controlled file path"
  remediation: "Validate paths with Path.GetFullPath"
  cwe: "CWE-22"
  owasp: "A01:2021"

- id: aspnet-ssrf
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)(HttpClient|WebClient|WebRequest)\\..\\.(\\.s[^)]*Request\\.[''severity: high
  description: "Server-Side Request Forgery via user-controlled URL"
  remediation: "Validate URLs against an allowlist"
  cwe: "CWE-918"
  owasp: "A10:2021"

- id: aspnet-cors-wildcard
  languages: [csharp, aspnet]
  patterns:
    - regex: 'AllowAnyOrigin\\.s*\\.(\\.)|WithOrigins\\.s*\\.(\\.s* \\.\\.*\\. ''severity: medium
  description: "CORS configured to allow any origin"
  remediation: "Specify allowed origins explicitly"
  cwe: "CWE-942"
  owasp: "A05:2021"

- id: aspnet-hardcoded-connection-string
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)(connectionstring|ConnectionString)\\.s*=\\.s* \\.[^\\. ] [Pp]assword=[^\\. ]\\. ''severity: high
  description: "Database connection string with hardcoded password"
  remediation: "Use Azure Key Vault or User Secrets"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: aspnet-hardcoded-secret-appsettings
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)(ApiKey|Secret|Password|Token)\\.s*[=:]\\.s*\\.[^\\.]{8,}\\.''severity: high
  description: "Hardcoded secret detected in configuration or source code"
  remediation: "Use environment variables or key vault"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: aspnet-weak-crypto
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)(MD5|SHA1|MD5CryptoServiceProvider|SHA1CryptoServiceProvider|DES)''severity: medium
  description: "Use of weak or deprecated cryptographic algorithm"
  remediation: "Use SHA256, SHA512, or AES"
  cwe: "CWE-327"
  owasp: "A02:2021"

- id: aspnet-debug-enabled
  languages: [csharp, aspnet]
  patterns:
    - regex: '(?i)UseDeveloperExceptionPage|app\\..UseDatabaseErrorPage''severity: medium
  description: "Developer exception page or detailed errors enabled"
  remediation: "Use app.UseExceptionHandler in production"
  cwe: "CWE-209"
  owasp: "A05:2021"

- id: aspnet-open-redirect
  languages: [csharp, aspnet]
  patterns:
    - regex: 'Redirect\\.s*\\.(\\.sRequest\\.[|RedirectToAction\\.s\\.([^)]*returnUrl''severity: high
  description: "Open redirect vulnerability via user-controlled URL"
  remediation: "Use Url.IsLocalUrl() to validate redirect URLs"
  cwe: "CWE-601"
