  confidence: 0.55
- id: csharp-sqli-source-sqlcommand-request
  languages:
  - csharp
  patterns:
  - regex: (?i)new\s+SqlCommand\s*\([^)]*\+\s*Request\[
  - regex: (?i)new\s+SqlCommand\s*\(\s*[\"'][^\"']*(?:SELECT|INSERT|UPDATE|DELETE)[^\"']*[\"']\s*\+\s*Request\.
  negative_patterns:
  - regex: (?i)Parameters\.(?:Add|AddWithValue)\s*\(
  severity: critical
  description: 'SQL injection: HTTP Request parameter concatenated directly into SqlCommand. Attacker can dump the database.'
  remediation: 'Use SqlParameter: cmd.Parameters.AddWithValue(''@id'', Request[''id'']); with parameterized CommandText.'
  cwe: CWE-89
  owasp: A03:2021
  confidence: 0.97
- id: csharp-xss-source-response-request
