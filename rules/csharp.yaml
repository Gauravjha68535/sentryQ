  confidence: 0.95
- id: csharp-open-redirect-source-request
  languages:
  - csharp
  patterns:
  - regex: (?i)Response\.Redirect\s*\([^)]*Request\[
  - regex: (?i)return\s+Redirect\s*\([^)]*Request\[
