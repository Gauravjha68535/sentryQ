- id: cs-reflection-rce
  languages: [csharp]
  patterns:
    - regex: '(?s)(?:Type\.GetType|Assembly\.Load|GetMethod)[\s\S]{0,500}\.Invoke\s*\(''severity: critical
  description: "Potential Reflection-based RCE: Dynamic type loading or method retrieval followed by Invoke(). User-controlled input here allows arbitrary code execution."
  remediation: "Avoid using reflection with non-constant type or method names. Use an allowlist if dynamic invocation is required."
  cwe: "CWE-94"
  owasp: "A03:2021"

- id: cs-binaryformatter-deserialize
  languages: [csharp]
  patterns:
    - regex: 'BinaryFormatter\.Deserialize''severity: critical
  description: "Insecure BinaryFormatter deserialization"
  remediation: "Validate inputs and use secure APIs."
  cwe: "CWE-502"
  owasp: "A03:2021"

