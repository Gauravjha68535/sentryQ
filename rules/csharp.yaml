- id: csharp-aspx-viewstate-mac
  languages:
  - csharp
  patterns:
  - regex: (?i)EnableViewStateMac\s*=\s*[\\\"'\]false[\\\"'\]]
  severity: critical
  description: ViewState MAC validation is disabled. This allows attackers to forge ViewState data, potentially leading to
    Remote Code Execution via deserialization.
  remediation: Set EnableViewStateMac="true" or remove the attribute entirely (it defaults to true in modern frameworks).
  cwe: CWE-502
  owasp: A08:2021
  confidence: 0.7
- id: csharp-aspx-literal-passthrough
  languages:
