  patterns:
  - regex: (?i)<asp:Literal[^>]*Mode\s*=\s*[\\\"'\]PassThrough[\\\"'\]]
  severity: critical
  description: asp:Literal is set to PassThrough mode. Any user-controlled data assigned to this control will be rendered
    raw, leading to direct Stored/Reflected XSS.
  remediation: Change Mode to 'Encode' or 'Transform'.
  cwe: CWE-79
  owasp: A03:2021
  confidence: 0.7
- id: csharp-reflection-rce
  languages:
  - csharp
  patterns:
  - regex: (?i)MethodInfo\.Invoke\([^,]+,\s*new\s*object\[\]\s*\{\s*(?:Request|Request\.QueryString|Request\.Form)\[\]
  severity: critical
  description: Reflection API (MethodInfo.Invoke) called with parameters directly from an HTTP Request, enabling Remote Code
    Execution.
  remediation: Do not pass user-controlled data directly into Reflection APIs. Use a strict allowlist mapping.
  cwe: CWE-470
  owasp: A08:2021
  confidence: 0.8
- id: csharp-session-assignment-idor
  languages:
  - csharp
  patterns:
  - regex: (?i)Session\[\s*["'][^"']+["']\s*\]\s*=\s*(?:Request|Request\.QueryString|Request\.Form)\[\]
  severity: high
  description: Sensitive server-side session variables are assigned directly from user request parameters, allowing state
    tampering/privilege escalation.
  remediation: Validate and authorize all state transitions before updating the Session object.
  cwe: CWE-565
  owasp: A01:2021
  confidence: 0.75
