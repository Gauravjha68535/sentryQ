# SentryQ Security Rules — Side-Channel & Timing Attacks
# Covers: Non-constant-time comparisons, timing leaks, cache-based attacks

# ======================== Non-Constant-Time String Comparisons ========================

- id: timing-string-comparison-secret
  languages: [javascript, typescript, python, ruby, php, go, java, csharp]
  patterns:
    - regex: '(?i)(?:token|secret|password|hash|signature|hmac|digest|api[_-]?key|auth[_-]?token)\s*(?:===?|==|\.equals\(|!=|!==)'
    - regex: '(?i)if\s*\(\s*(?:token|secret|password|hash|hmac|signature|digest)\s*(?:===?|!==?)\s*'
  severity: high
  description: "Secret/token compared using non-constant-time operator (==, ===, .equals) — vulnerable to timing attacks that leak the correct value byte-by-byte."
  remediation: "Use constant-time comparison: crypto.timingSafeEqual() (Node), hmac.compare_digest() (Python), ActiveSupport::SecurityUtils.secure_compare (Ruby), hash_equals() (PHP)."
  cwe: "CWE-208"
  owasp: "A02:2021-Cryptographic Failures"

- id: timing-hmac-comparison
  languages: [javascript, typescript, python, ruby, php, go, java, csharp]
  patterns:
    - regex: '(?i)(?:hmac|mac|signature|digest).*(?:===?|==|\.equals\(|\.toString\(\)\s*===?)'
    - regex: '(?i)(?:computed[_-]?(?:hash|hmac|mac|signature)).*(?:===?|==)\s*(?:expected|received|provided|given)'
  severity: critical
  description: "HMAC/MAC/signature verified using timing-unsafe comparison — attacker can forge valid signatures via timing oracle."
  remediation: "Use crypto.timingSafeEqual(Buffer.from(a), Buffer.from(b)) or language-specific constant-time compare."
  cwe: "CWE-208"
  owasp: "A02:2021-Cryptographic Failures"

# ======================== Password Comparison ========================

- id: timing-password-comparison-direct
  languages: [javascript, typescript, python, ruby, php, go, java, csharp]
  patterns:
    - regex: '(?i)(?:stored[_-]?password|db[_-]?password|user\.password|hashed[_-]?password)\s*(?:===?|==|\.equals\()\s*(?:input|provided|submitted|req\.|request\.|body\.|params\.)'
  severity: critical
  description: "Password compared directly without hashing or with timing-unsafe comparison — vulnerable to timing attack and plaintext comparison."
  remediation: "Use bcrypt.compare(), argon2.verify(), or scrypt with built-in constant-time comparison."
  cwe: "CWE-208"
  owasp: "A02:2021-Cryptographic Failures"

# ======================== Branching on Secrets ========================

- id: timing-early-return-on-auth
  languages: [javascript, typescript, python, ruby, php, go, java, csharp]
  patterns:
    - regex: '(?i)if\s*\(\s*(?:username|user|email)\s*(?:===?|==|\.equals)\s*[^)]+\)\s*\{\s*(?:return|throw|res\.status)'
    - regex: '(?i)if\s*\(\s*!?\s*(?:find[_-]?user|get[_-]?user|User\.find|db\.users)\s*\([^)]*\)\s*\)\s*\{\s*(?:return|throw|res\.status\(\s*(?:401|403))' 
  severity: medium
  description: "Authentication returns early for invalid users vs invalid passwords — timing difference reveals valid usernames."
  remediation: "Always perform the full password verification even for non-existent users. Return the same error message and take the same time."
  cwe: "CWE-208"
  owasp: "A07:2021-Identification and Authentication Failures"

- id: timing-conditional-sleep-secret
  languages: [javascript, typescript, python, ruby, php, go, java, csharp]
  patterns:
    - regex: '(?i)(?:sleep|setTimeout|time\.sleep|Thread\.sleep|usleep)\s*\([^)]*\)\s*(?:if|unless)\s*.*(?:password|token|secret|key)'
    - regex: '(?i)if\s*.*(?:password|token|secret).*\{[^}]*(?:sleep|setTimeout|delay|Thread\.sleep)'
  severity: medium
  description: "Conditional delay based on secret comparison — creates a timing side-channel."
  remediation: "Use constant-time operations. Add uniform delay regardless of comparison result."
  cwe: "CWE-208"
  owasp: "A02:2021-Cryptographic Failures"

# ======================== Cryptographic Timing Leaks ========================

- id: timing-rsa-no-blinding
  languages: [java, csharp, python, go]
  patterns:
    - regex: '(?i)RSA(?:PrivateKey|\.decrypt|Cipher).*(?:NoPadding|ECB|PKCS1)'
    - regex: '(?i)Cipher\.getInstance\s*\(\s*["\x27]RSA/(?:ECB|NONE)/(?:NoPadding|PKCS1Padding)["\x27]'
  severity: high
  description: "RSA decryption without blinding/OAEP padding — vulnerable to Bleichenbacher/Manger timing attacks."
  remediation: "Use RSA-OAEP padding. Avoid PKCS#1 v1.5 padding for encryption."
  cwe: "CWE-385"
  owasp: "A02:2021-Cryptographic Failures"

- id: timing-modular-exponentiation
  languages: [python, java, go, csharp]
  patterns:
    - regex: '(?i)pow\s*\(\s*\w+\s*,\s*(?:private|secret|key|exponent)\s*,\s*\w+\s*\)'
    - regex: '(?i)modPow\s*\(\s*(?:private|secret|exponent)'
  severity: medium
  description: "Custom modular exponentiation with secret exponent — may leak bits via execution time differences."
  remediation: "Use library-provided constant-time modular exponentiation. Never implement your own."
  cwe: "CWE-385"
  owasp: "A02:2021-Cryptographic Failures"

# ======================== Information Leaks via Timing ========================

- id: timing-database-user-enumeration
  languages: [javascript, typescript, python, ruby, php, go, java, csharp]
  patterns:
    - regex: '(?i)(?:User|Account|Member)\.find(?:One|ByEmail|ByUsername|ById)\s*\([^)]+\)\s*\.then\s*\(\s*(?:user|account)\s*=>\s*\{\s*if\s*\(\s*!(?:user|account)\s*\)'
  severity: medium
  description: "User lookup with early return on not-found — database query time reveals whether accounts exist."
  remediation: "Perform dummy password hash comparison for non-existent users to equalize response time."
  cwe: "CWE-203"
  owasp: "A07:2021-Identification and Authentication Failures"

- id: timing-error-message-differs
  languages: [javascript, typescript, python, ruby, php, go, java, csharp]
  patterns:
    - regex: '(?i)(?:invalid username|user not found|unknown user|no such user|account does not exist)'
    - regex: '(?i)(?:incorrect password|wrong password|invalid password|password mismatch)'
  severity: medium
  description: "Different error messages for invalid username vs invalid password — enables username enumeration."
  remediation: "Use a generic message: 'Invalid credentials' for both cases."
  cwe: "CWE-203"
  owasp: "A07:2021-Identification and Authentication Failures"

# ======================== Cache-Based Side Channels ========================

- id: timing-cache-lookup-secret
  languages: [javascript, typescript, python, ruby, php, go, java, csharp]
  patterns:
    - regex: '(?i)(?:cache|redis|memcached)\.get\s*\(\s*(?:token|session[_-]?id|api[_-]?key)\s*\)\s*(?:\.then|await)?\s*\(?\s*(?:result|value|cached)\s*(?:=>|,)?\s*\{?\s*if\s*\(\s*!?(?:result|value|cached)'
  severity: low
  description: "Cache hit/miss for secret lookup creates timing difference — may reveal valid tokens."
  remediation: "Add constant-time delay after cache lookups, or always query the database as fallback."
  cwe: "CWE-208"
  owasp: "A02:2021-Cryptographic Failures"
