# ======================== XSS - JAVASCRIPT PROTOCOLS (31-50) ========================

- id: html-href-javascript
  languages: [html]
  patterns:
    - regex: |-
        (?i)(href|src|action|formaction|data|poster|background|cite|longdesc|usemap)\s*=\s*["']\s*javascript:
  severity: high
  description: "JavaScript protocol in URL attribute - XSS vulnerability"
  remediation: "Never use javascript: URLs. Use proper event handlers or navigation."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: html-href-javascript-encoded
  languages: [html]
  patterns:
    - regex: |-
        (?i)(href|src|action|formaction)\s*=\s*["']\s*(&#[jJ]|&#[xX]?[0-9A-Fa-f]+;?)?\s*j[\s\x00-\x20]*a[\s\x00-\x20]*v[\s\x00-\x20]*a[\s\x00-\x20]*s[\s\x00-\x20]*c[\s\x00-\x20]*r[\s\x00-\x20]*i[\s\x00-\x20]*p[\s\x00-\x20]*t
  severity: high
  description: "Encoded/obfuscated javascript: protocol - XSS evasion attempt"
  remediation: "Block all javascript: URLs regardless of encoding. Use allowlist for safe URLs."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: html-href-vbscript
  languages: [html]
  patterns:
    - regex: |-
        (?i)(href|src|action)\s*=\s*["']\s*vbscript:
  severity: high
  description: "VBScript protocol in URL (IE only) - XSS vulnerability"
  remediation: "Remove VBScript URLs. Use JavaScript alternatives."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: html-href-data
  languages: [html]
  patterns:
    - regex: |-
        (?i)(href|src|action|formaction)\s*=\s*["']\s*data:\s*text/(html|javascript)
  severity: high
  description: "Data URI with executable content - XSS risk"
  remediation: "Validate data URIs. Block script-executing data URIs."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: html-href-data-html
  languages: [html]
  patterns:
    - regex: |-
        (?i)(href|src)\s*=\s*["']\s*data:\s*text/html
  severity: high
  description: "Data URI containing HTML - XSS risk"
  remediation: "Block HTML data URIs. Use trusted sources only."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: html-href-data-base64-html
  languages: [html]
  patterns:
    - regex: |-
        (?i)(href|src)\s*=\s*["']\s*data:\s*text/html;base64
  severity: high
  description: "Base64-encoded HTML in data URI - XSS risk"
  remediation: "Block base64 HTML data URIs. Decode and validate if absolutely needed."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: html-href-javascript-in-meta
  languages: [html]
