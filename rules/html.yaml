# ======================== XSS - DOM SINKS (51-70) ========================

- id: html-dom-innerhtml
  languages: [javascript, typescript, vue, react, angular]
  patterns:
    - regex: |-
        \.innerHTML\s*=
  severity: high
  description: "Direct innerHTML assignment - XSS vulnerability if content contains user input"
  remediation: "Use textContent for text, or sanitize with DOMPurify before innerHTML assignment."
  cwe: "CWE-79"
  owasp: "A03:2021"

- id: html-dom-outerhtml
  languages: [javascript, typescript]
  patterns:
    - regex: |-
        \.outerHTML\s*=
  severity: high
  description: "outerHTML assignment - XSS vulnerability, also replaces entire element"
  remediation: "Avoid outerHTML with user input. Use DOM manipulation methods instead."
  cwe: "CWE-79"
