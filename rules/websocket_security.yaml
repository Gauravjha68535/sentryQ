- id: ws-missing-origin-check
  languages:
  - javascript
  - typescript
  - python
  - go
  - ruby
  - java
  patterns:
  - regex: (?i)(?:new\s+WebSocket\s*\(|ws\.on\s*\([\"']connection[\"']|websocket\.accept\s*\()
  negative_patterns:
  - regex: (?i)origin|allowedOrigins|allowed_origins|CORS
  severity: high
  description: WebSocket connection handler missing Origin header validation — enables cross-site WebSocket hijacking.
  remediation: Implement verifyClient callback to check request.headers.origin against an allowlist.
  cwe: CWE-346
  owasp: A01:2021-Broken Access Control
  confidence: 0.85
- id: ws-origin-wildcard
  languages:
  - javascript
  - typescript
  - python
  - go
  - ruby
  - java
  patterns:
  - regex: (?i)(?:allowedOrigins|cors[_-]?origins?|origins?)\s*[=:]\s*["\x27]\*["\x27]
  - regex: (?i)cors\s*[=:]\s*\{[^}]*origin\s*:\s*(?:true|["\x27]\*["\x27])
  - regex: (?i)Access-Control-Allow-Origin.*\*
  severity: critical
  description: WebSocket allows connections from any origin (*) — any malicious website can connect to your WebSocket server.
  remediation: 'Restrict origins to specific trusted domains: origins: [''https://example.com''].'
  cwe: CWE-942
  owasp: A01:2021-Broken Access Control
  confidence: 0.75
- id: ws-origin-check-bypass
  languages:
  - javascript
  - typescript
  patterns:
  - regex: (?i)verifyClient\s*[:=]\s*(?:function|\([^)]*\)\s*=>)\s*\{[^}]*return\s+true
  - regex: (?i)verifyClient\s*[:=]\s*\(\s*\)\s*=>\s*true
  severity: critical
  description: WebSocket verifyClient always returns true — origin check is bypassed.
  remediation: Validate info.origin or info.req.headers.origin in verifyClient callback.
  cwe: CWE-346
  owasp: A01:2021-Broken Access Control
  confidence: 0.8
- id: ws-no-auth-on-connection
  languages:
  - javascript
  - typescript
  - python
  - go
  patterns:
  - regex: (?i)ws\.on\s*\([\"']connection[\"']|websocket\.accept\s*\(
  negative_patterns:
  - regex: (?i)auth|token|session|cookie|jwt|bearer
  severity: high
  description: WebSocket connection handler without authentication — unauthenticated users can connect.
  remediation: Verify authentication token/session in the connection handler or upgrade request before accepting.
  cwe: CWE-306
  owasp: A07:2021-Identification and Authentication Failures
  confidence: 0.8
- id: ws-token-in-url
  languages:
  - javascript
  - typescript
  - python
  - go
  - ruby
  patterns:
  - regex: (?i)new\s+WebSocket\s*\(\s*["\x27`]wss?://[^"\x27`]*\?.*(?:token|jwt|auth|key|session)=
  - regex: (?i)ws[s]?\s*://.*\?(?:token|auth_token|jwt|api_key)=
  severity: high
  description: WebSocket auth token passed in URL query string — visible in server logs, proxy logs, and browser history.
  remediation: Send auth token in the first WebSocket message after connection, or use cookies/headers during upgrade.
  cwe: CWE-598
  owasp: A07:2021-Identification and Authentication Failures
  confidence: 0.75
- id: ws-message-no-validation
  languages:
  - javascript
  - typescript
  - python
  - go
  patterns:
  - regex: (?i)(?:ws|socket|connection)\.on\s*\(\s*["\x27]message["\x27]\s*,\s*(?:function|\([^)]*\)\s*=>)\s*\{[^}]*JSON\.parse\s*\([^)]+\)[^}]*(?:eval|exec|query|sql|command|child_process)
  severity: critical
  description: WebSocket message parsed and used directly in dangerous sinks (eval, SQL, exec) without validation.
  remediation: Validate and sanitize all WebSocket message data. Use schema validation (joi, zod, ajv).
  cwe: CWE-20
  owasp: A03:2021-Injection
  confidence: 0.8
- id: ws-message-broadcast-unsanitized
  languages:
  - javascript
  - typescript
  - python
  - go
  patterns:
  - regex: (?i)(?:wss?\.clients|io\.emit|socket\.broadcast)\s*\.[^;\\n]*(?:req\.|request\.|data\.|message\.)
  severity: high
  description: WebSocket broadcast using unvalidated client data — stored XSS via WebSocket message.
  remediation: Sanitize and validate all messages before broadcasting. Apply HTML encoding for chat/messaging apps.
  cwe: CWE-79
  owasp: A03:2021-Injection
  confidence: 0.75
- id: ws-sql-injection
  languages:
  - javascript
  - typescript
  - python
  - go
  - ruby
  - java
  - csharp
  patterns:
  - regex: (?i)(?:ws|socket|connection)\.on\s*\(\s*[\"']message[\"'][^}]*(?:query|execute|raw)\s*\(\s*[\"'`]
  severity: critical
  description: WebSocket message data concatenated into SQL query — SQL injection via WebSocket.
  remediation: Use parameterized queries. Never concatenate WebSocket message data into SQL strings.
  cwe: CWE-89
  owasp: A03:2021-Injection
  confidence: 0.8
- id: ws-no-message-size-limit
  languages:
  - javascript
  - typescript
  - python
  - go
  patterns:
  - regex: (?i)(?:WebSocket|ws)\s*\(\s*(?:server|app)\s*[,\)]
  negative_patterns:
  - regex: (?i)maxPayload|max_size|maxMessageSize|message_max_size
  severity: medium
  description: WebSocket server without message size limit — oversized messages cause memory exhaustion.
  remediation: 'Set maxPayload option: new WebSocket.Server({ maxPayload: 1024 * 1024 }) for 1MB limit.'
  cwe: CWE-400
  owasp: A04:2021-Insecure Design
  confidence: 0.7
- id: ws-no-rate-limiting
  languages:
  - javascript
  - typescript
  - python
  - go
  patterns:
  - regex: (?i)ws\.on\s*\([\"']message[\"']|socket\.on\s*\([\"']message[\"']
  negative_patterns:
  - regex: (?i)rate.?limit|throttle|rateLimit
  severity: medium
  description: WebSocket message handler without rate limiting — message flooding causes DoS.
  remediation: Implement per-client rate limiting using token bucket or sliding window algorithm.
  cwe: CWE-770
  owasp: A04:2021-Insecure Design
  confidence: 0.75
- id: ws-no-connection-limit
  languages:
  - javascript
  - typescript
  - python
  - go
  patterns:
  - regex: (?i)(?:WebSocket\.Server|new\s+wss?\.Server)\s*\(
  negative_patterns:
  - regex: (?i)maxConnections|max_connections|clientLimit
  severity: medium
  description: WebSocket server without connection limit — connection exhaustion attack possible.
  remediation: Track connected clients and reject new connections above threshold.
  cwe: CWE-770
  owasp: A04:2021-Insecure Design
  confidence: 0.7
- id: ws-sensitive-data-unencrypted
  languages:
  - javascript
  - typescript
  - python
  - go
  - ruby
  patterns:
  - regex: (?i)ws\.on\s*\([\"']message[\"'][^;\\n]*(?:password|token|credit|ssn|secret)
  severity: high
  description: Sensitive data transmitted over WebSocket without explicit encryption check.
  remediation: Use wss:// (WebSocket Secure) for all non-localhost connections.
  cwe: CWE-319
  owasp: A02:2021-Cryptographic Failures
  confidence: 0.75
- id: ws-error-info-leak
  languages:
  - javascript
  - typescript
  - python
  - go
  patterns:
  - regex: (?i)(?:ws|socket|connection)\.send\s*\(\s*(?:JSON\.stringify\s*\(\s*\{[^}]*(?:stack|stackTrace|err\.message|error\.message|traceback))
  - regex: (?i)catch\s*\(\s*(?:e|err|error)\s*\)\s*\{[^}]*(?:ws|socket|connection)\.send\s*\(\s*(?:e|err|error)\.(?:message|stack)
  severity: medium
  description: WebSocket error handler leaks stack traces/internal errors to client.
  remediation: Send generic error messages. Log detailed errors server-side only.
  cwe: CWE-209
  owasp: A05:2021-Security Misconfiguration
  confidence: 0.65
