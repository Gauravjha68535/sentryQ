# ============================================================================
# POWERSHELL SECURITY RULES
# ============================================================================

# ======================== Hardcoded Secrets ========================
- id: ps-hardcoded-password
  languages: [powershell]
  patterns:
    - regex: '(?i)(password|passwd|pwd|secret)\\s*=\\s*[''\"][^''\"]{8,}[''\"]'
  severity: high
  description: "Hardcoded password in PowerShell script"
  remediation: "Use Get-Credential, SecureString, or Azure Key Vault"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: ps-hardcoded-credential
  languages: [powershell]
  patterns:
    - regex: '(?i)ConvertTo-SecureString\\s+[''\"][^''\"]+[''\"]\\s+-AsPlainText'
  severity: high
  description: "Hardcoded password converted to SecureString"
  remediation: "Use Get-Credential or read from encrypted credential store"
  cwe: "CWE-798"
  owasp: "A07:2021"

# ======================== Code Injection ========================
- id: ps-invoke-expression
  languages: [powershell]
  patterns:
    - regex: '(?i)Invoke-Expression|iex\\s+\\$'
  severity: critical
  description: "Invoke-Expression can execute arbitrary code"
  remediation: "Avoid Invoke-Expression. Use & (call operator) with validated commands"
  cwe: "CWE-94"
  owasp: "A03:2021"

- id: ps-add-type-unsafe
  languages: [powershell]
  patterns:
    - regex: '(?i)Add-Type\\s+.*-TypeDefinition.*\\$'
  severity: high
  description: "Add-Type with user input can compile and run arbitrary code"
  remediation: "Never use user input in Add-Type TypeDefinition"
  cwe: "CWE-94"
  owasp: "A03:2021"

# ======================== Command Injection ========================
- id: ps-command-injection
  languages: [powershell]
  patterns:
    - regex: '(?i)(Start-Process|cmd\\s+/c|cmd\\.exe).*\\$'
  severity: critical
  description: "Command injection via Start-Process with variable input"
  remediation: "Validate input. Use -ArgumentList array instead of string concatenation"
  cwe: "CWE-78"
  owasp: "A03:2021"

# ======================== Insecure Downloads ========================
- id: ps-download-and-execute
  languages: [powershell]
  patterns:
    - regex: '(?i)(Invoke-WebRequest|Invoke-RestMethod|DownloadString|DownloadFile).*\\|.*Invoke-Expression|iex'
  severity: critical
  description: "Download and execute pattern — extremely dangerous"
  remediation: "Download, inspect, then execute. Verify file hashes"
  cwe: "CWE-94"
  owasp: "A08:2021"

- id: ps-insecure-webclient
  languages: [powershell]
  patterns:
    - regex: '(?i)\\[Net\\.WebClient\\].*DownloadString.*http://'
  severity: high
  description: "Downloading content over HTTP (unencrypted)"
  remediation: "Use HTTPS for all downloads"
  cwe: "CWE-319"
  owasp: "A02:2021"

# ======================== Execution Policy ========================
- id: ps-bypass-execution-policy
  languages: [powershell]
  patterns:
    - regex: '(?i)-ExecutionPolicy\\s+(Bypass|Unrestricted)'
  severity: medium
  description: "Execution policy bypass may allow malicious scripts"
  remediation: "Use RemoteSigned or AllSigned execution policy"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== Sensitive Data ========================
- id: ps-sensitive-data-log
  languages: [powershell]
  patterns:
    - regex: '(?i)Write-(Host|Output|Verbose).*(?:password|secret|token|key)'
  severity: medium
  description: "Sensitive data in console output"
  remediation: "Remove sensitive data from output. Use SecureString for sensitive values"
  cwe: "CWE-532"
  owasp: "A09:2021"

# ======================== SQL Injection ========================
- id: ps-sql-injection
  languages: [powershell]
  patterns:
    - regex: '(?i)Invoke-Sql.*\\$|\\$.*\\.ExecuteNonQuery.*\\$'
  severity: critical
  description: "SQL injection via variable interpolation in PowerShell"
  remediation: "Use parameterized queries with SqlParameter"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ======================== TLS ========================
- id: ps-insecure-tls
  languages: [powershell]
  patterns:
    - regex: '(?i)ServerCertificateValidationCallback.*\\{.*\\$true|Ssl3|Tls\\b[^1]'
  severity: high
  description: "TLS validation disabled or weak protocol version"
  remediation: "Use [Net.SecurityProtocolType]::Tls12 and proper certificate validation"
  cwe: "CWE-295"
  owasp: "A02:2021"

# ======================== Privilege Escalation ========================
- id: ps-privilege-escalation
  languages: [powershell]
  patterns:
    - regex: '(?i)-Verb\\s+RunAs|Enable-PSRemoting\\s+-Force'
  severity: medium
  description: "Privilege escalation via RunAs or PSRemoting"
  remediation: "Minimize privilege escalation. Log all elevated operations"
  cwe: "CWE-250"
  owasp: "A01:2021"

