    - regex: '\\[\\s*\\w+\\s*\\+\\s*\\d+\\s*\\]|\\[\\s*\\w+\\s*-\\s*\\d+\\s*\\]''severity: high
  description: "Array index with arithmetic - potential off-by-one"
