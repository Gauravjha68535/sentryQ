    - regex: 'access\\s*\\([^)]*\\)\\s*;[^}]*open\\s*\\([^)]*\\)''severity: high
  description: "TOCTOU race condition: check with access then open"
  remediation: "Open file first, then use fstat to verify properties"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-stat-open
  languages: [c]
  patterns:
    - regex: 'stat\\s*\\([^)]*\\)\\s*;[^}]*open\\s*\\([^)]*\\)''severity: high
  description: "TOCTOU race condition: stat then open"
  remediation: "Open file first, then use fstat on the file descriptor"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-access-mkstemp
  languages: [c]
  patterns:
    - regex: 'access\\s*\\([^)]*tmp[^)]*\\)\\s*;[^}]*mkstemp''severity: high
  description: "TOCTOU race in temp file creation"
  remediation: "Use mkstemp directly without prior access check"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-exists-open
  languages: [c]
  patterns:
    - regex: '(?:stat|access|e?uidaccess)\\s*\\([^)]*\\)\\s*;[^}]*(?:open|fopen|creat)''severity: high
  description: "TOCTOU race: file existence check before open"
  remediation: "Attempt open directly and handle ENOENT gracefully"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-mkdir-chdir
  languages: [c]
  patterns:
    - regex: 'mkdir\\s*\\([^)]*\\)\\s*;[^}]*chdir\\s*\\([^)]*\\)''severity: medium
  description: "TOCTOU race: create directory then chdir into it"
  remediation: "Use open directory descriptor and fchdir"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-symlink-lstat
  languages: [c]
  patterns:
    - regex: 'symlink\\s*\\([^)]*\\)\\s*;[^}]*lstat\\s*\\([^)]*\\)''severity: medium
  description: "TOCTOU race: create symlink then stat it"
  remediation: "Check symlink target at creation time"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-rename
  languages: [c]
  patterns:
    - regex: '(?:stat|access)\\s*\\([^)]*\\)\\s*;[^}]*rename\\s*\\([^)]*\\)''severity: high
  description: "TOCTOU race: check file then rename"
  remediation: "Use rename directly and handle errors"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-unlink
  languages: [c]
  patterns:
    - regex: '(?:stat|access)\\s*\\([^)]*\\)\\s*;[^}]*unlink\\s*\\([^)]*\\)''severity: high
  description: "TOCTOU race: check file then unlink"
  remediation: "Use unlink directly and handle ENOENT gracefully"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-chmod
  languages: [c]
  patterns:
    - regex: '(?:stat|access)\\s*\\([^)]*\\)\\s*;[^}]*chmod\\s*\\([^)]*\\)''severity: high
  description: "TOCTOU race: check permissions then chmod"
  remediation: "Use fchmod on opened file descriptor"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-toctou-chown
  languages: [c]
  patterns:
    - regex: '(?:stat|access)\\s*\\([^)]*\\)\\s*;[^}]*chown\\s*\\([^)]*\\)''severity: high
  description: "TOCTOU race: check ownership then chown"
  remediation: "Use fchown on opened file descriptor"
  cwe: "CWE-367"
  owasp: "A01:2021"

- id: c-race-signal-handler-unsafe
  languages: [c]
  patterns:
    - regex: 'signal\\s*\\([^,]+,\\s*[^)]*\\w+\\s*\\)[^}]*static[^}]*volatile''severity: high
  description: "Signal handler with non-volatile static data - race condition"
  remediation: "Use volatile sig_atomic_t for flags, avoid complex handlers"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-race-signal-handler-reentrant
  languages: [c]
  patterns:
    - regex: 'signal\\s*\\([^,]+,\\s*[^)]*malloc|signal\\s*\\([^,]+,\\s*[^)]*free''severity: high
  description: "Signal handler calls non-reentrant function"
  remediation: "Only use async-signal-safe functions in signal handlers"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-race-fork-exec-unsafe
  languages: [c]
  patterns:
    - regex: 'fork\\(\\)\\s*;[^}]*malloc|fork\\(\\)\\s*;[^}]*free''severity: high
  description: "Memory allocation after fork - may cause deadlocks"
  remediation: "Call only async-signal-safe functions between fork and exec"
  cwe: "CWE-362"
  owasp: "A06:2021"

- id: c-race-fork-file-descriptor
  languages: [c]
  patterns:
    - regex: 'fork\\(\\)\\s*;[^}]*close\\([^)]*\\)[^}]*execl''severity: medium
  description: "File descriptor handling after fork - may leak descriptors"
  remediation: "Set FD_CLOEXEC on file descriptors or close them in child"
  cwe: "CWE-362"
  owasp: "A06:2021"

- id: c-race-pthread-create-shared
  languages: [c]
  patterns:
    - regex: 'pthread_create\\s*\\([^,]+,\\s*NULL,\\s*[^,]+,\\s*&\\w+\\)''severity: medium
  description: "Passing pointer to local variable to thread - race condition"
  remediation: "Pass by value or ensure variable lifetime exceeds thread"
  cwe: "CWE-362"
  owasp: "A06:2021"

- id: c-race-pthread-mutex-init
  languages: [c]
  patterns:
    - regex: 'pthread_mutex_init\\s*\\(&\\w+,\\s*NULL\\)\\s*;[^}]*pthread_create''severity: low
  description: "Mutex initialized before threads created - ensure proper ordering"
  remediation: "Initialize synchronization primitives before creating threads"
  cwe: "CWE-362"
  owasp: "A06:2021"

- id: c-race-pthread-mutex-destroy
  languages: [c]
  patterns:
    - regex: 'pthread_mutex_destroy\\s*\\(&\\w+\\)\\s*;[^}]*''severity: high
  description: "Mutex destroyed while threads may still be using it"
  remediation: "Join all threads before destroying synchronization primitives"
  cwe: "CWE-362"
  owasp: "A06:2021"

- id: c-race-double-check-locking
  languages: [c]
  patterns:
    - regex: 'if\\s*\\(\\s*!\\w+\\s*\\)\\s*\\{[^}]*lock[^}]*if\\s*\\(\\s*!\\w+\\s*\\)''severity: medium
  description: "Double-checked locking pattern - may be unsafe in C"
  remediation: "Use pthread_once or C11 call_once for one-time initialization"
  cwe: "CWE-362"
  owasp: "A06:2021"

- id: c-race-atomic-operation-missing
  languages: [c]
  patterns:
    - regex: '\\w+\\+\\+|\\w+--|\\w+\\s*=\\s*\\w+\\s*\\+\\s*1''severity: medium
  description: "Non-atomic increment on shared variable - race condition"
  remediation: "Use atomic builtins: __sync_add_and_fetch or C11 atomics"
  cwe: "CWE-362"
  owasp: "A06:2021"

- id: c-race-temp-file-unsafe
  languages: [c]
  patterns:
    - regex: 'tmpnam|tempnam|mktemp''severity: high
  description: "Insecure temporary file creation - race condition"
  remediation: "Use mkstemp instead"
  cwe: "CWE-377"
  owasp: "A01:2021"

- id: c-race-temp-file-unsafe-check
  languages: [c]
  patterns:
    - regex: 'tmpnam|tempnam|mktemp''severity: high
  description: "Insecure temporary file name generation - race condition"
  remediation: "Replace with mkstemp which creates and opens atomically"
  cwe: "CWE-377"
  owasp: "A01:2021"

