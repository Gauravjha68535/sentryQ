  remediation: "Set pointer to NULL after free: free(ptr); ptr = NULL;"
  cwe: "CWE-416"
  owasp: "A06:2021"

- id: c-free-stack-array
  languages: [c]
  patterns:
    - regex: 'free\\s*\\(\\s*&\\s*\\w+\\s*\\)''severity: high
  description: "Attempting to free stack-allocated memory - undefined behavior"
  remediation: "Never free stack-allocated variables"
  cwe: "CWE-590"
  owasp: "A06:2021"

- id: c-free-non-heap
  languages: [c]
  patterns:
    - regex: 'free\\s*\\(\\s*\\w+\\s*\\)\\s*;\\s*''severity: high
  description: "free called without clear allocation source - may free stack memory"
  remediation: "Ensure pointer was allocated with malloc/calloc/realloc"
  cwe: "CWE-590"
  owasp: "A06:2021"

- id: c-use-after-scope
  languages: [c]
  patterns:
    - regex: '\\w+\\s*\\[?\\s*=\\s*&\\s*\\w+\\s*;\\s*\\}[^}]*\\w+''severity: high
  description: "Pointer to stack variable used after scope exit - use-after-scope"
  remediation: "Allocate on heap if needed outside scope, or copy data"
  cwe: "CWE-562"
  owasp: "A06:2021"

- id: c-return-local-address
  languages: [c]
  patterns:
    - regex: 'return\\s+&\\s*\\w+\\s*;\\s*\\}''severity: high
  description: "Returning address of local variable - stack use after return"
  remediation: "Allocate on heap and return pointer, or use static/global"
  cwe: "CWE-562"
  owasp: "A06:2021"

- id: c-return-local-array
  languages: [c]
  patterns:
    - regex: 'return\\s+\\w+\\s*;\\s*\\}.*\\w+\\s+\\w+\\s*\\[[^\\]]+\\]''severity: high
  description: "Returning local array (decays to pointer) - stack use after return"
  remediation: "Allocate array on heap and return pointer"
  cwe: "CWE-562"
  owasp: "A06:2021"

- id: c-alloca-stack-overflow
  languages: [c]
  patterns:
    - regex: 'alloca\\s*\\(\\s*[^)]+\\*\\)|alloca\\s*\\(\\s*[^)]+\\+[^)]+\\)''severity: high
  description: "alloca with arithmetic - potential stack overflow"
  remediation: "Use malloc for large or variable-sized allocations"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: c-alloca-loop
  languages: [c]
  patterns:
    - regex: 'for\\s*\\([^;]+;[^;]+;[^)]*\\)\\s*\\{[^}]*alloca''severity: high
  description: "alloca in loop - can exhaust stack quickly"
  remediation: "Use malloc in loops and free after iteration"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: c-alloca-while
  languages: [c]
  patterns:
    - regex: 'while\\s*\\([^)]*\\)\\s*\\{[^}]*alloca''severity: high
  description: "alloca in while loop - unbounded stack allocation"
  remediation: "Use malloc and free in loop body"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: c-alloca-recursive
  languages: [c]
  patterns:
    - regex: 'alloca\\s*\\([^)]+\\)[^}]*\\w+\\s*\\([^)]*\\)''severity: high
  description: "alloca in recursive function - rapid stack exhaustion"
  remediation: "Use malloc and free in recursive functions"
  cwe: "CWE-770"
  owasp: "A06:2021"

# ======================== INTEGER OVERFLOW (91-120) ========================

- id: c-integer-overflow-malloc
  languages: [c]
  patterns:
    - regex: 'malloc\\s*\\(\\s*[^)]*\\*[^)]+\\)''severity: high
  description: "malloc with multiplication - potential integer overflow"
  remediation: "Check for overflow: if (a > SIZE_MAX / b) return NULL;"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-calloc
  languages: [c]
  patterns:
    - regex: 'calloc\\s*\\(\\s*[^,]+,\\s*[^)]+\\*[^)]+\\)''severity: medium
  description: "calloc already checks for overflow - this multiplication is unnecessary"
  remediation: "Remove redundant multiplication, pass counts directly"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-realloc
  languages: [c]
  patterns:
    - regex: 'realloc\\s*\\(\\s*[^,]+,\\s*[^)]*\\*[^)]+\\)''severity: high
  description: "realloc with multiplication - potential integer overflow"
  remediation: "Check overflow before multiplication"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-array-index
  languages: [c]
  patterns:
    - regex: '\\w+\\s*\\[\\s*\\w+\\s*\\+\\s*\\w+\\s*\\]|\\w+\\s*\\[\\s*\\w+\\s*\\*\\s*\\w+\\s*\\]''severity: high
  description: "Array index with addition/multiplication - integer overflow may cause OOB"
  remediation: "Check for overflow before array access"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-ptr-arithmetic
  languages: [c]
  patterns:
    - regex: '\\w+\\s*\\+\\s*\\w+\\s*\\*\\s*sizeof|\\w+\\s*\\+\\s*\\w+\\s*\\+\\s*\\w+''severity: high
  description: "Pointer arithmetic with addition/multiplication - overflow risk"
  remediation: "Check for overflow before pointer arithmetic"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-loop
  languages: [c]
  patterns:
    - regex: 'for\\s*\\(\\s*\\w+\\s*=\\s*[^;]+;\\s*\\w+\\s*<\\s*[^;]+\\*[^;]+;''severity: medium
  description: "Loop condition with multiplication - potential overflow"
  remediation: "Use separate variable for limit or check overflow"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-cast
  languages: [c]
  patterns:
    - regex: '\\(\\s*(?:unsigned\\s+)?(?:int|short|char)\\s*\\)\\s*\\w+\\s*\\*\\s*\\w+''severity: high
  description: "Multiplication result cast to smaller type - truncation"
  remediation: "Perform bounds check before casting"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-assign
  languages: [c]
  patterns:
    - regex: '\\w+\\s*=\\s*\\w+\\s*\\*\\s*\\w+\\s*;''severity: medium
  description: "Multiplication without overflow check"
  remediation: "Use checked arithmetic: if (__builtin_mul_overflow(a, b, &result)) error()"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-add
  languages: [c]
  patterns:
    - regex: '\\w+\\s*=\\s*\\w+\\s*\\+\\s*\\w+\\s*;''severity: medium
  description: "Addition without overflow check"
  remediation: "Use checked addition: if (__builtin_add_overflow(a, b, &result)) error()"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-sub
  languages: [c]
  patterns:
    - regex: '\\w+\\s*=\\s*\\w+\\s*-\\s*\\w+\\s*;''severity: medium
  description: "Subtraction without underflow check"
  remediation: "Use checked subtraction: if (__builtin_sub_overflow(a, b, &result)) error()"
  cwe: "CWE-191"
  owasp: "A06:2021"

- id: c-integer-overflow-neg
  languages: [c]
  patterns:
    - regex: '-\\s*\\w+''severity: low
  description: "Unary negation - may underflow for unsigned"
  remediation: "Ensure operand is signed and not at minimum value"
  cwe: "CWE-191"
  owasp: "A06:2021"

- id: c-integer-overflow-shift
  languages: [c]
  patterns:
    - regex: '\\w+\\s*<<\\s*\\w+|\\w+\\s*>>\\s*\\w+''severity: high
  description: "Shift with variable shift count - undefined behavior if too large"
  remediation: "Ensure shift count < bit width of type"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-shift-by-type
  languages: [c]
  patterns:
    - regex: '\\w+\\s*<<\\s*\\d{3,}|\\w+\\s*<<\\s*\\d+\\s*[^;]''severity: high
  description: "Shift by large constant - may exceed type width"
  remediation: "Ensure shift count < bit width of type"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-sizeof-multiplication
  languages: [c]
  patterns:
    - regex: 'sizeof\\s*\\([^)]+\\)\\s*\\*\\s*\\w+''severity: low
  description: "sizeof multiplication - ensure result doesn't overflow"
  remediation: "Use calloc which handles multiplication safely"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-signed-unsigned
  languages: [c]
  patterns:
    - regex: '\\(\\s*unsigned\\s+int\\s*\\)\\s*-\\d+''severity: medium
  description: "Cast of negative value to unsigned - large positive result"
  remediation: "Avoid casting signed negatives to unsigned"
  cwe: "CWE-195"
  owasp: "A06:2021"

- id: c-integer-overflow-sign-comparison
  languages: [c]
  patterns:
    - regex: '\\w+\\s*(?:<|>|<=|>=|==)\\s*\\w+\\s*;''severity: medium
  description: "Comparison of signed and unsigned values - may give unexpected results"
  remediation: "Cast to same signedness or ensure values in appropriate range"
  cwe: "CWE-196"
  owasp: "A06:2021"

- id: c-integer-overflow-array-size
  languages: [c]
  patterns:
    - regex: '\\w+\\s*\\[\\s*\\w+\\s*\\]\\s*;''severity: low
  description: "Variable-length array - ensure size doesn't overflow stack"
  remediation: "Check size against reasonable limit"
  cwe: "CWE-770"
  owasp: "A06:2021"

- id: c-integer-overflow-division
  languages: [c]
  patterns:
    - regex: '/\\s*\\w+|%\\s*\\w+''severity: high
  description: "Division/modulo by variable - check for zero and overflow"
  remediation: "Check divisor != 0 and ensure no INT_MIN/-1 overflow"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-division-constant
  languages: [c]
  patterns:
    - regex: '/\\s*0|%\\s*0''severity: high
  description: "Division by zero constant - undefined behavior"
  remediation: "Never divide by zero"
  cwe: "CWE-369"
  owasp: "A06:2021"

- id: c-integer-overflow-abs
  languages: [c]
  patterns:
    - regex: 'abs\\s*\\(\\s*INT_MIN\\s*\\)|abs\\s*\\(\\s*-?2147483648\\s*\\)''severity: high
  description: "abs(INT_MIN) overflows - undefined behavior"
  remediation: "Check for INT_MIN before calling abs"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-integer-overflow-check-missing
  languages: [c]
  patterns:
    - regex: 'if\\s*\\(\\s*\\w+\\s*<\\s*\\w+\\s*\\*\\s*\\w+\\s*\\)''severity: high
  description: "Multiplication in condition without overflow check"
  remediation: "Check for overflow before multiplication in condition"
  cwe: "CWE-190"
  owasp: "A06:2021"

# ======================== COMMAND INJECTION (121-150) ========================

- id: c-command-injection-system
  languages: [c]
  patterns:
    - regex: 'system\\s*\\(\\s*[^)]*user|system\\s*\\(\\s*[^)]*\\+[^)]+\\)|system\\s*\\(\\s*[^)]*\\$''severity: critical
  description: "system() with user input - command injection"
  remediation: "Use execve with explicit argument array, never shell with user input"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-popen
  languages: [c]
  patterns:
    - regex: 'popen\\s*\\(\\s*[^)]*user|popen\\s*\\(\\s*[^)]*\\+[^)]+\\)''severity: critical
  description: "popen() with user input - command injection"
  remediation: "Use pipe + fork + exec pattern with argument arrays"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-execl
  languages: [c]
  patterns:
    - regex: 'execl[pe]?\\s*\\(\\s*[^,]+,\\s*[^,]+,\\s*[^)]*user''severity: high
  description: "execl* with user input as argument - argument injection"
  remediation: "Validate and sanitize all arguments passed to exec functions"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-execv
  languages: [c]
  patterns:
    - regex: 'execv[pe]?\\s*\\([^,]+,\\s*[^)]*user''severity: high
  description: "execv* with user input in argument array - argument injection"
