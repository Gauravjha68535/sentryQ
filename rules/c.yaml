# ======================== SIGNAL HANDLING (301-330) ========================

- id: c-signal-unsafe-function
  languages: [c]
  patterns:
    - regex: 'signal\\s*\\([^,]+,\\s*[^)]*printf|signal\\s*\\([^,]+,\\s*[^)]*malloc|signal\\s*\\([^,]+,\\s*[^)]*free''severity: high
  description: "Signal handler calling non-async-signal-safe function"
  remediation: "Only use async-signal-safe functions in signal handlers"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-signal-reentrant-function
  languages: [c]
  patterns:
    - regex: 'signal\\s*\\([^,]+,\\s*[^)]*strlen|signal\\s*\\([^,]+,\\s*[^)]*strcpy''severity: high
  description: "Signal handler calling non-reentrant function"
  remediation: "Use only async-signal-safe functions in handlers"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-signal-handler-volatile
  languages: [c]
  patterns:
    - regex: 'signal\\s*\\([^,]+,\\s*[^)]*\\w+\\s*\\)[^}]*int\\s+\\w+''severity: high
  description: "Signal handler accessing non-volatile global variable"
  remediation: "Use volatile sig_atomic_t for global flags in handlers"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-signal-handler-longjmp
  languages: [c]
  patterns:
    - regex: 'signal\\s*\\([^,]+,\\s*[^)]*longjmp''severity: high
  description: "longjmp from signal handler - may leave program in inconsistent state"
  remediation: "Avoid longjmp in signal handlers, use siglongjmp with sigsetjmp"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-signal-handler-siglongjmp
  languages: [c]
  patterns:
    - regex: 'signal\\s*\\([^,]+,\\s*[^)]*siglongjmp''severity: high
  description: "siglongjmp from signal handler - use with caution"
  remediation: "Ensure sigsetjmp saved signal mask appropriately"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-signal-handler-multiple-signals
  languages: [c]
  patterns:
    - regex: 'signal\\(SIGINT[^)]*\\).*signal\\(SIGTERM[^)]*\\).*signal\\(SIGQUIT''severity: low
  description: "Multiple signal handlers - ensure they're all safe"
  remediation: "Check all signal handlers for async-signal-safety"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-signal-handler-sigaction-sa-resethand
  languages: [c]
  patterns:
    - regex: 'sigaction.*SA_RESETHAND''severity: low
  description: "sigaction with SA_RESETHAND - handler reset after first invocation"
  remediation: "Ensure handler reinstalls itself if needed"
  cwe: "CWE-479"
  owasp: "A06:2021"

- id: c-signal-raise
  languages: [c]
  patterns:
    - regex: 'raise|kill''severity: medium
  description: "Sending signals - ensure PID/tid is valid"
  remediation: "Validate process/thread ID before sending"
  cwe: "CWE-20"
  owasp: "A03:2021"

