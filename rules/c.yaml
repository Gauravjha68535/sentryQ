  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-posix-spawn
  languages: [c]
  patterns:
    - regex: 'posix_spawn\\s*\\([^,]+,\\s*[^,]+,\\s*[^,]+,\\s*[^,]+,\\s*[^)]*user''severity: critical
