- id: c-memory-corruption-alignment-cast
  languages: [c]
  patterns:
    - regex: '\\(\\w+\\s*\\*\\)\\s*\\w+\\s*\\+\\s*\\d+''severity: medium
  description: "Casting unaligned pointer - undefined behavior"
  remediation: "Ensure pointer is properly aligned for type"
  cwe: "CWE-704"
  owasp: "A06:2021"

- id: c-memory-corruption-unaligned-access
  languages: [c]
  patterns:
    - regex: 'memcpy\\s*\\([^,]+,\\s*[^,]+,\\s*sizeof\\([^)]+\\)\\s*\\)''severity: low
  description: "Potential unaligned access - use memcpy for safe unaligned access"
  remediation: "memcpy is safe for unaligned access, good practice"
  cwe: "CWE-704"
  owasp: "A06:2021"

- id: c-memory-corruption-flexible-array-sizeof
  languages: [c]
  patterns:
    - regex: 'sizeof\\s*\\(\\s*struct\\s+\\w+\\s*\\)\\s*;\\s*malloc''severity: high
  description: "malloc for struct with flexible array member without extra space"
  remediation: "Add space for array: sizeof(struct) + (count * element_size)"
  cwe: "CWE-120"
  owasp: "A06:2021"

- id: c-memory-corruption-zero-size-alloc
  languages: [c]
  patterns:
    - regex: 'malloc\\s*\\(\\s*0\\s*\\)''severity: medium
  description: "malloc(0) - implementation-defined behavior"
  remediation: "Avoid zero-size allocations, handle as special case"
  cwe: "CWE-120"
  owasp: "A06:2021"

- id: c-memory-corruption-negative-size-alloc
  languages: [c]
  patterns:
    - regex: 'malloc\\s*\\(\\s*-\\s*\\d+\\s*\\)|malloc\\s*\\(\\s*-\\s*\\w+\\s*\\)''severity: high
  description: "malloc with negative size - undefined behavior"
  remediation: "Ensure allocation size is positive"
  cwe: "CWE-190"
  owasp: "A06:2021"

- id: c-memory-corruption-realloc-size-zero
  languages: [c]
  patterns:
    - regex: 'realloc\\s*\\([^,]+,\\s*0\\s*\\)''severity: high
  description: "realloc with size 0 - free behavior, error prone"
  remediation: "Use free() explicitly when freeing, not realloc(ptr, 0)"
  cwe: "CWE-120"
  owasp: "A06:2021"

- id: c-memory-corruption-stack-buffer-overflow
  languages: [c]
  patterns:
    - regex: 'char\\s+\\w+\\s*\\[\\s*\\d+\\s*\\]\\s*;\\s*strcpy|char\\s+\\w+\\s*\\[\\s*\\d+\\s*\\]\\s*;\\s*gets''severity: high
  description: "Stack buffer declared and then overflowed with unsafe function"
  remediation: "Use bounded functions: strncpy, fgets, etc."
  cwe: "CWE-121"
  owasp: "A06:2021"

- id: c-memory-corruption-stack-buffer-loop
  languages: [c]
  patterns:
    - regex: 'for\\s*\\([^;]+;[^;]+;[^)]*\\)\\s*\\{[^}]*\\[i\\]\\s*=\\s*[^;]+''severity: high
  description: "Manual stack buffer fill loop - potential overflow"
  remediation: "Add bounds check: if (i < sizeof(buffer)/sizeof(buffer[0]))"
  cwe: "CWE-121"
  owasp: "A06:2021"

- id: c-memory-corruption-heap-buffer-overflow
  languages: [c]
  patterns:
    - regex: 'malloc\\s*\\(\\s*\\d+\\s*\\)\\s*;\\s*[^}]*\\[\\d+\\]\\s*=''severity: high
  description: "Heap buffer allocated with fixed size - potential overflow"
  remediation: "Check index against allocation size"
  cwe: "CWE-122"
  owasp: "A06:2021"

- id: c-memory-corruption-heap-buffer-loop
  languages: [c]
  patterns:
    - regex: 'malloc\\s*\\(\\s*\\w+\\s*\\)\\s*;\\s*for.*\\[i\\]''severity: high
  description: "Heap buffer fill in loop - potential overflow"
  remediation: "Ensure loop limit <= allocation size"
  cwe: "CWE-122"
  owasp: "A06:2021"

- id: c-memory-corruption-gets
  languages: [c]
  patterns:
    - regex: 'gets\\s*\\(''severity: critical
  description: "gets() - no bounds checking, always buffer overflow"
  remediation: "Use fgets() with explicit buffer size"
  cwe: "CWE-121"
  owasp: "A06:2021"

- id: c-memory-corruption-sprintf-no-bounds
  languages: [c]
  patterns:
    - regex: 'sprintf\\s*\\([^,]+,\\s*[^)]+%[^)]*\\)''severity: high
  description: "sprintf without bounds - buffer overflow"
  remediation: "Use snprintf with explicit buffer size"
  cwe: "CWE-121"
  owasp: "A06:2021"

- id: c-memory-corruption-strcat-no-bounds
  languages: [c]
  patterns:
    - regex: 'strcat\\s*\\([^,]+,\\s*[^)]+\\)''severity: high
  description: "strcat without bounds - buffer overflow"
  remediation: "Use strncat or strlcat with explicit size"
  cwe: "CWE-121"
  owasp: "A06:2021"

- id: c-memory-corruption-memcpy-overflow
  languages: [c]
  patterns:
    - regex: 'memcpy\\s*\\([^,]+,\\s*[^,]+,\\s*[^)]*sizeof\\([^)]+\\)\\s*\\)''severity: high
  description: "memcpy with sizeof destination - ensure destination is array"
  remediation: "Use sizeof(array) for destination, not sizeof(pointer)"
  cwe: "CWE-121"
  owasp: "A06:2021"

- id: c-memory-corruption-memcpy-pointer-size
  languages: [c]
  patterns:
    - regex: 'memcpy\\s*\\([^,]+,\\s*[^,]+,\\s*sizeof\\([^)]*\\*[^)]*\\)\\s*\\)''severity: high
  description: "memcpy with sizeof(pointer) - copies wrong amount"
  remediation: "Use sizeof(type) * count for correct size"
  cwe: "CWE-121"
  owasp: "A06:2021"

- id: c-memory-corruption-scanf-no-width
  languages: [c]
  patterns:
    - regex: 'scanf\\s*\\(\\s*['''\"][^0-9]*%s[^''\"]*[''\"]'
  severity: critical
  description: "scanf %s without width - buffer overflow"
  remediation: "Use scanf with width: scanf(\"%255s\", buffer)"
  cwe: "CWE-121"
  owasp: "A06:2021"

# ======================== RESOURCE LEAKS (421-450) ========================

- id: c-resource-leak-malloc
  languages: [c]
  patterns:
    - regex: 'malloc\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Memory allocated with malloc but never freed"
  remediation: "Free memory when no longer needed, use RAII patterns"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-calloc
  languages: [c]
  patterns:
    - regex: 'calloc\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Memory allocated with calloc but never freed"
  remediation: "Free memory, track allocations"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-realloc
  languages: [c]
  patterns:
    - regex: 'realloc\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Memory allocated/reallocated but never freed"
  remediation: "Free memory when done, use temporary for realloc"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-strdup
  languages: [c]
  patterns:
    - regex: 'strdup\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "strdup allocated memory but never freed"
  remediation: "Free the duplicated string"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-asprintf
  languages: [c]
  patterns:
    - regex: 'asprintf\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "asprintf allocated memory but never freed"
  remediation: "Free the allocated string"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-fopen
  languages: [c]
  patterns:
    - regex: 'fopen\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "File opened but never closed"
  remediation: "Close file with fclose when done"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-freopen
  languages: [c]
  patterns:
    - regex: 'freopen\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "File reopened but never closed"
  remediation: "Close file when done"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-fdopen
  languages: [c]
  patterns:
    - regex: 'fdopen\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "File descriptor wrapped in FILE* but never closed"
  remediation: "Close with fclose (closes underlying fd)"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-popen
  languages: [c]
  patterns:
    - regex: 'popen\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Pipe opened but never closed"
  remediation: "Close with pclose when done"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-open
  languages: [c]
  patterns:
    - regex: 'open\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "File descriptor opened but never closed"
  remediation: "Close fd with close() when done"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-socket
  languages: [c]
  patterns:
    - regex: 'socket\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Socket created but never closed"
  remediation: "Close socket with close()"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-accept
  languages: [c]
  patterns:
    - regex: 'accept\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Accepted socket never closed"
  remediation: "Close client socket after use"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-opendir
  languages: [c]
  patterns:
    - regex: 'opendir\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Directory opened but never closed"
  remediation: "Close directory with closedir"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-mkstemp
  languages: [c]
  patterns:
    - regex: 'mkstemp\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Temporary file descriptor not closed"
  remediation: "Close temp file after use and unlink"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-posix-memalign
  languages: [c]
  patterns:
    - regex: 'posix_memalign\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Aligned memory never freed"
  remediation: "Free aligned memory with free()"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-mmapped
  languages: [c]
  patterns:
    - regex: 'mmap\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Memory mapped but never unmapped"
  remediation: "Unmap with munmap when done"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-shmat
  languages: [c]
  patterns:
    - regex: 'shmat\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Shared memory attached but never detached"
  remediation: "Detach with shmdt"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-semaphore
  languages: [c]
  patterns:
    - regex: 'sem_open\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Semaphore opened but never closed"
  remediation: "Close semaphore with sem_close"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-mq-open
  languages: [c]
  patterns:
    - regex: 'mq_open\\s*\\([^)]+\\)\\s*;[^}]*''severity: high
  description: "Message queue opened but never closed"
  remediation: "Close message queue with mq_close"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-sched
  languages: [c]
  patterns:
    - regex: 'sched_getscheduler|sched_setscheduler''severity: low
  description: "Scheduler operations - no resource leak"
  remediation: "Safe"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-error-path
  languages: [c]
  patterns:
    - regex: 'if\\s*\\([^)]*\\)\\s*\\{[^}]*return[^}]*\\}[^}]*free''severity: high
  description: "Free only on success path - leak on error path"
  remediation: "Use goto cleanup pattern to free on all paths"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: c-resource-leak-fd-leak-loop
  languages: [c]
  patterns:
    - regex: 'for.*open.*[^}]*\\}[^}]*''severity: high
  description: "Opening files in loop without closing - fd leak"
  remediation: "Close each file descriptor inside loop"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-resource-leak-mem-leak-loop
  languages: [c]
  patterns:
    - regex: 'for.*malloc.*[^}]*\\}[^}]*''severity: high
  description: "Allocating in loop without freeing - memory leak"
  remediation: "Free each allocation in loop or after use"
  cwe: "CWE-401"
  owasp: "A06:2021"

# ======================== UNINITIALIZED MEMORY (451-480) ========================

- id: c-uninit-local-var
  languages: [c]
  patterns:
    - regex: 'int\\s+\\w+\\s*;\\s*[^{]*\\w+\\s*=''severity: high
  description: "Local variable used without initialization"
  remediation: "Initialize variables when declared"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-pointer
  languages: [c]
  patterns:
    - regex: '\\w+\\s*\\*\\s*\\w+\\s*;\\s*[^=]*\\*\\w+''severity: high
  description: "Pointer used without initialization"
  remediation: "Initialize pointer to NULL and check before use"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-struct
  languages: [c]
  patterns:
    - regex: 'struct\\s+\\w+\\s+\\w+\\s*;\\s*[^=]*\\w+\\.\\w+''severity: high
  description: "Struct member accessed without struct initialization"
  remediation: "Initialize struct with = {0} or memset"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-array
  languages: [c]
  patterns:
    - regex: '\\w+\\s+\\w+\\s*\\[\\d+\\]\\s*;\\s*\\w+\\s*\\[\\d+\\]''severity: high
  description: "Array element accessed before initialization"
  remediation: "Initialize arrays when declared or with memset"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-malloc-mem
  languages: [c]
  patterns:
    - regex: 'malloc\\s*\\([^)]+\\)\\s*;\\s*[^=]*\\*\\w+''severity: high
  description: "Heap memory used without initialization"
  remediation: "Use calloc or memset after malloc"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-realloc-mem
  languages: [c]
  patterns:
    - regex: 'realloc\\s*\\([^)]+\\)\\s*;\\s*[^=]*\\*\\w+''severity: high
  description: "realloc may not preserve content of new memory"
  remediation: "Initialize newly allocated space"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-stack-array
  languages: [c]
  patterns:
    - regex: 'char\\s+\\w+\\s*\\[\\d+\\]\\s*;\\s*[^}]*strcpy|strcat''severity: high
  description: "Stack array used without initialization"
  remediation: "Initialize array with memset or set first char to '\\0'"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-conditional
  languages: [c]
  patterns:
    - regex: 'if\\s*\\([^)]*\\)\\s*\\{[^}]*\\}\\s*else\\s*\\{[^}]*\\}\\s*\\w+''severity: medium
  description: "Variable potentially uninitialized in one branch"
  remediation: "Initialize variable before conditional or in both branches"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-pointer-to-local
  languages: [c]
  patterns:
    - regex: '\\w+\\s*=\\s*&\\s*\\w+\\s*;\\s*\\}''severity: high
  description: "Pointer to local variable - use after return"
  remediation: "Don't store pointers to local variables"
  cwe: "CWE-562"
  owasp: "A06:2021"

- id: c-uninit-union
  languages: [c]
  patterns:
    - regex: 'union\\s+\\w+\\s+\\w+\\s*;\\s*\\w+\\.\\w+''severity: high
  description: "Union member accessed without initialization"
  remediation: "Initialize union before use"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-bitfield
  languages: [c]
  patterns:
    - regex: 'struct\\s+\\w+\\s*\\{[^}]*:\\d+[^}]*\\}\\s*\\w+\\s*;\\s*\\w+\\.\\w+''severity: medium
  description: "Bitfield accessed without initialization"
  remediation: "Initialize entire struct before use"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-function-param-out
  languages: [c]
  patterns:
    - regex: '\\w+\\s*\\(\\s*&\\s*\\w+\\s*\\)\\s*;\\s*[^=]*\\w+''severity: high
  description: "Function called with output parameter, variable used before check"
  remediation: "Check function return value before using output"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-function-param-inout
  languages: [c]
  patterns:
    - regex: '\\w+\\s*\\([^,]+,\\s*&\\s*\\w+\\s*\\)\\s*;\\s*[^=]*\\w+''severity: high
  description: "In-out parameter used after call without checking"
  remediation: "Check function success before using parameter"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-errno-check
  languages: [c]
  patterns:
    - regex: 'if\\s*\\(\\s*\\w+\\s*==\\s*-1\\s*\\)\\s*\\{[^}]*\\}\\s*[^=]*\\w+''severity: medium
  description: "Variable may be uninitialized if function failed"
  remediation: "Only use variable if function succeeded"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-struct-member
  languages: [c]
  patterns:
    - regex: 'struct\\s+\\w+\\s+\\w+\\s*;\\s*\\w+\\.\\w+\\s*=''severity: high
  description: "Struct member assigned without struct initialization"
  remediation: "Initialize struct before assigning members"
  cwe: "CWE-457"
  owasp: "A06:2021"

- id: c-uninit-struct-ptr-member
  languages: [c]
  patterns:
    - regex: 'struct\\s+\\w+\\s*\\*\\s*\\w+\\s*;\\s*\\w+->\\w+\\s*=''severity: high
  description: "Pointer to struct used without allocation"
  remediation: "Allocate and initialize struct before use"
  cwe: "CWE-457"
  owasp: "A06:2021"

# ======================== CONCURRENT PROGRAMMING (481-500) ========================

- id: c-thread-mutex-unlock-error
  languages: [c]
  patterns:
    - regex: 'pthread_mutex_lock.*if.*return.*''severity: high
  description: "Early return without unlocking mutex - deadlock"
  remediation: "Unlock mutex before all return paths"
  cwe: "CWE-667"
  owasp: "A06:2021"

- id: c-thread-mutex-double-lock
  languages: [c]
  patterns:
    - regex: 'pthread_mutex_lock.*pthread_mutex_lock''severity: high
  description: "Mutex locked twice - deadlock"
  remediation: "Don't lock mutex twice in same thread"
  cwe: "CWE-667"
  owasp: "A06:2021"

- id: c-thread-mutex-destroy-locked
  languages: [c]
  patterns:
    - regex: 'pthread_mutex_destroy.*while.*locked''severity: high
  description: "Mutex destroyed while locked - undefined behavior"
  remediation: "Ensure mutex is unlocked before destroying"
  cwe: "CWE-667"
  owasp: "A06:2021"

- id: c-thread-cond-wait-no-lock
  languages: [c]
  patterns:
    - regex: 'pthread_cond_wait[^;]*;''severity: high
  description: "pthread_cond_wait called without mutex lock"
  remediation: "Always lock mutex before pthread_cond_wait"
  cwe: "CWE-667"
  owasp: "A06:2021"

- id: c-thread-cond-signal-no-lock
  languages: [c]
  patterns:
    - regex: 'pthread_cond_signal[^;]*;[^}]*''severity: high
  description: "pthread_cond_signal without mutex - may lose wakeups"
  remediation: "Signal while holding mutex"
  cwe: "CWE-667"
  owasp: "A06:2021"

- id: c-thread-cond-broadcast-no-lock
  languages: [c]
  patterns:
    - regex: 'pthread_cond_broadcast[^;]*;[^}]*''severity: high
  description: "pthread_cond_broadcast without mutex - may lose wakeups"
  remediation: "Broadcast while holding mutex"
  cwe: "CWE-667"
  owasp: "A06:2021"

- id: c-thread-cond-wait-spurious
  languages: [c]
  patterns:
    - regex: 'pthread_cond_wait[^;]*;''severity: high
  description: "pthread_cond_wait without loop for predicate - spurious wakeups"
  remediation: "Always use while(predicate) { pthread_cond_wait(...); }"
  cwe: "CWE-667"
  owasp: "A06:2021"

- id: c-thread-attr-leak
  languages: [c]
  patterns:
    - regex: 'pthread_attr_init[^;]*;''severity: medium
  description: "Thread attributes not destroyed - resource leak"
  remediation: "Destroy attributes after use"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-thread-join-missing
  languages: [c]
  patterns:
    - regex: 'pthread_create[^;]*;''severity: high
  description: "Thread created but not joined or detached - resource leak"
  remediation: "Join or detach all threads"
  cwe: "CWE-775"
  owasp: "A06:2021"

- id: c-thread-cancel-async
  languages: [c]
  patterns:
    - regex: 'pthread_setcanceltype.*PTHREAD_CANCEL_ASYNCHRONOUS''severity: high
  description: "Async cancellation - dangerous, can leave state inconsistent"
  remediation: "Use deferred cancellation or avoid cancellation"
  cwe: "CWE-667"
  owasp: "A06:2021"

- id: c-thread-key-leak
  languages: [c]
  patterns:
    - regex: 'pthread_key_create[^;]*;''severity: medium
  description: "Thread-specific data key not deleted - resource leak"
  remediation: "Delete keys when no longer needed"
  cwe: "CWE-775"
  owasp: "A06:2021"
