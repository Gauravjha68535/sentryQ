  description: "Dynamically allocating command string with user input"
  remediation: "Avoid dynamic command construction, use exec directly"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-env-tainted
  languages: [c]
  patterns:
    - regex: 'execv[pe]?\\s*\\([^,]+,\\s*[^,]+,\\s*[^)]*user''severity: critical
  description: "execve with user-controlled environment - environment injection"
  remediation: "Never allow user to control environment variables passed to exec"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-escapeshellarg-missing
  languages: [c]
  patterns:
    - regex: 'system\\s*\\([^)]*user|popen\\s*\\([^)]*user''severity: critical
  description: "Shell command with user input without escaping"
  remediation: "Never use user input in shell commands. Use exec family instead."
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-shell-var
  languages: [c]
  patterns:
    - regex: 'putenv\\s*\\([^)]*user|setenv\\s*\\([^,]+,\\s*[^,]+,\\s*[^)]*user''severity: high
  description: "Setting environment variables with user input - may affect shell"
  remediation: "Avoid setting environment variables from user input"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-shell-metachar
  languages: [c]
  patterns:
    - regex: 'system\\s*\\([^)]*[;&|`$(){}<>][^)]*\\)''severity: critical
  description: "system() with shell metacharacters - potential injection"
  remediation: "Never pass user data to system() regardless of escaping"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-popen-metachar
  languages: [c]
  patterns:
    - regex: 'popen\\s*\\([^)]*[;&|`$(){}<>][^)]*\\)''severity: critical
  description: "popen() with shell metacharacters - command injection"
  remediation: "Use pipe/fork/exec instead of popen"
  cwe: "CWE-78"
  owasp: "A03:2021"

