  patterns:
    - regex: 'system\\s*\\(\\s*[^)]*\\+[^)]+\\)''severity: critical
  description: "system() with string concatenation - likely includes user input"
  remediation: "Never use system() with concatenated strings containing user input"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-popen-concat
  languages: [c]
  patterns:
    - regex: 'popen\\s*\\(\\s*[^)]*\\+[^)]+\\)''severity: critical
  description: "popen() with string concatenation - command injection"
  remediation: "Avoid popen with user input, use fork/exec instead"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-sprintf-cmd
  languages: [c]
  patterns:
    - regex: 'sprintf\\s*\\(\\s*\\w+,\\s*['''\"](?:[^''\"]*)(?:%s|%d)[^''\"]*[''\"],\\s*[^)]*user'
  severity: high
  description: "Building command string with sprintf and user input"
  remediation: "Use exec family directly with argument arrays"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: c-command-injection-asprintf-cmd
  languages: [c]
  patterns:
    - regex: 'asprintf\\s*\\([^,]+,\\s*['''\"][^''\"]*%[^''\"]*[''\"],\\s*[^)]*user'
