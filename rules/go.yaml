- id: go-command-injection
  languages: [go]
  patterns:
    - regex: '(?i)exec\\.Command\\s*\\(\\s*[\"''](sh|bash|cmd)[\"'']\\s*,\\s*[\"''](-c|/c)[\"'']\\s*,'
  severity: critical
  description: "Command injection via exec.Command with sh/bash -c"
  remediation: "Never pass user input directly to a shell. Pass arguments individually."
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: go-command-injection-general
  languages: [go]
  patterns:
    - regex: 'exec\\.Command(?:Context)?\\s*\\(\\s*[^,]+,\\s*[^)]*\\b(req|c|r|ctx|params)[^)]*\\)'
  severity: high
  description: "Potential command injection passing variables to exec.Command"
  remediation: "Validate all variables passed to exec.Command. Avoid user input."
  cwe: "CWE-78"
  owasp: "A03:2021"

# ======================== SQL Injection ========================
- id: go-sqli-fmt-sprintf
  languages: [go]
  patterns:
    - regex: '(?i)fmt\\.Sprintf\\(\\s*[\"''][^\"'']*(?:SELECT|INSERT|UPDATE|DELETE|FROM|WHERE).*?%s.*?[\"'']'
  severity: critical
  description: "SQL injection via fmt.Sprintf"
  remediation: "Use parameterized queries with ? placeholders."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: go-sqli-concat
  languages: [go]
  patterns:
    - regex: '(?i)[\"''][^\"'']*(?:SELECT|INSERT|UPDATE|DELETE|FROM|WHERE)[^\"'']*[\"'']\\s*\\+'
  severity: critical
  description: "SQL injection via string concatenation"
  remediation: "Use parameterized queries with ? placeholders."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: go-sqli-gorm
  languages: [go]
  patterns:
    - regex: '(?i)\\.(Raw|Exec|Where|Order)\\s*\\(\\s*fmt\\.Sprintf'
  severity: high
  description: "SQL injection in GORM via fmt.Sprintf"
  remediation: "Use parameterized queries like .Where(\"name = ?\", name)"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ======================== SSRF / Network ========================
- id: go-ssrf-http
  languages: [go]
  patterns:
    - regex: '(?i)http\\.(Get|Post|Head|Do|NewRequest)\\s*\\(\\s*[^\"'']*\\b(req|c|r)[^\"'']*\\)'
  severity: high
  description: "Server-Side Request Forgery via user-controlled URL"
  remediation: "Validate URL against an allowlist. Do not accept arbitrary URLs."
  cwe: "CWE-918"
  owasp: "A10:2021"

- id: go-insecure-tls
  languages: [go]
  patterns:
    - regex: 'InsecureSkipVerify\\s*:\\s*true'
  severity: high
  description: "TLS verification disabled"
  remediation: "Never disable TLS in production. Leave InsecureSkipVerify false."
  cwe: "CWE-295"
  owasp: "A07:2021"

# ======================== Path Traversal ========================
- id: go-path-traversal
  languages: [go]
  patterns:
    - regex: '(?i)(os\\.(Open|Create|ReadFile)|ioutil\\.ReadFile)\\s*\\(\\s*filepath\\.Join\\([^\\)]*\\b(req|c|r|filename|path)\\b[^\\)]*\\)'
  severity: high
  description: "Path traversal via filepath.Join with user input"
  remediation: "Validate path using filepath.Clean and check base directory."
  cwe: "CWE-22"
  owasp: "A01:2021"

- id: go-file-upload
  languages: [go]
  patterns:
    - regex: 'io\\.Copy\\s*\\(\\s*[^,]+,\\s*file\\s*\\)'
  severity: medium
  description: "Unrestricted file upload"
  remediation: "Validate file extension, size, and content type before saving."
  cwe: "CWE-434"
  owasp: "A04:2021"

# ======================== XSS ========================
- id: go-template-html
  languages: [go]
  patterns:
    - regex: 'template\\.HTML\\s*\\('
  severity: medium
  description: "template.HTML bypasses auto-escaping (XSS risk)"
  remediation: "Avoid template.HTML with user input. Rely on html/template."
  cwe: "CWE-79"
  owasp: "A03:2021"

# ======================== JWT / Auth ========================
- id: go-hardcoded-secret
  languages: [go]
  patterns:
    - regex: '(?i)(secret|token|key|password)\\s*[=:]\\s*[\"''][a-zA-Z0-9_-]{12,}[\"'']'
  severity: high
  description: "Hardcoded secret/token"
  remediation: "Store secrets in environment variables."
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: go-jwt-none
  languages: [go]
  patterns:
    - regex: 'jwt\\.SigningMethodNone'
  severity: critical
  description: "JWT accepts 'none' algorithm"
  remediation: "Always use explicit secure signing methods like HS256."
  cwe: "CWE-347"
  owasp: "A02:2021"

- id: go-weak-rand
  languages: [go]
  patterns:
    - regex: 'math/rand(?:\\.Seed)?'
  severity: low
  description: "Weak PRNG used"
  remediation: "Use crypto/rand for security-sensitive operations."
  cwe: "CWE-338"
  owasp: "A02:2021"

