# ======================== CONTEXT MISUSE (51-80) ========================

- id: go-context-cancel-not-called
  languages: [go]
  patterns:
    - regex: 'context\\.With(?:Cancel|Timeout|Deadline).*?(?:(?!cancel|defer cancel).){0,50}$'
  severity: high
  description: "Context cancel function not called"
  remediation: "Always call cancel function, typically with defer cancel()"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: go-context-cancel-not-deferred
  languages: [go]
  patterns:
    - regex: 'cancel\\s*:?=\\s*context\\.With(?:Cancel|Timeout|Deadline).*?(?!defer cancel)'
  severity: medium
  description: "Context cancel function not deferred"
  remediation: "Use defer cancel() immediately after context creation"
  cwe: "CWE-401"
  owasp: "A06:2021"

- id: go-context-background-without-timeout
  languages: [go]
  patterns:
    - regex: 'context\\.Background\\(\\)(?:(?!WithTimeout|WithDeadline).){0,100}(?:db|http|grpc|client)\\.(?:Query|Exec|Get|Post|Do)'
  severity: medium
  description: "Database/HTTP operation with Background context (no timeout)"
  remediation: "Use context.WithTimeout for all external operations"
  cwe: "CWE-770"
  owasp: "A04:2023"

- id: go-context-todo-in-production
  languages: [go]
  patterns:
    - regex: 'context\\.TODO\\(\\)'
  severity: medium
