  severity: high
  description: "Backtick OS command execution with string interpolation. Extremely vulnerable to command injection."
  remediation: "Avoid backticks. Use Open3.capture3 or system() with discrete, un-concatenated argument arrays."
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: ruby-marshal-dump-leak
  languages: [ruby]
  patterns:
  - regex: '(?i)(?:render|send_data)\s+Marshal\.dump'
  severity: high
  description: "Exporting raw Marshal.dump data directly to clients establishes a future deserialization attack vector."
  remediation: "Never transmit Ruby-specific Marshal encodings to untrusted clients. Use JSON or MessagePack."
  cwe: "CWE-502"
  owasp: "A08:2021"

- id: ruby-html-safe-bypass
  languages: [ruby]
  patterns:
  - regex: '(?i)render\s+html:\s*.*\.html_safe'
  severity: critical
  description: "Explicitly instructing Rails to render strings with .html_safe completely bypasses native XSS and SSTI controls."
  remediation: "Remove .html_safe and rely on native Rails output encoding, or strictly sanitize before tagging as safe."
  cwe: "CWE-116"
  owasp: "A03:2021"

- id: ruby-csv-unvalidated-ingestion
  languages: [ruby]
  patterns:
  - regex: '(?i)CSV\.parse\([A-Za-z_]+\.read.?.?\s+do'
  severity: high
  description: "Unvalidated CSV ingestion. If parsed rows are later supplied to object deserializers, it establishes a Stored payload trigger."
  remediation: "Validate CSV MIME types, enforce structured mapping, and strictly sanitize all row fields prior to database operations."
  cwe: "CWE-434"
  owasp: "A04:2021"

- id: ruby-md5-over-bcrypt
  languages: [ruby]
  patterns:
  - regex: '(?i)Digest::(?:MD5|SHA1)\.hexdigest.*password'
  severity: high
  description: "Using fundamentally broken hash algorithms (MD5/SHA1) for password digests, bypassing Rails has_secure_password."
  remediation: "Remove manual Digest imports and utilize Rails native `has_secure_password` which securely wraps bcrypt out-of-the-box."
  cwe: "CWE-328"
  owasp: "A02:2021"



- id: ruby-webhook-sig-bypass
  languages: [ruby]
  patterns:
    - regex: '(?s)(?:sig|signature|X-Signature|X-Hub-Signature)\s*=\s*(?:params|request\.headers)[\s\S]{0,500}Marshal\.load\s*\('
  severity: critical
  description: "Potential signature bypass: Webhook signature is read but Marshal.load follows. Ensure signature is verified and execution is aborted on mismatch."
  remediation: "Verify HMAC signature before calling Marshal.load(). Use OpenSSL::HMAC.hexdigest and hmac_compare to prevent timing attacks."
  cwe: "CWE-347"
  owasp: "A07:2021"
