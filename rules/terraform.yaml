- id: tf-aws-s3-public-acl
  languages: [terraform]
  patterns:
    - regex: '(?i)acl\s*=\s*\\"(public-read|public-read-write|authenticated-read)\\"'
  severity: critical
  description: "S3 bucket with public ACL — data may be exposed to the internet"
  remediation: "Use acl = \"private\" and configure IAM policies for specific access"
  cwe: "CWE-732"
  owasp: "A01:2021"

- id: tf-aws-s3-no-encryption
  languages: [terraform]
  patterns:
    - regex: '(?i)resource\s+\\\"aws_s3_bucket\\\"[^}]*'
  severity: high
  description: "S3 bucket without server-side encryption"
  remediation: "Enable SSE: server_side_encryption_configuration { rule { apply_server_side_encryption_by_default } }"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: tf-aws-s3-no-versioning
  languages: [terraform]
  patterns:
    - regex: '(?i)resource\s+\\\"aws_s3_bucket\\\"[^}]*'
  severity: medium
  description: "S3 bucket without versioning enabled"
  remediation: "Enable versioning to protect against accidental deletions"
  cwe: "N/A"
  owasp: "N/A"

- id: tf-aws-sg-open-ingress
  languages: [terraform]
  patterns:
    - regex: '(?i)cidr_blocks\s*=\s*\[\s*\\\"0\.0\.0\.0/0\\\"\s*\]'
  severity: high
  description: "Security group allows ingress from 0.0.0.0/0 (entire internet)"
  remediation: "Restrict cidr_blocks to specific IP ranges needed for access"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: tf-aws-rds-public
  languages: [terraform]
  patterns:
    - regex: '(?i)publicly_accessible\s*=\s*true'
  severity: critical
  description: "RDS/database instance publicly accessible from the internet"
  remediation: "Set publicly_accessible = false and use VPC private subnets"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: tf-aws-rds-no-encryption
  languages: [terraform]
  patterns:
    - regex: '(?i)storage_encrypted\s*=\s*false'
  severity: high
  description: "RDS storage encryption disabled"
  remediation: "Set storage_encrypted = true for encryption at rest"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: tf-aws-iam-wildcard
  languages: [terraform]
  patterns:
    - regex: '(?i)\\"Action\\"\s*:\s*\\"\*\\"|\\"Resource\\"\s*:\s*\\"\*\\"'
  severity: critical
  description: "IAM policy with wildcard Action or Resource grants excessive permissions"
  remediation: "Follow least privilege: specify exact actions and resource ARNs"
  cwe: "CWE-250"
  owasp: "A01:2021"

- id: tf-aws-cloudtrail-disabled
  languages: [terraform]
  patterns:
    - regex: '(?i)enable_logging\s*=\s*false'
  severity: high
  description: "CloudTrail logging disabled — audit trail lost"
  remediation: "Enable logging: enable_logging = true with S3 bucket for log storage"
  cwe: "CWE-778"
  owasp: "A09:2021"

# ======================== Azure ========================
- id: tf-azure-storage-public
  languages: [terraform]
  patterns:
    - regex: '(?i)allow_blob_public_access\s*=\s*true|public_network_access_enabled\s*=\s*true'
  severity: high
  description: "Azure Storage account allows public access"
  remediation: "Set allow_blob_public_access = false for storage accounts"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== GCP ========================
- id: tf-gcp-compute-public
  languages: [terraform]
  patterns:
    - regex: '(?i)access_config\s*\{\s*\}'
  severity: high
  description: "GCP compute instance with public IP (empty access_config)"
  remediation: "Remove access_config block to prevent public IP assignment. Use Cloud NAT"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== General ========================
- id: tf-hardcoded-secret
  languages: [terraform]
  patterns:
    - regex: '(?i)(password|secret|api_key|access_key)\s*=\s*\\"[^\\"]{8,}\\"'
  severity: critical
  description: "Hardcoded secret in Terraform configuration"
  remediation: "Use terraform variables with sensitive flag, environment vars, or vault provider"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: tf-no-state-encryption
  languages: [terraform]
  patterns:
    - regex: '(?i)backend\s+\\\"s3\\\"\s*\{[^}]*'
  severity: high
  description: "Terraform state stored without encryption"
  remediation: "Enable encryption for remote state: encrypt = true in backend config"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: tf-http-backend
  languages: [terraform]
  patterns:
    - regex: '(?i)backend\s+\\\"http\\\"\s*\{[^}]*address\s*=\s*\\\"http://'
  severity: high
  description: "Terraform state backend uses HTTP instead of HTTPS"
  remediation: "Use HTTPS for remote state backend to protect sensitive state data"
  cwe: "CWE-319"
  owasp: "A02:2021"

- id: tf-k8s-privileged-pod
  languages: [terraform]
  patterns:
    - regex: '(?i)privileged\s*=\s*true'
  severity: critical
  description: "Kubernetes Pod or Deployment running a privileged container"
  remediation: "Set privileged = false or remove the parameter"
  cwe: "CWE-269"
  owasp: "A01:2021"

- id: tf-k8s-host-network
  languages: [terraform]
  patterns:
    - regex: '(?i)host_network\s*=\s*true'
  severity: high
  description: "Kubernetes Pod using host network namespace"
  remediation: "Set host_network = false to isolate network traffic"
  cwe: "CWE-284"
  owasp: "A05:2021"

- id: tf-k8s-no-limits
  languages: [terraform]
  patterns:
    - regex: '(?i)resources\s*\{[^}]*'
  severity: medium
  description: "Kubernetes container missing resource limits"
  remediation: "Define CPU and memory limits inside the resources block"
  cwe: "CWE-400"
  owasp: "A06:2021"

