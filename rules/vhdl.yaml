- id: vhdl-hardcoded-key
  languages: [vhdl]
  patterns:
    - regex: '(?i)constant\s+.*(?:key|password|secret)\s*:\s*.*\s*:=\s*[xX]?\\"'
  severity: high
  description: "Hardcoded cryptographic key"
  remediation: "Provide keys dynamically or via secure storage"
  cwe: "CWE-798"
  owasp: "A07:2021"
  confidence: 0.8
- id: vhdl-insecure-initial-state
  languages: [vhdl]
  patterns:
    - regex: '(?i)signal\s+\w+\s*:\s*.*:=\s*[xXuUzZ\\\-W]'
  severity: medium
  description: "Insecure or undefined initial state"
  remediation: "Explicitly initialize to secure zero state"
  cwe: "CWE-665"
  owasp: "A06:2021"
  confidence: 0.8
- id: vhdl-unprotected-jtag
  languages: [vhdl]
  patterns:
    - regex: '(?i)attribute\s+jtag\s*:\s*boolean|port\s*\(\s*tck|tms|tdi|tdo'
  severity: medium
  description: "Exposed JTAG interface"
  remediation: "Disable or secure JTAG in production builds"
  cwe: "CWE-284"
  owasp: "A01:2021"
  confidence: 0.8
- id: vhdl-infinite-loop
  languages: [vhdl]
  patterns:
    - regex: '(?i)loop\s*'
  severity: low
  description: "Infinite loop in process"
  remediation: "Ensure there is an exit condition"
  cwe: "CWE-835"
  owasp: "A05:2021"
  confidence: 0.8

- id: vhdl-command-injection
  languages: [vhdl]
  patterns:
    - regex: '(?i)\$system\s*\(|\$fopen\s*\(.*user'
  severity: critical
  description: "Command injection via system calls"
  remediation: "Validate all inputs to system calls"
  cwe: "CWE-78"
  owasp: "A03:2021"
  confidence: 0.8

- id: vhdl-path-traversal
  languages: [vhdl]
  patterns:
    - regex: '(?i)fopen\s*\([^)]*\+\s*[^)]+\]'
  severity: high
  description: "Path traversal in file operations"
  remediation: "Validate and sanitize file paths"
  cwe: "CWE-22"
  owasp: "A01:2021"
  confidence: 0.8

- id: vhdl-timing-attack
  languages: [vhdl]
  patterns:
    - regex: '(?i)(?:=|/=)\s*[^)]*(?:and|or)\s*[^)]*\bkey\b'
  severity: medium
  description: "Potential timing attack in comparison"
  remediation: "Use constant-time comparison functions"
  cwe: "CWE-208"
  owasp: "A02:2021"
  confidence: 0.8

- id: vhdl-weak-random
  languages: [vhdl]
  patterns:
    - regex: '(?i)(random|urandom)\s*\('
  severity: medium
  description: "Non-cryptographic random in security context"
  remediation: "Use hardware random number generators for crypto"
  cwe: "CWE-338"
  owasp: "A02:2021"
  confidence: 0.8

- id: vhdl-xxe
  languages: [vhdl]
  patterns:
    - regex: '(?i)xmlParse|readXML|domParser'
  severity: high
  description: "XXE vulnerability in XML parsing"
  remediation: "Disable external entity processing in XML parser"
  cwe: "CWE-611"
  owasp: "A03:2021"
  confidence: 0.8

- id: vhdl-stack-overflow
  languages: [vhdl]
  patterns:
    - regex: '(?i)process\s*\([^)]*\)\s*begin.*process\s*\('
  severity: high
  description: "Nested process instantiation - potential stack overflow"
  remediation: "Limit recursion depth in component instantiation"
  cwe: "CWE-674"
  owasp: "A05:2021"
  confidence: 0.8

- id: vhdl-privilege-escalation
  languages: [vhdl]
  patterns:
    - regex: '(?i)signal\s+\w+_priv\s*:.*:=|process\s*\([^)]*admin'
  severity: high
  description: "Potential privilege management issue"
  remediation: "Implement proper privilege separation"
  cwe: "CWE-269"
  owasp: "A01:2021"
  confidence: 0.8

- id: vhdl-weak-cipher
  languages: [vhdl]
  patterns:
    - regex: '(?i)des\s*\(|rc4\s*\(|md5'
  severity: medium
  description: "Weak cryptographic algorithm"
  remediation: "Use AES-256 or modern crypto primitives"
  cwe: "CWE-327"
  owasp: "A02:2021"
  confidence: 0.8

- id: vhdl-test-bench
  languages: [vhdl]
  patterns:
    - regex: '(?i)test\s*bench|entity\s+\w+_tb'
  severity: low
  description: "Test bench in synthesis code"
  remediation: "Separate test benches from synthesis"
  cwe: "CWE-489"
  owasp: "A05:2021"
  confidence: 0.8

- id: vhdl-clock-domain
  languages: [vhdl]
  patterns:
    - regex: '(?i)process\s*\(.*clk.*\)\s*begin.*process\s*\(.*'
  severity: medium
  description: "Clock domain crossing issues"
  remediation: "Use proper CDC synchronization"
  cwe: "CWE-362"
  owasp: "A05:2021"
  confidence: 0.8

- id: vhdl-latch
  languages: [vhdl]
  patterns:
    - regex: '(?i)if\s+.*\s+then.*\s+elsif|if\s+.*\s+then\s+\w+\s*<='
  severity: medium
  description: "Potential latch inference"
  remediation: "Complete all if-else branches"
  cwe: "CWE-119"
  owasp: "A06:2021"
  confidence: 0.8

- id: vhdl-async-reset
  languages: [vhdl]
  patterns:
    - regex: '(?i)process\s*\(.*reset.*\)\s*begin.*if\s+reset'
  severity: medium
  description: "Async reset without synchronization"
  remediation: "Synchronize async reset"
  cwe: "CWE-710"
  owasp: "A05:2021"
  confidence: 0.8

- id: vhdl-unsigned-compare
  languages: [vhdl]
  patterns:
    - regex: '(?i)\w+\s*<\s*\w+\s*'
  severity: medium
  description: "Unsigned comparison may overflow"
  remediation: "Use proper signed/unsigned types"
  cwe: "CWE-190"
  owasp: "A06:2021"
  confidence: 0.8

- id: vhdl-generic-default
  languages: [vhdl]
  patterns:
    - regex: '(?i)generic\s*\(\s*\)|generic\s*map\s*\(\s*\)'
  severity: low
  description: "Generic without default value"
  remediation: "Provide default values for generics"
  cwe: "CWE-20"
  owasp: "A03:2021"
  confidence: 0.8
