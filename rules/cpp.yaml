- id: cpp-buffer-overflow-cin
  languages: [cpp]
  patterns:
    - regex: 'std::cin\s*>>\s*[^;]+\[\s*\]'
  severity: high
  description: "Unbounded input with cin >> array can cause buffer overflow"
  remediation: "Use std::string or specify max width: cin.width(size)"

- id: cpp-buffer-overflow-std-copy
  languages: [cpp]
  patterns:
    - regex: 'std::copy\s*\([^,]+,\s*[^,]+,\s*[^\)]+\]'
  severity: medium
  description: "std::copy without bounds checking can overflow destination"
  remediation: "Use std::copy_n or verify destination size before copy"

# Use After Free / Dangling Pointer
- id: cpp-use-after-free-delete
  languages: [cpp]
  patterns:
    - regex: 'delete\s+[^;]+;[^}]*.*'
  severity: high
  description: "Potential use-after-free after delete operator"
  remediation: "Set pointer to nullptr after delete and check before use"

- id: cpp-dangling-reference
  languages: [cpp]
  patterns:
    - regex: 'return\s+[^;]*&[^;]*local'
  severity: high
  description: "Returning reference to local variable causes dangling reference"
  remediation: "Return by value or use smart pointers for dynamic allocation"

# Unsafe Smart Pointer Usage
- id: cpp-unsafe-unique-ptr
  languages: [cpp]
  patterns:
    - regex: 'std::unique_ptr<[^>]+>\s*\([^)]*new'
  severity: low
  description: "Manual new with unique_ptr - prefer make_unique"
  remediation: "Use std::make_unique<T>() instead of unique_ptr<T>(new T())"

# Format String (C++ streams)
- id: cpp-format-string-sprintf
  languages: [cpp]
  patterns:
    - regex: 'sprintf\s*\(\s*[^,]+,\s*[^\\\"]*%[^\\\"]*[^,\)]+\s*\]'
  severity: high
  description: "C-style sprintf in C++ code - use std::ostringstream"
  remediation: "Use std::ostringstream or std::format (C++20) for type-safe formatting"

# Command Injection
- id: cpp-command-injection-system
  languages: [cpp]
  patterns:
    - regex: 'system\s*\(\s*[^\\\"]*\+[^\)]+\]'
  severity: critical
  description: "Potential command injection via system() with user input"
  remediation: "Avoid system(). Use posix_spawn or exec family with argument arrays"

# Integer Overflow in Containers
- id: cpp-integer-overflow-vector
  languages: [cpp]
  patterns:
    - regex: 'std::vector<[^>]+>\s*\([^\)]*\*[^\)]+\]'
  severity: medium
  description: "Potential integer overflow in vector size calculation"
  remediation: "Check for overflow: if (n > SIZE_MAX / sizeof(T)) throw std::bad_alloc()"

# Weak Cryptography
- id: cpp-weak-crypto-openssl-md5
  languages: [cpp]
  patterns:
    - regex: '(?i)(MD5|EVP_md5)'
  severity: medium
  description: "Use of weak cryptographic hash function (MD5) via OpenSSL"
  remediation: "Use EVP_sha256() or libsodium for modern cryptography"

# Hardcoded Secrets
- id: cpp-hardcoded-api-key
  languages: [cpp]
  patterns:
    - regex: '(?i)(api[_-]?key|apikey)\s*=\s*[''\\"][a-zA-Z0-9]{16,}[''\\"]'
  severity: high
  description: "Hardcoded API key detected in C++ source code"
  remediation: "Use environment variables or secure credential storage"

# Unsafe Casting
- id: cpp-unsafe-reinterpret-cast
  languages: [cpp]
  patterns:
    - regex: 'reinterpret_cast<[^>]+>\s*\('
  severity: medium
  description: "Use of reinterpret_cast can lead to undefined behavior"
  remediation: "Prefer static_cast or dynamic_cast. Document rationale if reinterpret_cast is necessary"

# Resource Leak (RAII violation)
- id: cpp-resource-leak-fopen
  languages: [cpp]
  patterns:
    - regex: 'fopen\s*\([^\)]+\)[^}]*'
  severity: medium
  description: "File opened with fopen() may not be properly closed"
  remediation: "Use RAII: std::fstream or wrap FILE* in a class with destructor"
