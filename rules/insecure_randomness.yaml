# ======================== Swift ========================

- id: insecure-random-swift-random
  languages: [swift]
  patterns:
    - regex: '(?i)Int\.random|Double\.random|Float\.random|CGFloat\.random''severity: high
  description: "Swift's random() is not cryptographically secure"
  remediation: "Use SecRandomCopyBytes or UUID for security-sensitive operations"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-swift-arc4random
  languages: [swift]
  patterns:
    - regex: '(?i)arc4random_uniform\s*\(''severity: high
  description: "arc4random_uniform is not recommended for cryptographic use"
  remediation: "Use SecRandomCopyBytes for cryptographic randomness"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== Rust ========================

- id: insecure-random-rust-thread-rng
  languages: [rust]
  patterns:
    - regex: 'rand::thread_rng|rand::random''severity: high
  description: "Thread-local RNG is not cryptographically secure"
  remediation: "Use rand::rngs::OsRng or getrandom crate for cryptographic randomness"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-rust-small-range
  languages: [rust]
  patterns:
    - regex: '(?i)(token|secret|key).*(rand|random)''severity: critical
  description: "Using non-crypto random for security token generation"
  remediation: "Use OsRng for generating tokens, secrets, and keys"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== UUID v1 (Timestamp-based) ========================

- id: insecure-random-uuid-v1
  languages: [javascript, typescript, python, java, go, ruby, php, csharp]
  patterns:
    - regex: '(?i)(?:uuid|v4)?.*\.uuidv1\s*\(|UUID\.v1\s*\(|uuid\.v1\s*\(|newUUIDv1|generateV1UUID''severity: high
  description: "UUID v1 uses timestamp and MAC address - predictable and privacy risk"
  remediation: "Use UUID v4 (random) for security purposes, or crypto.randomUUID() in JS"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== Time-based seeds ========================

- id: insecure-random-time-seed
  languages: [javascript, typescript, python, java, go, ruby, php, csharp, c, cpp]
  patterns:
    - regex: '(?i)(seed|srand|srandom)\s*\([^)]*(?:time|now|timestamp|date)''severity: high
  description: "Using time/timestamp as random seed - predictable"
  remediation: "Use cryptographically secure random generators that auto-seed from entropy"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== Predictable seeds ========================

- id: insecure-random-predictable-seed
  languages: [javascript, typescript, python, java, go, ruby, php, csharp, c, cpp]
  patterns:
    - regex: '(?i)(seed|srand)\s*\(\s*["''']|seed\s*\(\s*\d{1,6}\s*\)|seed\s*\(\s*null\s*\)'
  severity: high
  description: "Predictable or static random seed detected"
  remediation: "Remove manual seeding or use cryptographic random seed sources"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== Generic weak random for security ========================

- id: insecure-random-generic-security-context
  languages: [javascript, typescript, python, java, go, ruby, php, kotlin, swift, rust, c, cpp, csharp]
  patterns:
    - regex: '(?i)(?:random|rand)\s*\(.*(?:token|secret|key|password|auth|session|captcha|verification|activation|reset)''severity: critical
  description: "Weak random used for security-critical value generation"
  remediation: "Use language-specific cryptographic random APIs"
  cwe: "CWE-338"
  owasp: "A02:2021"
