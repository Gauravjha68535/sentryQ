# Insecure Randomness Security Rules
# Detects insecure random number generation across multiple programming languages
# Reference: OWASP A02:2021 - Cryptographic Failures, CWE-338: Use of Cryptographically Weak PRNG

# ======================== JavaScript/TypeScript ========================

- id: insecure-random-js-math-random
  languages: [javascript, typescript]
  patterns:
    - regex: 'Math\.random\s*\(''severity: high
  description: "Math.random() is not cryptographically secure - predictable for security purposes"
  remediation: "Use crypto.getRandomValues() or crypto.randomBytes() for security-sensitive operations"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-js-math-random-token
  languages: [javascript, typescript]
  patterns:
    - regex: '(?i)(token|secret|key|password|session|auth).*Math\.random''severity: critical
  description: "Math.random() used for security token generation - highly predictable"
  remediation: "Use crypto.randomUUID() or crypto.getRandomValues() for generating tokens"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== Python ========================

- id: insecure-random-python-random
  languages: [python]
  patterns:
    - regex: 'random\.random\s*\(''severity: high
  description: "random.random() is not cryptographically secure"
  remediation: "Use secrets module: secrets.token_urlsafe(32) or secrets.randbelow()"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-python-choice
  languages: [python]
  patterns:
    - regex: 'random\.choice\s*\(''severity: medium
  description: "random.choice() uses predictable random generator"
  remediation: "Use secrets.choice() for security-sensitive selections"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-python-randint
  languages: [python]
  patterns:
    - regex: 'random\.(randint|randrange)\s*\(''severity: high
  description: "random.randint/randrange uses predictable PRNG"
  remediation: "Use secrets.randbelow() for security-sensitive random numbers"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-python-token
  languages: [python]
  patterns:
    - regex: 'random\.[a-z]+\s*\(.*(?i)(token|secret|key|password|session)''severity: critical
  description: "Using random module for security token generation"
  remediation: "Use secrets.token_urlsafe(32) for tokens and secrets.token_hex(32) for keys"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== Java ========================

- id: insecure-random-java-util-random
  languages: [java]
  patterns:
    - regex: 'new\s+java\.util\.Random\s*\(''severity: high
  description: "java.util.Random is not cryptographically secure"
  remediation: "Use java.security.SecureRandom for security-sensitive operations"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-java-random-token
  languages: [java]
  patterns:
    - regex: 'Random\s*\([^)]*\)\.(?:nextInt|nextLong|nextDouble)\s*\([^)]*\).*(?i)(token|secret|key|id|session)''severity: critical
  description: "Using java.util.Random for security token generation"
  remediation: "Use SecureRandom with proper entropy source for tokens"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== Go ========================

- id: insecure-random-go-math-rand
  languages: [go]
  patterns:
    - regex: 'math/rand''severity: high
  description: "math/rand is not cryptographically secure - uses deterministic PRNG"
  remediation: "Use crypto/rand for all security-sensitive random number generation"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-go-math-rand-token
  languages: [go]
  patterns:
    - regex: '(?i)(token|secret|key|password|session|auth).*math/rand''severity: critical
  description: "math/rand used for generating security tokens - predictable"
  remediation: "Use crypto/rand and encoding/base64 for secure token generation"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-go-rand-seed
  languages: [go]
  patterns:
    - regex: 'rand\.Seed\s*\(''severity: high
  description: "Explicit seeding of random generator makes output predictable"
  remediation: "Remove manual seeding - crypto/rand auto-seeds from entropy"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== C/C++ ========================

- id: insecure-random-c-rand
  languages: [c, cpp]
  patterns:
    - regex: 'rand\s*\(''severity: high
  description: "rand() is not cryptographically secure"
  remediation: "Use arc4random(), getrandom(), or /dev/urandom for security"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-c-rand-token
  languages: [c, cpp]
  patterns:
    - regex: '(?i)(token|secret|key|password|session).*rand\s*\(''severity: critical
  description: "rand() used for security token generation - predictable"
  remediation: "Use cryptographic random APIs like RAND_bytes or arc4random_buf"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-c-srand-time
  languages: [c, cpp]
  patterns:
    - regex: 'srand\s*\(\s*(?:time|time_null)''severity: high
  description: "Seeding rand() with time() makes randomness predictable"
  remediation: "Use cryptographic random sources without deterministic seeding"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== Ruby ========================

- id: insecure-random-ruby-random
  languages: [ruby]
  patterns:
    - regex: '(?i)Random\.new''severity: high
  description: "Random.new is not cryptographically secure"
  remediation: "Use Random::Secure or SecureRandom for security-sensitive operations"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-ruby-rand
  languages: [ruby]
  patterns:
    - regex: '(?i)rand\s*\(''severity: high
  description: "rand() uses predictable PRNG for security contexts"
  remediation: "Use SecureRandom for generating random numbers in security contexts"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-ruby-token
  languages: [ruby]
  patterns:
    - regex: '(?i)(token|secret|key|password|session).*rand\s*\(|rand.*(?i)(token|secret|key|password|session)''severity: critical
  description: "Using insecure rand() for security token generation"
  remediation: "Use SecureRandom.urlsafe_base64 or SecureRandom.hex for tokens"
  cwe: "CWE-338"
  owasp: "A02:2021"

# ======================== PHP ========================

- id: insecure-random-php-mt-rand
  languages: [php]
  patterns:
    - regex: 'mt_rand\s*\(''severity: high
  description: "mt_rand() uses Mersenne Twister - not cryptographically secure"
  remediation: "Use random_bytes() or random_int() for security-sensitive operations"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-php-mt-rand-token
  languages: [php]
  patterns:
    - regex: '(?i)(token|secret|key|password|session|id).*mt_rand|mt_rand.*(?i)(token|secret|key|password|session|id)''severity: critical
  description: "mt_rand() used for session ID or token generation - predictable"
  remediation: "Use bin2hex(random_bytes(16)) or random_int() for secure tokens"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-php-rand
  languages: [php]
  patterns:
    - regex: '(?i)rand\s*\(''severity: high
  description: "rand() is not cryptographically secure"
  remediation: "Use random_bytes() or random_int() instead"
  cwe: "CWE-338"
  owasp: "A02:2021"

- id: insecure-random-php-srand
  languages: [php]
  patterns:
    - regex: '(?i)srand|mt_srand\s*\(''severity: high
  description: "Manual seeding of random generator makes output predictable"
  remediation: "Remove manual seeding - use random_bytes() which auto-seeds"
  cwe: "CWE-338"
  owasp: "A02:2021"

