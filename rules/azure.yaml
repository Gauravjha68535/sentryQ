# Azure Infrastructure as Code Security Rules
# Detects security misconfigurations in Azure Terraform and ARM/YAML templates
# Version: 1.0.0

- id: azure-storage-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)allow_blob_public_access\s*=\s*true''- regex: '(?i)public_network_access_enabled\s*=\s*true''- regex: '(?i)azurerm_storage_container[^}]*public_access\s*=\s*"blob"''severity: critical
  description: "Azure Storage account allows public blob access - sensitive data may be exposed to the internet"
  remediation: "Set allow_blob_public_access = false and use private endpoints or SAS tokens for access"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-storage-no-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)enable_https_traffic_only\s*=\s*false''- regex: '(?i)minimum_tls_version\s*=\s*"(TLS1_0|TLS1_1)"''severity: high
  description: "Azure Storage account has weak or no encryption in transit"
  remediation: "Enable HTTPS traffic only and set minimum_tls_version to TLS1_2"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: azure-storage-no-customer-key
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)encryption_type\s*=\s*"MicrosoftManaged"''severity: medium
  description: "Storage account does not use customer-managed keys for encryption at rest"
  remediation: "Use customer-managed keys stored in Key Vault for additional security"
  cwe: "CWE-320"
  owasp: "A02:2021"

- id: azure-sql-firewall-allow-all
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)start_ip_address\s*=\s*"0\.0\.0\.0"''- regex: '(?i)end_ip_address\s*=\s*"255\.255\.255\.255"''- regex: '(?i)azurerm_sql_firewall_rule[^}]*ip_address\s*=\s*"0\.0\.0\.0/0"''severity: critical
  description: "SQL Server firewall allows access from all IP addresses (0.0.0.0 - 255.255.255.255)"
  remediation: "Restrict firewall rules to specific IP ranges needed for application access"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-sql-no-tls
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)minimum_tls_version\s*=\s*"(1\.0|1\.1)"''severity: high
  description: "SQL Server has weak TLS configuration"
  remediation: "Set minimum_tls_version to 1.2 and enable enforced TLS"
  cwe: "CWE-295"
  owasp: "A02:2021"

- id: azure-sql-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)public_network_access_enabled\s*=\s*true''- regex: '(?i)public_network_access\s*=\s*"Enabled"''severity: high
  description: "SQL Server has public network access enabled"
  remediation: "Disable public network access and use private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-sql-auditing-disabled
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)state\s*=\s*"Disabled"''severity: medium
  description: "SQL Server auditing is disabled - security events may be missed"
  remediation: "Enable auditing and log to Storage Account or Log Analytics"
  cwe: "CWE-778"
  owasp: "A09:2021"

- id: azure-keyvault-no-purge-protection
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)purge_protection_enabled\s*=\s*false''- regex: '(?i)soft_delete_enabled\s*=\s*false''severity: high
  description: "Key Vault does not have purge protection enabled - keys/secrets may be irretrievably deleted"
  remediation: "Enable soft_delete and purge_protection for Key Vault"
  cwe: "CWE-282"
  owasp: "A04:2021"

- id: azure-keyvault-firewall-open
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_key_vault[^}]*network_acls[^}]*bypass\s*=\s*"None"''- regex: '(?i)ip_rules\s*=\s*\[\s*"0\.0\.0\.0/0"\s*\]''severity: critical
  description: "Key Vault firewall allows all traffic (0.0.0.0/0)"
  remediation: "Configure Key Vault firewall to deny default action and restrict to specific IPs or use private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-keyvault-soft-delete-disabled
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)soft_delete_retention_days\s*=\s*0''severity: high
  description: "Key Vault soft delete is disabled - deleted secrets cannot be recovered"
  remediation: "Enable soft_delete with retention of at least 7 days"
  cwe: "CWE-282"
  owasp: "A04:2021"

- id: azure-ad-service-principal-secret
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_azuread_application[^}]*password''- regex: '(?i)azurerm_azuread_service_principal_password''- regex: '(?i)client_secret\s*=\s*"[^"]+"''- regex: '(?i)password\s*=\s*"[A-Za-z0-9+/=]{40,}"''severity: critical
  description: "Azure AD service principal with hardcoded secret - credentials may be exposed in code"
  remediation: "Use managed identities or store secrets in Key Vault with proper access policies"
  cwe: "CWE-798"
  owasp: "A02:2021"

- id: azure-cosmosdb-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)public_network_access_enabled\s*=\s*true''- regex: '(?i)azurerm_cosmosdb_account[^}]*ip_range_filter\s*=\s*"0\.0\.0\.0"''severity: critical
  description: "Cosmos DB has public network access enabled"
  remediation: "Disable public network access and use private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-cosmosdb-no-throughput
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_cosmosdb_mongo_database[^}]*throughput\s*=\s*[\d]+''severity: low
  description: "Cosmos DB using provisioned throughput instead of serverless"
  remediation: "Consider serverless pricing model for variable workloads"
  cwe: "N/A"
  owasp: "N/A"

- id: azure-function-app-debug
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_function_app[^}]*site_config[^}]*http_logging_enabled\s*=\s*true''- regex: '(?i)enabled\s*=\s*true\s*\n\s*linux_fx_version''- regex: '(?i)debug_flag\s*=\s*"(true|1|enabled)"''severity: high
  description: "Function App has debugging or detailed logging enabled in production"
  remediation: "Disable detailed error messages and HTTP logging in production"
  cwe: "CWE-11"
  owasp: "A04:2021"

- id: azure-function-app-http2-disabled
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)http2_enabled\s*=\s*false''severity: low
  description: "Function App HTTP/2 is disabled - missing performance optimizations"
  remediation: "Enable http2_enabled for improved performance"
  cwe: "N/A"
  owasp: "N/A"

- id: azure-function-app-tls-min
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)minimum_tls_version\s*=\s*"1\.0"''- regex: '(?i)minimum_tls_version\s*=\s*"1\.1"''severity: high
  description: "Function App has weak TLS version - vulnerable to downgrade attacks"
  remediation: "Set minimum_tls_version to 1.2"
  cwe: "CWE-295"
  owasp: "A02:2021"

- id: azure-container-registry-admin
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_container_registry[^}]*admin_enabled\s*=\s*true''- regex: '(?i)admin_enabled\s*=\s*true''severity: high
  description: "Container Registry has admin user enabled - use service principal instead"
  remediation: "Disable admin user and use Azure AD authentication with service principals"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-container-registry-no-sku
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)sku\s*=\s*"Basic"''severity: medium
  description: "Container Registry using Basic SKU - lacks security features like geo-replication"
  remediation: "Use Premium SKU for features like geo-replication and content trust"
  cwe: "N/A"
  owasp: "N/A"

- id: azure-redis-no-ssl
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_redis_cache[^}]*enable_non_ssl_port\s*=\s*true''- regex: '(?i)enable_non_ssl_port\s*=\s*true''severity: critical
  description: "Redis cache has non-SSL port enabled - data in transit not encrypted"
  remediation: "Disable enable_non_ssl_port and use SSL port 6380"
  cwe: "CWE-295"
  owasp: "A02:2021"

- id: azure-redis-min-tls
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)minimum_tls_version\s*=\s*"1\.0"''- regex: '(?i)minimum_tls_version\s*=\s*"1\.1"''severity: high
  description: "Redis cache has weak TLS version"
  remediation: "Set minimum_tls_version to 1.2"
  cwe: "CWE-295"
  owasp: "A02:2021"

- id: azure-app-service-debug
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_app_service[^}]*site_config[^}]*debug_error_port\s*=\s*"[^"]+"''- regex: '(?i)azurerm_app_service_plan[^}]*sku[^}]*size\s*=\s*"F\d+"''- regex: '(?i)remote_debugging_enabled\s*=\s*true''severity: high
  description: "App Service has remote debugging enabled - potential for code execution"
  remediation: "Disable remote_debugging_enabled in production"
  cwe: "CWE-11"
  owasp: "A04:2021"

- id: azure-app-service-http2-disabled
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)http20_enabled\s*=\s*false''severity: medium
  description: "App Service HTTP/2 is disabled"
  remediation: "Enable http20_enabled for better performance"
  cwe: "N/A"
  owasp: "N/A"

- id: azure-app-service-tls-min
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)minimum_tls_version\s*=\s*"1\.0"''- regex: '(?i)minimum_tls_version\s*=\s*"1\.1"''severity: high
  description: "App Service has weak TLS version"
  remediation: "Set minimum_tls_version to 1.2"
  cwe: "CWE-295"
  owasp: "A02:2021"

- id: azure-nsg-allow-all-inbound
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_network_security_group[^}]*security_rule[^}]*source_address_prefix\s*=\s*"\*"''- regex: '(?i)azurerm_network_security_rule[^}]*source_address_prefixes\s*=\s*\[\s*"0\.0\.0\.0/0"\s*\]''- regex: '(?i)direction\s*=\s*"Inbound"[^}]*access\s*=\s*"Allow"[^}]*source_address_prefix\s*=\s*"\*"''severity: critical
  description: "Network Security Group allows all inbound traffic - no network segmentation"
  remediation: "Restrict inbound traffic to specific source IPs and ports needed for application"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-nsg-rule-rdp
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)destination_port_range\s*=\s*"3389"''- regex: '(?i)destination_port_range\s*=\s*"22"''severity: high
  description: "NSG allows RDP/SSH from internet - direct admin access exposed"
  remediation: "Use jump host or Bastion for admin access instead of direct RDP/SSH"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-nsg-default-open
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)default_action\s*=\s*"Allow"''severity: high
  description: "NSG uses default allow action - should be deny by default"
  remediation: "Set default_action to Deny and explicitly allow needed traffic"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-vm-no-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_windows_virtual_machine[^}]*encryption_at_host_enabled\s*=\s*false''- regex: '(?i)azurerm_linux_virtual_machine[^}]*encryption_at_host_enabled\s*=\s*false''severity: high
  description: "Virtual Machine does not have encryption at host enabled"
  remediation: "Enable encryption_at_host_enabled for encryption at rest"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: azure-vm-public-ip
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_network_interface[^}]*ip_configuration[^}]*public_ip_address_id''- regex: '(?i)public_ip_address\s*=\s*"Dynamic"''severity: medium
  description: "Virtual Machine has public IP address assigned"
  remediation: "Use private IPs and access through jump host or VPN"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-lb-no-dnat
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_lb_nat_pool[^}]*frontend_ip_configuration_name\s*=\s*"[^"]*"''- regex: '(?i)azurerm_lb_rule[^}]*frontend_port\s*=\s*[\d]+[^}]*backend_port\s*=\s*[\d]+''severity: medium
  description: "Load Balancer NAT rules may expose VMs directly to internet"
  remediation: "Review NAT rules and ensure proper access controls"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-api-management-public
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_api_management[^}]*public_network_access_enabled\s*=\s*true''- regex: '(?i)public_network_access\s*=\s*"Enabled"''severity: high
  description: "API Management has public network access enabled"
  remediation: "Disable public_network_access and use VNet integration or private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-api-management-version
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_api_management[^}]*sku_name\s*=\s*"Developer"''severity: medium
  description: "API Management using Developer SKU - not for production"
  remediation: "Use Production SKU (Premium/Standard) for production workloads"
  cwe: "N/A"
  owasp: "N/A"

- id: azure-eventhub-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_eventhub[^}]*public_network_access_enabled\s*=\s*true''severity: high
  description: "Event Hub has public network access enabled"
  remediation: "Disable public_network_access and use VNet rules or private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-eventhub-no-capture
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_eventhub_namespace[^}]*capture[^}]*enabled\s*=\s*false''severity: medium
  description: "Event Hub capture is disabled - events not archived"
  remediation: "Enable capture to store events for auditing and replay"
  cwe: "CWE-778"
  owasp: "A09:2021"

- id: azure-service-bus-public
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_servicebus_namespace[^}]*public_network_access_enabled\s*=\s*true''severity: high
  description: "Service Bus has public network access enabled"
  remediation: "Disable public_network_access and use VNet integration"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-hdinsight-encryption
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_hdinsight_spark_cluster[^}]*encryption_at_host\s*=\s*false''- regex: '(?i)minimal_tls_version\s*=\s*"1\.1"''severity: high
  description: "HDInsight cluster has encryption disabled"
  remediation: "Enable encryption_at_host and use TLS 1.2+"
  cwe: "CWE-311"
  owasp: "A02:2021"

- id: azure-batch-pool-public
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_batch_pool[^}]*public_ip_address_configuration[^}]*provisioning_type\s*=\s*"BatchManaged"''severity: medium
  description: "Batch pool uses public IPs"
  remediation: "Use UserManaged IPs or disable public IP if not needed"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-search-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_search_service[^}]*public_network_access_enabled\s*=\s*true''severity: high
  description: "Azure Search has public network access enabled"
  remediation: "Disable public_network_access and use private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-cognitive-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_cognitive_account[^}]*public_network_access_enabled\s*=\s*true''severity: high
  description: "Cognitive Services has public network access enabled"
  remediation: "Disable public_network_access and use VNet integration"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-signalr-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_signalr_service[^}]*public_network_access_enabled\s*=\s*true''severity: high
  description: "SignalR has public network access enabled"
  remediation: "Disable public_network_access and use private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-webpubsub-public-access
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_web_pubsub_service[^}]*public_network_access_enabled\s*=\s*true''severity: high
  description: "Web PubSub has public network access enabled"
  remediation: "Disable public_network_access and use private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-automation-account-public
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_automation_account[^}]*public_network_access_enabled\s*=\s*true''severity: medium
  description: "Automation Account has public network access enabled"
  remediation: "Disable public_network_access if not needed for hybrid workers"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-log-analytics-public
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_log_analytics_workspace[^}]*public_network_access_enabled\s*=\s*true''severity: medium
  description: "Log Analytics workspace has public network access enabled"
  remediation: "Disable public_network_access and use private endpoints"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: azure-monitor-diagnostic-settings
  languages: [terraform, yaml]
  patterns:
    - regex: '(?i)azurerm_monitor_diagnostic_setting''severity: medium
  description: "Resource missing diagnostic settings - audit logs not collected"
  remediation: "Configure diagnostic settings to send logs to Log Analytics or Storage"
  cwe: "CWE-778"
  owasp: "A09:2021"
