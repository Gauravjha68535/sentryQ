  patterns:
    - regex: '(?i)log\\s*\\(.*\\r\\n''severity: medium
  description: "CRLF in log"
  remediation: "Remove CRLF from log input"
  cwe: "CWE-117"
  owasp: "A09:2021"

- id: lua-log-user-input
  languages: [lua]
  patterns:
    - regex: '(?i)log\\s*\\(.*req\\.''severity: medium
  description: "User input in log"
  remediation: "Sanitize user input before logging"
  cwe: "CWE-117"
  owasp: "A09:2021"

- id: lua-log-query
  languages: [lua]
  patterns:
    - regex: '(?i)log\\s*\\(.*query''severity: medium
  description: "Query in log"
  remediation: "Sanitize query before logging"
  cwe: "CWE-117"
  owasp: "A09:2021"

- id: lua-log-body
  languages: [lua]
  patterns:
    - regex: '(?i)log\\s*\\(.*body''severity: medium
  description: "Request body in log"
  remediation: "Sanitize body before logging"
  cwe: "CWE-117"
  owasp: "A09:2021"

- id: lua-log-header
  languages: [lua]
  patterns:
    - regex: '(?i)log\\s*\\(.*header''severity: medium
  description: "Header in log"
  remediation: "Sanitize headers before logging"
  cwe: "CWE-117"
  owasp: "A09:2021"

- id: lua-openresty-unsafe
  languages: [lua]
  patterns:
    - regex: '(?i)resty\\.http.*request_uri''severity: high
  description: "OpenResty HTTP without validation"
  remediation: "Validate URLs before requests"
  cwe: "CWE-918"
  owasp: "A10:2021"
  confidence: 0.8

- id: lua-ffi-unsafe
  languages: [lua]
  patterns:
    - regex: '(?i)ffi\\.load|ffi\\.cdef''severity: high
  description: "FFI loads external libraries"
  remediation: "Validate FFI calls"
  cwe: "CWE-94"
  owasp: "A03:2021"
  confidence: 0.8
