# ============================================================================
# LUA SECURITY RULES
# ============================================================================

# ======================== Code Injection ========================
- id: lua-code-injection-loadstring
  languages: [lua]
  patterns:
    - regex: 'loadstring\\s*\\(|load\\s*\\(\\s*['''\"]'
  severity: critical
  description: "loadstring()/load() can execute arbitrary Lua code"
  remediation: "Avoid loadstring with user input. Use a sandboxed environment if needed"
  cwe: "CWE-94"
  owasp: "A03:2021"

- id: lua-code-injection-dofile
  languages: [lua]
  patterns:
    - regex: 'dofile\\s*\\(|loadfile\\s*\\(''severity: high
  description: "dofile/loadfile executes Lua from external file"
  remediation: "Validate file paths. Never load user-controlled file paths"
  cwe: "CWE-94"
  owasp: "A03:2021"

# ======================== Command Injection ========================
- id: lua-command-injection-execute
  languages: [lua]
  patterns:
    - regex: 'os\\.execute\\s*\\(|io\\.popen\\s*\\(''severity: critical
  description: "Command injection via os.execute() or io.popen()"
  remediation: "Avoid os.execute with user input. Validate and sanitize commands"
  cwe: "CWE-78"
  owasp: "A03:2021"

# ======================== SQL Injection ========================
- id: lua-sql-injection
  languages: [lua]
  patterns:
    - regex: '(?i)(execute|query)\\s*\\(\\s*['''\"].*\\.\\.\\s*'
  severity: critical
  description: "SQL injection via string concatenation in Lua"
  remediation: "Use parameterized queries or prepared statements"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ======================== Hardcoded Secrets ========================
- id: lua-hardcoded-password
  languages: [lua]
  patterns:
    - regex: '(?i)(password|passwd|secret|api_key)\\s*=\\s*['''\"][^''\"]{8,}[''\"]'
  severity: high
  description: "Hardcoded password or secret in Lua code"
  remediation: "Use environment variables or configuration files with restricted access"
  cwe: "CWE-798"
  owasp: "A07:2021"

# ======================== Path Traversal ========================
- id: lua-path-traversal
  languages: [lua]
  patterns:
    - regex: 'io\\.open\\s*\\([^)]*\\.\\.''severity: high
  description: "Path traversal via string concatenation in file open"
  remediation: "Validate file paths against base directory"
  cwe: "CWE-22"
  owasp: "A01:2021"

# ======================== Insecure Deserialization ========================
- id: lua-insecure-deserialize
  languages: [lua]
  patterns:
    - regex: 'loadstring\\s*\\(.*recv|load\\s*\\(.*socket''severity: critical
  description: "Deserializing network data as Lua code"
  remediation: "Use JSON or MessagePack for data serialization, not Lua code"
  cwe: "CWE-502"
  owasp: "A08:2021"

# ======================== Weak Random ========================
- id: lua-insecure-random
  languages: [lua]
  patterns:
    - regex: 'math\\.random\\s*\\(''severity: medium
  description: "math.random is not cryptographically secure"
  remediation: "Use /dev/urandom or a crypto library for security-sensitive random"
  cwe: "CWE-330"
  owasp: "A02:2021"

# ======================== Redis (OpenResty/Nginx) ========================
- id: lua-redis-injection
  languages: [lua]
  patterns:
    - regex: 'redis\\.call\\s*\\([^)]*\\.\\.''severity: high
  description: "Redis command injection via string concatenation"
  remediation: "Use redis.call with separate arguments, not concatenated strings"
  cwe: "CWE-77"
  owasp: "A03:2021"

# ======================== Nginx/OpenResty ========================
- id: lua-ngx-xss
  languages: [lua]
  patterns:
    - regex: 'ngx\\.say\\s*\\(.*ngx\\.var|ngx\\.print\\s*\\(.*ngx\\.req\\.get_uri_args''severity: high
  description: "XSS via direct output of request variables in OpenResty"
  remediation: "Escape user input before output: ngx.escape_uri() or htmlspecialchars"
  cwe: "CWE-79"
  owasp: "A03:2021"

