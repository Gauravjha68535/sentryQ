- id: k8s-privileged-container
  languages: [yaml]
  patterns:
    - regex: '(?i)privileged:\\s*true''severity: critical
  description: "Pod running privileged container"
  remediation: "Set privileged: false or remove the field entirely"

# Host Network

- id: k8s-host-network
  languages: [yaml]
  patterns:
    - regex: '(?i)hostNetwork:\\s*true''severity: high
  description: "Pod using host network namespace"
  remediation: "Set hostNetwork: false and use Kubernetes networking"

# Host PID

- id: k8s-host-pid
  languages: [yaml]
  patterns:
    - regex: '(?i)hostPID:\\s*true''severity: high
  description: "Pod sharing host PID namespace"
  remediation: "Set hostPID: false unless absolutely necessary"

# Host IPC

- id: k8s-host-ipc
  languages: [yaml]
  patterns:
    - regex: '(?i)hostIPC:\\s*true''severity: high
  description: "Pod sharing host IPC namespace"
  remediation: "Set hostIPC: false unless absolutely necessary"

# Root User

- id: k8s-run-as-root
  languages: [yaml]
  patterns:
    - regex: '(?i)runAsUser:\\s*0|runAsNonRoot:\\s*false''severity: high
  description: "Container running as root user"
  remediation: "Set runAsNonRoot: true and specify non-root runAsUser"

# Writable Root Filesystem

- id: k8s-writable-root-fs
  languages: [yaml]
  patterns:
    - regex: '(?i)readOnlyRootFilesystem:\\s*false|securityContext''severity: medium
  description: "Container root filesystem is writable"
  remediation: "Set readOnlyRootFilesystem: true and use volumes for writable paths"

# Capabilities Added

- id: k8s-cap-add
  languages: [yaml]
  patterns:
    - regex: '(?i)add:\\s*\\[?\\s*(ALL|SYS_ADMIN|NET_ADMIN|SYS_PTRACE)''severity: high
  description: "Dangerous Linux capabilities added to container"
  remediation: "Remove unnecessary capabilities. Use minimal required set"

# No Resource Limits

- id: k8s-no-resource-limits
  languages: [yaml]
  patterns:
    - regex: '(?i)resources:\\s*\\{\\s*|''severity: medium
  description: "Container without resource limits defined"
  remediation: "Define resources.limits and resources.requests for CPU and memory"

# Default Service Account

- id: k8s-default-service-account
  languages: [yaml]
  patterns:
    - regex: '(?i)serviceAccountName:\\s*default|serviceAccount:\\s*default''severity: medium
  description: "Pod using default service account"
  remediation: "Create and use dedicated service accounts with minimal permissions"

# Automount Service Account Token

- id: k8s-automount-sa-token
  languages: [yaml]
  patterns:
    - regex: '(?i)automountServiceAccountToken:\\s*true|''severity: medium
  description: "Service account token automatically mounted"
  remediation: "Set automountServiceAccountToken: false if not needed"

# Host Path Volume

- id: k8s-host-path-volume
  languages: [yaml]
  patterns:
    - regex: '(?i)hostPath:\\s*\\{''severity: high
  description: "Pod using hostPath volume"
  remediation: "Use PersistentVolumeClaim or ConfigMap/Secret instead of hostPath"

# Allow Privilege Escalation

- id: k8s-allow-privilege-escalation
  languages: [yaml]
  patterns:
    - regex: '(?i)allowPrivilegeEscalation:\\s*true|''severity: high
  description: "Container allows privilege escalation"
  remediation: "Set allowPrivilegeEscalation: false in securityContext"

# Ingress Without TLS

- id: k8s-ingress-no-tls
  languages: [yaml]
  patterns:
    - regex: '(?i)kind:\\s*Ingress''severity: high
  description: "Ingress resource without TLS configuration"
  remediation: "Add tls section with secretName for HTTPS termination"

# ClusterRole Binding to Default SA

- id: k8s-clusterrole-default-sa
  languages: [yaml]
  patterns:
    - regex: '(?i)kind:\\s*ClusterRoleBinding.*name:\\s*default''severity: critical
  description: "ClusterRole bound to default service account"
  remediation: "Use dedicated service accounts with minimal required permissions"

# Secrets in Environment Variables

- id: k8s-secrets-in-env
  languages: [yaml]
  patterns:
    - regex: '(?i)value:\\s*['''\"][^''\"]{8,}[''\"].*password|value:\\s*[''\"][^''\"]{8,}[''\"].*secret'
  severity: high
  description: "Secrets hardcoded in environment variables"
  remediation: "Use secretKeyRef to reference Kubernetes Secrets"

# NodePort Service

- id: k8s-nodeport-service
  languages: [yaml]
  patterns:
    - regex: '(?i)type:\\s*NodePort''severity: medium
  description: "Service exposed via NodePort"
  remediation: "Use ClusterIP with Ingress or LoadBalancer for external access"

# Liveness/Readiness Probe Missing

- id: k8s-probe-missing
  languages: [yaml]
  patterns:
    - regex: '(?i)kind:\\s*(Deployment|StatefulSet)''severity: medium
  description: "Deployment without liveness/readiness probes"
  remediation: "Add livenessProbe and readinessProbe for health checking"

# Image Pull Policy Always

- id: k8s-image-pull-policy
  languages: [yaml]
  patterns:
    - regex: '(?i)imagePullPolicy:\\s*Always''severity: low
  description: "Image pull policy set to Always"
  remediation: "Use IfNotPresent with tagged images for production"

# Latest Image Tag

- id: k8s-latest-image-tag
  languages: [yaml]
  patterns:
    - regex: '(?i)image:\\s*[^:]+:latest|image:\\s*[^:]+$''severity: medium
  description: "Using :latest tag or no tag for container image"
  remediation: "Pin image to specific version: image: nginx:1.25.3"

# Network Policy Missing

- id: k8s-network-policy-missing
  languages: [yaml]
  patterns:
    - regex: '(?i)kind:\\s*Namespace''severity: medium
  description: "Namespace without NetworkPolicy"
  remediation: "Create NetworkPolicy to restrict pod-to-pod communication"

