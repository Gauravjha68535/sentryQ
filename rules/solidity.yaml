- id: sol-erc20-approve-race
  languages: [solidity]
  patterns:
    - regex: '(?i)approve\\s*\\(\\s*\\w+\\s*,\\s*\\w+\\s*\\)''severity: high
  description: "ERC20 approve race condition"
  remediation: "Use increaseAllowance/decreaseAllowance"
  cwe: "CWE-841"
  owasp: "A04:2021"
  confidence: 0.8

