# ============================================================================
# SOLIDITY / SMART CONTRACT SECURITY RULES
# ============================================================================

# ======================== Reentrancy ========================
- id: sol-reentrancy-external-call
  languages: [solidity]
  patterns:
    - regex: '\\.call\\{value:|\\.send\\(|\\.transfer\\(''severity: critical
  description: "External call may be vulnerable to reentrancy attacks"
  remediation: "Use checks-effects-interactions pattern. Apply ReentrancyGuard from OpenZeppelin"
  cwe: "CWE-841"
  owasp: "N/A"

- id: sol-reentrancy-state-after-call
  languages: [solidity]
  patterns:
    - regex: '\\.call\\{[^}]*\\}\\([^)]*\\)[^;]*;[^}]*\\w+\\s*=''severity: critical
  description: "State modification after external call — reentrancy risk"
  remediation: "Update state BEFORE external calls (checks-effects-interactions pattern)"
  cwe: "CWE-841"
  owasp: "N/A"

# ======================== Overflow / Underflow ========================
- id: sol-unchecked-math
  languages: [solidity]
  patterns:
    - regex: 'unchecked\\s*\\{''severity: medium
  description: "Unchecked arithmetic block bypasses overflow/underflow checks"
  remediation: "Only use unchecked blocks when overflow is mathematically impossible"
  cwe: "CWE-190"
  owasp: "N/A"

# ======================== Access Control ========================
- id: sol-tx-origin-auth
  languages: [solidity]
  patterns:
    - regex: 'tx\\.origin''severity: high
  description: "tx.origin used for authorization — vulnerable to phishing attacks"
  remediation: "Use msg.sender instead of tx.origin for authorization checks"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: sol-missing-access-control
  languages: [solidity]
  patterns:
    - regex: 'function\\s+\\w+\\s*\\([^)]*\\)\\s*(public|external)''severity: high
  description: "Public/external function may lack access control"
  remediation: "Add onlyOwner modifier or require(msg.sender == owner) for sensitive functions"
  cwe: "CWE-862"
  owasp: "A01:2021"

- id: sol-unprotected-selfdestruct
  languages: [solidity]
  patterns:
    - regex: 'selfdestruct\\s*\\(|suicide\\s*\\(''severity: critical
  description: "selfdestruct can destroy the contract and steal all funds"
  remediation: "Add strict access control to selfdestruct. Consider removing it entirely"
  cwe: "CWE-284"
  owasp: "A01:2021"

# ======================== Randomness ========================
- id: sol-insecure-randomness
  languages: [solidity]
  patterns:
    - regex: 'block\\.(timestamp|difficulty|number|coinbase)|blockhash\\(''severity: high
  description: "Block variables used for randomness can be manipulated by miners"
  remediation: "Use Chainlink VRF or commit-reveal scheme for secure randomness"
  cwe: "CWE-330"
  owasp: "N/A"

# ======================== Gas / DoS ========================
- id: sol-unbounded-loop
  languages: [solidity]
  patterns:
    - regex: 'for\\s*\\(\\s*uint\\s+\\w+\\s*=\\s*0\\s*;\\s*\\w+\\s*<\\s*\\w+\\.length''severity: medium
  description: "Unbounded loop over dynamic array may cause out-of-gas DoS"
  remediation: "Limit loop iterations or use pagination pattern"
  cwe: "CWE-400"
  owasp: "N/A"

- id: sol-dos-with-revert
  languages: [solidity]
  patterns:
    - regex: 'require\\s*\\([^)]*\\.transfer\\(|require\\s*\\([^)]*\\.send\\(''severity: medium
  description: "External call in require can brick the contract if recipient reverts"
  remediation: "Use pull-over-push pattern for payments. Let users withdraw instead"
  cwe: "CWE-400"
  owasp: "N/A"

# ======================== Visibility ========================
- id: sol-default-visibility
  languages: [solidity]
  patterns:
    - regex: 'function\\s+\\w+\\s*\\([^)]*\\)\\s*''severity: medium
  description: "Function without explicit visibility defaults to public"
  remediation: "Always specify function visibility: public, private, internal, or external"
  cwe: "CWE-710"
  owasp: "N/A"

# ======================== Delegate Call ========================
- id: sol-delegatecall
  languages: [solidity]
  patterns:
    - regex: '\\.delegatecall\\(''severity: high
  description: "delegatecall executes code in the context of the calling contract"
  remediation: "Only delegatecall to trusted contracts. Validate target address"
  cwe: "CWE-829"
  owasp: "N/A"

# ======================== Hardcoded Addresses ========================
- id: sol-hardcoded-address
  languages: [solidity]
  patterns:
    - regex: '0x[0-9a-fA-F]{40}''severity: low
  description: "Hardcoded Ethereum address detected"
  remediation: "Use constructor parameters or configuration for addresses to support multiple networks"
  cwe: "CWE-798"
  owasp: "N/A"

# ======================== Floating Pragma ========================
- id: sol-floating-pragma
  languages: [solidity]
  patterns:
    - regex: 'pragma solidity\\s*\\^''severity: low
  description: "Floating pragma version allows compilation with different compiler versions"
  remediation: "Lock pragma to a specific version: pragma solidity 0.8.20;"
  cwe: "N/A"
  owasp: "N/A"

# ======================== Front-Running ========================
- id: sol-frontrunning-vulnerable
  languages: [solidity]
  patterns:
    - regex: '(?i)approve\\s*\\(|transferFrom\\s*\\(''severity: medium
  description: "ERC-20 approve/transferFrom pattern is vulnerable to front-running"
  remediation: "Use increaseAllowance/decreaseAllowance or permit (EIP-2612)"
  cwe: "CWE-362"
  owasp: "N/A"

# ======================== Flash Loan ========================
- id: sol-flash-loan-vulnerable
  languages: [solidity]
  patterns:
    - regex: '(?i)flashLoan|flash_loan|getReserves''severity: medium
  description: "Function may be vulnerable to flash loan price manipulation"
  remediation: "Use time-weighted average prices (TWAP) from Uniswap V3 or Chainlink oracles"
  cwe: "N/A"
  owasp: "N/A"

