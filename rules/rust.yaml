# ==================== SQL Injection ====================
- id: rust-sql-injection-format
  languages: [rust]
  patterns:
    - regex: '(?i)(execute|query)\\.s*\\.\\.s*format!\\.s*\\.\\.s*[\\.\\.27].*\\..*\\..*[\\.\\.27]''- ast:
        language: rust
        query: '(call_expression function: (identifier) @func (#eq? @func "execute") arguments: (arguments (macro_invocation macro: (identifier) @macro (#eq? @macro "format!"))))'
  severity: critical
  description: "Potential SQL injection via format! macro in SQL query"
  remediation: "Use parameterized queries with ? placeholders in your SQL library (sqlx, diesel, postgres)"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: rust-sql-injection-concat
  languages: [rust]
  patterns:
    - regex: '(?i)\\.query\\.s*\\.\\.s*[\\.\\.27].*\\..*[\\.\\.27]''severity: critical
  description: "SQL injection risk via string concatenation in query"
  remediation: "Use parameterized queries: conn.execute(\"SELECT * FROM users WHERE id = $1\", &[&user_id])"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ==================== Command Injection ====================
- id: rust-command-injection
  languages: [rust]
  patterns:
    - regex: 'Command::new\\.s*\\.\\.s*[\\.\\.27].*\\..*[\\.\\.27]''- ast:
        language: rust
        query: '(call_expression function: (path_expression path: (identifier) @path (#eq? @path "Command")) arguments: (arguments (string_literal) @cmd (#match? @cmd "\\+")))'
  severity: critical
  description: "Potential command injection via Command with string concatenation"
  remediation: "Pass command arguments as separate parameters: Command::new(\"ls\").arg(user_input)"
  cwe: "CWE-78"
  owasp: "A03:2021"

- id: rust-shell-injection
  languages: [rust]
  patterns:
    - regex: '(?i)(system|popen)\\.s*\\.\\.s*[\\.\\.27].*\\..*\\..*[\\.\\.27]''severity: critical
  description: "Shell command with interpolated user input detected"
  remediation: "Avoid shell commands. Use std::process::Command with explicit arguments"
  cwe: "CWE-78"
  owasp: "A03:2021"

