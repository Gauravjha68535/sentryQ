  severity: medium
  description: "WordPress debug mode enabled in production - exposes sensitive data"
  remediation: "Set WP_DEBUG to false in production wp-config.php"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: php-wp-config-salt
  languages: [php]
  patterns:
    - regex: 'define\\s*\\(\\s*[''"](?:AUTH_KEY|SECURE_AUTH_KEY|LOGGED_IN_KEY|NONCE_KEY)[''"]\\s*,\\s*[''"][^''"]*[''"]'
  severity: high
  description: "WordPress salts in wp-config - ensure they are unique and strong"
  remediation: "Use https://api.wordpress.org/secret-key/1.1/salt/ to generate strong salts"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: php-wp-config-db
  languages: [php]
  patterns:
    - regex: 'define\\s*\\(\\s*[''"](?:DB_NAME|DB_USER|DB_PASSWORD|DB_HOST)[''"]\\s*,\\s*[''"][^''"]*[''"]'
  severity: high
  description: "WordPress database credentials in wp-config"
  remediation: "Use strong passwords, restrict database user permissions"
  cwe: "CWE-798"
  owasp: "A07:2021"

- id: php-wp-config-table-prefix
  languages: [php]
  patterns:
    - regex: '\$table_prefix\\s*=\\s*[''"]wp_[''"]'
  severity: medium
  description: "WordPress default table prefix - easily guessable"
  remediation: "Change table prefix to something unique: 'wp8a3d9_'', ''myapp_'"
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: php-wp-ajax-nonce-missing
  languages: [php]
  patterns:
