  severity: medium
  description: "Token splitting via explode() used for authentication can be spoofed by appending arbitrary padding to hit the split target, leading to IDOR."
  remediation: "Ensure split lengths are strictly validated (e.g., exactly two segments) or rely on unforgeable serialized signed objects (JWTs)."
  cwe: "CWE-287"
  owasp: "A01:2021"

- id: php-webhook-sig-bypass
  languages: [php]
  patterns:
    - regex: '(?s)(?:sig|signature|X-Signature|X-Hub-Signature)\s*=\s*(?:\$_SERVER|\$request->header)[\s\S]{0,500}unserialize\s*\('
  severity: critical
  description: "Potential signature bypass: Webhook signature is read but unserialize() follows. Ensure signature is verified and execution is aborted on mismatch."
  remediation: "Verify HMAC signature before calling unserialize(). Use hash_equals() to prevent timing attacks."
  cwe: "CWE-347"
  owasp: "A07:2021"

- id: php-laravel-ssrf-auth-chain
  languages: [php]
  patterns:
