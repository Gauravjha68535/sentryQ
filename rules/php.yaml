  description: "Potential SSRF-to-Account-Takeover chain: User-controlled URL parameter used in authentication flow."
  remediation: "Strictly validate redirect URLs and state parameters against an allowlist."
  cwe: "CWE-918"
  owasp: "A10:2021"

- id: php-fake-sanitizer-path
