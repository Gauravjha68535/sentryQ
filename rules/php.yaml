  severity: critical
  description: "IDOR via unsigned base64 token. base64 encoding without an HMAC signature is trivially forgeable."
  remediation: "Sign verification tokens with a strong HMAC or use JWTs to prevent forgery."
  cwe: "CWE-639"
  owasp: "A01:2021"

- id: php-extract-eval-injection
  languages: [php]
  patterns:
  - regex: '(?i)extract\(\$[^)]+\)(?:.|\n)*eval\('
  severity: critical
  description: "extract() immediately preceding eval() allows critical variable injection and code execution."
  remediation: "Never use extract() on untrusted arrays, and avoid eval() entirely."
  cwe: "CWE-94"
  owasp: "A03:2021"

- id: php-process-list-credentials
  languages: [php]
  patterns:
  - regex: '(?i)mysqldump\s+-u\{\$[^}]+\}\s+-p\{\$[^}]+\}'
  severity: critical
  description: "Database credentials injected directly into a shell command line, exposing them to the process list (ps aux)."
  remediation: "Pass database credentials via environment variables instead of command line arguments."
  cwe: "CWE-214"
  owasp: "A05:2021"

- id: php-curl-ssrf-unrestricted
  languages: [php]
  patterns:
  - regex: '(?i)curl_setopt\([^\,]+,\s*CURLOPT_URL,\s*\$(?!.*CURLPROTO_HTTPS).*\)'
  severity: high
  description: "cURL handler lacking CURLOPT_PROTOCOLS restriction allows SSRF scheme bypass (dict://, file://, gopher://)."
  remediation: "Restrict allowed cURL protocols using CURLOPT_PROTOCOLS to limit to HTTPS only."
  cwe: "CWE-918"
  owasp: "A10:2021"

- id: php-laravel-cache-poisoning
  languages: [php]
  patterns:
  - regex: '(?i)Cache::(?:get|put)\([''"]widget_\{\$type\}_'
  severity: high
  description: "Cache key poisoning via user-controlled input interpolated directly into the cache key."
  remediation: "Strictly validate or explicitly define cache keys to prevent collision and data exposure."
  cwe: "CWE-20"
  owasp: "A03:2021"

- id: php-oauth-open-redirect
  languages: [php]
  patterns:
  - regex: '(?i)(?:return|redirect\()->.*\$request->(?:input|get)\([''"](?:next|redirect|url)[''"]'
  severity: high
  description: "Unsanitized 'next' or 'redirect' URL parameter used immediately following an OAuth authentication callback establishes an Open Redirect phishing path."
  remediation: "Strictly validate redirection targets against an internal relative path allowlist before routing the user post-login."
  cwe: "CWE-601"
  owasp: "A10:2021"

- id: php-raw-db-column-interpolation
  languages: [php]
  patterns:
  - regex: '(?i)DB::select\(\s*["'']SELECT\s+\{\$[a-zA-Z_]+\}'
  severity: high
  description: "Raw SQL parameter interpolation of table column names (SELECT {$field}) circumvents value parameterization, allowing schema discovery / data exfiltration."
  remediation: "Validate requested columns against a hardcoded array allowlist before executing dynamic selects."
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: php-idor-explode-truncation
  languages: [php]
  patterns:
