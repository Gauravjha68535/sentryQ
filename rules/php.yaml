# ======================== SESSIONS & COOKIES (201-225) ========================

- id: php-session-fixation
  languages: [php]
  patterns:
    - regex: 'session_start\\(\\);(?!.*session_regenerate_id)'
  severity: high
  description: "Session started without regeneration - vulnerable to session fixation"
  remediation: "Call session_regenerate_id(true) after login"
  cwe: "CWE-384"
  owasp: "A01:2021"

- id: php-session-id-in-url
  languages: [php]
  patterns:
    - regex: 'SID|session_name\\(\\)\\s*\\.\\s*=|session_id\\(\\)\\s*\\.\\s*='
  severity: high
  description: "Session ID in URL - exposure in logs, referrer headers"
  remediation: "Ensure session.use_only_cookies = 1 in php.ini"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: php-session-use-only-cookies
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.use_only_cookies[''"],\\s*0\\)'
  severity: high
  description: "Session allows ID in URL - exposes session ID"
  remediation: "Set session.use_only_cookies = 1"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: php-session-use-trans-sid
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.use_trans_sid[''"],\\s*1\\)'
  severity: high
  description: "Transparent SID enabled - exposes session in URLs"
  remediation: "Set session.use_trans_sid = 0"
  cwe: "CWE-200"
  owasp: "A05:2021"

- id: php-session-cookie-httponly
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.cookie_httponly[''"],\\s*0\\)'
  severity: high
  description: "Session cookie without HttpOnly flag - accessible to JavaScript"
  remediation: "Set session.cookie_httponly = 1"
  cwe: "CWE-614"
  owasp: "A01:2021"

- id: php-session-cookie-secure
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.cookie_secure[''"],\\s*0\\)'
  severity: medium
  description: "Session cookie without Secure flag - sent over HTTP"
  remediation: "Set session.cookie_secure = 1 when using HTTPS"
  cwe: "CWE-614"
  owasp: "A01:2021"

- id: php-session-cookie-samesite
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.cookie_samesite[''"],\\s*[''"](?:None|none)[''"]\\)'
  severity: high
  description: "Session cookie with SameSite=None - requires Secure flag, CSRF risk"
  remediation: "Use SameSite=Lax or Strict"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: php-session-cookie-domain
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.cookie_domain[''"],\\s*[''"]\\.[^''"]+[''"]\\)'
  severity: medium
  description: "Session cookie domain too broad - sent to subdomains"
  remediation: "Restrict cookie domain to specific domain"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: php-session-cookie-path
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.cookie_path[''"],\\s*[''"]/[''"]\\)'
  severity: low
  description: "Session cookie path set to root - sent to all paths"
  remediation: "Restrict cookie path to application path"
  cwe: "CWE-284"
  owasp: "A01:2021"

- id: php-session-gc-maxlifetime
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.gc_maxlifetime[''"],\\s*[6-9]\\d{5,}\\)'
  severity: high
  description: "Session lifetime too long (hours/days) - increased hijacking window"
  remediation: "Set session.gc_maxlifetime to reasonable value (1800-7200 seconds)"
  cwe: "CWE-613"
  owasp: "A07:2021"

- id: php-session-cache-limiter
  languages: [php]
  patterns:
    - regex: 'session_cache_limiter\\([''"]public[''"]\\)'
  severity: high
  description: "Session cache limiter set to public - may cache authenticated pages"
  remediation: "Use session_cache_limiter('private_no_expire') or 'private'"
  cwe: "CWE-524"
  owasp: "A05:2021"

- id: php-session-save-path
  languages: [php]
  patterns:
    - regex: 'session_save_path\\([''"](?:/tmp|/var/tmp)[''"]\\)'
  severity: high
  description: "Session save path in world-writable directory - session hijacking"
  remediation: "Use secure directory with restricted permissions"
  cwe: "CWE-732"
  owasp: "A01:2021"

- id: php-session-save-path-perms
  languages: [php]
  patterns:
    - regex: 'session_save_path\\([^)]+\\);?(?!.*chmod)'
  severity: medium
  description: "Session save path set without checking permissions"
  remediation: "Ensure session directory has 700 permissions"
  cwe: "CWE-732"
  owasp: "A01:2021"

- id: php-session-serialize-handler
  languages: [php]
  patterns:
    - regex: 'ini_set\\([''"]session\\.serialize_handler[''"],\\s*[''"]php[''"]\\)'
  severity: high
  description: "PHP serialize handler - may allow object injection"
  remediation: "Use 'php_serialize' handler: session.serialize_handler = php_serialize"
  cwe: "CWE-502"
  owasp: "A08:2021"

- id: php-session-serialize-injection
  languages: [php]
  patterns:
    - regex: 'session_decode|session_encode'
  severity: high
  description: "Manual session encoding/decoding - object injection risk"
  remediation: "Avoid manual session manipulation"
  cwe: "CWE-502"
  owasp: "A08:2021"

- id: php-setcookie-httponly
  languages: [php]
  patterns:
    - regex: 'setcookie\\s*\\([^)]+(?!httponly)'
  severity: high
  description: "setcookie() without HttpOnly flag - accessible to JavaScript"
  remediation: "Use setcookie(..., ['httponly' => true]) or setcookie(..., ..., true)"
  cwe: "CWE-614"
  owasp: "A01:2021"

- id: php-setcookie-secure
  languages: [php]
  patterns:
    - regex: 'setcookie\\s*\\([^)]+(?!secure)'
  severity: high
  description: "setcookie() without Secure flag - sent over HTTP"
  remediation: "Add 'secure' => true to options array"
  cwe: "CWE-614"
  owasp: "A01:2021"

- id: php-setcookie-samesite
  languages: [php]
  patterns:
    - regex: 'setcookie\\s*\\([^)]+(?!samesite)'
  severity: medium
  description: "setcookie() without SameSite attribute - CSRF risk"
  remediation: "Add 'samesite' => 'Lax' or 'Strict' to options"
  cwe: "CWE-352"
  owasp: "A01:2021"

- id: php-setcookie-samesite-none
  languages: [php]
  patterns:
    - regex: 'samesite\\s*=>\\s*[''"]None[''"]'
  severity: high
  description: "Cookie with SameSite=None - requires Secure flag"
