- id: erlang-os-cmd
  languages: [erlang]
  patterns:
    - regex: '(?i)os:cmd\s*\('
  severity: critical
  description: "OS command execution"
  remediation: "Avoid os:cmd with user input"
  cwe: "CWE-78"
  owasp: "A03:2021"
  confidence: 0.8

