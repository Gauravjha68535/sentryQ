# ============================================================================
# ELIXIR / PHOENIX SECURITY RULES
# ============================================================================

# ======================== Hardcoded Secrets ========================
- id: elixir-hardcoded-secret
  languages: [elixir]
  patterns:
    - regex: '(?i)(secret_key_base|password|api_key|secret)\s*[=:]\s*\\"[^\\"]{8,}\\"'
  severity: high
  description: "Hardcoded secret in Elixir source code"
  remediation: "Use System.get_env() or runtime config for secrets"
  cwe: "CWE-798"
  owasp: "A07:2021"

# ======================== SQL Injection (Ecto) ========================
- id: elixir-sql-injection-fragment
  languages: [elixir]
  patterns:
    - regex: '(?i)fragment\s*\(\s*\\".*#\{|Ecto\.Adapters\.SQL\.query.*#\{'
  severity: critical
  description: "SQL injection via string interpolation in Ecto fragment"
  remediation: "Use Ecto.Query placeholders: fragment(\"? = ?\", field, ^value)"
  cwe: "CWE-89"
  owasp: "A03:2021"

- id: elixir-sql-injection-raw
  languages: [elixir]
  patterns:
    - regex: '(?i)Ecto\.Adapters\.SQL\.(query|query!)\s*\(.*<>'
  severity: critical
  description: "Raw SQL with string concatenation in Ecto"
  remediation: "Use parameterized queries: SQL.query(repo, \"SELECT * WHERE id = $1\", [id])"
  cwe: "CWE-89"
  owasp: "A03:2021"

# ======================== Command Injection ========================
- id: elixir-command-injection
  languages: [elixir]
  patterns:
    - regex: 'System\.cmd\s*\(.*#\{|:os\.cmd\s*\(.*#\{'
  severity: critical
  description: "Command injection via string interpolation in System.cmd"
  remediation: "Use System.cmd/3 with separate argument list. Never interpolate user input"
  cwe: "CWE-78"
  owasp: "A03:2021"

# ======================== Code Injection ========================
- id: elixir-code-injection-eval
  languages: [elixir]
  patterns:
    - regex: 'Code\.eval_string\s*\(|Code\.eval_file\s*\('
  severity: critical
  description: "Code.eval_string() can execute arbitrary Elixir code"
  remediation: "Avoid Code.eval_string with user input. Use AST-safe parsing"
  cwe: "CWE-94"
  owasp: "A03:2021"

# ======================== XSS (Phoenix) ========================
- id: elixir-phoenix-xss
  languages: [elixir]
  patterns:
    - regex: '(?i)raw\s*\(.*conn\.params|Phoenix\.HTML\.raw\s*\(.*params'
  severity: high
  description: "XSS via raw() with user input in Phoenix template"
  remediation: "Avoid raw(). Phoenix auto-escapes by default — use <%= instead of raw"
  cwe: "CWE-79"
  owasp: "A03:2021"

# ======================== CSRF ========================
- id: elixir-phoenix-csrf-disabled
  languages: [elixir]
  patterns:
    - regex: '(?i)protect_from_forgery\s*false|:put_secure_browser_headers.*delete'
  severity: high
  description: "CSRF protection disabled in Phoenix"
  remediation: "Keep protect_from_forgery enabled and use csrf_meta_tag in templates"
  cwe: "CWE-352"
  owasp: "A01:2021"

# ======================== Sensitive Data ========================
- id: elixir-sensitive-log
  languages: [elixir]
  patterns:
    - regex: '(?i)Logger\.(info|warn|error|debug)\s*\(.*(?:password|token|secret|credit_card)'
  severity: medium
  description: "Sensitive data in Logger output"
  remediation: "Filter sensitive data from logs. Use @derive {Inspect, except: [:password]}"
  cwe: "CWE-532"
  owasp: "A09:2021"

# ======================== Deserialization ========================
- id: elixir-insecure-deserialization
  languages: [elixir]
  patterns:
    - regex: ':erlang\.binary_to_term\s*\(|:erlang\.term_to_binary'
  severity: high
  description: "Erlang term deserialization can execute arbitrary code"
  remediation: "Use :erlang.binary_to_term(data, [:safe]) or JSON for untrusted data"
  cwe: "CWE-502"
  owasp: "A08:2021"

# ======================== Insecure HTTP ========================
- id: elixir-insecure-http
  languages: [elixir]
  patterns:
    - regex: 'http://[^\\\"''\s]+'
  severity: low
  description: "Insecure HTTP URL detected"
  remediation: "Use HTTPS for all external communications"
  cwe: "CWE-319"
  owasp: "A02:2021"

# ======================== Open Redirect ========================
- id: elixir-open-redirect
  languages: [elixir]
  patterns:
    - regex: 'redirect\s*\(\s*conn\s*,\s*external:\s*.*params'
  severity: high
  description: "Open redirect via user-controlled URL"
  remediation: "Validate redirect URLs against allowlist. Prefer internal redirects"
  cwe: "CWE-601"
  owasp: "A01:2021"

# ======================== Path Traversal ========================
- id: elixir-path-traversal
  languages: [elixir]
  patterns:
    - regex: 'File\.(read|write|stream)\s*\(.*params|Path\.join\s*\(.*params'
  severity: high
  description: "Path traversal via user-controlled file path"
  remediation: "Validate paths with Path.expand and ensure they start within expected directory"
  cwe: "CWE-22"
  owasp: "A01:2021"

